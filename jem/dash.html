<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>J&E Admin Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script type="module" src="../../apps/assets/js/login.js" defer></script>

    <style>
      :root {
        --bg: #080e18;
        --panel: #0d1526;
        --panel2: #111c31;
        --text: #f0f4ff;
        --muted: #8fa8c8;
        --accent: #0ea5e9;
        --accent-dim: rgba(14, 165, 233, 0.15);
        --border: rgba(255, 255, 255, 0.1);
        --radius: 16px;
        --shadow: 0 10px 30px rgba(0, 0, 0, 0.45);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
      }

      button,
      input,
      select {
        font: inherit;
      }

      .app {
        display: grid;
        height: 100vh;
      }

      .sidebar {
        border-right: 1px solid var(--border);
        background: var(--panel);
        overflow-y: auto;
        display: flex;
        flex-direction: column;
      }

      .sidebar-header {
        padding: 18px;
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
        background: rgba(13, 21, 38, 0.96);
        backdrop-filter: blur(10px);
        z-index: 10;
      }

      .sidebar-header h1 {
        margin: 0;
        font-size: 1.3rem;
      }

      .muted {
        color: var(--muted);
        font-size: 0.88rem;
      }

      .login-panel {
        display: grid;
        gap: 12px;
        margin-top: 16px;
      }

      .btn {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 11px 14px;
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        cursor: pointer;
        font-weight: 700;
        transition: background 0.15s ease;
      }

      .btn:hover {
        background: rgba(255, 255, 255, 0.12);
      }

      .btn-primary {
        background: var(--accent);
        border-color: var(--accent);
      }

      .btn-danger {
        background: rgba(239, 68, 68, 0.15);
        border-color: rgba(239, 68, 68, 0.3);
        color: #fecaca;
      }

      .hidden {
        display: none !important;
      }

      .toolbar {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 16px;
      }

      .search-row {
        margin-top: 16px;
        display: grid;
        gap: 10px;
      }

      .requests {
        padding: 16px;
        display: grid;
        gap: 14px;
      }

      .request-card {
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: rgba(255, 255, 255, 0.03);
        overflow: hidden;
        box-shadow: var(--shadow);
      }

      .request-top {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 14px;
        border-bottom: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.02);
      }

      .request-title {
        display: grid;
        gap: 3px;
      }

      .request-title strong {
        font-size: 1rem;
      }

      .status {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 5px 10px;
        border-radius: 999px;
        font-size: 0.72rem;
        font-weight: 800;
        text-transform: uppercase;
        border: 1px solid var(--border);
        white-space: nowrap;
      }

      .status-new {
        background: rgba(245, 158, 11, 0.18);
        color: #fde68a;
        border-color: rgba(245, 158, 11, 0.35);
      }

      .status-contacted {
        background: rgba(14, 165, 233, 0.18);
        color: #bae6fd;
        border-color: rgba(14, 165, 233, 0.35);
      }

      .status-scheduled {
        background: rgba(168, 85, 247, 0.18);
        color: #e9d5ff;
        border-color: rgba(168, 85, 247, 0.35);
      }

      .status-completed {
        background: rgba(34, 197, 94, 0.18);
        color: #bbf7d0;
        border-color: rgba(34, 197, 94, 0.35);
      }

      .request-body {
        padding: 14px;
        display: grid;
        gap: 12px;
      }

      .request-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }

      .request-field {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 10px;
        background: rgba(255, 255, 255, 0.03);
      }

      .request-field span {
        display: block;
        color: var(--muted);
        font-size: 0.72rem;
        margin-bottom: 4px;
      }

      .notes {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
        background: rgba(0, 0, 0, 0.18);
        white-space: pre-wrap;
      }

      .request-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .workspace {
        display: grid;
        grid-template-rows: auto 1fr;
        overflow: hidden;
        background: #050b15;
      }

      .workspace-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        padding: 14px 18px;
        border-bottom: 1px solid var(--border);
        background: rgba(13, 21, 38, 0.95);
        backdrop-filter: blur(10px);
      }

      .workspace-buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      iframe {
        width: 100%;
        height: 100%;
        border: 0;
        background: white;
      }

      .empty-state {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: var(--muted);
        font-size: 1rem;
        text-align: center;
        padding: 30px;
      }

      @media (max-width: 1200px) {
        .app {
          grid-template-columns: 1fr;
        }

        .sidebar {
          max-height: 50vh;
        }
      }

      @media (max-width: 600px) {
        .request-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
    <link rel="stylesheet" href="./assets/css/styles.css" id="stylesheet" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="./index.html">
          <span class="brand-name">J<span>&amp;</span>E Mobile</span>
          <span class="brand-sub">Detailing &amp; Mechanic</span>
        </a>

        <div id="login-section">
          <form id="login-form">
            <label for="username">Email:</label>
            <input type="email" id="username" required />
            <br />
            <label for="password">Password:</label>
            <input type="password" id="password" required />
            <br />
            <button type="submit">Sign in</button>
          </form>
          <button id="logout" style="display: none">Logout</button>
        </div>
      </div>

      <!-- Mobile menu -->
      <div id="mobile-menu" class="mobile-menu" aria-hidden="true"></div>
    </header>

    <div class="admin-dashboard">
      <div class="app">
        <!-- SIDEBAR -->
        <aside class="sidebar">
          <div class="sidebar-header">
            <h1>J&E Dispatch</h1>
            <div class="muted" id="adminStatus">Not logged in</div>

            <div id="adminPanel" class="hidden">
              <div class="search-row">
                <input
                  type="search"
                  id="searchInput"
                  placeholder="Search requests..."
                />

                <select id="statusFilter">
                  <option value="all">All Statuses</option>
                  <option value="new">New</option>
                  <option value="contacted">Contacted</option>
                  <option value="scheduled">Scheduled</option>
                  <option value="completed">Completed</option>
                </select>
              </div>
            </div>
          </div>

          <div id="requests" class="requests"></div>
        </aside>

        <!-- WORKSPACE -->
        <section class="workspace">
          <div class="workspace-top">
            <div>
              <strong>Workspace</strong>
              <div class="muted">
                Open your internal apps directly in the dashboard.
              </div>
            </div>

            <div class="workspace-buttons">
              <button
                class="btn"
                data-app="../../apps/online/onlinetasker.html"
              >
                Open Tasker
              </button>

              <button
                class="btn"
                data-app="../../apps/online/onlineinvoice.html"
              >
                Open Invoice
              </button>

              <button class="btn" id="clearFrameBtn">Close App</button>
            </div>
          </div>

          <div id="workspaceArea">
            <div class="empty-state">
              Select an app to open it in the workspace.
            </div>
          </div>
        </section>
      </div>
    </div>

    <script type="module">
      import {
        auth,
        database,
        ref,
        set,
        get,
        onValue,
        signOut,
        onAuthStateChanged,
        signInWithEmailAndPassword,
      } from "../../assets/js/firebase-init.js";

      const adminPanel = document.getElementById("adminPanel");
      const adminStatus = document.getElementById("adminStatus");

      const requestsEl = document.getElementById("requests");
      const searchInput = document.getElementById("searchInput");
      const statusFilter = document.getElementById("statusFilter");

      const workspaceArea = document.getElementById("workspaceArea");
      const clearFrameBtn = document.getElementById("clearFrameBtn");

      let allTickets = {};
      let isAdmin = false;

      onAuthStateChanged(auth, async (user) => {
        if (!user) {
          isAdmin = false;

          adminStatus.textContent = "Not logged in";

          adminPanel.classList.add("hidden");

          requestsEl.innerHTML = `
            <div class="request-card">
                <div class="request-body">
                <div class="muted">
                    Please sign in using the header above.
                </div>
                </div>
            </div>
            `;

          return;
        }

        try {
          const adminSnap = await get(ref(database, `${user.uid}/info/role`));

          isAdmin = adminSnap.exists() && adminSnap.val() === "admin";

          if (!isAdmin) {
            adminStatus.textContent = `Logged in as ${user.email} (Not authorized)`;

            adminPanel.classList.add("hidden");

            requestsEl.innerHTML = `
        <div class="request-card">
          <div class="request-body">
            <div class="muted">
              Your account is not authorized as an admin.
            </div>
          </div>
        </div>
      `;

            return;
          }

          adminStatus.textContent = `Logged in as ${user.email}`;

          adminPanel.classList.remove("hidden");

          loadTickets();
        } catch (error) {
          console.error(error);

          adminStatus.textContent = "Failed to verify admin access";
        }
      });

      function loadTickets() {
        onValue(ref(database, "public/serviceTickets"), (snapshot) => {
          allTickets = snapshot.val() || {};

          renderTickets();
        });
      }

      searchInput.addEventListener("input", renderTickets);
      statusFilter.addEventListener("change", renderTickets);

      function renderTickets() {
        const query = searchInput.value.trim().toLowerCase();
        const status = statusFilter.value;

        requestsEl.innerHTML = "";

        const tickets = Object.entries(allTickets)
          .map(([id, ticket]) => ({ id, ...ticket }))
          .filter((ticket) => {
            const searchBlob = [
              ticket.name,
              ticket.phone,
              ticket.service,
              ticket.notes,
              ticket.city,
              ticket.vehicle,
            ]
              .join(" ")
              .toLowerCase();

            const matchesSearch = !query || searchBlob.includes(query);
            const matchesStatus = status === "all" || ticket.status === status;

            return matchesSearch && matchesStatus;
          })
          .sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

        if (!tickets.length) {
          requestsEl.innerHTML = `
          <div class="request-card">
            <div class="request-body">
              <div class="muted">No requests found.</div>
            </div>
          </div>
        `;

          return;
        }

        tickets.forEach((ticket) => {
          const card = document.createElement("div");
          card.className = "request-card";

          card.innerHTML = `

          <div class="request-top">

            <div class="request-title">
              <strong>${escapeHtml(ticket.name || "Unknown")}</strong>
              <div class="muted">
                ${escapeHtml(ticket.ticketNumber || ticket.id)}
              </div>
              <div class="muted">
                ${new Date(ticket.timestamp || Date.now()).toLocaleString()}
              </div>
            </div>

            <div class="status status-${ticket.status || "new"}">
              ${ticket.status || "new"}
            </div>

          </div>

          <div class="request-body">

            <div class="request-grid">

              <div class="request-field">
                <span>Phone</span>
                ${escapeHtml(ticket.phone || "-")}
              </div>

              <div class="request-field">
                <span>Service</span>
                ${escapeHtml(ticket.service || "-")}
              </div>

              <div class="request-field">
                <span>City</span>
                ${escapeHtml(ticket.city || "-")}
              </div>

              <div class="request-field">
                <span>Vehicle</span>
                ${escapeHtml(ticket.vehicle || "-")}
              </div>

            </div>

            <div class="notes">${escapeHtml(ticket.notes || "No notes")}</div>

            <div class="request-actions">

              <a class="btn" href="tel:${ticket.phone || ""}">
                Call
              </a>

              <a class="btn" href="sms:${ticket.phone || ""}">
                Text
              </a>

              <button class="btn" data-status="contacted">
                Contacted
              </button>

              <button class="btn" data-status="scheduled">
                Scheduled
              </button>

              <button class="btn" data-status="completed">
                Completed
              </button>

              <button class="btn" data-tasker="true">
                Open Tasker
              </button>

              <button class="btn" data-invoice="true">
                Open Invoice
              </button>

            </div>

          </div>
        `;

          card.querySelectorAll("[data-status]").forEach((btn) => {
            btn.addEventListener("click", async () => {
              const newStatus = btn.dataset.status;

              try {
                await set(ref(database, `public/serviceTickets/${ticket.id}`), {
                  ...ticket,
                  status: newStatus,
                  updatedAt: Date.now(),
                });
              } catch (error) {
                console.error(error);
                alert("Failed to update status.");
              }
            });
          });

          card.querySelector("[data-tasker]").addEventListener("click", () => {
            openIframe("./onlinetasker.html");
          });

          card.querySelector("[data-invoice]").addEventListener("click", () => {
            openIframe("./onlineinvoice.html");
          });

          requestsEl.appendChild(card);
        });
      }

      document.querySelectorAll("[data-app]").forEach((btn) => {
        btn.addEventListener("click", () => {
          openIframe(btn.dataset.app);
        });
      });

clearFrameBtn.addEventListener("click", () => {
  // Show dashboard again
  document.querySelector(".sidebar").style.display = "";
  document.querySelector(".workspace-top strong").style.display = "";
  document.querySelector(".workspace-top .muted").style.display = "";

  // Show all buttons again
  document.querySelectorAll(".workspace-buttons .btn").forEach((btn) => {
    btn.style.display = "";
  });

  // Clear iframe
  workspaceArea.innerHTML = `
    <div class="empty-state">
      Select an app to open it in the workspace.
    </div>
  `;
});

function openIframe(url) {
  // Hide everything except close button
  document.querySelector(".sidebar").style.display = "none";
  document.querySelector(".workspace-top strong").style.display = "none";
  document.querySelector(".workspace-top .muted").style.display = "none";

  // Hide all buttons except Close App
  document.querySelectorAll(".workspace-buttons .btn").forEach((btn) => {
    if (btn.id !== "clearFrameBtn") {
      btn.style.display = "none";
    }
  });

  // Fullscreen iframe
  workspaceArea.innerHTML = `
    <iframe src="${url}"></iframe>
  `;
}

      function escapeHtml(value) {
        return String(value || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }
    </script>
  </body>
</html>
