<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Online Journal</title>
  <link rel="stylesheet" href="assets/css/online.css" />
  <link rel="icon" href="../assets/img/favicon.ico" />
  <script>
    (function () {
      const t = localStorage.getItem("ss-theme");
      if (t === "light") document.documentElement.classList.add("light");
    })();
  </script>
  <style>
    .journal-shell {
      max-width: 1280px;
      margin: auto;
      padding: 16px;
    }

    .journal-layout {
      display: grid;
      gap: 16px;
      align-items: start;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      min-width: 0;
    }

    .panel h2 {
      margin: 0 0 10px;
      font-size: 1rem;
    }

    label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 2px;
    }

    input,
    textarea {
      width: 100%;
      box-sizing: border-box;
      margin-bottom: 8px;
      border-radius: var(--radius);
    }

    textarea {
      min-height: 80px;
      resize: vertical;
    }

    #editorPanel {
      max-height: calc(100vh - 120px);
      overflow-y: auto;
    }

    .section-card {
      border: 1px solid var(--border);
      padding: 10px;
      border-radius: var(--radius);
      margin-bottom: 10px;
      background: var(--surface2);
    }

    .section-card h4 {
      margin: 0 0 6px;
      font-size: 0.88rem;
    }

    .entry-card {
      border: 1px solid var(--border);
      padding: 10px 12px;
      border-radius: var(--radius);
      margin-bottom: 8px;
      cursor: pointer;
      background: var(--surface2);
    }

    .entry-card:hover {
      filter: brightness(1.08);
    }

    .entry-card small {
      display: block;
      color: var(--muted);
      margin-bottom: 4px;
      font-size: 11px;
    }

    .entry-card h3 {
      margin: 0 0 4px;
      font-size: 0.95rem;
    }

    .entry-card p {
      margin: 0;
      font-size: 12px;
      color: var(--muted);
    }

    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .article-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }

    .btn-outline:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    #articleView {
      max-width: 900px;
    }

    .article-meta {
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .article-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 10px 0 14px;
    }

    .tag {
      display: inline-block;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 999px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
    }

    .article-section {
      border-top: 1px solid var(--border);
      padding-top: 12px;
      margin-top: 12px;
    }

    .article-section h3 {
      margin-bottom: 6px;
      color: var(--primary);
      font-size: 0.95rem;
    }

    .article-section ul {
      padding-left: 18px;
      margin: 8px 0 0;
    }

    .article-section li {
      margin-bottom: 4px;
      font-size: 13px;
    }

    .status-line {
      margin-top: 8px;
      min-height: 18px;
      font-size: 12px;
      color: var(--muted);
    }

    .muted-line {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
    }

    .empty-state {
      color: var(--muted);
      padding: 12px;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      background: var(--surface2);
      font-size: 13px;
    }

    .article-header-image {
      width: 100%;
      max-height: 360px;
      object-fit: cover;
      border-radius: var(--radius);
      margin-bottom: 16px;
      border: 1px solid var(--border);
    }

    .article-img {
      width: 100%;
      max-width: 700px;
      margin: 12px auto;
      display: block;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    .code-block {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px;
      overflow-x: auto;
      margin-top: 8px;
    }

    .code-block code {
      font-family: monospace;
      color: var(--text);
      font-size: 12px;
    }

    .article-link {
      color: var(--primary);
      text-decoration: none;
    }

    .article-link:hover {
      text-decoration: underline;
    }

    .related-links {
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .related-links h4 {
      margin-bottom: 8px;
      color: var(--primary);
      font-size: 0.9rem;
    }

    .related-links ul {
      list-style: none;
      padding: 0;
    }

    .related-links li {
      margin-bottom: 6px;
    }

    .related-links a {
      color: var(--primary);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 13px;
    }

    .related-links a:hover {
      text-decoration: underline;
    }

    .related-links a::before {
      content: "→";
      font-weight: bold;
    }

    .auth-indicator {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: var(--radius);
      margin-bottom: 10px;
      display: inline-block;
    }

    .auth-bar {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
    }

    #login-inline {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 10px;
      position: absolute;
      top: 100%;
      right: 10px;
      z-index: 100;
      display: none;
      min-width: 220px;
    }

    #login-inline h3 {
      margin: 0 0 8px;
      font-size: 13px;
    }

    #auth-err {
      color: var(--danger);
      font-size: 11px;
      margin: 4px 0 0;
    }

    @media (max-width: 980px) {
      .journal-layout {
        grid-template-columns: 1fr;
      }

      #editorPanel {
        max-height: none;
      }
    }
  </style>
</head>

<body>

  <header style="position:relative;">
    <h1>Online Journal</h1>
    <div class="auth-bar">
      <span id="auth-label">Not signed in</span>
      <button id="auth-btn">Sign In</button>
    </div>
    <button id="theme-toggle" title="Toggle theme">&#9728;&#65039;</button>
    <script>
      (function () {
        const btn = document.getElementById("theme-toggle");
        const html = document.documentElement;
        btn.textContent = html.classList.contains("light") ? "🌙" : "☀️";
        btn.addEventListener("click", function () {
          const next = html.classList.contains("light") ? "dark" : "light";
          html.classList.toggle("light", next === "light");
          localStorage.setItem("ss-theme", next);
          btn.textContent = next === "light" ? "🌙" : "☀️";
        });
      })();
    </script>
    <div id="login-inline">
      <h3>Sign In</h3>
      <input type="email" id="email-in" placeholder="Email" />
      <input type="password" id="pass-in" placeholder="Password" />
      <button id="do-login">Sign In</button>
      <p id="auth-err"></p>
    </div>
  </header>

  <main>
    <div class="journal-shell">
      <div class="journal-layout">

        <!-- LEFT: EDITOR -->
        <section class="panel" id="editorPanel" style="display:none;">
          <h2 id="editorTitle">Create Article</h2>
          <p class="muted-line">Build article-style entries with sections and step lists.</p>

          <label for="title">Title</label>
          <input id="title" placeholder="Article title" />

          <label for="description">Description</label>
          <textarea id="description" placeholder="Short article summary"></textarea>

          <label for="tags">Tags</label>
          <input id="tags" placeholder="tag1, tag2, tag3" />

          <div class="actions">
            <button id="addSection" type="button">Add Section</button>
            <button id="save" type="button">Save Article</button>
            <button class="btn-outline" id="clearFormBtn" type="button">Clear</button>
          </div>

          <div id="sections"></div>
          <div class="status-line" id="statusLine"></div>
        </section>

        <!-- RIGHT: VIEW -->
        <section class="panel">
          <div class="auth-indicator" id="authIndicator">Loading...</div>

          <div id="listView">
            <div class="toolbar">
              <button class="btn-outline" id="refreshListBtn" type="button">Refresh</button>
              <button class="btn-outline" id="importJsonBtn" type="button">Import JSON</button>
              <input type="file" id="importJsonFile" accept="application/json" style="display:none" />
            </div>
            <h2>Articles</h2>
            <div id="list"></div>
          </div>

          <div id="articleView" style="display:none;">
            <div class="toolbar">
              <button class="btn-outline" id="backToListBtn" type="button">Back to List</button>
            </div>

            <h2 id="articleTitle"></h2>
            <div class="article-meta" id="articleDate"></div>
            <p id="articleDescription"></p>
            <div class="article-tags" id="articleTags"></div>
            <div id="articleSections"></div>

            <div class="article-actions" style="display:none;">
              <button id="editArticleBtn" type="button">Edit Article</button>
              <button class="btn-outline" id="moveArticleBtn" type="button">Move Article</button>
              <button class="btn-outline" id="deleteArticleBtn" type="button">Delete Article</button>
            </div>
          </div>
        </section>

      </div>
    </div>
  </main>

  <script type="module">
    import { auth, database, ref, set, get, remove } from "../assets/js/firebase-init.js";
    import { onUserReady } from "../assets/js/auth.js";
    import { renderArticleContent } from "../assets/js/onlinejournal.js";

    /* ── state ── */
    let PATH = "public/journalArticles";
    let currentUser = null;
    let sections = [];
    let allArticles = {};
    let currentArticleId = null;
    let editingId = null;
    let isSaving = false;

    /* ── elements ── */
    const authIndicator = document.getElementById("authIndicator");
    const titleInput = document.getElementById("title");
    const descriptionInput = document.getElementById("description");
    const tagsInput = document.getElementById("tags");
    const sectionsContainer = document.getElementById("sections");
    const statusLine = document.getElementById("statusLine");
    const editorTitle = document.getElementById("editorTitle");
    const addSectionBtn = document.getElementById("addSection");
    const saveBtn = document.getElementById("save");
    const clearFormBtn = document.getElementById("clearFormBtn");
    const listView = document.getElementById("listView");
    const articleView = document.getElementById("articleView");
    const listEl = document.getElementById("list");
    const articleTitle = document.getElementById("articleTitle");
    const articleDate = document.getElementById("articleDate");
    const articleDescription = document.getElementById("articleDescription");
    const articleTags = document.getElementById("articleTags");
    const articleSections = document.getElementById("articleSections");
    const backToListBtn = document.getElementById("backToListBtn");
    const refreshListBtn = document.getElementById("refreshListBtn");
    const editArticleBtn = document.getElementById("editArticleBtn");
    const moveArticleBtn = document.getElementById("moveArticleBtn");
    const deleteArticleBtn = document.getElementById("deleteArticleBtn");

    /* ── auth ── */
    onUserReady(async (user) => {
      const editorPanel = document.getElementById("editorPanel");
      const articleActions = document.querySelector(".article-actions");

      if (user) {
        PATH = user.uid + "/journalArticles";
        currentUser = user;
        authIndicator.textContent = "Personal Journal (" + user.email + ")";
        authIndicator.style.background = "var(--primary)";
        authIndicator.style.color = "#fff";
        if (editorPanel) editorPanel.style.display = "block";
        if (articleActions) articleActions.style.display = "flex";
      } else {
        PATH = "public/journalArticles";
        currentUser = null;
        authIndicator.textContent = "Public Shared Journal";
        authIndicator.style.background = "var(--surface2)";
        authIndicator.style.color = "var(--muted)";
        if (editorPanel) editorPanel.style.display = "none";
        if (articleActions) articleActions.style.display = "none";
      }

      await loadArticles(true);
    });

    /* ── helpers ── */
    function setStatus(msg, err) {
      statusLine.textContent = msg || "";
      statusLine.style.color = err ? "var(--danger)" : "var(--muted)";
    }

    function escapeHtml(v) {
      return String(v ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function getTags() {
      return tagsInput.value.split(",").map(t => t.trim()).filter(Boolean);
    }

    function getSections() {
      return sections.map(s => ({
        title: s.title.trim(),
        summary: s.summary.trim(),
        steps: s.steps.map(x => x.trim()).filter(Boolean),
        content: s.content || []
      })).filter(s => s.title || s.summary || s.steps.length || (s.content && s.content.length));
    }

    /* ── sections ── */
    function addSection(sec) {
      sections.push(sec || { title: "", summary: "", steps: [], content: [] });
      renderSections();
    }

    function renderSections() {
      sectionsContainer.innerHTML = "";

      if (!sections.length) {
        sectionsContainer.innerHTML = '<div class="empty-state">No sections yet</div>';
        return;
      }

      sections.forEach(function (s, i) {
        var div = document.createElement("div");
        div.className = "section-card";
        div.innerHTML =
          "<h4>Section " + (i + 1) + "</h4>" +
          '<input data-i="' + i + '" class="sec-title" value="' + escapeHtml(s.title) + '" placeholder="Title"/>' +
          '<textarea data-i="' + i + '" class="sec-summary">' + escapeHtml(s.summary) + "</textarea>" +
          '<textarea data-i="' + i + '" class="sec-steps">' + escapeHtml(s.steps.join("\n")) + "</textarea>" +
          "<label>Image URL</label>" +
          '<input type="text" class="sec-image" data-i="' + i + '" value="' +
          escapeHtml((s.content && s.content.find(function (c) { return c.type === 'image'; }) || {}).src || '') +
          '" placeholder="assets/img/example.png"/>' +
          '<div class="actions">' +
          '<button data-i="' + i + '" class="sec-up">&#8593;</button>' +
          '<button data-i="' + i + '" class="sec-down">&#8595;</button>' +
          '<button data-i="' + i + '" class="sec-del">Remove</button>' +
          "</div>";
        sectionsContainer.appendChild(div);
      });

      sectionsContainer.querySelectorAll(".sec-title").forEach(function (el) {
        el.oninput = function (e) { sections[e.target.dataset.i].title = e.target.value; };
      });
      sectionsContainer.querySelectorAll(".sec-summary").forEach(function (el) {
        el.oninput = function (e) { sections[e.target.dataset.i].summary = e.target.value; };
      });
      sectionsContainer.querySelectorAll(".sec-steps").forEach(function (el) {
        el.oninput = function (e) { sections[e.target.dataset.i].steps = e.target.value.split("\n"); };
      });
      sectionsContainer.querySelectorAll(".sec-image").forEach(function (el) {
        el.oninput = function (e) {
          var i = Number(e.target.dataset.i);
          if (!sections[i]) return;
          sections[i].content = (sections[i].content || []).filter(function (c) { return c.type !== "image"; });
          if (e.target.value.trim()) sections[i].content.push({ type: "image", src: e.target.value.trim() });
        };
      });
      sectionsContainer.querySelectorAll(".sec-del").forEach(function (btn) {
        btn.onclick = function () { sections.splice(Number(btn.dataset.i), 1); renderSections(); };
      });
      sectionsContainer.querySelectorAll(".sec-up").forEach(function (btn) {
        btn.onclick = function () {
          var i = Number(btn.dataset.i);
          if (i === 0) return;
          var tmp = sections[i]; sections[i] = sections[i - 1]; sections[i - 1] = tmp;
          renderSections();
        };
      });
      sectionsContainer.querySelectorAll(".sec-down").forEach(function (btn) {
        btn.onclick = function () {
          var i = Number(btn.dataset.i);
          if (i >= sections.length - 1) return;
          var tmp = sections[i]; sections[i] = sections[i + 1]; sections[i + 1] = tmp;
          renderSections();
        };
      });
    }

    /* ── save ── */
    async function saveArticle() {
      if (isSaving) return;
      var title = titleInput.value.trim();
      if (!title) return setStatus("Title required", true);
      try {
        isSaving = true;
        saveBtn.disabled = true;
        var sourcePath = (editingId && allArticles[editingId]) ? allArticles[editingId].__path : PATH;
        var realId = (editingId && allArticles[editingId]) ? allArticles[editingId].__id : Date.now().toString();
        var existing = (editingId && allArticles[editingId]) ? allArticles[editingId] : null;
        var payload = {
          title,
          description: descriptionInput.value.trim(),
          tags: getTags(),
          sections: getSections(),
          updatedAt: Date.now(),
          createdAt: existing ? existing.createdAt : Date.now()
        };
        await set(ref(database, sourcePath + "/" + realId), payload);
        editingId = null;
        currentArticleId = null;
        await loadArticles();
        setStatus("Saved ✓");
      } catch (e) {
        console.error(e);
        setStatus("Save failed", true);
      }
      isSaving = false;
      saveBtn.disabled = false;
    }

    /* ── import ── */
    document.getElementById("importJsonBtn").onclick = function () {
      document.getElementById("importJsonFile").click();
    };

    document.getElementById("importJsonFile").addEventListener("change", async function (e) {
      var file = e.target.files[0];
      if (!file) return;
      try {
        var text = await file.text();
        var data = JSON.parse(text);
        var articles = Array.isArray(data) ? data : [data];
        for (var a of articles) {
          var id = (a.createdAt && a.createdAt.toString()) || Date.now().toString();
          var payload = Object.assign({}, a);
          delete payload.__id; delete payload.__path; delete payload.__scope;
          payload.updatedAt = Date.now();
          await set(ref(database, PATH + "/" + id), payload);
        }
        setStatus("Imported " + articles.length + " article(s) ✓");
        await loadArticles();
      } catch (err) {
        console.error(err);
        setStatus("Import failed — invalid JSON", true);
      }
      e.target.value = "";
    });

    /* ── load / list ── */
    async function loadArticles(initial) {
      var combined = {};
      var publicPath = "public/journalArticles";
      var publicSnap = await get(ref(database, publicPath));
      var publicData = publicSnap.exists() ? publicSnap.val() : {};
      Object.entries(publicData).forEach(function ([id, article]) {
        combined["public__" + id] = Object.assign({}, article, { __id: id, __path: publicPath, __scope: "public" });
      });
      if (currentUser) {
        var privatePath = currentUser.uid + "/journalArticles";
        var privateSnap = await get(ref(database, privatePath));
        var privateData = privateSnap.exists() ? privateSnap.val() : {};
        Object.entries(privateData).forEach(function ([id, article]) {
          combined["private__" + id] = Object.assign({}, article, { __id: id, __path: privatePath, __scope: "private" });
        });
      }
      allArticles = combined;
      renderList();
      if (initial) {
        var params = new URLSearchParams(location.search);
        var id = params.get("id");
        if (id && allArticles[id]) renderArticle(id);
      }
    }

    function renderList() {
      listEl.innerHTML = "";
      Object.entries(allArticles)
        .sort(function (a, b) {
          function getTime(article) {
            if (article.date) {
              var parts = article.date.split('-').map(Number);
              return new Date(parts[0], parts[1] - 1, parts[2]).getTime();
            }
            return article.updatedAt || article.createdAt || 0;
          }
          return getTime(b[1]) - getTime(a[1]);
        })
        .forEach(function ([rowKey, a]) {
          var div = document.createElement("div");
          div.className = "entry-card";
          var scopeLabel = a.__scope === "private" ? "Private" : "Public";
          var cardDate = "";
          if (a.date) {
            var parts = a.date.split('-').map(Number);
            cardDate = new Date(parts[0], parts[1] - 1, parts[2]).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
          } else if (a.createdAt) {
            cardDate = new Date(a.createdAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
          }
          div.innerHTML =
            "<small>" + scopeLabel + (cardDate ? " · " + cardDate : "") + "</small>" +
            "<h3>" + escapeHtml(a.title) + "</h3>" +
            "<p>" + escapeHtml(a.description || "") + "</p>";
          div.onclick = function () { location.search = "?id=" + encodeURIComponent(rowKey); };
          listEl.appendChild(div);
        });
    }

    /* ── view ── */
    function renderArticle(id) {
      var a = allArticles[id];
      if (!a) return;
      currentArticleId = id;
      listView.style.display = "none";
      articleView.style.display = "block";
      articleTitle.textContent = a.title;
      var dateStr = "";
      if (a.date) {
        var parts = a.date.split('-').map(Number);
        dateStr = new Date(parts[0], parts[1] - 1, parts[2]).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
      } else if (a.createdAt) {
        dateStr = new Date(a.createdAt).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
      }
      articleDate.textContent = dateStr;
      articleDescription.textContent = a.description || "";
      articleTags.innerHTML = "";
      (a.tags || []).forEach(function (tag) {
        var span = document.createElement("span");
        span.className = "tag";
        span.textContent = tag;
        articleTags.appendChild(span);
      });
      articleSections.innerHTML = renderArticleContent(a);
      if (currentUser) {
        editArticleBtn.style.display = "inline-block";
        moveArticleBtn.style.display = "inline-block";
        deleteArticleBtn.style.display = "inline-block";
        moveArticleBtn.textContent = a.__scope === "public" ? "Move to Private" : "Move to Public";
      } else {
        editArticleBtn.style.display = "none";
        moveArticleBtn.style.display = "none";
        deleteArticleBtn.style.display = "none";
      }
    }

    /* ── delete / move ── */
    async function deleteArticle() {
      if (!currentArticleId || !allArticles[currentArticleId]) return;
      if (!confirm("Delete?")) return;
      var sourcePath = allArticles[currentArticleId].__path;
      var realId = allArticles[currentArticleId].__id;
      await remove(ref(database, sourcePath + "/" + realId));
      currentArticleId = null;
      editingId = null;
      location.search = "";
    }

    async function moveArticle() {
      if (!currentUser || !currentArticleId || !allArticles[currentArticleId]) return;
      var article = allArticles[currentArticleId];
      var realId = article.__id;
      var fromPath = article.__path;
      var toPath = article.__scope === "public"
        ? currentUser.uid + "/journalArticles"
        : "public/journalArticles";
      var nextScope = article.__scope === "public" ? "private" : "public";
      var confirmMsg = article.__scope === "public"
        ? "Move to your private journal?"
        : "Move to the public journal?";
      if (!confirm(confirmMsg)) return;
      try {
        moveArticleBtn.disabled = true;
        moveArticleBtn.textContent = "Moving...";
        var payload = Object.assign({}, article);
        delete payload.__id; delete payload.__path; delete payload.__scope;
        payload.updatedAt = Date.now();
        await set(ref(database, toPath + "/" + realId), payload);
        await remove(ref(database, fromPath + "/" + realId));
        await loadArticles();
        var newRowKey = nextScope + "__" + realId;
        currentArticleId = newRowKey;
        renderArticle(newRowKey);
        setStatus("Moved to " + nextScope + " ✓");
      } catch (err) {
        console.error(err);
        setStatus("Move failed", true);
      } finally {
        moveArticleBtn.disabled = false;
        moveArticleBtn.textContent = "Move Article";
      }
    }

    /* ── events ── */
    addSectionBtn.onclick = function () { addSection(); };
    saveBtn.onclick = saveArticle;
    clearFormBtn.onclick = function () { location.reload(); };
    backToListBtn.onclick = function () { location.search = ""; };
    refreshListBtn.onclick = function () { loadArticles(); };
    editArticleBtn.onclick = function () {
      var a = allArticles[currentArticleId];
      if (!a) return;
      editingId = currentArticleId;
      titleInput.value = a.title;
      descriptionInput.value = a.description;
      tagsInput.value = (a.tags || []).join(", ");
      sections = (a.sections || []).map(function (s) {
        return { title: s.title || "", summary: s.summary || "", steps: s.steps || [], content: s.content || [] };
      });
      renderSections();
      document.getElementById("editorPanel").scrollIntoView({ behavior: "smooth" });
    };
    deleteArticleBtn.onclick = deleteArticle;
    moveArticleBtn.onclick = moveArticle;
    renderSections();
  </script>

</body>

</html>
