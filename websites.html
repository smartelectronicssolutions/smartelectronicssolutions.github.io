<!DOCTYPE html>
<html lang="en" class="theme-web">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Smart Solutions — portfolio of sites and projects built by Luis.">
    <title>Projects — Smart Solutions</title>
    <link rel="stylesheet" href="assets/css/master.css">
    <link rel="icon" href="assets/img/favicon.ico">
    <style>
        .page-hero {
            text-align: center; padding: 56px 24px 36px;
            background: linear-gradient(160deg, #04100a 0%, #0a1a0f 55%, #04100a 100%);
        }
        .page-hero h1 { font-size: clamp(1.8rem, 4vw, 2.6rem); margin-bottom: 10px; }
        .page-hero p { color: var(--color-text-muted); max-width: 520px; margin: 0 auto; line-height: 1.7; }

        .projects-body { max-width: var(--max-width); margin: 0 auto; padding: 48px 24px; }

        /* Filter tabs */
        .filter-bar {
            display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 28px;
        }

        .filter-btn {
            padding: 6px 16px; border-radius: 20px; border: 1px solid var(--color-border);
            background: transparent; color: var(--color-text-muted);
            font-size: var(--font-size-sm); font-family: var(--font-main);
            cursor: pointer; transition: all 0.2s;
        }

        .filter-btn.active, .filter-btn:hover {
            background: var(--color-primary); color: white; border-color: var(--color-primary);
        }

        /* Thumbnail grid */
        .thumb-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: var(--gap);
        }

        .thumb-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            overflow: hidden;
            text-decoration: none;
            color: var(--color-text);
            transition: border-color 0.2s, transform 0.2s;
            display: flex; flex-direction: column;
        }

        .thumb-card:hover { border-color: var(--color-primary); transform: translateY(-3px); color: var(--color-text); }

        .thumb-card img {
            width: 100%; aspect-ratio: 16/9; object-fit: cover;
            background: var(--color-surface-2);
        }

        .thumb-card .thumb-body { padding: 14px; flex: 1; }
        .thumb-card h3 { font-size: 0.95rem; margin-bottom: 5px; color: var(--color-primary-lt); }
        .thumb-card p { font-size: 0.78rem; color: var(--color-text-muted); line-height: 1.5; }

        .thumb-card .thumb-tag {
            font-size: 0.68rem; background: rgba(58,154,92,0.15);
            color: #5dc47a; border-radius: 4px; padding: 2px 6px;
            display: inline-block; margin-top: 6px; letter-spacing: 0.5px;
        }

        .thumb-card.hidden { display: none; }
    </style>
</head>
<body>

    <div id="header-placeholder"></div>

    <section class="page-hero">
        <span class="label">Smart Site Solutions</span>
        <h1>Sites & Projects</h1>
        <p>A collection of sites and web apps built across divisions — client work, internal tools, and personal projects.</p>
    </section>

    <main class="projects-body">
        <div class="filter-bar">
            <button class="filter-btn active" onclick="filter('all', this)">All</button>
            <button class="filter-btn" onclick="filter('site', this)">Sites</button>
            <button class="filter-btn" onclick="filter('app', this)">Apps</button>
            <button class="filter-btn" onclick="filter('client', this)">Client</button>
            <button class="filter-btn" onclick="filter('personal', this)">Personal</button>
        </div>

        <div class="thumb-grid" id="thumbGrid"></div>
    </main>

    <div id="footer-placeholder"></div>

    <script>
        document.getElementById('hamburger').addEventListener('click', () => document.getElementById('navLinks').classList.toggle('active'));

        const projects = [
            { title: "Smart Solutions", desc: "Unified multi-division platform — one CSS, one image folder, five themed sections.", img: "assets/img/logo.png", link: "index.html", tags: ["site", "personal"] },
            { title: "Electronics & Tech", desc: "SES, YTG, and CPR combined into one themed section with tab navigation.", img: "assets/img/ses-thumbnail.png", link: "electronics.html", tags: ["site", "personal"] },
            { title: "Alpha Appliance Service", desc: "Client site for appliance repair business. Custom nav, Kickserv portal, service area map.", img: "assets/img/ses-thumbnail.png", link: "websites/aa/index.html", tags: ["site", "client"] },
            { title: "The Emporium", desc: "Retail site for low-voltage gear. Firebase-backed affiliate product catalog.", img: "assets/img/ju-thumbnail.png", link: "ju.html", tags: ["site", "personal"] },
            { title: "Daily Journal", desc: "Structured daily tracking with focus blocks, drift logging, GSB ratings, and Firebase sync.", img: "assets/img/ls-thumbnail.png", link: "apps/online/onlinejournal.html", tags: ["app", "personal"] },
            { title: "Task Manager", desc: "Field task tracker with clock in/out, travel segments, image capture, and odometer logging.", img: "assets/img/ytg-thumbnail.png", link: "apps/online/onlinetasker.html", tags: ["app", "personal"] },
            { title: "Invoice Maker", desc: "Professional invoice generator with labor, parts, and export.", img: "assets/img/qmp-thumbnail.png", link: "apps/online/onlineinvoice.html", tags: ["app", "personal"] },
            { title: "Repair Calculator", desc: "Device repair price calculator for phones and tablets. Firebase-connected pricing data.", img: "assets/img/cpr-thumbnail.png", link: "electronics.html", tags: ["app", "personal"] },
            { title: "Walmart Radar Tracker", desc: "Telaid field tool — QC checklists and project tracking for Walmart radar installs.", img: "assets/img/honeydo-thumbnail.png", link: "apps/telaid/walmart-tracker.html", tags: ["app", "personal"] },
            { title: "Gallery", desc: "AI and digital art collection with lightbox viewer.", img: "assets/img/gdg-thumbnail.png", link: "gallery.html", tags: ["site", "personal"] },
        ];

        const grid = document.getElementById('thumbGrid');

        projects.forEach(p => {
            const card = document.createElement('a');
            card.className = 'thumb-card';
            card.href = p.link;
            card.dataset.tags = p.tags.join(' ');
            card.innerHTML = `
                <img src="${p.img}" alt="${p.title}" loading="lazy" onerror="this.src='assets/img/default.png'">
                <div class="thumb-body">
                    <h3>${p.title}</h3>
                    <p>${p.desc}</p>
                    <span class="thumb-tag">${p.tags[0]}</span>
                </div>
            `;
            grid.appendChild(card);
        });

        function filter(tag, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.thumb-card').forEach(card => {
                const match = tag === 'all' || card.dataset.tags.includes(tag);
                card.classList.toggle('hidden', !match);
            });
        }
    </script>
    <script src="assets/js/main.js" defer></script>
</body>
</html>
