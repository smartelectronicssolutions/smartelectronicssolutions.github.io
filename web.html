<!DOCTYPE html>
<html lang="en" class="theme-web">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Smart Site Solutions — web apps, business sites, and custom tools built for real workflows.">
    <title>Web & Dev — Smart Solutions</title>
    <link rel="stylesheet" href="assets/css/master.css">
    <link rel="icon" href="assets/img/favicon.ico">
    <style>
        /* ── Web section layout: sidebar + content inside main ── */
        .web-layout {
            display: flex;
            min-height: calc(100vh - var(--header-height) - var(--footer-height));
        }

        .web-sidebar {
            width: 200px;
            flex-shrink: 0;
            background: var(--color-surface);
            border-right: 1px solid var(--color-border);
            padding: 24px 12px;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .sidebar-label {
            font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase;
            color: var(--color-text-muted); margin: 14px 0 5px 4px; opacity: 0.5;
        }

        .sidebar-label:first-child { margin-top: 0; }

        .nav-btn {
            display: block; width: 100%;
            padding: 8px 12px; border-radius: 8px;
            background: transparent; border: none;
            color: var(--color-text-muted); font-family: var(--font-main);
            font-size: var(--font-size-sm); text-align: left;
            cursor: pointer; transition: background 0.2s, color 0.2s;
            text-decoration: none;
        }

        .nav-btn:hover { background: var(--color-surface-2); color: var(--color-primary-lt); }
        .nav-btn.active { background: var(--color-primary); color: white; }

        .web-content {
            flex: 1;
            min-width: 0;
            padding: 40px 36px;
        }

        /* ── Content styles ── */
        #pageContainer h1 { font-size: clamp(1.6rem, 3.5vw, 2.4rem); margin-bottom: 14px; }
        #pageContainer h2 { font-size: 1.3rem; margin: 28px 0 10px; }
        #pageContainer p { margin-bottom: 14px; }
        #pageContainer a { color: var(--color-primary-lt); }

        .build-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: var(--gap); margin: 20px 0; }
        .featured-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: var(--gap); margin: 20px 0; }
        .featured-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius); padding: 20px; }
        .featured-card h3 { font-size: 0.95rem; margin-bottom: 6px; }
        .featured-card p { font-size: 0.8rem; margin-bottom: 4px; }

        .process-list { list-style: decimal; padding-left: 20px; max-width: 700px; margin-bottom: 32px; }
        .process-list li { padding: 10px 0; color: var(--color-text-muted); border-bottom: 1px solid var(--color-border); line-height: 1.7; }
        .process-list li strong { color: var(--color-text); }

        .about-bio p { font-size: 1rem; line-height: 1.8; margin-bottom: 16px; }
        .skills-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; margin: 16px 0 24px; }
        .skill-tag { background: rgba(58,154,92,0.1); border: 1px solid rgba(58,154,92,0.3); border-radius: 6px; padding: 8px 12px; color: #5dc47a; font-size: var(--font-size-sm); text-align: center; }

        .cta-box { text-align: center; background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius); padding: 36px 24px; margin-top: 32px; }
        .cta-box h2 { margin-bottom: 10px; }
        .cta-box p { margin-bottom: 18px; }

        /* ── Mobile: sidebar becomes top tab bar ── */
        @media (max-width: 768px) {
            .web-layout { flex-direction: column; }
            .web-sidebar { width: 100%; flex-direction: row; flex-wrap: wrap; border-right: none; border-bottom: 1px solid var(--color-border); padding: 10px 12px; gap: 4px; }
            .sidebar-label { display: none; }
            .nav-btn { width: auto; padding: 6px 10px; font-size: 0.78rem; }
            .web-content { padding: 24px 16px; }
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <main>
        <div class="web-layout">
            <!-- Sidebar -->
            <nav class="web-sidebar">
                <span class="sidebar-label">About</span>
                <button class="nav-btn active" onclick="loadPage('home', this)">Overview</button>
                <button class="nav-btn" onclick="loadPage('about', this)">About Me</button>
                <span class="sidebar-label">Work</span>
                <button class="nav-btn" onclick="loadPage('portfolio', this)">Portfolio</button>
                <a class="nav-btn" href="websites.html">All Projects ↗</a>
                <span class="sidebar-label">Services</span>
                <button class="nav-btn" onclick="loadPage('services', this)">What I Build</button>
                <button class="nav-btn" onclick="loadPage('process', this)">How It Works</button>
                <span class="sidebar-label">Connect</span>
                <a class="nav-btn" href="contact.html">Contact ↗</a>
            </nav>

            <!-- Content -->
            <div class="web-content">
                <div id="pageContainer"></div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script>
        const pages = {
            home: `
                <h1>Web Apps & Sites Built for Real Workflows</h1>
                <p>Practical tools that replace spreadsheets, scattered notes, and manual processes. Every build starts from a real workflow problem — not a template.</p>
                <div class="build-grid">
                    <div class="card"><h3>Job & Project Tracking</h3><p>Daily logs, task timing, checklists, and job history organized by project.</p></div>
                    <div class="card"><h3>Finance & Mileage</h3><p>Track spending, fuel, budgets, and totals built around your categories.</p></div>
                    <div class="card"><h3>Inventory & Data</h3><p>Searchable databases with editable fields, categories, and clean exports.</p></div>
                    <div class="card"><h3>Business Websites</h3><p>Fast, mobile-friendly sites for small businesses and service providers.</p></div>
                    <div class="card"><h3>Custom Dashboards</h3><p>Firebase-backed dashboards that surface the data you actually need.</p></div>
                    <div class="card"><h3>Field Tools</h3><p>QC checklists, placement verifiers, and job-site utilities built for real use.</p></div>
                </div>
                <div class="cta-box">
                    <h2>Have a process you repeat every week?</h2>
                    <p>I can turn it into a tool. Reach out and we will figure out the right approach.</p>
                    <a href="contact.html" class="btn btn-primary">Get in Touch</a>
                    &nbsp;
                    <a href="websites.html" class="btn btn-outline">See All Projects</a>
                </div>
            `,
            about: `
                <h1>About Me</h1>
                <div class="about-bio">
                    <p>I'm Luis — a self-taught web developer and low voltage field technician with a background in phone repair, fire/life safety, AV, and enterprise security system installations.</p>
                    <p>I build tools because I need them. Everything in this portfolio started as a real problem on a real job — a spreadsheet that was too slow, a process that needed structure, or a workflow that deserved better.</p>
                    <p>CompTIA A+ and Security+ certified. Currently field tech at Telaid, installing enterprise security systems for Walmart. Working toward a PM/PMO transition and Azure cloud infrastructure role.</p>
                    <h2>Skills</h2>
                    <div class="skills-grid">
                        <div class="skill-tag">HTML / CSS</div>
                        <div class="skill-tag">JavaScript</div>
                        <div class="skill-tag">Firebase</div>
                        <div class="skill-tag">Git / GitHub</div>
                        <div class="skill-tag">Low Voltage</div>
                        <div class="skill-tag">Access Control</div>
                        <div class="skill-tag">AV Integration</div>
                        <div class="skill-tag">CompTIA A+</div>
                        <div class="skill-tag">CompTIA Sec+</div>
                        <div class="skill-tag">Azure (learning)</div>
                    </div>
                </div>
            `,
            portfolio: `
                <h1>Featured Work</h1>
                <p>A selection of systems built and shipped. <a href="websites.html">View all projects →</a></p>
                <div class="featured-grid">
                    <div class="featured-card"><h3>Smart Solutions Platform</h3><p><strong>Type:</strong> Multi-division business hub</p><p>One CSS, one image folder, five themed sections, shared nav components. This site.</p></div>
                    <div class="featured-card"><h3>Alpha Appliance Service</h3><p><strong>Type:</strong> Client site — Chattanooga, TN</p><p>Appliance repair business. Custom nav, Kickserv portal, service area map, visit tracking.</p></div>
                    <div class="featured-card"><h3>Daily Journal System</h3><p><strong>Type:</strong> Productivity tool</p><p>Structured daily tracking with focus blocks, drift logging, GSB ratings, and JSON export.</p></div>
                    <div class="featured-card"><h3>Task Manager + Time Tracker</h3><p><strong>Type:</strong> Field work tool</p><p>Clock in/out, travel/work segments, address links, image capture, odometer tracking.</p></div>
                    <div class="featured-card"><h3>Finance Suite</h3><p><strong>Type:</strong> Financial tracking</p><p>Categories, year filters, totals, and reporting-ready exports.</p></div>
                    <div class="featured-card"><h3>Walmart Radar Tracker</h3><p><strong>Type:</strong> Field tool — Telaid</p><p>QC checklists and project tracking for on-site radar system deployments.</p></div>
                </div>
                <div style="text-align:center;margin-top:24px;">
                    <a href="websites.html" class="btn btn-outline">View All Projects</a>
                </div>
            `,
            services: `
                <h1>What I Build</h1>
                <p>Each tool is built around a specific workflow — not a generic template.</p>
                <div class="build-grid">
                    <div class="card"><h3>Job & Project Tracking</h3><p>Multi-day field jobs with required deliverables — notes by day, checklists, structured data.</p></div>
                    <div class="card"><h3>Photo & Deliverables</h3><p>Upload and organize job photos, enforce naming, and flag missing required items.</p></div>
                    <div class="card"><h3>Inventory & Databases</h3><p>Searchable item lists, editable fields, categories, clean exports for reporting.</p></div>
                    <div class="card"><h3>Finance & Mileage</h3><p>Spending, budgets, fuel logs, and totals built around your categories.</p></div>
                    <div class="card"><h3>Business Websites</h3><p>Clean, fast, mobile-friendly sites with Firebase integration and visit tracking.</p></div>
                    <div class="card"><h3>Custom Dashboards</h3><p>Firebase-backed dashboards that surface the data you actually need, when you need it.</p></div>
                    <div class="card"><h3>Field Tools</h3><p>QC checklists, placement verifiers, shift trackers — built for real on-site use.</p></div>
                    <div class="card"><h3>Productivity Systems</h3><p>Daily journals, task managers, and focus tools built around real workflows.</p></div>
                </div>
            `,
            process: `
                <h1>How It Works</h1>
                <p>Fast from concept to working tool — no long discovery phases, no bloated proposals.</p>
                <ol class="process-list">
                    <li><strong>Workflow review</strong> — you show me what you are doing now: spreadsheets, notes, apps, photos.</li>
                    <li><strong>Prototype</strong> — I build a first version fast so you can use it immediately.</li>
                    <li><strong>Refine</strong> — we adjust based on actual usage. This is where most of the value happens.</li>
                    <li><strong>Deliver</strong> — you get a working tool tailored to your process, hosted and maintained.</li>
                </ol>
                <div class="cta-box">
                    <h2>Ready to start?</h2>
                    <p>Reach out with a description of your workflow and I will get back to you quickly.</p>
                    <a href="contact.html" class="btn btn-primary">Contact Me</a>
                </div>
            `
        };

        function loadPage(id, btn) {
            const container = document.getElementById('pageContainer');
            container.innerHTML = pages[id] || '<p>Page not found.</p>';
            sessionStorage.setItem('webPage', id);
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');
            container.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        const saved = sessionStorage.getItem('webPage');
        loadPage(saved && pages[saved] ? saved : 'home',
            document.querySelector(`.nav-btn[onclick*="'${saved && pages[saved] ? saved : 'home'}'"]`));
    </script>
    <script src="assets/js/main.js"></script>
</body>
</html>
