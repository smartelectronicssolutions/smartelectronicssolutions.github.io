<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="The Emporium Catalog — browse all products by category and component." />
  <title>Catalog — The Emporium</title>
  <link rel="stylesheet" href="assets/css/master.css" />
  <link rel="icon" href="assets/img/favicon.ico" />
  <style>
    .catalog-body {
      max-width: var(--max);
      margin: 0 auto;
      padding: 48px 24px;
    }

    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-bottom: 28px;
      padding: 16px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .filter-bar input[type="text"] {
      flex: 1;
      min-width: 160px;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      color: var(--text);
      font-size: var(--sm);
    }

    .filter-bar select {
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      color: var(--text);
      font-size: var(--sm);
      cursor: pointer;
    }

    .filter-bar label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: var(--sm);
      color: var(--muted);
      cursor: pointer;
    }

    .filter-bar input[type="checkbox"] {
      width: auto;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: var(--gap);
    }

    .product-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .product-item img {
      height: 100px;
      width: auto;
      margin: 0 auto;
      object-fit: contain;
    }

    .product-item h3 {
      font-size: .9rem;
      margin: 4px 0 0;
    }

    .product-item .meta {
      font-size: .75rem;
      color: var(--muted);
    }

    .product-item .our-price {
      font-size: .85rem;
      color: var(--plight);
    }

    .cta-button {
      display: inline-block;
      margin-top: auto;
      background: var(--primary);
      color: white;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: .8rem;
      font-weight: bold;
      text-decoration: none;
    }

    .cta-button:hover {
      background: var(--accent);
      color: white;
    }

    #emptyState {
      display: none;
      text-align: center;
      color: var(--muted);
      padding: 48px 24px;
    }

    .result-count {
      font-size: var(--sm);
      color: var(--muted);
      margin-bottom: 16px;
    }
  </style>
</head>

<body>

  <div id="header-placeholder"></div>

  <section class="hero">
    <span class="label">The Emporium</span>
    <h1>Full Product Catalog</h1>
    <p>Browse all curated tools and gear. Filter by category, component, or search by name.</p>
  </section>

  <main class="catalog-body">
    <div class="filter-bar">
      <input type="text" id="searchBox" placeholder="Search products..." />
      <select id="categoryFilter">
        <option value="">All Categories</option>
      </select>
      <select id="componentFilter">
        <option value="">All Sub-Categories</option>
      </select>
      <label>
        <input type="checkbox" id="includeNoLink" />
        Show items without links
      </label>
    </div>

    <p class="result-count" id="resultCount"></p>

    <div class="product-grid" id="catalogGrid"></div>

    <div id="emptyState">
      <p>No products match your filters.</p>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script type="module" src="assets/js/catalog.js"></script>

  <script>
    const resultCount = document.getElementById("resultCount");
    const grid = document.getElementById("catalogGrid");
    const observer = new MutationObserver(() => {
      const n = grid.children.length;
      resultCount.textContent = n ? `${n} product${n !== 1 ? "s" : ""} shown` : "";
    });
    observer.observe(grid, { childList: true });
  </script>

  <script src="assets/js/main.js"></script>
</body>

</html>
