<!DOCTYPE html>
<html lang="en" class="theme-finance">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Smart Solutions — get in touch for electronics, tech support, web development, or general inquiries.">
    <title>Contact — Smart Solutions</title>
    <link rel="stylesheet" href="assets/css/master.css">
    <link rel="icon" href="assets/img/favicon.ico">
    <link rel="manifest" href="site.webmanifest">
    <style>
        .contact-hero {
            text-align: center;
            padding: 64px 24px 40px;
            background: linear-gradient(160deg, #040e0e 0%, #091a1a 55%, #040e0e 100%);
        }

        .contact-hero h1 {
            font-size: clamp(2rem, 4vw, 2.8rem);
            margin-bottom: 10px;
        }

        .contact-hero p {
            color: var(--color-text-muted);
            max-width: 520px;
            margin: 0 auto;
            line-height: 1.7;
        }

        .contact-body {
            max-width: 680px;
            margin: 48px auto;
            padding: 0 24px;
        }

        .contact-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            padding: 36px 32px;
        }

        .contact-card h2 {
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 14px;
        }

        .form-group label {
            font-size: var(--font-size-sm);
            color: var(--color-text-muted);
        }

        .form-group textarea {
            min-height: 120px;
        }

        .submit-row {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .submit-row button {
            margin: 0;
            padding: 10px 28px;
        }

        #form-status.success {
            color: #5aaa6a;
            font-size: var(--font-size-sm);
        }

        #form-status.error {
            color: #e05a5a;
            font-size: var(--font-size-sm);
        }

        .contact-info {
            margin-top: 28px;
            padding-top: 24px;
            border-top: 1px solid var(--color-border);
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }

        .contact-info-item {
            font-size: var(--font-size-sm);
            color: var(--color-text-muted);
        }

        .contact-info-item strong {
            color: var(--color-text);
            display: block;
            margin-bottom: 2px;
        }

        .division-links {
            margin-top: 24px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
        }

        .division-link {
            display: block;
            background: var(--color-surface-2);
            border: 1px solid var(--color-border);
            border-radius: 8px;
            padding: 12px 14px;
            color: var(--color-text-muted);
            font-size: var(--font-size-sm);
            text-align: center;
            text-decoration: none;
            transition: border-color 0.2s, color 0.2s;
        }

        .division-link:hover {
            border-color: var(--color-primary);
            color: var(--color-primary-lt);
        }

        .division-link span {
            display: block;
            font-size: 0.68rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 3px;
            opacity: 0.55;
        }

        @media (max-width: 600px) {
            .contact-card {
                padding: 24px 18px;
            }

            .contact-info {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <div id="header-placeholder"></div>

    <section class="contact-hero">
        <span class="label">Smart Solutions</span>
        <h1>Get in Touch</h1>
        <p>Whether you need a system installed, a tool built, or a site launched — reach out and we will figure out the
            right fit.</p>
    </section>

    <main class="contact-body">
        <div class="contact-card">
            <h2>Send a Message</h2>
            <form id="contactForm">
                <div class="form-group"><label for="name">Your Name</label><input type="text" id="name"
                        placeholder="First and last name" required></div>
                <div class="form-group"><label for="email">Email Address</label><input type="email" id="email"
                        placeholder="your@email.com" required></div>
                <div class="form-group"><label for="phone">Phone Number</label><input type="tel" id="phone"
                        placeholder="(optional)"></div>
                <div class="form-group"><label for="message">Message</label><textarea id="message"
                        placeholder="What do you need? Be as specific or general as you like." required></textarea>
                </div>
                <div class="submit-row">
                    <button type="submit" id="submitBtn">Send Message</button>
                    <span id="form-status"></span>
                </div>
            </form>

            <div class="contact-info">
                <div class="contact-info-item"><strong>Email</strong><a href="mailto:luis@smartelectronicssolutions.com"
                        id="email-text" style="color:var(--color-primary-lt);">luis@smartelectronicssolutions.com</a>
                </div>
            </div>

            <div class="division-links">
                <a class="division-link" href="electronics.html"><span>Low Voltage / Repair</span>Electronics</a>
                <a class="division-link" href="workspace.html"><span>Sites & Tools</span>Workspace</a>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script>
        document.getElementById('contactForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const status = document.getElementById('form-status');
            btn.textContent = 'Sending...'; btn.disabled = true;
            try {
                const res = await fetch('https://formsubmit.co/ajax/luis@smartelectronicssolutions.com', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({ name: document.getElementById('name').value, email: document.getElementById('email').value, phone: document.getElementById('phone').value, message: document.getElementById('message').value })
                });
                const json = await res.json();
                if (json.success) { status.textContent = 'Message sent — I will get back to you soon.'; status.className = 'success'; this.reset(); }
                else throw new Error();
            } catch { status.textContent = 'Something went wrong. Email me directly.'; status.className = 'error'; }
            btn.textContent = 'Send Message'; btn.disabled = false;
        });
    </script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/contact.js"></script>
</body>

</html>
