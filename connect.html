<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Smart Solutions — connect with a technician for remote support, download tools, and get help.">
    <title>Connect — Smart Solutions</title>
    <link rel="stylesheet" href="assets/css/master.css">
    <link rel="icon" href="assets/img/favicon.ico">
    <style>
        .connect-wrap {
            max-width: 560px;
            margin: 56px auto;
            padding: 0 24px;
        }

        .connect-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 40px 32px;
            text-align: center;
        }

        .connect-card h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .connect-card>p {
            color: var(--muted);
            margin-bottom: 28px;
            line-height: 1.7;
        }

        .connect-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            text-align: left;
            margin-bottom: 20px;
        }

        .connect-form label {
            font-size: var(--sm);
            color: var(--muted);
            margin-bottom: 2px;
        }

        .terms-row {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px;
        }

        .terms-row input {
            width: auto;
            margin-top: 3px;
            flex-shrink: 0;
        }

        .terms-row label {
            font-size: 0.8rem;
            color: var(--muted);
            line-height: 1.5;
        }

        .email-link {
            color: var(--plight);
        }

        .email-link:hover {
            color: var(--primary);
        }

        .support-note {
            margin-top: 20px;
            font-size: var(--sm);
            color: var(--muted);
        }
    </style>
</head>

<body>

    <div id="header-placeholder"></div>

    <main>
        <div class="connect-wrap">
            <div class="connect-card">
                <h1>Download & Connect</h1>
                <p>Enter your name and the support password provided by your technician to download the remote support
                    tool and begin your session.</p>

                <form class="connect-form" id="contactForm">
                    <div>
                        <label for="name">Your Name</label>
                        <input type="text" id="name" placeholder="First and last name">
                    </div>
                    <div>
                        <label for="caseNumber">Case Number <span style="opacity:0.6;font-size:0.9em">(optional)</span></label>
                        <input type="text" id="caseNumber" placeholder="e.g. SR-12345">
                    </div>
                    <div>
                        <label for="password">Support Password</label>
                        <input type="password" id="password" placeholder="Provided by your technician">
                    </div>
                    <div class="terms-row">
                        <input type="checkbox" id="termsCheckbox">
                        <label for="termsCheckbox">By clicking Download, you agree to work with our technician and
                            acknowledge that some information may be shared for troubleshooting and service
                            purposes.</label>
                    </div>
                    <button type="submit" id="submitBtn" class="btn btn-primary" style="width:100%;margin:0;">Download
                        Remote Tool</button>
                </form>

                <p class="support-note">
                    For support, email:
                    <a class="email-link" href="mailto:luis@smartelectronicssolutions.com?subject=Support%20Request">
                        luis@smartelectronicssolutions.com
                    </a>
                </p>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script type="module">
        import { getIP, updateVisitData } from './assets/js/visitLogger.js';

        document.addEventListener("DOMContentLoaded", function () {
            const contactForm = document.getElementById("contactForm");

            contactForm.addEventListener("submit", async function (event) {
                event.preventDefault();
                const name = document.getElementById("name").value.trim();
                const caseNumber = document.getElementById("caseNumber").value.trim();
                const ip = await getIP();
                await updateVisitData(ip, name, caseNumber ? { caseNumber } : {});

                window.location.href = "https://my.splashtop.com/team_deployment/download/TX7WXPYJ23PR";
            });
        });
    </script>
    <script src="assets/js/main.js" defer></script>
</body>

</html>
