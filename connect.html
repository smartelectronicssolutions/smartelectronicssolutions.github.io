<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Smart Solutions — connect with a technician for remote support, download tools, and get help.">
    <title>Connect — Smart Tech Solutions</title>
    <link rel="stylesheet" href="assets/css/master.css">
    <link rel="icon" href="assets/img/favicon.ico">
    <style>
        :root {
            --color-primary: #2a9d8f;
            --color-primary-lt: #4ac8ba;
            --color-accent: #1d7a70;
        }

        .connect-wrap {
            max-width: 560px;
            margin: 56px auto;
            padding: 0 24px;
        }

        .connect-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            padding: 40px 32px;
            text-align: center;
        }

        .connect-card h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .connect-card>p {
            color: var(--color-text-muted);
            margin-bottom: 28px;
            line-height: 1.7;
        }

        .connect-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            text-align: left;
            margin-bottom: 20px;
        }

        .connect-form label {
            font-size: var(--font-size-sm);
            color: var(--color-text-muted);
            margin-bottom: 2px;
        }

        .terms-row {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            background: var(--color-surface-2);
            border: 1px solid var(--color-border);
            border-radius: 6px;
            padding: 12px;
        }

        .terms-row input {
            width: auto;
            margin-top: 3px;
            flex-shrink: 0;
        }

        .terms-row label {
            font-size: 0.8rem;
            color: var(--color-text-muted);
            line-height: 1.5;
        }

        .email-link {
            color: #4ac8ba;
        }

        .email-link:hover {
            color: #2a9d8f;
        }

        .support-note {
            margin-top: 20px;
            font-size: var(--font-size-sm);
            color: var(--color-text-muted);
        }
    </style>
</head>

<body>

    <div id="header-placeholder"></div>

    <main>
        <div class="connect-wrap">
            <div class="connect-card">
                <h1>Download & Connect</h1>
                <p>Enter your name and the support password provided by your technician to download the remote support
                    tool and begin your session.</p>

                <form class="connect-form" id="contactForm">
                    <div>
                        <label for="name">Your Name</label>
                        <input type="text" id="name" placeholder="First and last name">
                    </div>
                    <div>
                        <label for="password">Support Password</label>
                        <input type="password" id="password" placeholder="Provided by your technician">
                    </div>
                    <div class="terms-row">
                        <input type="checkbox" id="termsCheckbox">
                        <label for="termsCheckbox">By clicking Download, you agree to work with our technician and
                            acknowledge that some information may be shared for troubleshooting and service
                            purposes.</label>
                    </div>
                    <button type="submit" id="submitBtn" class="btn btn-primary" style="width:100%;margin:0;">Download
                        Remote Tool</button>
                </form>

                <p class="support-note">
                    For support, email:
                    <a class="email-link" href="mailto:luis@smartelectronicssolutions.com?subject=Support%20Request">
                        luis@smartelectronicssolutions.com
                    </a>
                </p>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script>
        document.getElementById('hamburger').addEventListener('click', () => document.getElementById('navLinks').classList.toggle('active'));
    </script>

    <script type="module">
        import { getDatabase, get, ref, set } from './assets/js/firebase-init.js';
        import { getIP, updateVisitCount } from './assets/js/visitLogger.js';

        document.addEventListener("DOMContentLoaded", async function () {
            const contactForm = document.getElementById("contactForm");

            contactForm.addEventListener("submit", async function (event) {
                event.preventDefault();
                const name = document.getElementById("name").value;
                const password = document.getElementById("password").value;
                const ipAddress = await getIP();

                await updateVisitCount(ipAddress);

                window.location.href = "https://my.splashtop.com/team_deployment/download/TX7WXPYJ23PR";
            });

            const ip = await getIP();
            updateVisitCount(ip);
        });
    </script>
    <script src="assets/js/main.js" defer></script>
</body>

</html>
