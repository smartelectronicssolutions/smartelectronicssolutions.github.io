<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Converters</title>
    <link rel="stylesheet" href="../../assets/css/app-styles.css" id="stylesheet">
    <style>
        .converter-app {
            color: black;
            text-align: center;
            height: auto;
            max-width: 320px;
        }

        button {
            background-color: black;
            color: white;
            border: none;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 14px;
            margin: 5px;
            border: 1px solid black;
        }

        button:hover {
            background-color: white;
            color: black;
            border: 1px solid black;
        }

        input,
        select {
            padding: 5px;
            margin: 5px;
        }

        .bill-input {
            width: 50px;
        }

        .bill-label {
            display: inline-block;
            margin-right: 10px;
        }

        .money-section {
            margin-bottom: 20px;
        }

        .money-section h3 {
            margin-top: 10px;
            margin-bottom: 10px;
        }

        .money-section .money-row {
            margin-bottom: 5px;
        }

        .hidden {
            display: none;
        }

        #date-container {
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <header>
        <h1>Converting App</h1>
    </header>

    <main class="converter-app">
        <div>
            <!-- Conversion Type Selection -->
            <select id="conversion-type">
                <option value="weight">Weight</option>
                <option value="length">Length</option>
                <option value="time">Time</option>
                <option value="money">Money</option>
                <option value="date">Date</option>
            </select>
            <!-- Weight Conversion Container -->
            <div id="weight-container" class="conversion-container">
                <input id="weight-input" type="number" placeholder="Enter weight">
                <br>
                <select id="input-unit">
                    <option value="ounces">Ounces</option>
                    <option value="grams">Grams</option>
                    <option value="kilograms">Kilograms</option>
                    <option value="pounds">Pounds</option>
                </select>
                <select id="output-unit">
                    <option value="grams">Grams</option>
                    <option value="kilograms">Kilograms</option>
                    <option value="pounds">Pounds</option>
                    <option value="ounces">Ounces</option>
                </select>
                <br>
                <button id="convert-btn" onclick="convert()">Convert</button>
                <p id="output">Converted weight:</p>
            </div>
            <!-- Length Conversion Container -->
            <div id="length-container" class="conversion-container hidden">
                <input id="length-input" type="number" placeholder="Enter length">
                <br>
                <select id="input-length-unit">
                    <option value="feet">Feet</option>
                    <option value="meters">Meters</option>
                    <option value="inches">Inches</option>
                    <option value="centimeters">Centimeters</option>
                    <option value="millimeters">Millimeters</option>
                </select>
                <select id="output-length-unit">
                    <option value="meters">Meters</option>
                    <option value="feet">Feet</option>
                    <option value="inches">Inches</option>
                    <option value="centimeters">Centimeters</option>
                    <option value="millimeters">Millimeters</option>
                </select>
                <button id="convert-length-btn" onclick="convertLength()">Convert Length</button>
                <p id="length-output">Converted length:</p>
            </div>
            <!-- Time Conversion Container -->
            <div id="time-container" class="conversion-container hidden">
                <input id="time-input" type="number" placeholder="Enter time">
                <br>
                <select id="input-time-unit">
                    <option value="years">Years</option>
                    <option value="months">Months</option>
                    <option value="days">Days</option>
                    <option value="hours">Hours</option>
                    <option value="minutes">Minutes</option>
                </select>
                <select id="output-time-unit">
                    <option value="months">Months</option>
                    <option value="years">Years</option>
                    <option value="days">Days</option>
                    <option value="hours">Hours</option>
                    <option value="minutes">Minutes</option>
                </select>
                <br>
                <button id="convert-time-btn" onclick="convertTime()">Convert Time</button>
                <p id="time-output">Converted time:</p>
            </div>
            <!-- Money Conversion Container -->
            <div id="money-container" class="conversion-container hidden">
                <input class="denomination-input" id="input-100" type="number" placeholder="Enter number of $100 bills">
                <input class="denomination-input" id="input-50" type="number" placeholder="Enter number of $50 bills">
                <input class="denomination-input" id="input-20" type="number" placeholder="Enter number of $20 bills">
                <input class="denomination-input" id="input-10" type="number" placeholder="Enter number of $10 bills">
                <input class="denomination-input" id="input-5" type="number" placeholder="Enter number of $5 bills">
                <input class="denomination-input" id="input-1" type="number" placeholder="Enter number of $1 bills">
                <input class="denomination-input" id="input-0_25" type="number" placeholder="Enter number of 25¢ coins">
                <input class="denomination-input" id="input-0_10" type="number" placeholder="Enter number of 10¢ coins">
                <input class="denomination-input" id="input-0_05" type="number" placeholder="Enter number of 5¢ coins">
                <input class="denomination-input" id="input-0_01" type="number" placeholder="Enter number of 1¢ coins">
                <button id="calculate-total-btn" type="button">Calculate Total</button>
                <p id="money-output">Total amount:</p>
            </div>
            <!-- Date Conversion Container -->
            <div id="date-container" class="conversion-container hidden">
                <label for="dateInput">Enter a Date:</label>
                <input type="date" id="dateInput">
                <br>
                <label for="timeInput">Enter Time:</label>
                <input type="time" id="timeInput" step="1">
                <br>
                <label for="timezone">Select Time Zone:</label>
                <select id="timezone">
                    <option value="UTC" selected>UTC</option>
                    <option value="America/New_York">Eastern Time (US & Canada)</option>
                    <option value="America/Chicago">Central Time (US & Canada)</option>
                    <option value="America/Denver">Mountain Time (US & Canada)</option>
                    <option value="America/Los_Angeles">Pacific Time (US & Canada)</option>
                    <option value="Europe/London">London (UK)</option>
                    <option value="Europe/Berlin">Berlin (Germany)</option>
                    <option value="Asia/Tokyo">Tokyo (Japan)</option>
                    <!-- Add more time zones as needed -->
                </select>
                <br>
                <button id="convert-date-btn" onclick="convertDate()">Convert</button>
                <p id="date-output">Converted Timestamp:</p>
            </div>
        </div>
    </main>

    <script>
        // DOM elements //
        const conversionType = document.getElementById('conversion-type');
        const weightContainer = document.getElementById('weight-container');
        const lengthContainer = document.getElementById('length-container');
        const timeContainer = document.getElementById('time-container');
        const moneyContainer = document.getElementById('money-container');
        const dateContainer = document.getElementById('date-container');

        // Event listeners //
        conversionType.addEventListener('change', updateConversionType);

        // Functions //
        function updateConversionType() {
            const selectedType = conversionType.value;

            weightContainer.classList.toggle('hidden', selectedType !== 'weight');
            lengthContainer.classList.toggle('hidden', selectedType !== 'length');
            timeContainer.classList.toggle('hidden', selectedType !== 'time');
            moneyContainer.classList.toggle('hidden', selectedType !== 'money');
            dateContainer.classList.toggle('hidden', selectedType !== 'date');
        }

        // Weight conversion //
        const weightInput = document.getElementById('weight-input');
        const inputUnit = document.getElementById('input-unit');
        const outputUnit = document.getElementById('output-unit');
        const output = document.getElementById('output');

        function convert() {
            const weight = parseFloat(weightInput.value);
            const inputUnitValue = inputUnit.value;
            const outputUnitValue = outputUnit.value;

            if (isNaN(weight)) {
                output.innerText = 'Please enter a valid weight.';
                return;
            }

            const conversionFactors = {
                grams: {
                    grams: 1,
                    kilograms: 0.001,
                    pounds: 0.00220462,
                    ounces: 0.035274,
                },
                kilograms: {
                    grams: 1000,
                    kilograms: 1,
                    pounds: 2.20462,
                    ounces: 35.274,
                },
                pounds: {
                    grams: 453.592,
                    kilograms: 0.453592,
                    pounds: 1,
                    ounces: 16,
                },
                ounces: {
                    grams: 28.3495,
                    kilograms: 0.0283495,
                    pounds: 0.0625,
                    ounces: 1,
                },
            };

            const convertedWeight = weight * conversionFactors[inputUnitValue][outputUnitValue];
            output.innerText = `Converted weight: ${convertedWeight.toFixed(2)} ${outputUnitValue}`;
        }

        // Length conversion //
        const lengthInput = document.getElementById('length-input');
        const inputLengthUnit = document.getElementById('input-length-unit');
        const outputLengthUnit = document.getElementById('output-length-unit');
        const lengthOutput = document.getElementById('length-output');

        const lengthConversionFactors = {
            meters: {
                meters: 1,
                feet: 3.28084,
                inches: 39.3701,
                centimeters: 100,
                millimeters: 1000,
            },
            feet: {
                meters: 0.3048,
                feet: 1,
                inches: 12,
                centimeters: 30.48,
                millimeters: 304.8,
            },
            inches: {
                meters: 0.0254,
                feet: 0.0833333,
                inches: 1,
                centimeters: 2.54,
                millimeters: 25.4,
            },
            centimeters: {
                meters: 0.01,
                feet: 0.0328084,
                inches: 0.393701,
                centimeters: 1,
                millimeters: 10,
            },
            millimeters: {
                meters: 0.001,
                feet: 0.00328084,
                inches: 0.0393701,
                centimeters: 0.1,
                millimeters: 1,
            },
        };

        function convertLength() {
            const length = parseFloat(lengthInput.value);
            const inputLengthUnitValue = inputLengthUnit.value;
            const outputLengthUnitValue = outputLengthUnit.value;

            if (isNaN(length)) {
                lengthOutput.innerText = 'Please enter a valid length.';
                return;
            }

            const convertedLength = length * lengthConversionFactors[inputLengthUnitValue][outputLengthUnitValue];
            lengthOutput.innerText = `Converted length: ${convertedLength.toFixed(2)} ${outputLengthUnitValue}`;
        }

        // Time conversion //
        const timeInput = document.getElementById('time-input');
        const inputTimeUnit = document.getElementById('input-time-unit');
        const outputTimeUnit = document.getElementById('output-time-unit');
        const timeOutput = document.getElementById('time-output');

        const timeConversionFactors = {
            years: {
                years: 1,
                months: 12,
                days: 365,
                hours: 8760,
                minutes: 525600,
            },
            months: {
                years: 1 / 12,
                months: 1,
                days: 30.44,
                hours: 730,
                minutes: 43800,
            },
            days: {
                years: 1 / 365,
                months: 1 / 30.44,
                days: 1,
                hours: 24,
                minutes: 1440,
            },
            hours: {
                years: 1 / 8760,
                months: 1 / 730,
                days: 1 / 24,
                hours: 1,
                minutes: 60,
            },
            minutes: {
                years: 1 / 525600,
                months: 1 / 43800,
                days: 1 / 1440,
                hours: 1 / 60,
                minutes: 1,
            },
        };

        function convertTime() {
            const time = parseFloat(timeInput.value);
            const inputTimeUnitValue = inputTimeUnit.value;
            const outputTimeUnitValue = outputTimeUnit.value;

            if (isNaN(time)) {
                timeOutput.innerText = 'Please enter a valid time.';
                return;
            }

            const convertedTime = time * timeConversionFactors[inputTimeUnitValue][outputTimeUnitValue];
            timeOutput.innerText = `Converted time: ${convertedTime.toFixed(2)} ${outputTimeUnitValue}`;
        }

        // Money calculation //
        const input100 = document.getElementById("input-100");
        const input50 = document.getElementById("input-50");
        const input20 = document.getElementById("input-20");
        const input10 = document.getElementById("input-10");
        const input5 = document.getElementById("input-5");
        const input1 = document.getElementById("input-1");
        const input025 = document.getElementById("input-0_25");
        const input010 = document.getElementById("input-0_10");
        const input005 = document.getElementById("input-0_05");
        const input001 = document.getElementById("input-0_01");
        const calculateBtn = document.getElementById("calculate-total-btn");
        const moneyOutput = document.getElementById("money-output");

        function calculateTotal() {
            // Get the values from the input fields
            const value100 = input100.value || 0;
            const value50 = input50.value || 0;
            const value20 = input20.value || 0;
            const value10 = input10.value || 0;
            const value5 = input5.value || 0;
            const value1 = input1.value || 0;
            const value025 = input025.value || 0;
            const value010 = input010.value || 0;
            const value005 = input005.value || 0;
            const value001 = input001.value || 0;

            // Calculate the total amount
            const total = (value100 * 100) + (value50 * 50) + (value20 * 20) + (value10 * 10) + (value5 * 5) + (value1 * 1) + (value025 * 0.25) + (value010 * 0.1) + (value005 * 0.05) + (value001 * 0.01);

            // Display the total amount on the webpage
            moneyOutput.innerText = "Total amount: $" + total.toFixed(2);
        }

        calculateBtn.addEventListener("click", calculateTotal);

        // Date conversion
        const dateInput = document.getElementById('dateInput');
        const dateOutput = document.getElementById('date-output');

        function convertDate() {
            const dateInput = document.getElementById('dateInput');
            const timeInput = document.getElementById('timeInput');
            const timezoneSelect = document.getElementById('timezone');
            const dateOutput = document.getElementById('date-output');

            const dateValue = dateInput.value;
            const timeValue = timeInput.value || '00:00:00';
            const timezone = timezoneSelect.value;

            const dateTimeString = `${dateValue}T${timeValue}`;

            let date = new Date(dateTimeString + 'Z');

            if (timezone !== 'UTC') {
                const options = {
                    timeZone: timezone,
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: false
                };

                const formatter = new Intl.DateTimeFormat([], options);
                const parts = formatter.formatToParts(date);

                const dateParts = {
                    year: parts.find(part => part.type === 'year').value,
                    month: parts.find(part => part.type === 'month').value,
                    day: parts.find(part => part.type === 'day').value,
                    hour: parts.find(part => part.type === 'hour').value,
                    minute: parts.find(part => part.type === 'minute').value,
                    second: parts.find(part => part.type === 'second').value
                };

                date = new Date(`${dateParts.year}-${dateParts.month}-${dateParts.day}T${dateParts.hour}:${dateParts.minute}:${dateParts.second}`);
            }

            if (isNaN(date.getTime())) {
                dateOutput.innerText = 'Invalid date or time format. Please enter a valid date and time.';
                return;
            }

            const timestamp = date.getTime();

            const formattedDate = date.toISOString().replace('T', ' ').substring(0, 19);

            dateOutput.innerText = `Converted Timestamp: ${timestamp} (${formattedDate} ${timezone})`;
        }
    </script>

</body>

</html>
