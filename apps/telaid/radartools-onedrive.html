  <script>
    const CONFIG = {
      MAX_NIGHTS: 10,
      DEFAULT_NIGHTS: 5,
      ADMIN_PASSWORD: 'telaidadmin',
      AUTO_SAVE_MS: 5000,
      IMAGE_MAX_WIDTH: 2048,
      SENSOR_IMAGE_COUNT_REQUIRED: 2,
      ROOT_FOLDER: 'RadarApp/projects',
      CLIENT_ID: 'f5ef88e6-7af0-40af-ae6a-5a9d3342360e',
      SHARED_DRIVE_ID: 'b!3mJ2DZSHdkmBrOccfkDkBt3Eklx5UvdMlDz0bmgGRktCiH2Pzkr5TbiD0DhegSHo',

      TENANT_ID: 'f9cb31b8-4d87-4d78-89f4-636d4e6f6509'
    };

    const $ = (id) => document.getElementById(id);
    const $$ = (selector, root = document) => Array.from(root.querySelectorAll(selector));

    const escapeHtml = (value) => String(value ?? '').replace(/[&<>"']/g, (m) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
    const sanitize = (str) => (str || '').trim().replace(/\s+/g, '_').replace(/[\\/:*?"<>|#%{}~&]/g, '_');
    const normalizeText = (v) => String(v ?? '').replace(/[\r\n]+/g, ' ').trim();
    const normKey = (s) => (s || '').trim().toLowerCase();

    const createEl = (tag, options = {}) => {
      const el = document.createElement(tag);
      if (options.className) el.className = options.className;
      if (options.text != null) el.textContent = options.text;
      if (options.html != null) el.innerHTML = options.html;
      if (options.attrs) {
        Object.entries(options.attrs).forEach(([key, value]) => {
          if (value != null) el.setAttribute(key, value);
        });
      }
      return el;
    };

    const downloadBlob = (blob, filename) => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    };

    const downloadCSV = (rows, filename) => {
      const csv = rows.map((row) => row.map((cell) => {
        const text = String(cell ?? '');
        return /[",\n]/.test(text) ? `"${text.replace(/"/g, '""')}"` : text;
      }).join(',')).join('\n');
      downloadBlob(new Blob([csv], { type: 'text/csv;charset=utf-8' }), filename);
    };

    // ============================
    // Microsoft Auth
    // ============================
    let accessToken = null;
    const redirectUri = window.location.origin + window.location.pathname;

    const tokenStorage = {
      set: (token) => localStorage.setItem('accessToken', token),
      get: () => localStorage.getItem('accessToken'),
      clear: () => localStorage.removeItem('accessToken')
    };

    function extractTokenFromUrl() {
      const hash = window.location.hash.substring(1);
      const params = new URLSearchParams(hash);
      const token = params.get('access_token');
      if (token) {
        accessToken = token;
        tokenStorage.set(token);
        history.replaceState(null, null, window.location.pathname);
      }
    }

    function isTokenExpired(token) {
      if (!token) return true;
      try {
        const [, payload] = token.split('.');
        const decoded = JSON.parse(atob(payload));
        return (Date.now() / 1000) > decoded.exp;
      } catch {
        return true;
      }
    }

    async function getUserInfo() {
      if (!accessToken || isTokenExpired(accessToken)) return null;
      try {
        const res = await fetch('https://graph.microsoft.com/v1.0/me', {
          headers: { Authorization: `Bearer ${accessToken}` }
        });
        if (!res.ok) return null;
        return await res.json();
      } catch {
        return null;
      }
    }

    function loginToMicrosoft() {
      const scope = ['Files.ReadWrite.All', 'User.Read'].join(' ');
      const authUrl =
        `https://login.microsoftonline.com/${CONFIG.TENANT_ID}/oauth2/v2.0/authorize` +
        `?client_id=${CONFIG.CLIENT_ID}` +
        `&response_type=token` +
        `&redirect_uri=${encodeURIComponent(redirectUri)}` +
        `&scope=${encodeURIComponent(scope)}` +
        `&response_mode=fragment`;
      window.location.href = authUrl;
    }

    function logoutFromMicrosoft() {
      tokenStorage.clear();
      accessToken = null;
      window.location.reload();
    }

    async function updateAuthUI() {
      const loginBtn = $('loginButton');
      const logoutBtn = $('logoutButton');
      const status = $('loginStatus');
      if (!status) return;

      if (!accessToken || isTokenExpired(accessToken)) {
        status.textContent = 'Not logged in';
        status.className = 'status status-bad';
        if (loginBtn) loginBtn.style.display = 'inline-block';
        if (logoutBtn) logoutBtn.style.display = 'none';
        return;
      }

      const user = await getUserInfo();
      if (!user) {
        status.textContent = 'Session expired';
        status.className = 'status status-bad';
        if (loginBtn) loginBtn.style.display = 'inline-block';
        if (logoutBtn) logoutBtn.style.display = 'none';
        return;
      }

      status.textContent = `Logged in as: ${user.displayName || user.userPrincipalName}`;
      status.className = 'status status-ok';
      if (loginBtn) loginBtn.style.display = 'none';
      if (logoutBtn) logoutBtn.style.display = 'inline-block';
    }

    function initMicrosoftAuth() {
      if (window.location.hash) extractTokenFromUrl();
      if (!accessToken) accessToken = tokenStorage.get();
      $('loginButton')?.addEventListener('click', loginToMicrosoft);
      $('logoutButton')?.addEventListener('click', logoutFromMicrosoft);
      updateAuthUI();
    }

    // ============================
    // OneDrive helpers
    // ============================
    const state = {
      currentProject: '',
      currentProjectName: '',
      currentCustomerName: '',
      expectedSensors: 0,
      allProjects: [],
      isLoadingProject: false,
      isUploading: false,
      modalItems: [],
      modalIndex: 0,
      qcConfig: null,
      qcListenerBound: false,
      currentChecklistType: 'radar',
      projectData: null,
    };

    let isSaving = false;

    function requireAuth(showAlert = false) {
      if (!accessToken || isTokenExpired(accessToken)) {
        if (showAlert) {
          alert('Please log in to Microsoft first.');
        }
        throw new Error('Not logged into Microsoft');
      }
    }

    async function graphFetch(url, options = {}) {
      requireAuth(false);
      const headers = { Authorization: `Bearer ${accessToken}`, ...(options.headers || {}) };
      const res = await fetch(url, { ...options, headers });
      if (!res.ok) {
        const text = await res.text().catch(() => '');
        throw new Error(`Graph error ${res.status}: ${text || res.statusText}`);
      }
      return res;
    }

    function getProjectFolderName(name = state.currentProjectName || state.currentProject) {
      return sanitize(name || '');
    }

    function getProjectBasePath() {
      const folder = getProjectFolderName();
      return `${CONFIG.ROOT_FOLDER}/${folder}`;
    }

    function getProjectFilePath() {
      return `${getProjectBasePath()}/project.json`;
    }

    function getImagesPath(mode = 'sensors') {
      return `${getProjectBasePath()}/${mode}`;
    }

    function ensureProjectShape(project) {
      return Object.assign({
        id: getProjectFolderName(project?.project || state.currentProjectName || state.currentProject) || Date.now().toString(),
        project: '',
        customerName: '',
        sensorCount: 0,
        createdAt: Date.now(),
        updatedAt: Date.now(),
        sensorMeta: {},
        qcData_radar: { sections: {} },
        qcData_remote: { sections: {} },
        qcData_audit: { sections: {} }
      }, project || {});
    }

    async function ensureFolder(path) {
      const parent = path.includes('/') ? path.split('/').slice(0, -1).join('/') : '';
      const name = path.split('/').pop();
      const url = parent
        ? `https://graph.microsoft.com/v1.0/drives/${CONFIG.SHARED_DRIVE_ID}/root:/${parent}:/children`
        : `https://graph.microsoft.com/v1.0/me/drive/root/children`;
      await graphFetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, folder: {}, '@microsoft.graph.conflictBehavior': 'replace' })
      }).catch(async (err) => {
        if (!String(err.message).includes('409')) throw err;
      });
    }

    async function ensureProjectFolders() {
      await ensureFolder('RadarApp');
      await ensureFolder(CONFIG.ROOT_FOLDER);
      await ensureFolder(getProjectBasePath());
      await ensureFolder(getImagesPath('sensors'));
      await ensureFolder(getImagesPath('deliverables'));
    }

    async function readJsonFile(path) {
      requireAuth();
      const res = await fetch(`https://graph.microsoft.com/v1.0/drives/${CONFIG.SHARED_DRIVE_ID}/root:/${path}:/content`, {
        headers: { Authorization: `Bearer ${accessToken}` }
      });
      if (res.status === 404) return null;
      if (!res.ok) {
        const text = await res.text().catch(() => '');
        throw new Error(`Read failed ${res.status}: ${text || res.statusText}`);
      }
      return await res.json();
    }

    async function writeJsonFile(path, data) {
      if (isSaving) {
        console.warn("⏳ Save skipped (already saving)");
        return;
      }

      isSaving = true;

      try {
        const urlBase = `https://graph.microsoft.com/v1.0/drives/${CONFIG.SHARED_DRIVE_ID}/root:/${path}`;

        // 🔍 STEP 1: Check existing file metadata
        let existingSize = 0;
        try {
          const metaRes = await graphFetch(urlBase);
          const meta = await metaRes.json();
          existingSize = meta.size || 0;
        } catch (e) {
          // file might not exist yet → ignore
        }

        // 🧮 STEP 2: Calculate new data size
        const jsonString = JSON.stringify(data, null, 2);
        const newSize = new Blob([jsonString]).size;

        console.log(`[SAVE] Existing: ${existingSize} bytes | New: ${newSize} bytes`);

        // ⚠️ STEP 3: Warn if shrinking
        if (existingSize > 0 && newSize < existingSize) {
          const confirmSave = confirm(
            `⚠️ New save is smaller than existing file.\n\nExisting: ${existingSize} bytes\nNew: ${newSize} bytes\n\nAre you sure you want to overwrite?`
          );

          if (!confirmSave) {
            console.warn("❌ Save cancelled (smaller file)");
            return;
          }
        }

        // 💾 STEP 4: Save
        const uploadUrl = `${urlBase}:/content`;

        await graphFetch(uploadUrl, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json'
          },
          body: jsonString
        });

      } catch (err) {
        console.error("❌ Save failed:", err);

        if (err.message.includes("412")) {
          console.warn("🔁 Retrying save...");
          await new Promise(r => setTimeout(r, 300));
          return writeJsonFile(path, data);
        }

      } finally {
        isSaving = false;
      }

      console.log("[SAVE] Done");
    }

    async function uploadBlobToOneDrive(path, blob, contentType = 'application/octet-stream') {
      await graphFetch(`https://graph.microsoft.com/v1.0/drives/${CONFIG.SHARED_DRIVE_ID}/root:/${path}:/content`, {
        method: 'PUT',
        headers: { 'Content-Type': contentType },
        body: blob
      });
    }

    async function listFolderChildren(path) {
      requireAuth();
      const res = await fetch(`https://graph.microsoft.com/v1.0/drives/${CONFIG.SHARED_DRIVE_ID}/root:/${path}:/children`, {
        headers: { Authorization: `Bearer ${accessToken}` }
      });
      if (res.status === 404) return [];
      if (!res.ok) {
        const text = await res.text().catch(() => '');
        throw new Error(`List failed ${res.status}: ${text || res.statusText}`);
      }
      const data = await res.json();
      return data.value || [];
    }

    async function deleteItemByPath(path) {
      await graphFetch(`https://graph.microsoft.com/v1.0/drives/${CONFIG.SHARED_DRIVE_ID}/root:/${path}`, { method: 'DELETE' });
    }

    async function getUniqueOneDriveFilename(folderPath, filename) {
      const idx = filename.lastIndexOf('.');
      const base = idx >= 0 ? filename.slice(0, idx) : filename;
      const ext = idx >= 0 ? filename.slice(idx) : '';
      const existing = await listFolderChildren(folderPath).catch(() => []);
      const names = new Set(existing.map((item) => item.name));
      if (!names.has(filename)) return filename;
      let suffix = 1;
      while (names.has(`${base}_${suffix}${ext}`)) suffix += 1;
      return `${base}_${suffix}${ext}`;
    }

    async function listImages(mode = 'sensors') {
      const items = await listFolderChildren(getImagesPath(mode)).catch(() => []);
      return items
        .filter((item) => item.file)
        .map((item) => ({
          id: item.id,
          name: item.name,
          url: item['@microsoft.graph.downloadUrl'],
          fullPath: `${getImagesPath(mode)}/${item.name}`,
          mode
        }));
    }

    async function listProjectsFromOneDrive() {
      const folders = await listFolderChildren(CONFIG.ROOT_FOLDER).catch(() => []);
      const projects = [];
      for (const item of folders.filter((x) => x.folder)) {
        const projectFile = await readJsonFile(`${CONFIG.ROOT_FOLDER}/${item.name}/project.json`).catch(() => null);
        const p = ensureProjectShape(projectFile || { project: item.name, id: item.name });
        projects.push({
          id: item.name,
          folder: item.name,
          customer: (p.customerName || '').trim(),
          project: (p.project || item.name).trim(),
          label: `${(p.customerName || '(No Customer)').trim()} — ${(p.project || item.name).trim()}`,
          time: Number(p.updatedAt) || Number(p.createdAt) || 0
        });
      }
      return projects.sort((a, b) => b.time - a.time);
    }

    async function saveCurrentProject() {
      const projectName = $('project').value.trim();

      if (!projectName) {
        alert('Project name required.');
        return false;
      }

      state.currentProjectName = projectName; const existing = ensureProjectShape(state.projectData || {});
      const data = ensureProjectShape({
        ...existing,
        project: $('project').value.trim(),
        customerName: $('customerName').value.trim(),
        sensorCount: Number($('field_sensorTotal')?.value || 0),
        sensorMeta: existing.sensorMeta || {},
        createdAt: existing.createdAt || Date.now(),
        updatedAt: Date.now(),
        [`qcData_${state.currentChecklistType}`]: collectData()
      });

      state.currentProjectName = data.project;
      state.currentCustomerName = data.customerName;
      state.expectedSensors = data.sensorCount;
      state.currentProject = getProjectFolderName(data.project);
      state.projectData = data;
      $('projectFolderDisplay').textContent = getProjectBasePath();
      await ensureProjectFolders();
      await writeJsonFile(getProjectFilePath(), data);
      await populateProjects();
      await loadProject(state.currentProject);

      return true;
    }

    async function loadProject(folderName) {
      if (!folderName || state.isLoadingProject) return;
      state.isLoadingProject = true;
      try {
        state.currentProject = folderName;
        state.currentProjectName = folderName;
        const data = ensureProjectShape(await readJsonFile(`${CONFIG.ROOT_FOLDER}/${folderName}/project.json`) || { project: folderName });
        state.projectData = data;
        state.currentProjectName = data.project || folderName;
        state.currentCustomerName = data.customerName || '';
        state.expectedSensors = Number(data.sensorCount) || 0;
        populateSensorDropdown(state.expectedSensors);
        $('project').value = state.currentProjectName;
        $('customerName').value = state.currentCustomerName;
        $('projectFolderDisplay').textContent = `${CONFIG.ROOT_FOLDER}/${folderName}`;
        populateSensorDropdown(state.expectedSensors);
        await Promise.all([updateGallery(), loadQCChecklist(folderName)]);
        syncSensorTotalToQC();
        initCollapsibles();
      } catch (err) {
        console.error('[loadProject] Failed:', err);
        alert(`Failed to load project. ${err.message}`);
      } finally {
        state.isLoadingProject = false;
      }
    }

    async function populateProjects() {
      state.allProjects = await listProjectsFromOneDrive();
      renderProjectDropdown(state.allProjects);
    }

    function renderProjectDropdown(projects) {
      $('projectList').innerHTML = '<option value="">-- Choose a project --</option>';
      projects.forEach((p) => $('projectList').appendChild(new Option(p.label, p.folder)));
    }

    function filterProjects() {
      const query = normKey($('projectSearch').value);
      if (!query) return renderProjectDropdown(state.allProjects);
      renderProjectDropdown(state.allProjects.filter((p) => normKey(`${p.customer} ${p.project}`).includes(query)));
    }

    function populateSensorDropdown(count) {
      [$('sensorMetaNumberDropdown'), $('sensorNumberDropdown')].forEach((dropdown) => {
        if (!dropdown) return;
        dropdown.innerHTML = '<option value="">Select a Device</option>';
        for (let i = 1; i <= count; i += 1) {
          const padded = String(i).padStart(2, '0');
          dropdown.appendChild(new Option(padded, String(i)));
        }
      });
    }

    function updateImageModeUI() {
      const mode = document.querySelector('input[name="viewMode"]:checked')?.value || 'sensors';
      $('sensorUploadSection').style.display = mode === 'sensors' ? 'block' : 'none';

    const resizeImage = (file, maxWidth = CONFIG.IMAGE_MAX_WIDTH) => new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onerror = reject;
      reader.onload = () => {
        const img = new Image();
        img.onerror = reject;
        img.src = reader.result;
        img.onload = () => {
          let { width, height } = img;
          if (width > maxWidth) {
            height *= maxWidth / width;
            width = maxWidth;
          }
          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          canvas.toBlob((blob) => resolve(blob || file), 'image/jpeg', 0.92);
        };
      };
      reader.readAsDataURL(file);
    });

    const addTextToImage = (blob, text) => new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onerror = reject;
      reader.onload = () => {
        const img = new Image();
        img.onerror = reject;
        img.src = reader.result;
        img.onload = () => {
          const barHeight = Math.max(72, Math.round(img.width * 0.08));
          const canvas = document.createElement('canvas');
          canvas.width = img.width;
          canvas.height = img.height + barHeight;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0);
          ctx.fillStyle = 'black';
          ctx.fillRect(0, img.height, canvas.width, barHeight);
          ctx.fillStyle = 'white';
          ctx.font = `bold ${Math.max(28, Math.round(img.width * 0.05))}px Arial`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(text, canvas.width / 2, img.height + barHeight / 2);
          canvas.toBlob((finalBlob) => resolve(finalBlob || blob), 'image/jpeg', 0.92);
        };
      };
      reader.readAsDataURL(blob);
    });

    function getFavorites() {
      try { return JSON.parse(localStorage.getItem('radarFavorites') || '{}'); }

    async function updateGallery() {
      if (!state.currentProject) {
        $('gallery').innerHTML = '';
        $('imageDropdown').innerHTML = '<option value="">-- Select an Image --</option>';
        $('missingList').innerHTML = '';
        return;
      }
      const mode = document.querySelector('input[name="viewMode"]:checked')?.value || 'sensors';
      let items = await listImages(mode);
      const seen = new Set();
      items = items.filter((item) => {
        const key = `${item.name}|${item.fullPath}`;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
      const favorites = getFavorites();
      items.sort((a, b) => {
        const fa = favorites[a.fullPath] ? 1 : 0;
        const fb = favorites[b.fullPath] ? 1 : 0;
        if (fa !== fb) return fb - fa;
        return a.name.localeCompare(b.name, undefined, { numeric: true });
      });
      state.modalItems = items;
      $('gallery').innerHTML = '';
      $('imageDropdown').innerHTML = '<option value="">-- Select an Image --</option>';
      $('missingList').innerHTML = '';

      items.forEach((item, index) => {
        const container = createEl('div', { className: 'image-container' });
        const img = createEl('img', { attrs: { src: item.url, loading: 'lazy', alt: item.name } });
        img.addEventListener('click', () => showModalByIndex(index));
        const star = createEl('span', {
          className: `favorite-star ${favorites[item.fullPath] ? 'favorited' : ''}`,
          text: favorites[item.fullPath] ? '★' : '☆'
        });
        star.addEventListener('click', (event) => {
          event.stopPropagation();
          if (favorites[item.fullPath]) delete favorites[item.fullPath]; else favorites[item.fullPath] = true;
          setFavorites(favorites);
          updateGallery();
        });
        container.appendChild(img);
        container.appendChild(star);
        $('gallery').appendChild(container);
        $('imageDropdown').appendChild(new Option(item.name, String(index)));
      });

      if (mode === 'sensors') {
        const countMap = {};
        items.forEach((item) => {
          const match = item.name.match(/(?:^|_)(\d{2})-/);
          if (match) {
            const idx = parseInt(match[1], 10);
            countMap[idx] = (countMap[idx] || 0) + 1;
          }
        });
        for (let i = 1; i <= state.expectedSensors; i += 1) {
          const have = countMap[i] || 0;
          if (have < CONFIG.SENSOR_IMAGE_COUNT_REQUIRED) {
            const padded = String(i).padStart(2, '0');
            const li = createEl('li', { text: `Sensor ${padded} - Missing ${CONFIG.SENSOR_IMAGE_COUNT_REQUIRED - have} image(s)` });
            li.dataset.sensor = String(i);
            li.className = 'missing-sensor';
            li.setAttribute('role', 'button');
            li.setAttribute('tabindex', '0');
            $('missingList').appendChild(li);
          }
        }
      }
    }

    async function uploadSensor() {
      if (state.isUploading) return;
      if (!state.currentProject) return alert('Save the project first.');
      const num = $('sensorNumberDropdown').value;
      const serial = sanitize($('serialNumber').value);
      const file = $('sensorImage').files?.[0];
      const skipMarkup = $('skipMarkupCheckbox').checked;
      if (!num || !serial || !file) return alert('Fill out all fields');

      state.isUploading = true;
      $('uploadImage').disabled = true;
      $('uploadImage').textContent = 'Uploading...';

      try {
        const paddedNum = String(num).padStart(2, '0');
        const folderPath = getImagesPath('sensors');
        const existing = await listImages('sensors').catch(() => []);
        const prefix = sanitize(state.currentCustomerName || state.currentProjectName || state.currentProject);
        const matchCount = existing.filter((item) => item.name.startsWith(`${prefix}_${paddedNum}`)).length;
        if (matchCount >= CONFIG.SENSOR_IMAGE_COUNT_REQUIRED) {
          const proceed = confirm(`Sensor ${paddedNum} already has ${CONFIG.SENSOR_IMAGE_COUNT_REQUIRED} uploads. Upload another?`);
          if (!proceed) return;
        }

        let blob = await resizeImage(file, CONFIG.IMAGE_MAX_WIDTH);
        if (!skipMarkup) {
          const labelBase = (state.currentCustomerName || state.currentProjectName || state.currentProject).trim();
          blob = await addTextToImage(blob, `${labelBase} ${paddedNum} - ${serial}`);
        }

        const filename = await getUniqueOneDriveFilename(folderPath, `${prefix}_${paddedNum}-${serial}.jpg`);
        await uploadBlobToOneDrive(`${folderPath}/${filename}`, blob, 'image/jpeg');

        const project = ensureProjectShape(state.projectData || {});
        project.sensorMeta[num] = {
          serial: $('serialNumber').value.trim() || '',
          m1: $('sensorMetaM1').value.trim() || '',
          m2: $('sensorMetaM2').value.trim() || '',
          m3: $('sensorMetaM3').value.trim() || '',
          updatedAt: Date.now()
        };
        project.updatedAt = Date.now();
        state.projectData = project;
        await writeJsonFile(getProjectFilePath(), project);

        $('sensorImage').value = '';
        await updateGallery();
      } catch (err) {
        console.error(err);
        alert(`Upload failed. ${err.message}`);
      } finally {
        state.isUploading = false;
        $('uploadImage').disabled = false;
        $('uploadImage').textContent = 'Upload';
      }
    }

    async function initQCConfig(force = false) {
      if (!force && state.qcConfig?.sections?.length) return;

      const type = state.currentChecklistType || 'radar';

      const fileMap = {
        radar: 'radar_checklist.json',
        remote: 'remote_checklist.json',
        audit: 'audit_checklist.json'
      };

      const fileName = fileMap[type];
      const oneDrivePath = `RadarApp/${fileName}`;

      try {
        console.log("🔄 Trying OneDrive:", oneDrivePath);

        const data = await readJsonFile(oneDrivePath);

        if (!data || !data.sections) {
          throw new Error("Invalid or missing OneDrive checklist");
        }

        console.log("✅ Loaded from OneDrive");
        state.qcConfig = data;
        return;

      } catch (err) {
        console.warn("⚠️ OneDrive failed, falling back to local file...", err);
      }

      // 🔁 FALLBACK TO LOCAL FILE
      try {
  console.log("🔄 Trying local file:", `./assets/js/${type}_checklist.json`);

  const res = await fetch(`./assets/js/${type}_checklist.json`);

        if (!res.ok) throw new Error(`Local fetch failed: ${res.status}`);

        const data = await res.json();

        console.log("✅ Loaded from local file");

      } catch (err) {
        console.error("❌ BOTH OneDrive and local failed:", err);

        state.qcConfig = { sections: [] };

        $('app').textContent =
          `❌ Failed to load checklist (${fileName}) from OneDrive AND local.`;

    function getSectionConfig(sectionId) {
      return state.qcConfig?.sections?.find((section) => section.id === sectionId) || null;
    }

    const getFieldToggleStorageKey = () => `radartoolsFieldVisibility_${state.currentChecklistType}`;

    function getToggleSectionId() {
      if (getSectionConfig('site_info')) return 'site_info';
      if (getSectionConfig('audit_info')) return 'audit_info';
      return null;
    }

    function getFieldVisibilityDefaults() {
      const sectionId = getToggleSectionId();
      const section = sectionId ? getSectionConfig(sectionId) : null;
      const defaults = {};

      if (!section?.fields?.length) return defaults;

      section.fields.forEach((field) => {
        if (field.hiddenByDefault === true) defaults[field.id] = false;
        if (field.defaultVisible === false) defaults[field.id] = false;
      });

      return defaults;
    }

    function getFieldVisibilityPrefs() {
      try {
        const prefs = JSON.parse(localStorage.getItem(getFieldToggleStorageKey()) || '{}');
        const defaults = getFieldVisibilityDefaults();

        Object.entries(defaults).forEach(([key, value]) => {
          if (prefs[key] === undefined) prefs[key] = value;
        });

        return prefs;
      } catch {
        return {};
      }
    }

    function setFieldVisibilityPrefs(prefs) {
      localStorage.setItem(getFieldToggleStorageKey(), JSON.stringify(prefs));
    }

    function applyFieldVisibility() {
      const sectionId = getToggleSectionId();
      if (!sectionId) return;

      const prefs = getFieldVisibilityPrefs();
      $$(`.field-row[data-section-id="${sectionId}"]`).forEach((row) => {
        const fieldId = row.dataset.fieldId;
        const visible = prefs[fieldId] !== false;
        row.classList.toggle('hidden', !visible);
      });
    }

    function renderFieldToggles() {
      const panel = $('fieldTogglePanel');
      if (!panel) return;

      const sectionId = getToggleSectionId();
      const section = sectionId ? getSectionConfig(sectionId) : null;
      if (!section?.fields?.length) {
        panel.innerHTML = '';
        panel.classList.add('hidden');
        return;
      }

      panel.classList.remove('hidden');
      panel.innerHTML = '';

      const prefs = getFieldVisibilityPrefs();

      const header = createEl('div', { className: 'field-toggle-header' });
      header.appendChild(createEl('strong', { text: 'Field visibility' }));

      const actions = createEl('div', { className: 'field-toggle-actions' });
      const showAllBtn = createEl('button', { text: 'Show all', attrs: { type: 'button' } });
      const hideAllBtn = createEl('button', { text: 'Hide all', attrs: { type: 'button' } });

      showAllBtn.addEventListener('click', () => {
        section.fields.forEach((field) => { prefs[field.id] = true; });
        setFieldVisibilityPrefs(prefs);
        renderFieldToggles();
        applyFieldVisibility();
      });

      hideAllBtn.addEventListener('click', () => {
        section.fields.forEach((field) => { prefs[field.id] = false; });
        setFieldVisibilityPrefs(prefs);
        renderFieldToggles();
        applyFieldVisibility();
      });

      actions.appendChild(showAllBtn);
      actions.appendChild(hideAllBtn);
      header.appendChild(actions);
      panel.appendChild(header);

      const list = createEl('div', { className: 'field-toggle-list' });

      section.fields.forEach((field) => {
        const fieldRow = createEl('label', { className: 'field-toggle-item' });
        const checkbox = createEl('input', { attrs: { type: 'checkbox', id: `toggle_${sectionId}_${field.id}` } });
        checkbox.checked = prefs[field.id] !== false;
        checkbox.addEventListener('change', () => {
          prefs[field.id] = checkbox.checked;
          setFieldVisibilityPrefs(prefs);
          applyFieldVisibility();
        });

        fieldRow.appendChild(checkbox);
        fieldRow.appendChild(document.createTextNode(` ${field.label || field.id}`));
        list.appendChild(fieldRow);
      });

      panel.appendChild(list);
    }

    function normalizeNightCount(value, fallback = 1) {
      const parsed = parseInt(value, 10);
      if (Number.isNaN(parsed) || parsed <= 0) return fallback;
      return Math.min(parsed, CONFIG.MAX_NIGHTS);
    }

    function getTotalNights(data = null) {
      const raw = data?.sections?.site_info?.fields?.totalNights;
      const fromData = (raw && typeof raw === 'object') ? raw.value : raw;
      if (fromData != null && fromData !== '') return normalizeNightCount(fromData, CONFIG.DEFAULT_NIGHTS);
      const el = $('field_totalNights');
      return el ? normalizeNightCount(el.value, CONFIG.DEFAULT_NIGHTS) : CONFIG.DEFAULT_NIGHTS;
    }

    function getFieldElementId(sectionId, fieldId, day = null) {
      return day == null ? `field_${fieldId}` : `field_${sectionId}_${fieldId}_${day}`;
    }

    const sectionRenderers = {
      fields(section, _data, container) {
        const fragment = document.createDocumentFragment();
        section.fields.forEach((field) => {
          const row = createEl('div', {
            className: 'field-row',
            attrs: { 'data-field-id': field.id, 'data-section-id': section.id }
          });

          row.appendChild(createEl('label', { text: field.label, attrs: { for: `field_${field.id}` } }));

          const attrs = {
            id: `field_${field.id}`,
            type: field.type === 'textarea' ? null : (field.type || 'text')
          };

          if (field.readonly) attrs.readonly = 'readonly';
          if (field.placeholder) attrs.placeholder = field.placeholder;

          row.appendChild(createEl(field.type === 'textarea' ? 'textarea' : 'input', { attrs }));
          fragment.appendChild(row);
        });
        container.appendChild(fragment);
      },
      checklist(section, _data, container) {
        const fragment = document.createDocumentFragment();
        section.items.forEach((item, index) => {
          const itemText = typeof item === 'object' ? item.text : item;
          const wrapper = createEl('div', { className: `checkItem ${item.type === 'negative' ? 'check-negative' : ''}` });
          const label = createEl('label');
          const checkbox = createEl('input', { attrs: { type: 'checkbox', id: `${section.id}_${index}` } });
          checkbox.addEventListener('change', () => {
            wrapper.classList.toggle('checked-negative', item.type === 'negative' && checkbox.checked);
          });
          label.appendChild(checkbox);
          label.appendChild(document.createTextNode(` ${itemText}`));
          wrapper.appendChild(label);
          fragment.appendChild(wrapper);
        });
        if (section.notes) {
          fragment.appendChild(createEl('label', { text: 'Notes', attrs: { for: `notes_${section.id}` } }));
          fragment.appendChild(createEl('textarea', { attrs: { id: `notes_${section.id}` } }));
        }
        container.appendChild(fragment);
      },
      checklistMultiDay(section, data, container) {
        const days = Math.max(1, getTotalNights(data));
        const fragment = document.createDocumentFragment();
        section.items.forEach((item, index) => {
          const wrapper = createEl('div', { className: 'checkItem' });
          wrapper.appendChild(createEl('strong', { text: item.text }));
          wrapper.appendChild(document.createElement('br'));
          for (let day = 0; day < days; day += 1) {
            const label = createEl('label', { className: 'checkMulti' });
            label.setAttribute('data-label', `Night ${day + 1}`);
            label.appendChild(createEl('input', { attrs: { type: 'checkbox', id: `${section.id}_${index}_${day}` } }));
            wrapper.appendChild(label);
          }
          fragment.appendChild(wrapper);
        });
        if (section.notes) {
          fragment.appendChild(createEl('label', { text: 'Notes', attrs: { for: `notes_${section.id}` } }));
          fragment.appendChild(createEl('textarea', { attrs: { id: `notes_${section.id}` } }));
        }
        container.appendChild(fragment);
      },
      nightCounter(section, data, container) {
        const days = Math.max(1, getTotalNights(data));
        const sensorTotal = Number(data?.sections?.site_info?.fields?.sensorTotal?.value || $('field_sensorTotal')?.value || 0);
        section.fields.forEach((field) => {
          const wrapper = createEl('div', { className: 'row' });
          wrapper.appendChild(createEl('strong', { text: field.label }));
          wrapper.appendChild(document.createElement('br'));
          for (let day = 0; day < days; day += 1) {
            const row = createEl('div');
            row.appendChild(createEl('span', { text: `Night ${day + 1}: ` }));
            row.appendChild(createEl('input', { attrs: { id: getFieldElementId(section.id, field.id, day), type: 'number', placeholder: '0' } }));
            row.appendChild(createEl('span', { className: 'sensor-total', text: `/ ${sensorTotal}` }));
            wrapper.appendChild(row);
          }
          container.appendChild(wrapper);
        });
      },
      scoring(section, _data, container) {
        const fragment = document.createDocumentFragment();
        section.fields.forEach((field) => {
          fragment.appendChild(createEl('label', { text: `${field.label} (0-${field.max})`, attrs: { for: `score_${field.id}` } }));
          fragment.appendChild(createEl('input', { attrs: { id: `score_${field.id}`, type: 'number', max: field.max } }));
        });
        fragment.appendChild(createEl('label', { text: 'Total', attrs: { for: `score_total_${section.id}` } }));
        fragment.appendChild(createEl('input', { attrs: { id: `score_total_${section.id}`, readonly: 'readonly' } }));
        container.appendChild(fragment);
      },
      singleSelect(section, _data, container) {
        const fragment = document.createDocumentFragment();
        section.options.forEach((option, index) => {
          const label = createEl('label');
          label.appendChild(createEl('input', { attrs: { type: 'radio', name: section.id, id: `${section.id}_${index}` } }));
          label.appendChild(document.createTextNode(` ${option}`));
          fragment.appendChild(label);
        });
        container.appendChild(fragment);
      }
    };

    function renderSection(section, data) {
      const container = $(`section_${section.id}`);
      if (!container) return;
      container.innerHTML = '';
      const renderer = sectionRenderers[section.type];
      if (!renderer) {
        container.textContent = `Unsupported section type: ${section.type}`;
        return;
      }
      renderer(section, data, container);
    }

    function buildApp(data = { sections: {} }) {
      $('app').innerHTML = '';
      if (!state.qcConfig?.sections?.length) {
        $('app').textContent = 'Checklist config not loaded.';
        return;
      }
      const fragment = document.createDocumentFragment();
      state.qcConfig.sections.forEach((section, index) => {
        const wrapper = createEl('div', { className: 'collapsible-section', attrs: { id: section.id } });
        const header = createEl('h2', { className: 'collapsible-header', text: section.title || `Section ${index + 1}` });
        const content = createEl('div', { attrs: { id: `section_${section.id}` } });
        wrapper.appendChild(header);
        wrapper.appendChild(content);
        fragment.appendChild(wrapper);
      });
      $('app').appendChild(fragment);
      state.qcConfig.sections.forEach((section) => renderSection(section, data));
      applyData(data);
      updateAllScoringTotals();
      syncSensorTotalToQC();
      renderFieldToggles();
      applyFieldVisibility();
      updateEndTimeFieldFromInputs();
      initCollapsibles();
    }

    function collectData() {
      const data = { sections: {} };
      if (!state.qcConfig?.sections?.length) return data;
      state.qcConfig.sections.forEach((section) => {
        const sectionData = {};
        if (section.type === 'nightCounter') {
          const days = Math.max(1, getTotalNights());
          sectionData.fields = {};
          section.fields.forEach((field) => {
            sectionData.fields[field.id] = [];
            for (let day = 0; day < days; day += 1) sectionData.fields[field.id].push(Number($(getFieldElementId(section.id, field.id, day))?.value || 0));
          });
        }
        if (section.type === 'fields') {
          sectionData.fields = {};
          section.fields.forEach((field) => {
            const value = $(`field_${field.id}`)?.value ?? '';
            sectionData.fields[field.id] = { label: field.label, value };
          });
        }
        if (section.type === 'scoring') {
          sectionData.scores = {};
          let manualScore = 0;
          section.fields.forEach((field) => {
            const max = Number(field.max) || 0;
            const value = Math.min(max, Math.max(0, Number($(`score_${field.id}`)?.value || 0)));
            sectionData.scores[field.id] = value;
            manualScore += value;
          });
          const checklistScore = calculateChecklistScoreAll();
          sectionData.total = Math.round((checklistScore.percent * 0.7) + (manualScore * 0.3));
          sectionData.checklistPercent = checklistScore.percent;
          sectionData.manualScore = manualScore;
        }
        if (section.type === 'singleSelect') {
          sectionData.selected = null;
          section.options.forEach((_, index) => { if ($(`${section.id}_${index}`)?.checked) sectionData.selected = index; });
        }
        if (section.type === 'checklist') {
          sectionData.items = section.items.map((item, index) => ({
            label: typeof item === 'object' ? item.text : item,
            checked: Boolean($(`${section.id}_${index}`)?.checked),
            value: Boolean($(`${section.id}_${index}`)?.checked) ? 1 : 0
          }));
          if (section.notes) sectionData.notes = $(`notes_${section.id}`)?.value ?? '';
        }
        if (section.type === 'checklistMultiDay') {
          const days = Math.max(1, getTotalNights());
          sectionData.items = section.items.map((item, index) => {
            const dayValues = [];
            for (let day = 0; day < days; day += 1) dayValues.push(Boolean($(`${section.id}_${index}_${day}`)?.checked));
            return { label: item.text, days: dayValues, value: dayValues.filter(Boolean).length };
          });
          if (section.notes) sectionData.notes = $(`notes_${section.id}`)?.value ?? '';
        }
        data.sections[section.id] = sectionData;
      });
      return data;
    }

    function applyData(data) {
      const sections = data?.sections || {};
      Object.entries(sections).forEach(([sectionId, sectionData]) => {
        if (sectionData.notes !== undefined) {
          const notesEl = $(`notes_${sectionId}`);
          if (notesEl) notesEl.value = sectionData.notes;
        }
        if (sectionData.fields) {
          Object.entries(sectionData.fields).forEach(([key, value]) => {
            const fieldEl = $(`field_${key}`);
            if (fieldEl) fieldEl.value = value && typeof value === 'object' && 'value' in value ? value.value : (value ?? '');
          });
        }
        if (sectionData.scores) {
          Object.entries(sectionData.scores).forEach(([key, value]) => {
            const scoreEl = $(`score_${key}`);
            if (scoreEl) scoreEl.value = value;
          });
        }
        if (sectionData.selected != null) {
          const radio = $(`${sectionId}_${sectionData.selected}`);
          if (radio) radio.checked = true;
        }
        if (Array.isArray(sectionData.items)) {
          sectionData.items.forEach((item, index) => {
            if (Array.isArray(item.days)) {
              item.days.forEach((value, dayIndex) => {
                const checkbox = $(`${sectionId}_${index}_${dayIndex}`);
                if (checkbox) checkbox.checked = value;
              });
            } else if (item.checked !== undefined) {
              const checkbox = $(`${sectionId}_${index}`);
              if (checkbox) {
                checkbox.checked = item.checked;
                checkbox.dispatchEvent(new Event('change', { bubbles: true }));
              }
            }
          });
        }
        const sectionConfig = getSectionConfig(sectionId);
        if (sectionConfig?.type === 'nightCounter' && sectionData.fields) {
          Object.entries(sectionData.fields).forEach(([fieldId, values]) => {
            (values || []).forEach((value, dayIndex) => {
              const el = $(getFieldElementId(sectionId, fieldId, dayIndex));
              if (el) el.value = value;
            });
          });
        }
      });
      updateAllScoringTotals();
    }

    function calculateChecklistScoreAll() {
      let earned = 0;
      let total = 0;
      state.qcConfig?.sections?.forEach((section) => {
        if (section.type === 'checklist') {
          section.items.forEach((item, index) => {
            const weight = item.weight != null ? Number(item.weight) : 1;
            const checked = Boolean($(`${section.id}_${index}`)?.checked);
            if (item.type === 'negative') {
              if (checked) earned -= weight;
            } else {
              total += weight;
              if (checked) earned += weight;
            }
          });
        }
        if (section.type === 'checklistMultiDay') {
          const days = Math.max(1, getTotalNights());
          section.items.forEach((item, index) => {
            const weight = item.weight != null ? Number(item.weight) : 1;
            for (let day = 0; day < days; day += 1) {
              total += weight;
              if (Boolean($(`${section.id}_${index}_${day}`)?.checked)) earned += weight;
            }
          });
        }
      });
      if (earned < 0) earned = 0;
      return { earned, total, percent: total > 0 ? Math.round((earned / total) * 100) : 0 };
    }

    function updateAllScoringTotals() {
      if (!state.qcConfig?.sections?.length) return;
      const checklistScore = calculateChecklistScoreAll();
      let manualScore = 0;
      state.qcConfig.sections.forEach((section) => {
        if (section.type !== 'scoring') return;
        section.fields.forEach((field) => { manualScore += Number($(`score_${field.id}`)?.value || 0); });
      });
      const finalScore = Math.round((checklistScore.percent * 0.7) + (manualScore * 0.3));
      const totalEl = $('score_total_final_scoring');
      if (totalEl) totalEl.value = finalScore;
      let breakdown = $('score_breakdown');
      if (!breakdown) {
        breakdown = createEl('div', { attrs: { id: 'score_breakdown' }, className: 'score-breakdown' });
        $('section_final_scoring')?.appendChild(breakdown);
      }
      breakdown.innerHTML = `Checklist Score: ${checklistScore.percent}%<br>Manual Score: ${manualScore}<br>Final Score: <strong>${finalScore}</strong>`;
    }

    async function saveQCData() {
      if (!state.currentProject || !state.qcConfig?.sections?.length) return;

      const data = collectData();
      const project = ensureProjectShape(state.projectData || {});
      project[`qcData_${state.currentChecklistType}`] = data;
      project.updatedAt = Date.now();

      state.projectData = project;

      await writeJsonFile(getProjectFilePath(), project);
    }

    function toLocalDateInputValue(dateLike) {
      if (!dateLike) return '';
      const d = new Date(dateLike);
      if (Number.isNaN(d.getTime())) return '';

      const year = d.getFullYear();
      const month = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');

      return `${year}-${month}-${day}`;
    }

    function toLocalDateTimeInputValue(dateLike) {
      if (!dateLike) return '';
      const d = new Date(dateLike);
      if (Number.isNaN(d.getTime())) return '';

      const pad = (value) => String(value).padStart(2, '0');
      const year = d.getFullYear();
      const month = pad(d.getMonth() + 1);
      const day = pad(d.getDate());
      const hours = pad(d.getHours());
      const minutes = pad(d.getMinutes());

      return `${year}-${month}-${day}T${hours}:${minutes}`;
    }

    function localDateInputToIso(dateInput) {
      if (!dateInput) return '';
      const [year, month, day] = dateInput.split('-').map(Number);
      if (!year || !month || !day) return '';

      const localMidnight = new Date(year, month - 1, day, 0, 0, 0, 0);
      if (Number.isNaN(localMidnight.getTime())) return '';

      return localMidnight.toISOString();
    }

    function localDateTimeInputToIso(dateInput) {
      if (!dateInput) return '';
      const [datePart, timePart] = String(dateInput).split('T');
      if (!datePart || !timePart) return '';

      const [year, month, day] = datePart.split('-').map(Number);
      const [hours, minutes] = timePart.split(':').map(Number);
      if (!year || !month || !day) return '';

      const local = new Date(year, month - 1, day, hours || 0, minutes || 0, 0, 0);
      if (Number.isNaN(local.getTime())) return '';

      return local.toISOString();
    }

    function checklistDateAndNightsToEndIso(dateInput, totalNightsInput) {
      if (!dateInput) return '';

      const [year, month, day] = String(dateInput).split('-').map(Number);
      if (!year || !month || !day) return '';

      let nights = Number(totalNightsInput);
      if (!Number.isFinite(nights) || nights <= 0) nights = CONFIG.DEFAULT_NIGHTS;

      nights = Math.min(Math.max(Math.trunc(nights), 1), CONFIG.MAX_NIGHTS);

      const endLocal = new Date(year, month - 1, day, 23, 59, 59, 999);
      endLocal.setDate(endLocal.getDate() + nights);

      if (Number.isNaN(endLocal.getTime())) return '';
      return endLocal.toISOString();
    }

    function updateEndTimeFieldFromInputs() {
      const endField = $('field_endTime');
      if (!endField) return;

      const startDateInput = $('field_date')?.value;
      const nightsValue = $('field_totalNights')?.value;
      const endIso = checklistDateAndNightsToEndIso(startDateInput, nightsValue);
      if (endIso) endField.value = toLocalDateTimeInputValue(endIso);
    }

    function applyTaskToSiteInfo(taskData) {
      const map = {
        date: toLocalDateInputValue(taskData.startTime) || toLocalDateInputValue(new Date()),
        siteNumber: taskData.project || '',
        sensorTotal: taskData.sensorCount || '',
        installSummary: taskData.notes || '',
        customerName: taskData.customerName || '',
        customerAddress: taskData.customerAddress || '',
        managerName: taskData.managerName || '',
        startOdometer: taskData.startOdometer || '',
        endOdometer: taskData.endOdometer || '',
        endTime: toLocalDateTimeInputValue(taskData.endTime)
      };
      Object.entries(map).forEach(([key, value]) => {
        const el = $(`field_${key}`);
        if (el && !el.value) el.value = value;
      });
      if ($('field_totalNights') && !$('field_totalNights').value) $('field_totalNights').value = CONFIG.DEFAULT_NIGHTS;
      if (!$('field_endTime')?.value) updateEndTimeFieldFromInputs();
    }

    function attachQCListeners() {
      if (state.qcListenerBound) return;
      $('qcChecklistSection')?.addEventListener('input', async (event) => {
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;
        if (target.id === 'field_date') {
          updateEndTimeFieldFromInputs();
        }
        if (target.id === 'field_totalNights') {
          const raw = target.value;
          if (raw === '') return;
          let value = Number(raw);
          if (isNaN(value)) return;
          value = Math.min(Math.max(value, 1), CONFIG.MAX_NIGHTS);
          if (value !== Number(raw)) target.value = value;
          const currentData = collectData();
          buildApp(currentData);
          applyData(currentData);
          updateEndTimeFieldFromInputs();
          return;
        }

        if (target.id === 'field_sensorTotal') {
          const total = Number(target.value) || 0;

          // ✅ Update runtime state
          state.expectedSensors = total;

          // ✅ Persist into projectData (THIS IS THE FIX)
          if (!state.projectData) state.projectData = {};
          if (!state.projectData[`qcData_${state.currentChecklistType}`]) {
            state.projectData[`qcData_${state.currentChecklistType}`] = { sections: {} };
          }

          const qc = state.projectData[`qcData_${state.currentChecklistType}`];

          if (!qc.sections.site_info) qc.sections.site_info = { fields: {} };
          if (!qc.sections.site_info.fields.sensorTotal) {
            qc.sections.site_info.fields.sensorTotal = { value: total };
          } else {
            qc.sections.site_info.fields.sensorTotal.value = total;
          }

          // ✅ Update UI
          populateSensorDropdown(total);
          updateGallery();

          $$('[id^="field_nightly_production_"]').forEach((input) => {
            input.parentElement?.querySelector('.sensor-total')?.replaceChildren(
              document.createTextNode(`/ ${total}`)
            );
          });

          return;
        }
        updateAllScoringTotals();
      });
      $('qcChecklistSection')?.addEventListener('change', () => {
        updateAllScoringTotals();
      });
      state.qcListenerBound = true;
    }

    async function loadQCChecklist(_projectId) {
      await initQCConfig();
      if (!state.qcConfig?.sections?.length) return;
      const taskData = ensureProjectShape(state.projectData || {});
      const qcData =
        taskData[`qcData_${state.currentChecklistType}`] ||
        taskData[`qcData_${state.currentChecklistType}_checklist`] ||
        { sections: {} };
      buildApp(qcData);
      applyTaskToSiteInfo(taskData);
      attachQCListeners();
    }

    function getNightlyProductionStats(data) {
      const section = data.sections.nightly_production;
      if (!section?.fields) return null;
      const parseValues = (val) => Array.isArray(val) ? val.map((v) => Number(v) || 0) : [];
      const sensors = parseValues(section.fields.sensors);
      const nights = Math.max(sensors.length, getTotalNights(data));
      const sensorTotal = Number(data?.sections?.site_info?.fields?.sensorTotal?.value) || Number($('field_sensorTotal')?.value) || state.expectedSensors || 0;
      let maxDone = 0;
      const result = [];
      for (let i = 0; i < nights; i += 1) {
        const done = Number(sensors[i] ?? 0);
        maxDone = Math.max(maxDone, done);
        result.push({ night: i + 1, done, total: sensorTotal, pct: sensorTotal > 0 ? Math.round((done / sensorTotal) * 100) : 0 });
      }
      return { nights: result, overall: sensorTotal > 0 ? Math.round((maxDone / sensorTotal) * 100) : 0 };
    }

    function generateCertificationReport() {
      const data = collectData();
      const scoring = data.sections.final_scoring || {};
      const total = scoring.total || 0;
      const checklistPercent = scoring.checklistPercent || 0;
      const manualScore = scoring.manualScore || 0;
      let result = 'PASS';
      if (total < 70) result = 'FAIL';
      else if (total < 85) result = 'NEEDS IMPROVEMENT';
      const production = getNightlyProductionStats(data);
      const lines = [
        `Total Score: ${total}`,
        `Checklist Score: ${checklistPercent}%`,
        `Manual Score: ${manualScore}`,
        `Result: ${result}`
      ];
      if (production) {
        lines.push('', 'Night Progress:');
        production.nights.forEach((night) => lines.push(`Night ${night.night}: ${night.done}/${night.total} (${night.pct}%)`));
        lines.push(`Overall Completion: ${production.overall}%`);
      }
      return lines.join('\n');
    }

    function buildReportFile() {
      return new Blob([generateCertificationReport()], { type: 'text/plain' });
    }

    function exportCertificationCSV() {
      const data = collectData();
      const rows = [['Metric', 'Value']];
      const scoring = data.sections.final_scoring || {};
      const total = scoring.total || 0;
      let result = 'PASS';
      if (total < 70) result = 'FAIL';
      else if (total < 85) result = 'NEEDS IMPROVEMENT';
      rows.push(['Total Score', total], ['Result', result]);
      Object.entries(scoring.scores || {}).forEach(([key, value]) => rows.push([key, value]));
      rows.push([], ['Night Progress']);
      const production = getNightlyProductionStats(data);
      if (production) {
        production.nights.forEach((night) => rows.push([`Night ${night.night}`, `${night.done}/${night.total} (${night.pct}%)`]));
        rows.push(['Overall Completion', `${production.overall}%`]);
      }
      downloadCSV(rows, 'certification_report.csv');
    }

    function buildQCChecklistCSV() {
      const data = collectData();
      const rows = [['Section', 'Field', 'Value']];
      Object.entries(data.sections || {}).forEach(([sectionId, section]) => {
        if (section.fields) {
          Object.entries(section.fields).forEach(([key, val]) => {
            const value = (val && typeof val === 'object' && 'value' in val) ? val.value : val;
            rows.push([sectionId, key, normalizeText(value)]);
          });
        }
        if (Array.isArray(section.items)) {
          section.items.forEach((item) => {
            if (item.label && !Array.isArray(item.days)) rows.push([sectionId, item.label, item.checked ?? item.value ?? '']);
            if (Array.isArray(item.days)) item.days.forEach((dayVal, d) => rows.push([sectionId, `${item.label} (Night ${d + 1})`, dayVal]));
          });
        }
        if (section.scores) {
          Object.entries(section.scores).forEach(([k, v]) => rows.push([sectionId, k, v]));
          rows.push([sectionId, 'Total Score', section.total || 0]);
        }
        if (section.notes) rows.push([sectionId, 'Notes', normalizeText(section.notes)]);
      });
      return rows;
    }

    async function uploadReportsToOneDrive() {
      if (!state.currentProject) return alert('No project selected');
      try {
        const qcRows = buildQCChecklistCSV();
        const qcCsv = qcRows.map((row) => row.map((cell) => {
          const text = String(cell ?? '');
          return /[",\n]/.test(text) ? `"${text.replace(/"/g, '""')}"` : text;
        }).join(',')).join('\n');
        const timestamp = "latest";
        await uploadBlobToOneDrive(`${getProjectBasePath()}/qc_${timestamp}.csv`, new Blob([qcCsv], { type: 'text/csv' }), 'text/csv');
        await uploadBlobToOneDrive(`${getProjectBasePath()}/report_${timestamp}.txt`, buildReportFile(), 'text/plain');
      } catch (err) {
        console.error(err);
        alert(`Upload failed. ${err.message}`);
      }
    }

    function syncSensorTotalToQC() {
      const total = state.expectedSensors;
      const qcField = $('field_sensorTotal');
      if (qcField) qcField.value = total;
      $$('.sensor-total').forEach((el) => { el.textContent = `/ ${total}`; });
    }

    function initCollapsibles() {
      $$('.collapsible-section').forEach((section) => {
        const header = section.querySelector('.collapsible-header');
        if (!header || !section.id) return;
        const saved = localStorage.getItem(`collapse:${section.id}`);
        if (saved === 'true') section.classList.add('collapsed');
        if (header.dataset.bound) return;
        header.dataset.bound = 'true';
        header.addEventListener('click', () => {
          section.classList.toggle('collapsed');
          localStorage.setItem(`collapse:${section.id}`, section.classList.contains('collapsed'));
        });
      });
    }

    function initModalEvents() {
      $('closeModalButton')?.addEventListener('click', closeModal);
      $('modal')?.addEventListener('click', (e) => { if (e.target === $('modal')) closeModal(); });
      $('modalPrev')?.addEventListener('click', () => {
        if (!state.modalItems.length) return;
        showModalByIndex((state.modalIndex - 1 + state.modalItems.length) % state.modalItems.length);
      });
      $('modalNext')?.addEventListener('click', () => {
        if (!state.modalItems.length) return;
        showModalByIndex((state.modalIndex + 1) % state.modalItems.length);
      });
      $('downloadButton')?.addEventListener('click', () => {
        const item = state.modalItems[state.modalIndex];
        if (!item) return;
        const a = document.createElement('a');
        a.href = item.url;
        a.download = item.name;
        a.click();
      });
      $('deleteButton')?.addEventListener('click', deleteCurrentModalImage);
      $('imageDropdown')?.addEventListener('change', () => {
        const index = Number($('imageDropdown')?.value);
        if (!Number.isNaN(index)) showModalByIndex(index);
      });
    }

    function initProjectEvents() {
      $('projectList')?.addEventListener('change', async () => {
        const folder = $('projectList').value;
        if (folder) {
          await loadProject(folder);
        }
      });
      $('projectSearch')?.addEventListener('input', filterProjects);

      $('saveProject')?.addEventListener('click', async () => {
        const btn = $('saveProject');

        try {
          requireAuth(true);

          if (btn?.disabled) return;
          btn.disabled = true;
          btn.textContent = 'Saving...';

          console.log("[SAVE] Saving project...");

          const success = await saveCurrentProject();

          if (!success) {
            console.warn("[SAVE] Aborted - project not valid");
            btn.disabled = false;
            btn.textContent = 'Save Project';
            return;
          }

          if (!state.currentProject) {
            console.warn("[SAVE] Aborted - no project selected");
            btn.disabled = false;
            btn.textContent = 'Save Project';
            return;
          }

          console.log("[SAVE] Saving QC data...");
          await saveQCData();

          console.log("[SAVE] Uploading QC + Report...");
          await uploadReportsToOneDrive();

          console.log("[SAVE] Done");

          alert('Project saved ✅');

        } catch (err) {
          console.error(err);
          alert("Save failed ❌");
        } finally {
          btn.disabled = false;
          btn.textContent = 'Save Project';
        }
      });

      $('newProjectBtn')?.addEventListener('click', () => {
        $('project').value = '';
        $('customerName').value = '';
        $('projectFolderDisplay').textContent = '';

        state.currentProject = '';
        state.currentProjectName = '';
        state.currentCustomerName = '';
        state.expectedSensors = 0;
        state.projectData = null;

        buildApp({ sections: {} });
        updateGallery();
      });
      $('exportProjectJsonBtn')?.addEventListener('click', () => {
        const project = ensureProjectShape(state.projectData || {});
        downloadBlob(new Blob([JSON.stringify(project, null, 2)], { type: 'application/json' }), `${sanitize(project.project || 'project')}.json`);
      });
    }

    function initFeatureEvents() {
      $('saveSensorMeta')?.addEventListener('click', saveSensorMeta);
      $('exportCSV')?.addEventListener('click', exportSensorMetaCsv);
      $('sensorMetaNumberDropdown')?.addEventListener('change', () => loadSensorMeta($('sensorMetaNumberDropdown').value));
      $('sensorNumberDropdown')?.addEventListener('change', async () => {
        const sensorNum = $('sensorNumberDropdown').value;
        if (!sensorNum) return;
        const data = ensureProjectShape(state.projectData || {}).sensorMeta?.[sensorNum] || {};
        if (data.serial) $('serialNumber').value = data.serial;
      });
      $$('input[name="viewMode"]').forEach((radio) => radio.addEventListener('change', async () => { updateImageModeUI(); await updateGallery(); }));
      $('missingList')?.addEventListener('click', (e) => { const li = e.target.closest('li[data-sensor]'); if (li) handlePickMissing(li.dataset.sensor); });
      $('missingList')?.addEventListener('keydown', (e) => {
        const li = e.target.closest('li[data-sensor]');
        if (li && (e.key === 'Enter' || e.key === ' ')) { e.preventDefault(); handlePickMissing(li.dataset.sensor); }
      });
      $('uploadImage')?.addEventListener('click', uploadSensor);
      $('uploadDeliverableImage')?.addEventListener('click', uploadDeliverableImage);
      $('compareBtn')?.addEventListener('click', () => { $('comparisonResults').innerHTML = `<pre>${escapeHtml(generateCertificationReport() || 'No report available')}</pre>`; });
      $('exportReportBtn')?.addEventListener('click', exportCertificationCSV);
      $('exportQCBtn')?.addEventListener('click', () => downloadCSV(buildQCChecklistCSV(), `${sanitize(state.currentProjectName || 'project')}_${state.currentChecklistType}_checklist.csv`));
      $('qcChecklistSection')?.addEventListener('input', (e) => {
        const target = e.target;

        if (target.id === 'field_totalNights') {
          updateTotalNightsLive(target.value);
        }
      });

      document.querySelectorAll('input[name="checklistType"]').forEach((radio) => {
        radio.addEventListener('change', async () => {
          state.currentChecklistType = radio.value;
          await initQCConfig(true);
          if (state.currentProject) await loadQCChecklist(state.currentProject); else buildApp({ sections: {} });
        });
      });
    }

    function updateTotalNightsLive(value) {
      let nights = parseInt(value, 10);

      if (isNaN(nights) || nights <= 0) return;

      nights = Math.min(nights, CONFIG.MAX_NIGHTS);

      // Update state immediately
      if (!state.projectData) state.projectData = {};
      if (!state.projectData.sections) state.projectData.sections = {};
      if (!state.projectData.sections.site_info) {
        state.projectData.sections.site_info = { fields: {} };
      }

      state.projectData.sections.site_info.fields.totalNights = {
        value: nights
      };

      const freshData =
        state.projectData?.[`qcData_${state.currentChecklistType}`] ||
        { sections: {} };

      buildApp(freshData);
      applyData(freshData);

      updateAllScoringTotals();
    }

    async function boot() {
      initMicrosoftAuth();
      initModalEvents();
      initProjectEvents();
      initFeatureEvents();
      updateImageModeUI();
      initCollapsibles();
      await initQCConfig(true);
      buildApp({ sections: {} });
      if (accessToken && !isTokenExpired(accessToken)) {
        try { await populateProjects(); } catch (err) { console.error(err); }
      }
    }

    boot();
  </script>
