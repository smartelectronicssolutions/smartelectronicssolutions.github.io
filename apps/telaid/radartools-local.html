<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Job Details Tracker - Local Only</title>
    <link rel="stylesheet" href="./assets/css/radartools.css" />
</head>

<body>
    <header>
    <h1><img src="./assets/img/telaid_logo.png" alt=""> Radar</h1>
        <section id="login-section" class="logins-section">
            <form id="login-form">
                <label for="username">Email:</label>
                <input type="email" id="username" required>

                <label for="password">Password:</label>
                <input type="password" id="password" required>

                <button type="submit">Sign in</button>
            </form>

            <button id="logout" style="display:none;">Logout</button>

            <div class="ms">
                <br>
                <button id="loginButton">Login to MS</button>
                <button id="logoutButton">Logout of MS</button>
                <p id="loginStatus">Login status...</p>
            </div>
        </section>

    </header>
    <nav class="top-actions">
        <button id="saveProject" type="button">Save Project</button>
        <button id="restoreBackupBtn">Restore Last Save</button>
        <button id="newProjectBtn" class="secondary" type="button">New / Load by Name</button>
        <button id="exportBackupBtn" class="secondary" type="button">Export Backup</button>
        <button id="importBackupBtn" class="secondary" type="button">Import Backup</button>
        <input id="backupInput" type="file" accept="application/json" class="hidden">
        <button id="clearAllBtn" class="danger" type="button">Clear All Local Data</button>
    </nav>

    <main id="mainApp">
        <section>
            <div class="grid grid-4">
                <div>
                    <label>Project ID / Name:
                        <input type="text" id="project" />
                    </label>
                </div>
                <div>
                    <label>Customer Name:
                        <input type="text" id="customerName" />
                    </label>
                </div>
                <div>
                    <label>Total Devices:
                        <input type="number" id="sensorCount" min="1" />
                    </label>
                </div>

            </div>

            <div class="grid grid-2" style="margin-top: 12px;">
                <div>
                    <label>
                        Search Projects:
                        <input type="text" id="projectSearch" placeholder="Type customer or project name…" />
                    </label>
                </div>
                <div>
                    <label>Existing Projects:
                        <select id="projectList">
                            <option value="">-- Choose a project --</option>
                        </select>
                    </label>
                </div>
            </div>
            <div class="hint">Everything is stored on this browser only. Export a backup if you want a portable copy.
            </div>
        </section>

        <section class="collapsible-section" id="qcChecklistSection">
            <h2 class="collapsible-header">📋 QC Checklist</h2>
            <div id="checklistSelector" class="button-row">
                <label><input type="radio" name="checklistType" value="radar" checked> Radar</label>
                <label><input type="radio" name="checklistType" value="remote"> Remote</label>
                <label><input type="radio" name="checklistType" value="audit"> Audit</label>
            </div>
            <div id="app">Loading checklist...</div>
        </section>

        <section class="collapsible-section" id="site-analysis">
            <h2 class="collapsible-header">📋 Site Analysis</h2>
            <div class="button-row">
                <button id="compareBtn" type="button">Generate Report</button>
                <button id="exportReportBtn" type="button">Export Report CSV</button>
                <button id="uploadQCBtn" type="button">Export QC Checklist CSV</button>
            </div>
            <div id="comparisonResults"></div>
        </section>

        <section class="collapsible-section" id="sensor-meta">
            <h2 class="collapsible-header">📡 Device Details</h2>
            <div class="grid grid-4">
                <div>
                    <label>Device #:
                        <select id="sensorMetaNumberDropdown">
                            <option value="">Select a Device</option>
                        </select>
                    </label>
                </div>
                <div>
                    <label>Serial #:
                        <input type="text" id="sensorMetaSerial" />
                    </label>
                </div>
                <div>
                    <label>Optional Info 1:
                        <input type="text" id="sensorMetaM1" placeholder="Optional" />
                    </label>
                </div>
                <div>
                    <label>Optional Info 2:
                        <input type="text" id="sensorMetaM2" placeholder="Optional" />
                    </label>
                </div>
            </div>

            <div class="grid grid-4" style="margin-top: 12px;">
                <div>
                    <label>Optional Info 3:
                        <input type="text" id="sensorMetaM3" placeholder="Optional" />
                    </label>
                </div>
                <div class="button-row" style="align-self:end;">
                    <button id="saveSensorMeta" type="button">Save Device Info</button>
                    <button id="exportCSV" type="button">Export Device Data</button>
                </div>
            </div>

            <div><br></div>

            <section id="radio-group" class="panel">
                <h3>🖼️ Device Images</h3>

                <div class="button-row">
                    <label><input type="radio" name="viewMode" value="sensors" checked /> Device Images</label>
                    <label><input type="radio" name="viewMode" value="deliverables" /> Other Deliverables</label>
                </div>

                <div id="sensorUploadSection" style="margin-top: 12px;">
                    <h3>Upload Device Image Below</h3>
                    <input type="file" id="sensorImage" accept="image/*" class="file-input" />
                    <label for="sensorImage" class="file-btn">📷 Take/Choose Picture</label>
                    <div class="grid grid-4">
                        <div>
                            <label>Device #:
                                <select id="sensorNumberDropdown">
                                    <option value="">Select a Device</option>
                                </select>
                            </label>
                        </div>
                        <div>
                            <label>Serial:
                                <input type="text" id="serialNumber" />
                            </label>
                        </div>
                        <div>
                            <label>
                                <input type="checkbox" id="skipMarkupCheckbox" />
                                No Markup
                            </label>
                        </div>
                        <div class="button-row" style="align-self:end;">
                            <button id="uploadImage" type="button">Upload</button>
                        </div>
                    </div>
                </div>

                <div id="deliverableUploadSection" style="display:none; margin-top: 12px;">
                    <h3>Upload Deliverable Image</h3>
                    <input type="file" id="fileUploader" accept="image/*" class="file-input" />
                    <label for="fileUploader" class="file-btn">📷 Take/Choose Picture</label>
                    <div class="grid grid-3">
                        <div>
                            <label>Name:
                                <input type="text" id="imageNameInput" />
                            </label>
                        </div>
                        <div>
                            <label>Markup:
                                <input type="text" id="markupTextInput" />
                            </label>
                        </div>
                        <div class="button-row" style="align-self:end;">
                            <button id="uploadDeliverableImage" type="button">Upload Image</button>
                        </div>
                    </div>
                </div>

                <div class="grid grid-2" style="margin-top: 16px;">
                    <div>
                        <h3>Missing Images</h3>
                        <ul id="missingList"></ul>
                    </div>
                    <div>
                        <h3>Gallery</h3>
                        <label for="imageDropdown">Select an Image:</label>
                        <select id="imageDropdown">
                            <option value="">- Select an Image -</option>
                        </select>
                        <div id="gallery"></div>
                    </div>
                </div>

            </section>
        </section>

        <div id="modal">
            <div id="modalContent">
                <img id="modalImage" src="" alt="Large View" />
                <p id="modalFileName"></p>

                <div class="modal-nav">
                    <button id="modalPrev" type="button">◀ Previous</button>
                    <button id="modalNext" type="button">Next ▶</button>
                </div>

                <div class="modal-actions">
                    <button id="downloadButton" type="button">Download</button>
                    <button class="clear-button" id="deleteButton" type="button">Delete</button>
                    <button id="closeModalButton" class="secondary" type="button">Close</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const CONFIG = {
            MAX_NIGHTS: 10,
            DEFAULT_NIGHTS: 5,
            ADMIN_PASSWORD: 'telaidadmin',
            AUTO_SAVE_MS: 1200,
            IMAGE_MAX_WIDTH: 2048,
            SENSOR_IMAGE_COUNT_REQUIRED: 2,
            STORAGE_KEY: 'radarLocalAppV1'
        };


        const $ = (id) => document.getElementById(id);
        const $$ = (selector, root = document) => Array.from(root.querySelectorAll(selector));

        const escapeHtml = (value) => String(value ?? '').replace(/[&<>"']/g, (m) => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[m]));

        const sanitize = (str) => (str || '').trim().replace(/\s+/g, '_').replace(/[\\/:*?"<>|#%{}~&]/g, '_');
        const normalizeText = (v) => String(v ?? '').replace(/[\r\n]+/g, ' ').trim();
        const normKey = (s) => (s || '').trim().toLowerCase();

        const createEl = (tag, options = {}) => {
            const el = document.createElement(tag);
            if (options.className) el.className = options.className;
            if (options.text != null) el.textContent = options.text;
            if (options.html != null) el.innerHTML = options.html;
            if (options.attrs) {
                Object.entries(options.attrs).forEach(([key, value]) => {
                    if (value != null) el.setAttribute(key, value);
                });
            }
            return el;
        };

        const debounce = (fn, delay = 300) => {
            let timer = null;
            return (...args) => {
                clearTimeout(timer);
                timer = setTimeout(() => fn(...args), delay);
            };
        };

        const downloadBlob = (blob, filename) => {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(url);
        };

        const downloadCSV = (rows, filename) => {
            const csv = rows.map((row) => row.map((cell) => {
                const text = String(cell ?? '');
                return /[",\n]/.test(text) ? `"${text.replace(/"/g, '""')}"` : text;
            }).join(',')).join('\n');
            downloadBlob(new Blob([csv], { type: 'text/csv;charset=utf-8' }), filename);
        };


        const DB_NAME = 'radarImagesDB';
        const STORE_NAME = 'images';

        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1);

                request.onupgradeneeded = () => {
                    const db = request.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                    }
                };

                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        async function saveImage(blob) {
            const db = await openDB();
            const id = crypto.randomUUID();

            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);

                store.put({ id, blob });

                tx.oncomplete = () => resolve(id);
                tx.onerror = () => reject(tx.error);
            });
        }

        async function getImage(id) {
            const db = await openDB();

            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readonly');
                const store = tx.objectStore(STORE_NAME);

                const request = store.get(id);

                request.onsuccess = () => resolve(request.result?.blob || null);
                request.onerror = () => reject(request.error);
            });
        }

        async function deleteImage(imageId) {
            const db = await openDB();

            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);

                store.delete(imageId);

                tx.oncomplete = resolve;
                tx.onerror = reject;
            });
        }

        function loadStore() {
            try {
                return JSON.parse(localStorage.getItem(CONFIG.STORAGE_KEY) || '{"projects":{},"favorites":{},"ui":{}}');
            } catch {
                return { projects: {}, favorites: {}, ui: {} };
            }
        }

        function saveStore() {
            localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify(store));
        }

        let store = loadStore();

        const state = {
            currentProject: '',
            currentProjectName: '',
            currentCustomerName: '',
            expectedSensors: 0,
            allProjects: [],
            isLoadingProject: false,
            isUploading: false,
            modalItems: [],
            modalIndex: 0,
            autoSaveTimer: null,
            lastAutosavedPayload: '',
            qcConfig: null,
            qcListenerBound: false,
            currentChecklistType: 'radar'
        };

        function ensureProjectShape(project) {
            return Object.assign({
                id: Date.now().toString(),
                project: '',
                customerName: '',
                sensorCount: 0,
                createdAt: Date.now(),
                updatedAt: Date.now(),
                sensorMeta: {},
                images: { sensors: [], deliverables: [] },
                qcData_radar: { sections: {} },
                qcData_remote: { sections: {} },
                qcData_audit: { sections: {} }
            }, project || {});
        }

        function bestTime(task, id) {
            return Math.max(
                Number(task?.updatedAt) || 0,
                Number(task?.createdAt) || 0,
                Number(task?.startTime) || 0,
                Number(task?.timestamp) || 0,
                Number(id) || 0
            );
        }

        function getProjectById(id = state.currentProject) {
            if (!id || !store.projects[id]) return null;
            return ensureProjectShape(store.projects[id]);
        }

        function saveProjectRecord(project) {
            const normalized = ensureProjectShape(project);
            normalized.updatedAt = Date.now();
            store.projects[normalized.id] = normalized;
            saveStore();
            return normalized;
        }

        function removeProjectRecord(id) {
            delete store.projects[id];
            saveStore();
        }

        function getFavorites() { return store.favorites || {}; }
        function setFavorites(favorites) { store.favorites = favorites; saveStore(); }



        function populateSensorDropdown(count) {
            [$('sensorMetaNumberDropdown'), $('sensorNumberDropdown')].forEach((dropdown) => {
                if (!dropdown) return;
                dropdown.innerHTML = '<option value="">Select a Device</option>';
                for (let i = 1; i <= count; i += 1) {
                    const padded = String(i).padStart(2, '0');
                    dropdown.appendChild(new Option(padded, String(i)));
                }
            });
        }

        function updateImageModeUI() {
            const mode = document.querySelector('input[name="viewMode"]:checked')?.value || 'sensors';
            if ($('sensorUploadSection')) $('sensorUploadSection').style.display = mode === 'sensors' ? 'block' : 'none';
            if ($('deliverableUploadSection')) $('deliverableUploadSection').style.display = mode === 'deliverables' ? 'block' : 'none';
        }

        let currentModalURL = null;

        function showModalByIndex(index) {
            const item = state.modalItems[index];
            if (!item) return;

            state.modalIndex = index;

            // cleanup old URL
            if (currentModalURL) {
                URL.revokeObjectURL(currentModalURL);
                currentModalURL = null;
            }

            if (item.imageId) {
                getImage(item.imageId).then(blob => {
                    if (!blob) return;
                    currentModalURL = URL.createObjectURL(blob);
                    $('modalImage').src = currentModalURL;
                });
            } else {
                $('modalImage').src = item.url || '';
            }

            $('modalFileName').textContent = item.name;
            $('modal').style.display = 'flex';
        }

        function closeModal() {
            if (currentModalURL) {
                URL.revokeObjectURL(currentModalURL);
                currentModalURL = null;
            }

            $('modal').style.display = 'none';
            $('modalImage').src = '';
            $('modalFileName').textContent = '';
        }

        async function loadSensorMeta(sensorNum) {
            const project = getProjectById();
            if (!sensorNum || !project) return;
            const data = project.sensorMeta?.[sensorNum] || {};
            $('sensorMetaSerial').value = data.serial || '';
            $('sensorMetaM1').value = data.m1 || '';
            $('sensorMetaM2').value = data.m2 || '';
            $('sensorMetaM3').value = data.m3 || '';
            if ($('serialNumber') && !$('serialNumber').value && data.serial) {
                $('serialNumber').value = data.serial;
            }
        }

        async function saveSensorMeta() {
            const sensorNum = $('sensorMetaNumberDropdown')?.value;
            const project = getProjectById();
            if (!sensorNum || !project) {
                alert('Select a device first.');
                return;
            }
            project.sensorMeta[sensorNum] = {
                serial: $('sensorMetaSerial')?.value.trim() || '',
                m1: $('sensorMetaM1')?.value.trim() || '',
                m2: $('sensorMetaM2')?.value.trim() || '',
                m3: $('sensorMetaM3')?.value.trim() || '',
                updatedAt: Date.now()
            };
            saveProjectRecord(project);
            if ($('sensorNumberDropdown')?.value === sensorNum) {
                $('serialNumber').value = $('sensorMetaSerial').value.trim() || '';
            }
            alert('Device info saved.');
        }

        async function exportSensorMetaCsv() {
            const project = getProjectById();
            if (!project) return alert('No project selected.');
            const rows = [['Device #', 'Serial', 'Info 1', 'Info 2', 'Info 3']];
            Object.entries(project.sensorMeta || {}).forEach(([sensorNum, meta]) => {
                rows.push([
                    normalizeText(sensorNum),
                    normalizeText(meta.serial),
                    normalizeText(meta.m1),
                    normalizeText(meta.m2),
                    normalizeText(meta.m3)
                ]);
            });
            downloadCSV(rows, `${sanitize(project.project || 'project')}_deviceData.csv`);
        }

        const resizeImage = (file, maxWidth = CONFIG.IMAGE_MAX_WIDTH) => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onerror = reject;
            reader.onload = () => {
                const img = new Image();
                img.onerror = reject;
                img.src = reader.result;
                img.onload = () => {
                    let { width, height } = img;
                    if (width > maxWidth) {
                        height *= maxWidth / width;
                        width = maxWidth;
                    }
                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    canvas.toBlob((blob) => resolve(blob || file), 'image/jpeg', 0.92);
                };
            };
            reader.readAsDataURL(file);
        });

        const blobToDataURL = (blob) => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onerror = reject;
            reader.onload = () => resolve(reader.result);
            reader.readAsDataURL(blob);
        });

        const addTextToImage = (blob, text) => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onerror = reject;
            reader.onload = () => {
                const img = new Image();
                img.onerror = reject;
                img.src = reader.result;
                img.onload = () => {
                    const barHeight = Math.max(72, Math.round(img.width * 0.08));
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height + barHeight;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    ctx.fillStyle = 'black';
                    ctx.fillRect(0, img.height, canvas.width, barHeight);
                    ctx.fillStyle = 'white';
                    ctx.font = `bold ${Math.max(28, Math.round(img.width * 0.05))}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(text, canvas.width / 2, img.height + barHeight / 2);
                    canvas.toBlob((finalBlob) => resolve(finalBlob || blob), 'image/jpeg', 0.92);
                };
            };
            reader.readAsDataURL(blob);
        });

        function getCurrentImages(mode = 'sensors') {
            const project = getProjectById();
            if (!project) return [];
            return [...(project.images?.[mode] || [])];
        }

        async function updateGallery() {
            const project = getProjectById();
            if (!project) {
                $('gallery').innerHTML = '';
                $('imageDropdown').innerHTML = '<option value="">-- Select an Image --</option>';
                $('missingList').innerHTML = '';
                return;
            }

            const mode = document.querySelector('input[name="viewMode"]:checked')?.value || 'sensors';
            let items = getCurrentImages(mode);
            const seen = new Set();
            items = items.filter((item) => {
                const key = `${item.name}|${item.imageId || item.url}`;
                if (seen.has(key)) return false;
                seen.add(key);
                return true;
            });

            const favorites = getFavorites();
            items.sort((a, b) => {
                const fa = favorites[a.id] ? 1 : 0;
                const fb = favorites[b.id] ? 1 : 0;
                if (fa !== fb) return fb - fa;
                return a.name.localeCompare(b.name, undefined, { numeric: true });
            });

            state.modalItems = items;
            $('gallery').innerHTML = '';
            $('imageDropdown').innerHTML = '<option value="">-- Select an Image --</option>';
            $('missingList').innerHTML = '';

            items.forEach((item, index) => {
                const container = createEl('div', { className: 'image-container' });
                const img = createEl('img', { attrs: { loading: 'lazy', alt: item.name } });

                // ✅ Load from IndexedDB
                if (item.imageId) {
                    getImage(item.imageId).then(blob => {
                        if (!blob) return;
                        const url = URL.createObjectURL(blob);
                        img.src = url;
                        img.onload = () => URL.revokeObjectURL(url);
                    });
                }
                // fallback for old images
                else if (item.url) {
                    img.src = item.url;
                }
                img.addEventListener('click', () => showModalByIndex(index));

                const star = createEl('span', {
                    className: `favorite-star ${favorites[item.id] ? 'favorited' : ''}`,
                    text: favorites[item.id] ? '★' : '☆'
                });

                star.addEventListener('click', (event) => {
                    event.stopPropagation();
                    if (favorites[item.id]) delete favorites[item.id]; else favorites[item.id] = true;
                    setFavorites(favorites);
                    updateGallery();
                });

                container.appendChild(img);
                container.appendChild(star);
                container.appendChild(createEl('div', { className: 'small', text: item.name }));
                $('gallery').appendChild(container);
                $('imageDropdown').appendChild(new Option(item.name, String(index)));
            });

            if (mode === 'sensors') {
                const countMap = {};
                items.forEach((item) => {
                    const match = item.name.match(/(?:^|_)(\d{2})-/);
                    if (match) {
                        const idx = parseInt(match[1], 10);
                        countMap[idx] = (countMap[idx] || 0) + 1;
                    }
                });

                for (let i = 1; i <= state.expectedSensors; i += 1) {
                    const have = countMap[i] || 0;
                    if (have < CONFIG.SENSOR_IMAGE_COUNT_REQUIRED) {
                        const padded = String(i).padStart(2, '0');
                        const li = createEl('li', { text: `Sensor ${padded} - Missing ${CONFIG.SENSOR_IMAGE_COUNT_REQUIRED - have} image(s)` });
                        li.dataset.sensor = String(i);
                        li.className = 'missing-sensor';
                        li.setAttribute('role', 'button');
                        li.setAttribute('tabindex', '0');
                        $('missingList').appendChild(li);
                    }
                }
            }
        }

        function handlePickMissing(sensorNum) {
            const sensorsRadio = document.querySelector('input[name="viewMode"][value="sensors"]');
            if (sensorsRadio && !sensorsRadio.checked) {
                sensorsRadio.checked = true;
                updateImageModeUI();
            }
            $('sensorNumberDropdown').value = sensorNum;
            $('sensorMetaNumberDropdown').value = sensorNum;
            $('sensorNumberDropdown').dispatchEvent(new Event('change', { bubbles: true }));
            $('sensorMetaNumberDropdown').dispatchEvent(new Event('change', { bubbles: true }));
            $('sensorUploadSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
            setTimeout(() => $('serialNumber')?.focus(), 250);
        }

        async function uploadSensor() {
            if (state.isUploading) return;
            const num = $('sensorNumberDropdown')?.value;
            const serial = sanitize($('serialNumber')?.value);
            const file = $('sensorImage')?.files?.[0];
            const skipMarkup = $('skipMarkupCheckbox')?.checked;
            const project = getProjectById();
            if (!project || !num || !serial || !file) return alert('Fill out all fields');

            state.isUploading = true;
            $('uploadImage').disabled = true;
            $('uploadImage').textContent = 'Uploading...';

            try {
                const paddedNum = String(num).padStart(2, '0');
                const existing = project.images.sensors || [];
                const prefix = sanitize(project.customerName || project.project || project.id);
                const matchCount = existing.filter((item) => item.name.startsWith(`${prefix}_${paddedNum}`)).length;
                if (matchCount >= CONFIG.SENSOR_IMAGE_COUNT_REQUIRED) {
                    const proceed = confirm(`Sensor ${paddedNum} already has ${CONFIG.SENSOR_IMAGE_COUNT_REQUIRED} uploads. Upload another?`);
                    if (!proceed) return;
                }

                let blob = await resizeImage(file, CONFIG.IMAGE_MAX_WIDTH);

                if (!skipMarkup) {
                    const labelBase = (project.customerName || project.project || project.id).trim();
                    blob = await addTextToImage(blob, `${labelBase} ${paddedNum} - ${serial}`);
                }

                // ✅ SAVE TO INDEXEDDB
                const imageId = await saveImage(blob);

                const filename = `${prefix}_${paddedNum}-${serial}.jpg`;

                project.images.sensors.push({
                    id: crypto.randomUUID(),
                    name: filename,
                    imageId,
                    createdAt: Date.now()
                });
                saveProjectRecord(project);
                $('sensorImage').value = '';
                await updateGallery();
            } catch (err) {
                console.error(err);
                alert('Upload failed. This can happen if the image is too large for local storage. Export a backup and clear old images if needed.');
            } finally {
                state.isUploading = false;
                $('uploadImage').disabled = false;
                $('uploadImage').textContent = 'Upload';
            }
        }

        async function uploadDeliverableImage() {
            const project = getProjectById();
            const file = $('fileUploader')?.files?.[0];
            const rawName = $('imageNameInput')?.value.trim();
            const markup = $('markupTextInput')?.value.trim();

            const finalName = sanitize(rawName || markup);

            if (!project || !file || !finalName) {
                return alert('Enter a name or markup.');
            }

            try {
                let blob = await resizeImage(file, CONFIG.IMAGE_MAX_WIDTH);

                if (markup) {
                    blob = await addTextToImage(blob, markup);
                }

                const imageId = await saveImage(blob);

                const filename = getUniqueLocalFilename(
                    project.images.deliverables,
                    `${finalName}.jpg`
                );

                project.images.deliverables.push({
                    id: crypto.randomUUID(),
                    name: filename,
                    imageId,
                    createdAt: Date.now()
                });

                saveProjectRecord(project);

                $('fileUploader').value = '';
                $('imageNameInput').value = '';
                $('markupTextInput').value = '';

                await updateGallery();

            } catch (err) {
                console.error(err);
                alert('Deliverable upload failed.');
            }
        }

        async function deleteCurrentModalImage() {
            const item = state.modalItems[state.modalIndex];
            const project = getProjectById();
            if (!item || !project) return;
            const ok = await confirmWithPassword('delete this image');
            if (!ok) return alert('Incorrect password.');
            ['sensors', 'deliverables'].forEach((mode) => {
                project.images[mode] = (project.images[mode] || []).filter((img) => {
                    if (img.id === item.id && img.imageId) {
                        deleteImage(img.imageId); // ✅ remove from IndexedDB
                    }
                    return img.id !== item.id;
                });
            });
            saveProjectRecord(project);
            closeModal();
            await updateGallery();
        }

        function confirmWithPassword(actionDescription = 'this action') {
            const input = prompt(`Enter password to confirm ${actionDescription}:`);
            return Promise.resolve(input === CONFIG.ADMIN_PASSWORD);
        }

        async function populateProjects() {
            state.allProjects = Object.entries(store.projects)
                .map(([id, task]) => {
                    const customer = (task.customerName || '').trim();
                    const project = (task.project || '').trim();
                    if (!customer && !project) return null;
                    return {
                        id,
                        customer,
                        project,
                        label: `${customer || '(No Customer)'} — ${project || '(No Project)'}`,
                        time: bestTime(task, id)
                    };
                })
                .filter(Boolean)
                .sort((a, b) => a.project.localeCompare(b.project));
            renderProjectDropdown(state.allProjects);
        }

        function renderProjectDropdown(projects) {
            $('projectList').innerHTML = '<option value="">-- Choose a project --</option>';
            projects.forEach((p) => $('projectList').appendChild(new Option(p.label, p.id)));
        }

        function filterProjects() {
            const query = normKey($('projectSearch')?.value);
            if (!query) return renderProjectDropdown(state.allProjects);
            renderProjectDropdown(state.allProjects.filter((p) => normKey(`${p.customer} ${p.project}`).includes(query)));
        }

        async function startApp(projectId = null) {
            await populateProjects();

            if (projectId) {
                await loadProject(projectId);
            }
        }

        async function loadProject(projectId) {
            if (state.isLoadingProject) return;
            state.isLoadingProject = true;
            try {
                state.currentProject = projectId;
                const data = getProjectById(projectId);
                if (!data) throw new Error('No project data');
                state.currentProjectName = data.project || '';
                state.currentCustomerName = (data.customerName || '').trim();
                state.expectedSensors = Number(data.sensorCount) || 0;
                $('project').value = state.currentProjectName;
                $('customerName').value = state.currentCustomerName;
                $('sensorCount').value = state.expectedSensors;
                populateSensorDropdown(state.expectedSensors);
                await Promise.all([updateGallery(), loadQCChecklist(projectId)]);
                syncSensorTotalToQC();
                initCollapsibles();
            } catch (err) {
                console.error('[loadProject] Failed:', err);
                alert('Failed to load project.');
            } finally {
                state.isLoadingProject = false;
            }
        }

        async function saveProjectBasics() {
            const name = $('project')?.value.trim();
            const customer = $('customerName')?.value.trim();

            if (!name) {
                alert("Project name required");
                return;
            }

            const existing = Object.entries(store.projects).find(
                ([id, p]) => (p.project || '').trim().toLowerCase() === name.toLowerCase()
            );

            let id;

            if (existing) {
                const [existingId] = existing;

                const confirmOverwrite = confirm(
                    `Project "${name}" already exists.\n\nOverwrite it?`
                );

                if (!confirmOverwrite) return;

                id = existingId;
            } else {
                id = Date.now().toString();
            }

            const projectData = {
                id,
                project: name,
                customerName: customer,
                sensorCount: Math.max(0, Number($('sensorCount')?.value) || 0),
                sensorMeta: {},
                images: { sensors: [], deliverables: [] },
                [`qcData_${state.currentChecklistType}`]: collectData(),
                createdAt: existing ? store.projects[id].createdAt : Date.now(),
                updatedAt: Date.now()
            };

            // ✅ FAILSAFE BACKUP
            localStorage.setItem(
                "radar_lastBackup",
                JSON.stringify({
                    timestamp: Date.now(),
                    data: store.projects[id] || null
                })
            );

            store.projects[id] = projectData;
            saveStore();

            state.currentProject = id;
            state.currentProjectName = name;
            state.currentCustomerName = customer;

            await populateProjects();
            await loadProject(id);

            alert("Project saved ✅");
        }

        function collectProjectAutosavePayload() {
            if (!state.currentProject) return null;
            return {
                project: $('project')?.value.trim() || '',
                customerName: $('customerName')?.value.trim() || '',
                sensorCount: Math.max(0, Number($('sensorCount')?.value) || 0),
                updatedAt: Date.now()
            };
        }

        const debouncedSaveProjectFields = debounce(async () => {
            const payload = collectProjectAutosavePayload();
            if (!payload) return;
            const comparable = JSON.stringify({ ...payload, updatedAt: 0 });
            if (comparable === state.lastAutosavedPayload) return;
            state.lastAutosavedPayload = comparable;
            let project = getProjectById();
            if (!project) return;
            Object.assign(project, payload);
            saveProjectRecord(project);
            state.currentProjectName = payload.project;
            state.currentCustomerName = payload.customerName;
            state.expectedSensors = payload.sensorCount;
            populateSensorDropdown(state.expectedSensors);
            syncSensorTotalToQC();
        }, CONFIG.AUTO_SAVE_MS);

        function startAutosaveLoop() {
            stopAutosaveLoop();
            state.autoSaveTimer = setInterval(() => {
                if (!state.currentProject) return;
                debouncedSaveProjectFields();
                saveQCData();
            }, CONFIG.AUTO_SAVE_MS);
        }

        function stopAutosaveLoop() {
            if (state.autoSaveTimer) clearInterval(state.autoSaveTimer);
            state.autoSaveTimer = null;
        }

        async function initQCConfig(force = false) {
            if (!force && state.qcConfig?.sections?.length) return;

            const type = state.currentChecklistType || 'radar';

            try {
                const res = await fetch(`./assets/js/${type}.json`);
                if (!res.ok) throw new Error(`Failed to load ${type}.json`);

                const data = await res.json();

                state.qcConfig = data;
            } catch (err) {
                console.error("Checklist load failed:", err);
                alert(`Failed to load ${type} checklist`);
                state.qcConfig = { sections: [] };
            }
        }

        function getSectionConfig(sectionId) {
            return state.qcConfig?.sections?.find((section) => section.id === sectionId) || null;
        }

        function normalizeNightCount(value, fallback = 1) {
            const parsed = parseInt(value, 10);
            if (Number.isNaN(parsed) || parsed <= 0) return fallback;
            return Math.min(parsed, CONFIG.MAX_NIGHTS);
        }

        function getTotalNights(data = null) {
            const raw = data?.sections?.site_info?.fields?.totalNights;
            const fromData = (raw && typeof raw === 'object') ? raw.value : raw;
            if (fromData != null && fromData !== '') return normalizeNightCount(fromData, CONFIG.DEFAULT_NIGHTS);
            const el = $('field_totalNights');
            return el ? normalizeNightCount(el.value, CONFIG.DEFAULT_NIGHTS) : CONFIG.DEFAULT_NIGHTS;
        }

        function getFieldElementId(sectionId, fieldId, day = null) {
            return day == null ? `field_${fieldId}` : `field_${sectionId}_${fieldId}_${day}`;
        }

        const sectionRenderers = {
            fields(section, _data, container) {
                const fragment = document.createDocumentFragment();
                section.fields.forEach((field) => {
                    fragment.appendChild(createEl('label', { text: field.label, attrs: { for: `field_${field.id}` } }));
                    fragment.appendChild(createEl(field.type === 'textarea' ? 'textarea' : 'input', {
                        attrs: { id: `field_${field.id}`, type: field.type === 'textarea' ? null : (field.type || 'text') }
                    }));
                });
                container.appendChild(fragment);
            },

            checklist(section, _data, container) {
                const fragment = document.createDocumentFragment();
                section.items.forEach((item, index) => {
                    const itemText = typeof item === 'object' ? item.text : item;
                    const wrapper = createEl('div', { className: `checkItem ${item.type === 'negative' ? 'check-negative' : ''}` });
                    const label = createEl('label');
                    const checkbox = createEl('input', { attrs: { type: 'checkbox', id: `${section.id}_${index}` } });
                    checkbox.addEventListener('change', () => {
                        wrapper.classList.toggle('checked-negative', item.type === 'negative' && checkbox.checked);
                    });
                    label.appendChild(checkbox);
                    label.appendChild(document.createTextNode(` ${itemText}`));
                    wrapper.appendChild(label);
                    fragment.appendChild(wrapper);
                });
                if (section.notes) {
                    fragment.appendChild(createEl('label', { text: 'Notes', attrs: { for: `notes_${section.id}` } }));
                    fragment.appendChild(createEl('textarea', { attrs: { id: `notes_${section.id}` } }));
                }
                container.appendChild(fragment);
            },

            checklistMultiDay(section, data, container) {
                const days = Math.max(1, getTotalNights(data));
                const fragment = document.createDocumentFragment();
                section.items.forEach((item, index) => {
                    const wrapper = createEl('div', { className: 'checkItem' });
                    wrapper.appendChild(createEl('strong', { text: item.text }));
                    wrapper.appendChild(document.createElement('br'));
                    for (let day = 0; day < days; day += 1) {
                        const label = createEl('label', { className: 'checkMulti' });
                        label.setAttribute('data-label', `Night ${day + 1}`);
                        label.appendChild(createEl('input', { attrs: { type: 'checkbox', id: `${section.id}_${index}_${day}` } }));
                        wrapper.appendChild(label);
                    }
                    fragment.appendChild(wrapper);
                });
                if (section.notes) {
                    fragment.appendChild(createEl('label', { text: 'Notes', attrs: { for: `notes_${section.id}` } }));
                    fragment.appendChild(createEl('textarea', { attrs: { id: `notes_${section.id}` } }));
                }
                container.appendChild(fragment);
            },

            nightCounter(section, data, container) {
                const days = Math.max(1, getTotalNights(data));
                const sensorTotal = Number(data?.sections?.site_info?.fields?.sensorTotal?.value || $('field_sensorTotal')?.value || 0);
                section.fields.forEach((field) => {
                    const wrapper = createEl('div', { className: 'row' });
                    wrapper.appendChild(createEl('strong', { text: field.label }));
                    wrapper.appendChild(document.createElement('br'));
                    for (let day = 0; day < days; day += 1) {
                        const row = createEl('div');
                        row.appendChild(createEl('span', { text: `Night ${day + 1}: ` }));
                        row.appendChild(createEl('input', { attrs: { id: getFieldElementId(section.id, field.id, day), type: 'number', placeholder: '0' } }));
                        row.appendChild(createEl('span', { className: 'sensor-total', text: `/ ${sensorTotal}` }));
                        wrapper.appendChild(row);
                    }
                    container.appendChild(wrapper);
                });
            },

            scoring(section, _data, container) {
                const fragment = document.createDocumentFragment();
                section.fields.forEach((field) => {
                    fragment.appendChild(createEl('label', { text: `${field.label} (0-${field.max})`, attrs: { for: `score_${field.id}` } }));
                    fragment.appendChild(createEl('input', { attrs: { id: `score_${field.id}`, type: 'number', max: field.max } }));
                });
                fragment.appendChild(createEl('label', { text: 'Total', attrs: { for: `score_total_${section.id}` } }));
                fragment.appendChild(createEl('input', { attrs: { id: `score_total_${section.id}`, readonly: 'readonly' } }));
                container.appendChild(fragment);
            },

            singleSelect(section, _data, container) {
                const fragment = document.createDocumentFragment();
                section.options.forEach((option, index) => {
                    const label = createEl('label');
                    label.appendChild(createEl('input', { attrs: { type: 'radio', name: section.id, id: `${section.id}_${index}` } }));
                    label.appendChild(document.createTextNode(` ${option}`));
                    fragment.appendChild(label);
                });
                container.appendChild(fragment);
            }
        };

        function renderSection(section, data) {
            const container = $(`section_${section.id}`);
            if (!container) return;
            container.innerHTML = '';
            const renderer = sectionRenderers[section.type];
            if (!renderer) {
                container.textContent = `Unsupported section type: ${section.type}`;
                return;
            }
            renderer(section, data, container);
        }

        function buildApp(data = { sections: {} }) {
            $('app').innerHTML = '';
            if (!state.qcConfig?.sections?.length) {
                $('app').textContent = 'Checklist config not loaded.';
                return;
            }
            const fragment = document.createDocumentFragment();
            state.qcConfig.sections.forEach((section, index) => {
                const wrapper = createEl('div', { className: 'collapsible-section', attrs: { id: section.id } });
                const header = createEl('h2', { className: 'collapsible-header', text: section.title || `Section ${index + 1}` });
                const content = createEl('div', { attrs: { id: `section_${section.id}` } });
                wrapper.appendChild(header);
                wrapper.appendChild(content);
                fragment.appendChild(wrapper);
            });
            $('app').appendChild(fragment);
            state.qcConfig.sections.forEach((section) => renderSection(section, data));
            applyData(data);
            updateAllScoringTotals();
            syncSensorTotalToQC();
            initCollapsibles();
        }

        function collectData() {
            const data = { sections: {} };
            if (!state.qcConfig?.sections?.length) return data;
            state.qcConfig.sections.forEach((section) => {
                const sectionData = {};
                if (section.type === 'nightCounter') {
                    const days = Math.max(1, getTotalNights());
                    sectionData.fields = {};
                    section.fields.forEach((field) => {
                        sectionData.fields[field.id] = [];
                        for (let day = 0; day < days; day += 1) {
                            sectionData.fields[field.id].push(Number($(getFieldElementId(section.id, field.id, day))?.value || 0));
                        }
                    });
                }
                if (section.type === 'fields') {
                    sectionData.fields = {};
                    section.fields.forEach((field) => {
                        const value = $(`field_${field.id}`)?.value ?? '';
                        sectionData.fields[field.id] = { label: field.label, value };
                    });
                }
                if (section.type === 'scoring') {
                    sectionData.scores = {};
                    let manualScore = 0;
                    section.fields.forEach((field) => {
                        const max = Number(field.max) || 0;
                        const value = Math.min(max, Math.max(0, Number($(`score_${field.id}`)?.value || 0)));
                        sectionData.scores[field.id] = value;
                        manualScore += value;
                    });
                    const checklistScore = calculateChecklistScoreAll();
                    sectionData.total = Math.round((checklistScore.percent * 0.7) + (manualScore * 0.3));
                    sectionData.checklistPercent = checklistScore.percent;
                    sectionData.manualScore = manualScore;
                }
                if (section.type === 'singleSelect') {
                    sectionData.selected = null;
                    section.options.forEach((_, index) => {
                        if ($(`${section.id}_${index}`)?.checked) sectionData.selected = index;
                    });
                }
                if (section.type === 'checklist') {
                    sectionData.items = section.items.map((item, index) => ({
                        label: typeof item === 'object' ? item.text : item,
                        checked: Boolean($(`${section.id}_${index}`)?.checked),
                        value: Boolean($(`${section.id}_${index}`)?.checked) ? 1 : 0
                    }));
                    if (section.notes) sectionData.notes = $(`notes_${section.id}`)?.value ?? '';
                }
                if (section.type === 'checklistMultiDay') {
                    const days = Math.max(1, getTotalNights());
                    sectionData.items = section.items.map((item, index) => {
                        const dayValues = [];
                        for (let day = 0; day < days; day += 1) {
                            dayValues.push(Boolean($(`${section.id}_${index}_${day}`)?.checked));
                        }
                        return { label: item.text, days: dayValues, value: dayValues.filter(Boolean).length };
                    });
                    if (section.notes) sectionData.notes = $(`notes_${section.id}`)?.value ?? '';
                }
                data.sections[section.id] = sectionData;
            });
            return data;
        }

        function applyData(data) {
            const sections = data?.sections || {};
            Object.entries(sections).forEach(([sectionId, sectionData]) => {
                if (sectionData.notes !== undefined) {
                    const notesEl = $(`notes_${sectionId}`);
                    if (notesEl) notesEl.value = sectionData.notes;
                }
                if (sectionData.fields) {
                    Object.entries(sectionData.fields).forEach(([key, value]) => {
                        const fieldEl = $(`field_${key}`);
                        if (fieldEl) fieldEl.value = value && typeof value === 'object' && 'value' in value ? value.value : (value ?? '');
                    });
                }
                if (sectionData.scores) {
                    Object.entries(sectionData.scores).forEach(([key, value]) => {
                        const scoreEl = $(`score_${key}`);
                        if (scoreEl) scoreEl.value = value;
                    });
                }
                if (sectionData.selected != null) {
                    const radio = $(`${sectionId}_${sectionData.selected}`);
                    if (radio) radio.checked = true;
                }
                if (Array.isArray(sectionData.items)) {
                    sectionData.items.forEach((item, index) => {
                        if (Array.isArray(item.days)) {
                            item.days.forEach((value, dayIndex) => {
                                const checkbox = $(`${sectionId}_${index}_${dayIndex}`);
                                if (checkbox) checkbox.checked = value;
                            });
                        } else if (item.checked !== undefined) {
                            const checkbox = $(`${sectionId}_${index}`);
                            if (checkbox) {
                                checkbox.checked = item.checked;
                                checkbox.dispatchEvent(new Event('change', { bubbles: true }));
                            }
                        }
                    });
                }
                const sectionConfig = getSectionConfig(sectionId);
                if (sectionConfig?.type === 'nightCounter' && sectionData.fields) {
                    Object.entries(sectionData.fields).forEach(([fieldId, values]) => {
                        (values || []).forEach((value, dayIndex) => {
                            const el = $(getFieldElementId(sectionId, fieldId, dayIndex));
                            if (el) el.value = value;
                        });
                    });
                }
            });
            updateAllScoringTotals();
        }

        function calculateChecklistScoreAll() {
            let earned = 0;
            let total = 0;
            state.qcConfig?.sections?.forEach((section) => {
                if (section.type === 'checklist') {
                    section.items.forEach((item, index) => {
                        const weight = item.weight != null ? Number(item.weight) : 1;
                        const checked = Boolean($(`${section.id}_${index}`)?.checked);
                        if (item.type === 'negative') {
                            if (checked) earned -= weight;
                        } else {
                            total += weight;
                            if (checked) earned += weight;
                        }
                    });
                }
                if (section.type === 'checklistMultiDay') {
                    const days = Math.max(1, getTotalNights());
                    section.items.forEach((item, index) => {
                        const weight = item.weight != null ? Number(item.weight) : 1;
                        for (let day = 0; day < days; day += 1) {
                            total += weight;
                            if (Boolean($(`${section.id}_${index}_${day}`)?.checked)) earned += weight;
                        }
                    });
                }
            });
            if (earned < 0) earned = 0;
            return { earned, total, percent: total > 0 ? Math.round((earned / total) * 100) : 0 };
        }

        function updateAllScoringTotals() {
            if (!state.qcConfig?.sections?.length) return;
            const checklistScore = calculateChecklistScoreAll();
            let manualScore = 0;
            state.qcConfig.sections.forEach((section) => {
                if (section.type !== 'scoring') return;
                section.fields.forEach((field) => {
                    manualScore += Number($(`score_${field.id}`)?.value || 0);
                });
            });
            const finalScore = Math.round((checklistScore.percent * 0.7) + (manualScore * 0.3));
            const totalEl = $('score_total_final_scoring');
            if (totalEl) totalEl.value = finalScore;
            let breakdown = $('score_breakdown');
            if (!breakdown) {
                breakdown = createEl('div', { attrs: { id: 'score_breakdown' }, className: 'score-breakdown' });
                $('section_final_scoring')?.appendChild(breakdown);
            }
            breakdown.innerHTML = `Checklist Score: ${checklistScore.percent}%<br>Manual Score: ${manualScore}<br>Final Score: <strong>${finalScore}</strong>`;
        }

        function updateNightDependentSections() {
            const data = collectData();
            state.qcConfig?.sections?.forEach((section) => {
                if (section.type === 'nightCounter' || section.type === 'checklistMultiDay') renderSection(section, data);
            });
            applyData(data);
            updateAllScoringTotals();
            syncSensorTotalToQC();
        }

        const saveQCData = debounce(async () => {
            if (!state.currentProject || !state.qcConfig?.sections?.length) return;
            const data = collectData();
            const project = getProjectById();
            if (!project || !Object.keys(data.sections || {}).length) return;
            project[`qcData_${state.currentChecklistType}`] = data;
            saveProjectRecord(project);
        }, 500);

        function toLocalDateInputValue(dateLike) {
            if (!dateLike) return '';
            const d = new Date(dateLike);
            if (Number.isNaN(d.getTime())) return '';

            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');

            return `${year}-${month}-${day}`;
        }

        function applyTaskToSiteInfo(taskData) {
            const map = {
                date: toLocalDateInputValue(taskData.startTime) || toLocalDateInputValue(new Date()),
                siteNumber: taskData.project || '',
                sensorTotal: taskData.sensorCount || '',
                installSummary: taskData.notes || '',
                location: taskData.customerAddress || '',
                customerName: taskData.customerName || ''
            };
            Object.entries(map).forEach(([key, value]) => {
                const el = $(`field_${key}`);
                if (el && !el.value) el.value = value;
            });
            if ($('field_totalNights') && !$('field_totalNights').value) $('field_totalNights').value = CONFIG.DEFAULT_NIGHTS;
        }

        function attachQCListeners() {
            if (state.qcListenerBound) return;
            $('qcChecklistSection')?.addEventListener('input', async (event) => {
                const target = event.target;
                if (!(target instanceof HTMLElement)) return;
                if (target.id === 'field_totalNights') {
                    const raw = target.value;

                    if (raw === '') return;

                    let value = Number(raw);

                    if (isNaN(value)) return;

                    value = Math.min(Math.max(value, 1), CONFIG.MAX_NIGHTS);

                    if (value !== Number(raw)) {
                        target.value = value;
                    }

                    const currentData = collectData();

                    buildApp(currentData);
                    applyData(currentData);

                    saveQCData();
                    return;
                }

                $('qcChecklistSection')?.addEventListener('blur', (e) => {
                    if (e.target?.id === 'field_totalNights') {
                        if (!e.target.value) {
                            e.target.value = CONFIG.DEFAULT_NIGHTS;
                        }
                    }
                }, true);

                if (target.id === 'field_sensorTotal') {
                    const total = target.value;
                    $$('[id^="field_nightly_production_"]').forEach((input) => {
                        input.parentElement?.querySelector('.sensor-total')?.replaceChildren(document.createTextNode(`/ ${total}`));
                    });
                    saveQCData();
                    return;
                }
                updateAllScoringTotals();
                saveQCData();
            });
            $('qcChecklistSection')?.addEventListener('change', () => {
                updateAllScoringTotals();
                saveQCData();
            });
            state.qcListenerBound = true;
        }

        async function loadQCChecklist(projectId) {
            await initQCConfig();
            if (!state.qcConfig?.sections?.length) return;
            const taskData = getProjectById(projectId) || {};
            const qcData = taskData[`qcData_${state.currentChecklistType}`] || { sections: {} };
            buildApp(qcData);
            applyTaskToSiteInfo(taskData);
            attachQCListeners();
        }

        function getNightlyProductionStats(data) {
            const section = data.sections.nightly_production;
            if (!section?.fields) return null;
            const parseValues = (val) => Array.isArray(val) ? val.map((v) => Number(v) || 0) : [];
            const sensors = parseValues(section.fields.sensors);
            const nights = Math.max(sensors.length, getTotalNights(data));
            const sensorTotal = Number(data?.sections?.site_info?.fields?.sensorTotal?.value) || Number($('field_sensorTotal')?.value) || state.expectedSensors || 0;
            let maxDone = 0;
            const result = [];
            for (let i = 0; i < nights; i += 1) {
                const done = Number(sensors[i] ?? 0);
                maxDone = Math.max(maxDone, done);
                result.push({ night: i + 1, done, total: sensorTotal, pct: sensorTotal > 0 ? Math.round((done / sensorTotal) * 100) : 0 });
            }
            return { nights: result, overall: sensorTotal > 0 ? Math.round((maxDone / sensorTotal) * 100) : 0 };
        }

        function generateCertificationReport() {
            const data = collectData();
            const scoring = data.sections.final_scoring || {};
            const total = scoring.total || 0;
            const checklistPercent = scoring.checklistPercent || 0;
            const manualScore = scoring.manualScore || 0;
            let result = 'PASS';
            if (total < 70) result = 'FAIL';
            else if (total < 85) result = 'NEEDS IMPROVEMENT';
            const production = getNightlyProductionStats(data);
            const lines = [
                `Total Score: ${total}`,
                `Checklist Score: ${checklistPercent}%`,
                `Manual Score: ${manualScore}`,
                `Result: ${result}`
            ];
            if (production) {
                lines.push('', 'Night Progress:');
                production.nights.forEach((night) => {
                    lines.push(`Night ${night.night}: ${night.done}/${night.total} (${night.pct}%)`);
                });
                lines.push(`Overall Completion: ${production.overall}%`);
            }
            return lines.join('\n');
        }

        function buildReportFile() {
            return new Blob([generateCertificationReport()], { type: 'text/plain' });
        }

        function exportCertificationCSV() {
            const data = collectData();
            const rows = [['Metric', 'Value']];
            const scoring = data.sections.final_scoring || {};
            const total = scoring.total || 0;
            let result = 'PASS';
            if (total < 70) result = 'FAIL'; else if (total < 85) result = 'NEEDS IMPROVEMENT';
            rows.push(['Total Score', total], ['Result', result]);
            Object.entries(scoring.scores || {}).forEach(([key, value]) => rows.push([key, value]));
            rows.push([], ['Night Progress']);
            const production = getNightlyProductionStats(data);
            if (production) {
                production.nights.forEach((night) => rows.push([`Night ${night.night}`, `${night.done}/${night.total} (${night.pct}%)`]));
                rows.push(['Overall Completion', `${production.overall}%`]);
            }
            downloadCSV(rows, 'certification_report.csv');
        }

        function initCollapsibles() {
            $$('.collapsible-section').forEach(section => {
                const header = section.querySelector('.collapsible-header');
                if (!header || !section.id) return;
                const saved = localStorage.getItem(`collapse:${section.id}`);
                if (saved === 'true') section.classList.add('collapsed');
                if (header.dataset.bound) return;
                header.dataset.bound = 'true';
                header.addEventListener('click', () => {
                    section.classList.toggle('collapsed');
                    localStorage.setItem(`collapse:${section.id}`, section.classList.contains('collapsed'));
                });
            });
        }

        function initModalEvents() {
            $('closeModalButton')?.addEventListener('click', closeModal);
            $('modal')?.addEventListener('click', (e) => { if (e.target === $('modal')) closeModal(); });
            $('modalPrev')?.addEventListener('click', () => {
                if (!state.modalItems.length) return;
                showModalByIndex((state.modalIndex - 1 + state.modalItems.length) % state.modalItems.length);
            });
            $('modalNext')?.addEventListener('click', () => {
                if (!state.modalItems.length) return;
                showModalByIndex((state.modalIndex + 1) % state.modalItems.length);
            });
            $('downloadButton')?.addEventListener('click', () => {
                const item = state.modalItems[state.modalIndex];
                if (!item) return;

                if (item.imageId) {
                    getImage(item.imageId).then(blob => {
                        if (!blob) return;
                        downloadBlob(blob, item.name);
                    });
                } else if (item.url) {
                    const a = document.createElement('a');
                    a.href = item.url;
                    a.download = item.name;
                    a.click();
                }
            });
            $('deleteButton')?.addEventListener('click', deleteCurrentModalImage);
            $('imageDropdown')?.addEventListener('change', () => {
                const index = Number($('imageDropdown')?.value);
                if (!Number.isNaN(index)) showModalByIndex(index);
            });
        }

        function initProjectEvents() {
            $('projectList')?.addEventListener('change', async () => {
                const id = $('projectList').value;
                if (id) {
                    await loadProject(id);
                }
            });
            $('projectSearch')?.addEventListener('input', filterProjects);
            $('sensorCount')?.addEventListener('input', async () => {
                state.expectedSensors = Math.max(0, Number($('sensorCount')?.value) || 0);
                populateSensorDropdown(state.expectedSensors);
                syncSensorTotalToQC();
                await updateGallery();
                debouncedSaveProjectFields();
            });
            $('saveProject')?.addEventListener('click', saveProjectBasics);
            $('project')?.addEventListener('keydown', async (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                }
            });
        }

        function initFeatureEvents() {
            $('saveSensorMeta')?.addEventListener('click', saveSensorMeta);
            $('exportCSV')?.addEventListener('click', exportSensorMetaCsv);
            $('sensorMetaNumberDropdown')?.addEventListener('change', () => loadSensorMeta($('sensorMetaNumberDropdown')?.value));
            $('sensorNumberDropdown')?.addEventListener('change', async () => {
                const sensorNum = $('sensorNumberDropdown')?.value;
                if (!sensorNum) return;
                const project = getProjectById();
                const data = project?.sensorMeta?.[sensorNum] || {};
                if (data.serial) $('serialNumber').value = data.serial;
            });
            $$('input[name="viewMode"]').forEach((radio) => {
                radio.addEventListener('change', async () => {
                    updateImageModeUI();
                    await updateGallery();
                });
            });
            $('missingList')?.addEventListener('click', (e) => {
                const li = e.target.closest('li[data-sensor]');
                if (li) handlePickMissing(li.dataset.sensor);
            });
            $('missingList')?.addEventListener('keydown', (e) => {
                const li = e.target.closest('li[data-sensor]');
                if (li && (e.key === 'Enter' || e.key === ' ')) {
                    e.preventDefault();
                    handlePickMissing(li.dataset.sensor);
                }
            });
            $('uploadImage')?.addEventListener('click', uploadSensor);
            $('uploadDeliverableImage')?.addEventListener('click', uploadDeliverableImage);
            $('compareBtn')?.addEventListener('click', () => {
                const report = generateCertificationReport();
                $('comparisonResults').innerHTML = `<pre>${escapeHtml(report || 'No report available')}</pre>`;
            });
            $('exportReportBtn')?.addEventListener('click', exportCertificationCSV);
            document.querySelectorAll('input[name="checklistType"]').forEach(radio => {
                radio.addEventListener('change', async () => {
                    state.currentChecklistType = radio.value;

                    await initQCConfig(true);

                    if (state.currentProject) {
                        await loadQCChecklist(state.currentProject);
                    } else {
                        buildApp({ sections: {} });
                    }
                });
            });
            $('uploadQCBtn')?.addEventListener('click', () => {
                const rows = buildQCChecklistCSV();
                downloadCSV(rows, `${sanitize(state.currentProjectName || 'project')}_${state.currentChecklistType}_checklist.csv`);
            });
            $('exportBackupBtn')?.addEventListener('click', exportBackup);
            $('importBackupBtn')?.addEventListener('click', () => $('backupInput').click());
            $('backupInput')?.addEventListener('change', importBackup);
            $('clearAllBtn')?.addEventListener('click', clearAllData);
        }

        function syncSensorTotalToQC() {
            const total = state.expectedSensors;
            const qcField = $('field_sensorTotal');
            if (qcField) qcField.value = total;
            $$('.sensor-total').forEach((el) => { el.textContent = `/ ${total}`; });
        }

        function buildQCChecklistCSV() {
            const data = collectData();
            const rows = [['Section', 'Field', 'Value']];
            Object.entries(data.sections || {}).forEach(([sectionId, section]) => {
                if (section.fields) {
                    Object.entries(section.fields).forEach(([key, val]) => {
                        const value = (val && typeof val === 'object' && 'value' in val) ? val.value : val;
                        rows.push([sectionId, key, normalizeText(value)]);
                    });
                }
                if (Array.isArray(section.items)) {
                    section.items.forEach((item) => {
                        if (item.label && !Array.isArray(item.days)) rows.push([sectionId, item.label, item.checked ?? item.value ?? '']);
                        if (Array.isArray(item.days)) {
                            item.days.forEach((dayVal, d) => rows.push([sectionId, `${item.label} (Night ${d + 1})`, dayVal]));
                        }
                    });
                }
                if (section.scores) {
                    Object.entries(section.scores).forEach(([k, v]) => rows.push([sectionId, k, v]));
                    rows.push([sectionId, 'Total Score', section.total || 0]);
                }
                if (section.notes) rows.push([sectionId, 'Notes', normalizeText(section.notes)]);
            });
            return rows;
        }

        function exportBackup() {
            saveStore();
            downloadBlob(
                new Blob([JSON.stringify(store, null, 2)], { type: 'application/json' }),
                `radar-local-backup-${new Date().toISOString().replace(/[:.]/g, '-')}.json`
            );
        }

        async function importBackup(event) {
            const file = event.target.files?.[0];
            if (!file) return;
            try {
                const text = await file.text();
                const parsed = JSON.parse(text);
                if (!parsed || typeof parsed !== 'object' || !parsed.projects) throw new Error('Invalid backup file');
                store = parsed;
                saveStore();
                await populateProjects();
                const firstId = Object.keys(store.projects)[0];
                if (firstId) await startApp(firstId);
                alert('Backup imported.');
            } catch (err) {
                console.error(err);
                alert('Import failed.');
            } finally {
                event.target.value = '';
            }
        }

        function clearAllData() {
            const ok = confirm('This will erase all local Radar app data on this browser. Continue?');
            if (!ok) return;

            localStorage.removeItem(CONFIG.STORAGE_KEY);

            // ✅ clear IndexedDB too
            indexedDB.deleteDatabase(DB_NAME);

            store = { projects: {}, favorites: {}, ui: {} };
            state.currentProject = '';

            $('project').value = '';
            $('customerName').value = '';
            $('sensorCount').value = '';

            $('app').innerHTML = 'Loading checklist...';
            $('gallery').innerHTML = '';
            $('imageDropdown').innerHTML = '<option value="">-- Select an Image --</option>';
            $('missingList').innerHTML = '';

            populateProjects();

            alert('Local data cleared.');
        }

        $('restoreBackupBtn')?.addEventListener('click', () => {
            const backup = JSON.parse(localStorage.getItem("radar_lastBackup") || "null");

            if (!backup || !backup.data) {
                alert("No backup found");
                return;
            }

            const confirmRestore = confirm("Restore last saved version?");
            if (!confirmRestore) return;

            const id = backup.data.id || Date.now().toString();

            store.projects[id] = backup.data;
            saveStore();

            populateProjects();
            loadProject(id);

            alert("Backup restored ✅");
        });

        $('newProjectBtn')?.addEventListener('click', () => {
            $('project').value = '';
            $('customerName').value = '';
            $('sensorCount').value = '';

            state.currentProject = '';
            state.currentProjectName = '';
            state.currentCustomerName = '';
            state.expectedSensors = 0;

            buildApp({ sections: {} });
            updateGallery();

            alert("New blank project ready (not saved yet)");
        });

        initModalEvents();
        initProjectEvents();
        initFeatureEvents();
        updateImageModeUI();
        populateProjects().then(async () => {
            await initQCConfig(true);
            buildApp({ sections: {} });
        });    </script>
</body>

</html>
