            if (Number.isNaN(localMidnight.getTime())) return '';

            return localMidnight.toISOString();
        }

        function toLocalDateTimeInputValue(dateLike) {
            if (!dateLike) return '';
            const d = new Date(dateLike);
            if (Number.isNaN(d.getTime())) return '';

            const pad = (value) => String(value).padStart(2, '0');
            const year = d.getFullYear();
            const month = pad(d.getMonth() + 1);
            const day = pad(d.getDate());
            const hours = pad(d.getHours());
            const minutes = pad(d.getMinutes());

            return `${year}-${month}-${day}T${hours}:${minutes}`;
        }

        function localDateTimeInputToIso(dateInput) {
            if (!dateInput) return '';
            const [datePart, timePart] = String(dateInput).split('T');
            if (!datePart || !timePart) return '';

            const [year, month, day] = datePart.split('-').map(Number);
            const [hours, minutes] = timePart.split(':').map(Number);
            if (!year || !month || !day) return '';

            const local = new Date(year, month - 1, day, hours || 0, minutes || 0, 0, 0);
            if (Number.isNaN(local.getTime())) return '';

            return local.toISOString();
        }

        function checklistDateAndNightsToEndIso(dateInput, totalNightsInput) {
            if (!dateInput) return '';

            const [year, month, day] = String(dateInput).split('-').map(Number);
            if (!year || !month || !day) return '';

            let nights = Number(totalNightsInput);
            if (!Number.isFinite(nights) || nights <= 0) {
                nights = CONFIG.DEFAULT_NIGHTS;
            }

            nights = Math.min(Math.max(Math.trunc(nights), 1), CONFIG.MAX_NIGHTS);

            const endLocal = new Date(year, month - 1, day, 23, 59, 59, 999);
            endLocal.setDate(endLocal.getDate() + nights);

            if (Number.isNaN(endLocal.getTime())) return '';
            return endLocal.toISOString();
        }

        function updateEndTimeFieldFromInputs() {
            const endField = $('field_endTime');
            if (!endField) return;

            const startDateInput = $('field_date')?.value;
            const nightsValue = $('field_totalNights')?.value;
            const endIso = checklistDateAndNightsToEndIso(startDateInput, nightsValue);
            if (endIso) {
                endField.value = toLocalDateTimeInputValue(endIso);
            }
        }

        function applyTaskToSiteInfo(taskData) {
            const map = {
                date: toLocalDateInputValue(taskData.startTime),
                siteNumber: taskData.project || '',
                customerName: taskData.customerName || '',
                sensorTotal: taskData.sensorCount || '',
                installSummary: taskData.notes || '',
                customerAddress: taskData.customerAddress || '',
                location: taskData.customerAddress || '',
                managerName: taskData.managerName || '',
                startOdometer: taskData.startOdometer || '',
                endOdometer: taskData.endOdometer || '',
                endTime: toLocalDateTimeInputValue(taskData.endTime)
            };

            Object.entries(map).forEach(([key, value]) => {
                const el = $(`field_${key}`);
                if (!el) return;

                const incoming = normalizeText(value);
                const current = normalizeText(el.value);

                // Do not clobber populated checklist values with empty task defaults.
                if (!incoming) return;
                if (current) return;

                el.value = value;
            });

            if (!$('field_endTime')?.value) {
                updateEndTimeFieldFromInputs();
            }
        }

        function attachQCListeners() {
            if (state.qcListenerBound) return;

            $('qcChecklistSection')?.addEventListener('input', async (event) => {
                const target = event.target;
                if (!(target instanceof HTMLElement)) return;

                if (target.id.startsWith('field_')) {
                    const fieldKey = target.id.replace('field_', '');
                    const map = {
                        date: 'startTime',
                        endTime: 'endTime',
                        siteNumber: 'project',
                        customerName: 'customerName',
                        sensorTotal: 'sensorCount',
                        installSummary: 'notes',
                        customerAddress: 'customerAddress',
                        location: 'customerAddress',
                        managerName: 'managerName',
                        startOdometer: 'startOdometer',
                        endOdometer: 'endOdometer'
                    };

                    const taskField = map[fieldKey];
                    if (taskField && state.currentProject) {
                        let value = target.value;
                        const patchPayload = {};

                        if (fieldKey === 'date') {
                            value = localDateInputToIso(value);
                            if (!value) return;

                            patchPayload[taskField] = value;

                            const nightsValue = $('field_totalNights')?.value;
                            const endIso = checklistDateAndNightsToEndIso(target.value, nightsValue);
                            if (endIso) {
                                patchPayload.endTime = endIso;
                                if ($('field_endTime')) {
                                    $('field_endTime').value = toLocalDateTimeInputValue(endIso);
                                }
                            }

                            await patch(getTaskPath(), patchPayload);
                            return;
                        }

                        if (fieldKey === 'endTime') {
                            value = localDateTimeInputToIso(value);
                            if (!value) return;
                            patchPayload[taskField] = value;
                            await patch(getTaskPath(), patchPayload);
                            return;
                        }

                        if (['sensorTotal', 'startOdometer', 'endOdometer'].includes(fieldKey)) {
                            const parsed = Number(value);
                            value = Number.isFinite(parsed) ? parsed : '';
                        }
                        patchPayload[taskField] = value;
                        await patch(getTaskPath(), patchPayload);
                    }
                }

                if (target.id === 'field_totalNights') {
                    let value = Number(target.value);
                    if (Number.isNaN(value)) return;

                    value = Math.min(Math.max(value, 1), CONFIG.MAX_NIGHTS);
                    target.value = value;

                    if (state.currentProject) {
                        const startDateInput = $('field_date')?.value;
                        const endIso = checklistDateAndNightsToEndIso(startDateInput, value);
                        if (endIso) {
                            await patch(getTaskPath(), { endTime: endIso });
                            if ($('field_endTime')) {
                                $('field_endTime').value = toLocalDateTimeInputValue(endIso);
                            }
                        }
                    }

                    updateNightDependentSections();
                    saveQCData();
                    return;
                }

                if (target.id === 'field_sensorTotal') {
                    const total = target.value;
                    $$('[id^="field_nightly_production_"]').forEach((input) => {
                        input.parentElement?.querySelector('.sensor-total')
                            ?.replaceChildren(document.createTextNode(`/ ${total}`));
                    });
                    saveQCData();
                    return;
                }

                updateAllScoringTotals();
                                'managerName',
                saveQCData();
            });

            $('qcChecklistSection')?.addEventListener('change', () => {
                updateAllScoringTotals();
                saveQCData();
            });

            state.qcListenerBound = true;
        }

        async function loadQCChecklist(projectId) {
            await initQCConfig();
            if (!state.qcConfig?.sections?.length) return;

            if ($('app')) $('app').innerHTML = '';

            const taskData = await readOnce(getTaskPath(projectId)) || {};
            const qcData = await readOnce(getQCPath()) || { sections: {} };

            if (state.currentChecklistType === 'audit' && !normalizeText(taskData.customerAddress)) {
                const auditFields = qcData?.sections?.audit_info?.fields || {};
                const auditAddress = auditFields.customerAddress;
                const auditLocation = auditFields.location;
                const fallbackAddress =
                    (auditAddress && typeof auditAddress === 'object' ? auditAddress.value : auditAddress) ||
                    (auditLocation && typeof auditLocation === 'object' ? auditLocation.value : auditLocation);

                if (normalizeText(fallbackAddress)) {
                    taskData.customerAddress = fallbackAddress;
                    await patch(getTaskPath(), {
                        customerAddress: fallbackAddress,
                        updatedAt: Date.now()
                    });
                }
            }

            buildApp(qcData);
            state.qcReady = true;
            applyTaskToSiteInfo(taskData);

            // Keep expected sensor count aligned with whichever source has real data.
            const qcSensorTotal = Number(
                qcData?.sections?.site_info?.fields?.sensorTotal?.value
            ) || 0;
            if (qcSensorTotal > 0) {
                state.expectedSensors = qcSensorTotal;
                populateSensorDropdown(state.expectedSensors);
                syncSensorTotalToQC();
            }

            attachQCListeners();
        }

        function getNightlyProductionStats(data) {
            const section = data.sections.nightly_production;
            if (!section?.fields) return null;

            const parseValues = (val) =>
                Array.isArray(val)
                    ? val.map((v) => Number(v) || 0)
                    : (typeof val === 'string'
                        ? val.split(',').map((v) => Number(v.trim()) || 0)
                        : []);

            const sensors = parseValues(section.fields.sensors);
            const nights = Math.max(sensors.length, getTotalNights(data));

            const sensorTotal =
                Number(
                    data?.sections?.site_info?.fields?.sensorTotal?.value
                ) ||
                Number($('field_sensorTotal')?.value) ||
                state.expectedSensors ||
                0;


            let maxDone = 0;
            const result = [];

            for (let i = 0; i < nights; i += 1) {
                const done = Number(sensors[i] ?? 0);
                maxDone = Math.max(maxDone, done);

                result.push({
                    night: i + 1,
                    done,
                    total: sensorTotal,
                    pct: sensorTotal > 0 ? Math.round((done / sensorTotal) * 100) : 0
                });
            }

            return {
                nights: result,
                overall: sensorTotal > 0 ? Math.round((maxDone / sensorTotal) * 100) : 0
            };
        }

        function generateCertificationReport() {
            const data = collectData();
            const scoring = data.sections.final_scoring || {};

            const total = scoring.total || 0;
            const checklistPercent = scoring.checklistPercent || 0;
            const manualScore = scoring.manualScore || 0;

            let result = 'PASS';
            if (total < 70) result = 'FAIL';
            else if (total < 85) result = 'NEEDS IMPROVEMENT';

            const production = getNightlyProductionStats(data);

            const lines = [
                `Total Score: ${total}`,
                `Checklist Score: ${checklistPercent}%`,
                `Manual Score: ${manualScore}`,
                `Result: ${result}`
            ];

            if (production) {
                lines.push('');
                lines.push('Night Progress:');
                production.nights.forEach((night) => {
                    lines.push(`Night ${night.night}: ${night.done}/${night.total} (${night.pct}%)`);
                });
                lines.push(`Overall Completion: ${production.overall}%`);
            }

            return lines.join('\n');
        }

        function buildReportFile() {
            const reportText = generateCertificationReport();
            return new Blob([reportText], { type: "text/plain" });
        }

        function buildReportCSVRows() {
            const data = collectData();
            const rows = [['Metric', 'Value']];

            const scoring = data.sections.final_scoring || {};
            const total = scoring.total || 0;

            let result = 'PASS';
            if (total < 70) result = 'FAIL';
            else if (total < 85) result = 'NEEDS IMPROVEMENT';

            rows.push(['Total Score', total], ['Result', result]);

            return rows;
        }

        function exportCertificationCSV() {
            const data = collectData();
            const rows = [['Metric', 'Value']];
            const scoring = data.sections.final_scoring || {};

            const total = scoring.total || 0;
            let result = 'PASS';
            if (total < 70) result = 'FAIL';
            else if (total < 85) result = 'NEEDS IMPROVEMENT';

            rows.push(['Total Score', total], ['Result', result]);

            Object.entries(scoring.scores || {}).forEach(([key, value]) => {
                rows.push([key, value]);
            });

            rows.push([]);
            rows.push(['Night Progress']);

            const production = getNightlyProductionStats(data);
            if (production) {
                production.nights.forEach((night) => {
                    rows.push([
                        `Night ${night.night}`,
                        `${night.done}/${night.total} (${night.pct}%)`
                    ]);
                });
                rows.push(['Overall Completion', `${production.overall}%`]);
            }

            downloadCSV(rows, 'certification_report.csv');
        }

        function initCollapsibles() {
            $$('.collapsible-section').forEach(section => {
                const header = section.querySelector('.collapsible-header');
                if (!header) return;

                const id = section.id;
                if (!id) return;

                const saved = localStorage.getItem(`collapse:${id}`);
                if (saved === 'true') {
                    section.classList.add('collapsed');
                }

                if (header.dataset.bound) return;
                header.dataset.bound = 'true';

                header.addEventListener('click', () => {
                    section.classList.toggle('collapsed');

                    localStorage.setItem(
                        `collapse:${id}`,
                        section.classList.contains('collapsed')
                    );
                });
            });
        }

        function initModalEvents() {
            $('closeModalButton')?.addEventListener('click', closeModal);

            $('modal')?.addEventListener('click', (e) => {
                if (e.target === $('modal')) closeModal();
            });

            $('modalPrev')?.addEventListener('click', () => {
                if (!state.modalItems.length) return;
                showModalByIndex((state.modalIndex - 1 + state.modalItems.length) % state.modalItems.length);
            });

            $('modalNext')?.addEventListener('click', () => {
                if (!state.modalItems.length) return;
                showModalByIndex((state.modalIndex + 1) % state.modalItems.length);
            });

            $('downloadButton')?.addEventListener('click', () => {
                const item = state.modalItems[state.modalIndex];
                if (!item) return;

                const a = document.createElement('a');
                a.href = item.url;
                a.download = item.name;
                a.click();
            });

            $('deleteButton')?.addEventListener('click', deleteCurrentModalImage);

            $('imageDropdown')?.addEventListener('change', () => {
                const index = Number($('imageDropdown')?.value);
                if (!Number.isNaN(index)) showModalByIndex(index);
            });
        }

        function initProjectEvents() {

            $('projectList')?.addEventListener('change', async () => {
                const id = $('projectList')?.value;
                if (id) await loadProject(id);
            });

            $('projectSearch')?.addEventListener('input', filterProjects);

            $('saveProject')?.addEventListener('click', saveProjectBasics);

            $('project')?.addEventListener('blur', async () => {
                const value = $('project')?.value.trim();
                if (!value) return;

                await loadOrCreateProject();
            });
        }

        function initFeatureEvents() {
            $('saveSensorMeta')?.addEventListener('click', saveSensorMeta);
            $('exportCSV')?.addEventListener('click', exportSensorMetaCsv);

            $('sensorMetaNumberDropdown')?.addEventListener('change', () => {
                loadSensorMeta($('sensorMetaNumberDropdown')?.value);
            });

            $('sensorNumberDropdown')?.addEventListener('change', async () => {
                const sensorNum = $('sensorNumberDropdown')?.value;
                if (!sensorNum) return;

                const data = await readOnce(`${sensorMetaBasePath()}/${sensorNum}`) || {};
                if (data.serial && $('serialNumber')) {
                    $('serialNumber').value = data.serial;
                }
            });

            $$('input[name="viewMode"]').forEach((radio) => {
                radio.addEventListener('change', async () => {
                    updateImageModeUI();
                    await updateGallery();
                });
            });

            $('missingList')?.addEventListener('click', (e) => {
                const li = e.target.closest('li[data-sensor]');
                if (li) handlePickMissing(li.dataset.sensor);
            });

            $('missingList')?.addEventListener('keydown', (e) => {
                const li = e.target.closest('li[data-sensor]');
                if (li && (e.key === 'Enter' || e.key === ' ')) {
                    e.preventDefault();
                    handlePickMissing(li.dataset.sensor);
                }
            });

            $('uploadImage')?.addEventListener('click', uploadSensor);
            $('uploadDeliverableImage')?.addEventListener('click', uploadDeliverableImage);

            $('compareBtn')?.addEventListener('click', () => {
                const report = generateCertificationReport();
                $('comparisonResults').innerHTML =
                    `<pre style="white-space: pre-wrap;">${escapeHtml(report || 'No report available')}</pre>`;
            });

            $('exportReportBtn')?.addEventListener('click', exportCertificationCSV);

            $$('input[name="checklistType"]').forEach(radio => {
                radio.addEventListener('change', async () => {

                    stopAutosaveLoop();

                    state.qcReady = false;
                    state.lastAutosavedPayload = '';

                    state.currentChecklistType = radio.value;
                    state.qcConfig = null;

                    await initQCConfig(true);
                    await loadQCChecklist(state.currentProject);

                    startAutosaveLoop();
                });
            });

            $('uploadQCBtn')?.addEventListener('click', async () => {
                const btn = $('uploadQCBtn');
                try {
                    if (btn?.disabled) return;
                    if (btn) {
                        btn.disabled = true;
                        btn.textContent = 'Uploading...';
                    }
                    const uploadedFiles = [];

                    const projectJsonPath = await saveProjectJsonToOneDrive();
                    if (!projectJsonPath) return;
                    uploadedFiles.push(projectJsonPath);

                    uploadedFiles.push(...await uploadReportsToOneDrive());
                    uploadedFiles.push(await uploadChecklistPDFToOneDrive());

                    logUploadedFiles('QC + reports upload complete', uploadedFiles);
                    alert(`OneDrive upload complete: ${uploadedFiles.length} file(s). See console for details.`);
                } catch (err) {
                    console.error(err);
                    alert(`OneDrive save failed: ${err.message}`);
                } finally {
                    if (btn) {
                        btn.disabled = false;
                        btn.textContent = 'Update to OneDrive';
                    }
                }
            });
            $('uploadImagesToOneDriveBtn')?.addEventListener('click', async () => {
                const btn = $('uploadImagesToOneDriveBtn');
                try {
                    if (btn?.disabled) return;
                    if (btn) {
                        btn.disabled = true;
                        btn.textContent = 'Uploading...';
                    }
                    const uploadedFiles = await uploadAllImagesToOneDrive();
                    logUploadedFiles('Image upload complete', uploadedFiles);
                    alert(`Uploaded ${uploadedFiles.length} image(s) to OneDrive. See console for details.`);
                } catch (err) {
                    console.error('Image upload failed:', err);
                    alert(`Image upload failed: ${err.message || err}`);
                } finally {
                    if (btn) {
                        btn.disabled = false;
                        btn.textContent = 'Upload Images to OneDrive';
                    }
                }
            });
        }

        function getQCPath() {
            return `${getTaskPath()}/qcData_${state.currentChecklistType}`;
        }

        function syncSensorTotalToQC() {
            const total = state.expectedSensors;

            const qcField = $('field_sensorTotal');
            if (qcField) qcField.value = total;

            $$('.sensor-total').forEach((el) => {
                el.textContent = `/ ${total}`;
            });
        }

        export function getAccessToken() {
            return getStoredAccessToken();
        }

        function logUploadedFiles(label, uploadedFiles = []) {
            if (!Array.isArray(uploadedFiles) || uploadedFiles.length === 0) {
                console.info(`[OneDrive] ${label}: no files uploaded.`);
                return;
            }

            console.groupCollapsed(`[OneDrive] ${label} (${uploadedFiles.length} file(s))`);
            uploadedFiles.forEach((path, index) => {
                console.log(`${index + 1}. ${path}`);
            });
            console.groupEnd();
        }

        onAuthStateChanged(auth, async (user) => {
            state.basePath = user ? user.uid : 'public';
            await populateProjects();
        });

        async function uploadAllImagesToOneDrive() {
            if (!state.currentProject) {
                throw new Error('No project selected.');
            }

            const site = sanitize(state.currentProjectName || state.currentProject);
            const basePath = `RadarApp/projects/${site}`;
            const modes = [
                { mode: 'sensors', subFolder: 'sensors' },
                { mode: 'deliverables', subFolder: 'deliverables' }
            ];

            const uploadedFiles = [];

            for (const { mode, subFolder } of modes) {
                const firebasePath = getImagesPath(mode);
                const oneDrivePath = `${basePath}/${subFolder}`;

                try {
                    const items = await listStorageItems(firebasePath).catch(() => []);
                    for (const item of items) {
                        try {
                            const blob = await (await fetch(item.url)).blob();
                            await GraphAPI.uploadFile(oneDrivePath, item.name, blob, blob.type || "image/jpeg");
                            uploadedFiles.push(`${oneDrivePath}/${item.name}`);
                        } catch (err) {
                            console.error(`Failed uploading ${item.name}:`, err);
                        }
                    }
                } catch (err) {
                    console.error(`Failed listing ${firebasePath}:`, err);
                }
            }

            return uploadedFiles;
        }

        function buildQCChecklistCSV() {
            const data = collectData();
            const rows = [["Section", "Field", "Value"]];

            Object.entries(data.sections || {}).forEach(([sectionId, section]) => {
                const sectionLabel = getSectionLabel(sectionId);

                // 🧾 Fields
                if (section.fields) {
                    Object.entries(section.fields).forEach(([key, val]) => {
                        const value = (val && typeof val === "object" && "value" in val)
                            ? val.value
                            : val;

                        rows.push([
                            sectionLabel,
                            getFieldLabel(sectionId, key),
                            formatMissing(value)
                        ]);
                    });
                }

                // ✅ Checklist
                if (Array.isArray(section.items)) {
                    section.items.forEach((item, i) => {
                        if (item.label) {
                            rows.push([
                                sectionLabel,
                                item.label,
                                item.checked ?? item.value ?? ""
                            ]);
                        }

                        // multi-day
                        if (Array.isArray(item.days)) {
                            item.days.forEach((dayVal, d) => {
                                rows.push([
                                    sectionLabel,
                                    `${item.label} (Night ${d + 1})`,
                                    dayVal
                                ]);
                            });
                        }
                    });
                }

                // 📊 Scores
                if (section.scores) {
                    Object.entries(section.scores).forEach(([k, v]) => {
                        rows.push([sectionLabel, prettifyId(k), v]);
                    });

                    rows.push([sectionLabel, "Total Score", section.total || 0]);
                }

                // 🧠 Notes
                rows.push([sectionLabel, "Notes", formatMissing(section.notes)]);
            });

            return rows;
        }

        function buildQCChecklistBlob() {
            const rows = buildQCChecklistCSV();

            const csv = rows.map(row =>
                row.map(cell => {
                    const text = String(cell ?? '');
                    return /[",\n]/.test(text)
                        ? `"${text.replace(/"/g, '""')}"`
                        : text;
                }).join(',')
            ).join('\n');

            return new Blob([csv], { type: "text/csv" });
        }

        // ===== ONEDRIVE UNIFIED FUNCTIONS =====
        async function saveProjectJsonToOneDrive() {
            try {
                if (!state.currentProject) await loadOrCreateProject();
                if (!state.currentProject) {
                    throw new Error('No project selected.');
                }

                const site = sanitize(state.currentProjectName || state.currentProject);
                const basePath = `RadarApp/projects/${site}`;

                await ensureFolderExists(basePath);

                const taskData = await readOnce(getTaskPath()) || {};
                const existingProject = await GraphAPI.readJson(basePath, 'project.json').catch(() => null);

                const qcKey = `qcData_${state.currentChecklistType}`;
                const payload = {
                    ...(existingProject || {}),
                    ...(taskData || {}),
                    id: existingProject?.id || taskData?.id || state.currentProject,
                    project: $('project')?.value?.trim() || taskData?.project || state.currentProjectName || state.currentProject,
                    customerName: taskData?.customerName || state.currentCustomerName || "",
                    sensorCount: Number($('field_sensorTotal')?.value || taskData?.sensorCount || 0),
                    sensorMeta: existingProject?.sensorMeta || taskData?.sensorMeta || {},
                    createdAt: Number(existingProject?.createdAt) || Number(taskData?.createdAt) || Date.now(),
                    updatedAt: Date.now(),
                    [qcKey]: collectData()
                };

                ["radar", "remote", "audit"].forEach((type) => {
                    const key = `qcData_${type}`;
                    if (payload[key]) return;
                    payload[key] = existingProject?.[key] || taskData?.[key] || { sections: {} };
                });

                await GraphAPI.writeJson(basePath, 'project.json', payload);
                return `${basePath}/project.json`;
            } catch (err) {
                console.error('Save project failed:', err);
                throw err;
            }
        }

        async function uploadReportsToOneDrive() {
            try {
                if (!state.currentProject) {
                    throw new Error('No project selected.');
                }

                const site = sanitize(state.currentProjectName || state.currentProject);
                const basePath = `RadarApp/projects/${site}`;
                const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
                const csvName = `qc_${timestamp}.csv`;
                const txtName = `report_${timestamp}.txt`;

                await Promise.all([
                    GraphAPI.uploadFile(basePath, csvName, buildQCChecklistBlob(), 'text/csv'),
                    GraphAPI.uploadFile(basePath, txtName, buildReportFile(), 'text/plain')
                ]);

                return [`${basePath}/${csvName}`, `${basePath}/${txtName}`];
            } catch (err) {
                console.error('Report upload failed:', err);
                throw err;
            }
        }

        async function uploadChecklistPDFToOneDrive() {
            try {
                if (!state.currentProject) {
                    throw new Error('No project selected.');
                }

                const site = sanitize(state.currentProjectName || state.currentProject);
                const basePath = `RadarApp/pdf/${site}`;
                const date = new Date().toISOString().split('T')[0];
                const checklistTag = (state.currentChecklistType || 'checklist').toLowerCase();
                const siteNumber = sanitize(getCurrentFieldValue('siteNumber') || state.currentProjectName || state.currentProject);
                const filename = `${siteNumber}_${checklistTag}_checklist_${date}.pdf`;

                const pdfBlob = await generateChecklistPDFBlob();
                if (!pdfBlob) throw new Error("PDF generation failed");

                await ensureFolderExists(basePath);
                await GraphAPI.uploadFile(basePath, filename, pdfBlob, 'application/pdf');

                return `${basePath}/${filename}`;
            } catch (err) {
                console.error('PDF upload failed:', err);
                throw err;
            }
        }

        async function generateChecklistPDFBlob() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            const data = collectData();

            let y = 10;
            const marginX = 10;
            const maxY = 280;
            const lineHeight = 6;
            const maxWidth = 190;

            const ensureSpace = (requiredLines = 1) => {
                if (y + (requiredLines * lineHeight) > maxY) {
                    doc.addPage();
                    y = 10;
                }
            };

            const line = (text = "") => {
                const lines = doc.splitTextToSize(String(text), maxWidth);
                const safeLines = Array.isArray(lines) ? lines : [String(text)];
                ensureSpace(Math.max(1, safeLines.length));
                doc.text(safeLines, marginX, y);
                y += Math.max(1, safeLines.length) * lineHeight;
            };

            const section = (title) => {
                y += 4;
                ensureSpace(2);
                doc.setFont(undefined, "bold");
                const titleLines = doc.splitTextToSize(title, maxWidth);
                doc.text(titleLines, marginX, y);
                doc.setFont(undefined, "normal");
                y += Math.max(1, titleLines.length) * lineHeight;
            };

            const singleSelectText = (sectionId, selectedIndex) => {
                if (selectedIndex == null) return 'N/A';
                const sectionConfig = getSectionConfig(sectionId);
                const options = sectionConfig?.options;
                if (Array.isArray(options) && options[selectedIndex] != null) {
                    return String(options[selectedIndex]);
                }
                return String(selectedIndex);
            };

            // ===== HEADER =====
            const siteName = state.currentProjectName || state.currentProject || "";

            doc.setFontSize(14);
            doc.text(`TELAID - ${siteName} QC Checklist`, marginX, y);
            y += 10;

            doc.setFontSize(10);

            getPdfSiteHeaderRows().forEach((row) => {
                line(`${row.label}: ${row.value}`);
            });
            line("");

            // ===== SECTIONS =====
            const headerSectionId = getPdfHeaderSectionId();
            Object.entries(data.sections).forEach(([sectionId, sectionData]) => {
                if (sectionId === headerSectionId) return;

                section(getSectionLabel(sectionId));

                // Fields
                if (sectionData.fields) {
                    Object.entries(sectionData.fields).forEach(([k, v]) => {
                        const val = (v && typeof v === "object") ? v.value : v;
                        line(`${getFieldLabel(sectionId, k)}: ${formatMissing(val)}`);
                    });
                }

                // Checklist
                if (Array.isArray(sectionData.items)) {
                    sectionData.items.forEach(item => {
                        if (item.label) {
                            const check = item.checked || item.value ? "*" : "-";
                            line(`${check} ${item.label}`);
                        }

                        if (Array.isArray(item.days)) {
                            item.days.forEach((d, i) => {
                                line(`   Night ${i + 1}: ${d ? "*" : "-"}`);
                            });
                        }
                    });
                }

                // Scores
                if (sectionData.scores) {
                    Object.entries(sectionData.scores).forEach(([k, v]) => {
                        line(`${getFieldLabel(sectionId, k)}: ${formatMissing(v, '0')}`);
                    });
                    line(`Total: ${sectionData.total || 0}`);
                }

                // Single-select sections (e.g., Lead Tech Understanding)
                if (Object.prototype.hasOwnProperty.call(sectionData, 'selected')) {
                    line(`${getSectionLabel(sectionId)}: ${singleSelectText(sectionId, sectionData.selected)}`);
                }

                // Notes
                if (sectionData.notes) {
                    line(`Notes: ${formatMissing(sectionData.notes)}`);
                }

                y += 4;
                ensureSpace(1);
            });

            return doc.output("blob");
        }

        async function ensureFolderExists(path) {
            const parts = path.split('/').filter(Boolean);
            let parentPath = '';

            for (const part of parts) {
                const currentPath = `${parentPath}/${part}`;
                try {
                    const checkEndpoint = `${ONEDRIVE_CONFIG.API_DRIVES(ONEDRIVE_CONFIG.SHARED_DRIVE_ID)}/root:${currentPath}`;
                    const res = await GraphAPI.fetch(checkEndpoint);

                    if (res.status === 404) {
                        const createEndpoint = parentPath
                            ? `${ONEDRIVE_CONFIG.API_DRIVES(ONEDRIVE_CONFIG.SHARED_DRIVE_ID)}/root:${parentPath}:/children`
                            : `${ONEDRIVE_CONFIG.API_DRIVES(ONEDRIVE_CONFIG.SHARED_DRIVE_ID)}/root/children`;

                        await GraphAPI.fetch(createEndpoint, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                name: part,
                                folder: {},
                                "@microsoft.graph.conflictBehavior": "replace"
                            })
                        });
                    }

                    parentPath = currentPath;
                } catch (err) {
                    console.error(`Folder creation failed for ${currentPath}:`, err);
                }
            }
        }

        initModalEvents();
        initProjectEvents();
        initFeatureEvents();
        updateImageModeUI();
        initCollapsibles();
    </script>
