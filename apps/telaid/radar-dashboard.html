<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Radar Data Sheet</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="./assets/css/radartools.css" />
  <script type="module" src="../assets/js/login.js"></script>
  <script type="module" src="../assets/js/microsoftAuth.js"></script>
  <style>
    .dashboard-wrap {
      padding: 12px;
    }

    .dashboard-toolbar {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }

    .dashboard-toolbar input,
    .dashboard-toolbar select {
      width: 100%;
      min-width: 0;
    }

    .dashboard-summary {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .source-toggle {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .source-toggle label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.04);
      font-size: 12px;
      cursor: pointer;
    }

    .summary-pill {
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.04);
      font-size: 12px;
      white-space: nowrap;
    }

    .table-shell {
      overflow: auto;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.18);
    }

    .radar-sheet {
      width: 100%;
      border-collapse: collapse;
      min-width: 1400px;
    }

    .radar-sheet th,
    .radar-sheet td {
      padding: 8px 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      border-right: 1px solid rgba(255, 255, 255, 0.06);
      vertical-align: top;
      font-size: 13px;
    }

    .radar-sheet th {
      position: sticky;
      top: 0;
      z-index: 2;
      text-align: left;
      background: rgba(20, 20, 20, 0.98);
      backdrop-filter: blur(6px);
    }

    .sheet-row {
      cursor: pointer;
    }

    .sheet-row:hover {
      background: rgba(255, 255, 255, 0.04);
    }

    .detail-row {
      display: none;
    }

    .detail-row.open {
      display: table-row;
    }

    .detail-cell {
      padding: 14px !important;
      background: rgba(255, 255, 255, 0.03);
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .detail-card {
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 12px;
      padding: 12px;
      background: rgba(0, 0, 0, 0.16);
    }

    .detail-card h3 {
      margin: 0 0 8px 0;
      font-size: 14px;
    }

    .kv {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 6px 10px;
      font-size: 13px;
    }

    .kv div:nth-child(odd) {
      opacity: 0.72;
    }

    .status-pass {
      color: #4caf50;
      font-weight: 700;
    }

    .status-review {
      color: #ffc107;
      font-weight: 700;
    }

    .status-fail {
      color: #f44336;
      font-weight: 700;
    }

    .status-incomplete {
      color: #9aa0a6;
      font-weight: 700;
    }

    .score-pass {
      color: #4caf50;
    }

    .score-review {
      color: #ffc107;
    }

    .score-fail {
      color: #f44336;
    }

    .score-empty {
      color: #9aa0a6;
    }

    .muted {
      opacity: 0.72;
    }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    .pill-list,
    .line-list {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .mini-pill {
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.05);
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
    }

    .line-list {
      flex-direction: column;
      gap: 4px;
    }

    .btn-pdf {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: linear-gradient(135deg, #16a34a, #22c55e);
      color: white;
      text-decoration: none;
      padding: 8px 14px;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 4px 12px rgba(22, 163, 74, 0.3);
      margin: 5px;
      font-size: 13px;
      border: none;
    }

    .btn-pdf:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(22, 163, 74, 0.5);
    }

    .compact {
      font-size: 12px;
      line-height: 1.35;
    }

    .nowrap {
      white-space: nowrap;
    }

    .truncate {
      max-width: 260px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: inline-block;
      vertical-align: bottom;
    }

    @media (max-width: 1100px) {
      .dashboard-toolbar {
        grid-template-columns: 1fr;
      }

      .dashboard-summary {
        justify-content: flex-start;
      }

      .detail-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <header class="top-actions">
    <h1>Radar Tools Dashboard</h1>

    <section id="login-section" class="logins-section">
      <form id="login-form" class="center">
        <label for="username">Email:</label>
        <input type="email" id="username" required>

        <label for="password">Password:</label>
        <input type="password" id="password" required>

        <button type="submit">Sign in</button>
      </form>

      <button id="logout" style="display:none;">Logout</button>

    </section>
    
      <div class="ms">
        <br>
        <button id="loginButton">Login to MS</button>
        <button id="logoutButton">Logout of MS</button>
        <p id="loginStatus">Login status...</p>
      </div>
  </header>

  <main class="dashboard-wrap">
    <div class="dashboard-toolbar">
      <input id="searchInput" type="text" placeholder="Search site, customer, address, lead tech, QC lead..." />
      <div class="source-toggle" id="sourceToggle">
        <label>
          <input type="radio" name="dataSource" value="onedrive" checked />
          OneDrive
        </label>
        <label>
          <input type="radio" name="dataSource" value="firebase" />
          Firebase
        </label>
      </div>
      <select id="statusFilter">
        <option value="ALL">All statuses</option>
        <option value="FAIL">Fail</option>
        <option value="REVIEW">Review</option>
        <option value="PASS">Pass</option>
        <option value="INCOMPLETE">Incomplete</option>
      </select>
      <div class="dashboard-summary" id="summaryPills"></div>
    </div>

    <div class="table-shell">
      <table class="radar-sheet">
        <thead>
          <tr>
            <th>Site</th>
            <th>Customer</th>
            <th>Status</th>
            <th>Lowest</th>
            <th>Worst</th>
            <th>Radar</th>
            <th>Remote</th>
            <th>Audit</th>
            <th>Sensors</th>
            <th>Serials</th>
            <th>Flags</th>
            <th>Partner / Lead</th>
            <th>QC Lead</th>
            <th>Updated</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr>
            <td colspan="14">Loading...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

  <script type="module">
    import {
      auth,
      onAuthStateChanged,
      database,
      ref as dbRef,
      get
    } from "../assets/js/firebase-init.js";

    const CONFIG = {
      ROOT: "RadarApp/projects",
      DRIVE_ID: "b!3mJ2DZSHdkmBrOccfkDkBt3Eklx5UvdMlDz0bmgGRktCiH2Pzkr5TbiD0DhegSHo"
    };

    const getAccessToken = () => String(localStorage.getItem("accessToken") || "").trim();
    let LAST_ACCESS_TOKEN = getAccessToken();
    let DASHBOARD_LOADING = false;
    let CURRENT_SOURCE = "onedrive";
    let FIREBASE_BASE_PATH = "public";

    let ALL_SITES = [];
    let PDF_LOOKUP = {};
    let CURRENT_FILTER = "ALL";
    let CURRENT_SEARCH = "";

    function setLoadingMessage(message) {
      const tbody = document.getElementById("tbody");
      if (!tbody) return;
      tbody.innerHTML = `<tr><td colspan="14">${escapeHtml(message)}</td></tr>`;
    }

    async function graph(url) {
      const token = getAccessToken();
      if (!token) {
        setLoadingMessage("Login to MS to load dashboard data.");
        return null;
      }

      const res = await fetch(url, {
        headers: { Authorization: `Bearer ${token}` }
      });
      if (res.status === 404) {
        return null;
      }
      if (!res.ok) {
        console.error("[GRAPH]", url, res.status);
        return null;
      }
      return res.json();
    }

    async function getProjects() {
      const url = `https://graph.microsoft.com/v1.0/drives/${CONFIG.DRIVE_ID}/root:/${CONFIG.ROOT}:/children`;
      const data = await graph(url);
      return data?.value || [];
    }

    async function loadProject(name) {
      try {
        const token = getAccessToken();
        if (!token) return null;

        const metaUrl = `https://graph.microsoft.com/v1.0/drives/${CONFIG.DRIVE_ID}/root:/${CONFIG.ROOT}/${encodeURIComponent(name)}/project.json`;
        const metaRes = await fetch(metaUrl, {
          headers: { Authorization: `Bearer ${token}` }
        });

        if (!metaRes.ok) {
          console.warn("[LOAD META FAILED]", name, metaRes.status);
          return null;
        }

        const meta = await metaRes.json();
        const downloadUrl = meta["@microsoft.graph.downloadUrl"];
        if (!downloadUrl) return null;

        const dataRes = await fetch(downloadUrl);
        if (!dataRes.ok) {
          console.warn("[LOAD DATA FAILED]", name, dataRes.status);
          return null;
        }

        return await dataRes.json();
      } catch (err) {
        console.error("[LOAD ERROR]", name, err);
        return null;
      }
    }

    function sanitizeForKey(str) {
      return (str || '').trim().replace(/\s+/g, '_').replace(/[\\/:*?"<>|#%{}~&]/g, '_');
    }

    async function loadPDFFolder() {
      try {
        const url = `https://graph.microsoft.com/v1.0/drives/${CONFIG.DRIVE_ID}/root:/${CONFIG.ROOT}/pdf:/children?$select=name,@microsoft.graph.downloadUrl`;
        const data = await graph(url);
        if (!data?.value) return;
        PDF_LOOKUP = {};
        for (const file of data.value) {
          if (!file.name?.toLowerCase().endsWith('.pdf')) continue;
          const match = file.name.match(/^(.+?)_checklist_/);
          if (match) {
            const key = match[1];
            if (!PDF_LOOKUP[key] || file.name > PDF_LOOKUP[key].name) {
              PDF_LOOKUP[key] = { name: file.name, url: file['@microsoft.graph.downloadUrl'] };
            }
          }
        }
      } catch (e) {
        console.warn('[PDF] Could not load PDF folder', e);
      }
    }

    function findPDFForRecord(record) {
      const key1 = sanitizeForKey(record.info.project);
      const key2 = sanitizeForKey(record.name);
      return PDF_LOOKUP[key1] || PDF_LOOKUP[key2] || null;
    }

    function getFirstNonEmpty(...values) {
      for (const value of values) {
        if (value !== undefined && value !== null && value !== "") return value;
      }
      return "";
    }

    function getSectionField(section, fieldName) {
      return section?.fields?.[fieldName]?.value ?? "";
    }

    function getChecklistNode(data, type) {
      if (type === "radar") {
        return (
          data?.qcData_radar ||
          data?.qcData_radar_checklist ||
          data?.qcData ||
          null
        );
      }

      if (type === "remote") {
        return data?.qcData_remote || null;
      }

      if (type === "audit") {
        return data?.qcData_audit || null;
      }

      return null;
    }

    function getChecklistScoring(qc, type) {
      if (!qc?.sections) return null;

      if (type === "audit") {
        return qc.sections.final_scoring || qc.sections.audit_score || null;
      }

      return qc.sections.final_scoring || null;
    }

    function getChecklistScore(data, type) {
      const qc = getChecklistNode(data, type);
      const scoring = getChecklistScoring(qc, type);
      return scoring?.total ?? null;
    }

    function getChecklistPercent(data, type) {
      const qc = getChecklistNode(data, type);
      const scoring = getChecklistScoring(qc, type);
      return scoring?.checklistPercent ?? null;
    }

    function getManualScore(data, type) {
      const qc = getChecklistNode(data, type);
      const scoring = getChecklistScoring(qc, type);
      return scoring?.manualScore ?? null;
    }

    function scoreClass(score) {
      if (score == null) return "score-empty";
      if (score < 70) return "score-fail";
      if (score < 85) return "score-review";
      return "score-pass";
    }

    function statusClass(status) {
      return {
        PASS: "status-pass",
        REVIEW: "status-review",
        FAIL: "status-fail",
        INCOMPLETE: "status-incomplete"
      }[status] || "";
    }

    function scoreBadge(score) {
      return `<span class="${scoreClass(score)}">${score ?? "-"}</span>`;
    }

    function analyzeSite(data) {
      const radar = getChecklistScore(data, "radar");
      const remote = getChecklistScore(data, "remote");
      const audit = getChecklistScore(data, "audit");

      const scores = { radar, remote, audit };
      const entries = Object.entries(scores)
        .filter(([, score]) => score != null && score !== 0)
        .map(([type, score]) => ({ type, score }));

      const missing = Object.entries(scores)
        .filter(([, score]) => score == null)
        .map(([type]) => type);

      let status = "INCOMPLETE";
      let lowestScore = null;
      let worstType = null;

      if (entries.length > 0) {
        const worst = entries.reduce((min, curr) => curr.score < min.score ? curr : min);
        lowestScore = worst.score;
        worstType = worst.type;

        if (lowestScore < 70) status = "FAIL";
        else if (lowestScore < 85) status = "REVIEW";
        else status = "PASS";
      }

      const issues = [];

      if (missing.length) {
        issues.push(`Missing checklist: ${missing.join(", ")}`);
      }

      for (const item of entries) {
        if (item.score < 70) issues.push(`${item.type.toUpperCase()} below threshold (${item.score})`);
        else if (item.score < 85) issues.push(`${item.type.toUpperCase()} review range (${item.score})`);
      }

      return {
        status,
        lowestScore,
        worstType,
        scores,
        missing,
        issues
      };
    }

    function getUpdatedAt(data) {
      return (
        data?.updatedAt ||
        data?.meta?.updatedAt ||
        data?.createdAt ||
        0
      );
    }

    function formatDateTime(ts) {
      if (!ts) return "-";
      const d = new Date(ts);
      if (Number.isNaN(d.getTime())) return "-";
      return d.toLocaleString();
    }

    function getSiteInfo(data) {
      const radar = getChecklistNode(data, "radar");
      const audit = getChecklistNode(data, "audit");

      const radarSiteInfo = radar?.sections?.site_info;
      const auditInfo = audit?.sections?.audit_info;

      return {
        project: getFirstNonEmpty(data?.project, getSectionField(auditInfo, "siteNumber")),
        customer: getFirstNonEmpty(data?.customerName, "-"),
        address: getFirstNonEmpty(
          data?.customerAddress,
          getSectionField(auditInfo, "customerAddress"),
          getSectionField(auditInfo, "location"),
          "-"
        ),
        managerName: getFirstNonEmpty(getSectionField(auditInfo, "managerName"), "-"),
        visitDate: getFirstNonEmpty(
          getSectionField(auditInfo, "visitDate"),
          getSectionField(auditInfo, "date"),
          "-"
        ),
        auditor: getFirstNonEmpty(getSectionField(auditInfo, "auditor"), "-"),
        qcLead: getFirstNonEmpty(
          getSectionField(radarSiteInfo, "qcLead"),
          getSectionField(auditInfo, "qcLead"),
          "-"
        ),
        partnerCompany: getFirstNonEmpty(getSectionField(radarSiteInfo, "partnerCompany"), "-"),
        leadTech: getFirstNonEmpty(getSectionField(radarSiteInfo, "leadTech"), "-"),
        additionalTechs: getFirstNonEmpty(getSectionField(radarSiteInfo, "additionalTechs"), "-"),
        totalNights: getFirstNonEmpty(getSectionField(radarSiteInfo, "totalNights"), "-")
      };
    }

    function getFlagLabels(sectionName, data) {
      const radar = getChecklistNode(data, "radar");
      const items = radar?.sections?.[sectionName]?.items || [];
      return items.filter(x => x.checked).map(x => x.label);
    }

    function countCheckedItems(sectionName, data, type = "radar") {
      const qc = getChecklistNode(data, type);
      const items = qc?.sections?.[sectionName]?.items || [];
      return items.filter(x => x.checked).length;
    }

    function countTruthyDays(sectionName, data, type = "radar") {
      const qc = getChecklistNode(data, type);
      const items = qc?.sections?.[sectionName]?.items || [];
      return items.reduce((sum, item) => {
        const days = Array.isArray(item.days) ? item.days : [];
        return sum + days.filter(Boolean).length;
      }, 0);
    }

    function getProductionTotals(data, type = "radar") {
      const qc = getChecklistNode(data, type);
      const fields = qc?.sections?.nightly_production?.fields || {};

      const last = arr =>
        Array.isArray(arr) && arr.length
          ? Number(arr[arr.length - 1]) || 0
          : 0;

      return {
        poles: last(fields.poles),
        brackets: last(fields.brackets),
        cables: last(fields.cables),
        sensors: last(fields.sensors)
      };
    }

    function getSensorStats(data) {
      const sensorMeta = Array.isArray(data?.sensorMeta)
        ? data.sensorMeta.filter(Boolean)
        : [];

      const withSerial = sensorMeta.filter(s => (s?.serial || "").trim() !== "").length;
      const withAnyMeasurement = sensorMeta.filter(s =>
        [s?.m1, s?.m2, s?.m3].some(v => (v || "").trim() !== "")
      ).length;

      return {
        sensorCount: Number(data?.sensorCount) || 0,
        serialCount: withSerial,
        measurementCount: withAnyMeasurement
      };
    }

    function getNotesBundle(data) {
      const radar = getChecklistNode(data, "radar");
      const audit = getChecklistNode(data, "audit");

      const comments = data?.comments ? Object.values(data.comments) : [];
      const primaryNotes = [
        data?.notes,
        getSectionField(radar?.sections?.partner_gaps, "gaps_text"),
        getSectionField(radar?.sections?.partner_strengths, "strengths_text"),
        radar?.sections?.predeployment_daily?.notes,
        radar?.sections?.night1_status?.notes,
        radar?.sections?.start_shift?.notes,
        radar?.sections?.end_shift?.notes,
        getSectionField(audit?.sections?.audit_notes, "strengths_text"),
        getSectionField(audit?.sections?.audit_result_notes, "finalNotes"),
        getSectionField(audit?.sections?.ceiling_notes, "CeilingNotes")
      ].filter(Boolean);

      return {
        comments,
        primaryNotes
      };
    }

    function getSearchText(record) {
      const info = record.info;
      const notes = record.notesBundle;
      return [
        record.name,
        info.project,
        info.customer,
        info.address,
        info.partnerCompany,
        info.leadTech,
        info.additionalTechs,
        info.qcLead,
        ...notes.comments,
        ...notes.primaryNotes
      ].join(" ").toLowerCase();
    }

    function buildRecord(name, data) {
      const analysis = analyzeSite(data || {});
      const info = getSiteInfo(data || {});
      const sensors = getSensorStats(data || {});
      const notesBundle = getNotesBundle(data || {});
      const qcFlags = getFlagLabels("qc_flags", data || {});
      const preparednessCount = countCheckedItems("qc_preparedness", data || {}, "radar");
      const startShiftCount = countTruthyDays("start_shift", data || {}, "radar");
      const endShiftCount = countTruthyDays("end_shift", data || {}, "radar");
      const auditFlags = (getChecklistNode(data, "audit")?.sections?.audit_flags?.items || [])
        .filter(x => x.checked)
        .map(x => x.label);
      const auditSensorFlags = (getChecklistNode(data, "audit")?.sections?.sensor_checks?.items || [])
        .filter(x => x.checked)
        .map(x => x.label);

      const radarProd = getProductionTotals(data || {}, "radar");
      const remoteProd = getProductionTotals(data || {}, "remote");

      return {
        name,
        data: data || {},
        analysis,
        info,
        sensors,
        notesBundle,
        qcFlags,
        preparednessCount,
        startShiftCount,
        endShiftCount,
        auditFlags,
        auditSensorFlags,
        radarProd,
        remoteProd,
        searchText: ""
      };
    }

    function createSummaryPills(records) {
      const counts = { ALL: records.length, FAIL: 0, REVIEW: 0, PASS: 0, INCOMPLETE: 0 };
      for (const r of records) counts[r.analysis.status] = (counts[r.analysis.status] || 0) + 1;

      return `
        <div class="summary-pill">Total ${counts.ALL}</div>
        <div class="summary-pill status-fail">Fail ${counts.FAIL}</div>
        <div class="summary-pill status-review">Review ${counts.REVIEW}</div>
        <div class="summary-pill status-pass">Pass ${counts.PASS}</div>
        <div class="summary-pill status-incomplete">Incomplete ${counts.INCOMPLETE}</div>
      `;
    }

    function renderIssues(record) {
      const lines = [...record.analysis.issues];

      if (record.qcFlags.length) lines.push(`QC flags: ${record.qcFlags.join(", ")}`);
      if (record.auditFlags.length) lines.push(`Audit flags: ${record.auditFlags.join(", ")}`);
      if (record.auditSensorFlags.length) lines.push(`Audit sensor checks: ${record.auditSensorFlags.join(", ")}`);

      if (!lines.length) return `<div class="muted">No active issues found</div>`;
      return `<div class="line-list compact">${lines.map(x => `<div>${x}</div>`).join("")}</div>`;
    }

    function renderNotes(record) {
      const combined = [...record.notesBundle.primaryNotes, ...record.notesBundle.comments].filter(Boolean);
      if (!combined.length) return `<div class="muted">No notes</div>`;
      return `<div class="line-list compact">${combined.slice(0, 8).map(x => `<div>${escapeHtml(x)}</div>`).join("")}</div>`;
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function renderMiniPills(items) {
      if (!items.length) return `<span class="muted">None</span>`;
      return `<div class="pill-list">${items.map(x => `<span class="mini-pill">${escapeHtml(x)}</span>`).join("")}</div>`;
    }

    function renderDetailRow(record) {
      const r = record.analysis.scores.radar;
      const re = record.analysis.scores.remote;
      const a = record.analysis.scores.audit;

      return `
        <div class="detail-grid">
          <section class="detail-card">
            <h3>Overview</h3>
            <div class="kv">
              <div>Status</div><div class="${statusClass(record.analysis.status)}">${record.analysis.status}</div>
              <div>Lowest score</div><div>${record.analysis.lowestScore ?? "-"}</div>
              <div>Worst checklist</div><div>${record.analysis.worstType ?? "-"}</div>
              <div>Project</div><div class="mono">${escapeHtml(record.info.project || "-")}</div>
              <div>Customer</div><div>${escapeHtml(record.info.customer || "-")}</div>
              <div>Address</div><div>${escapeHtml(record.info.address || "-")}</div>
              <div>Updated</div><div>${formatDateTime(getUpdatedAt(record.data))}</div>
              <div>Visit date</div><div>${escapeHtml(record.info.visitDate || "-")}</div>
            </div>
          </section>

          <section class="detail-card">
            <h3>Team / Site</h3>
            <div class="kv">
              <div>Partner</div><div>${escapeHtml(record.info.partnerCompany || "-")}</div>
              <div>Lead tech</div><div>${escapeHtml(record.info.leadTech || "-")}</div>
              <div>Additional techs</div><div>${escapeHtml(record.info.additionalTechs || "-")}</div>
              <div>QC lead</div><div>${escapeHtml(record.info.qcLead || "-")}</div>
              <div>Manager</div><div>${escapeHtml(record.info.managerName || "-")}</div>
              <div>Auditor</div><div>${escapeHtml(record.info.auditor || "-")}</div>
              <div>Total nights</div><div>${escapeHtml(record.info.totalNights || "-")}</div>
            </div>
          </section>

          <section class="detail-card">
            <h3>Performance</h3>
            <div class="kv">
              <div>Radar</div><div>${scoreBadge(r)}</div>
              <div>Remote</div><div>${scoreBadge(re)}</div>
              <div>Audit</div><div>${scoreBadge(a)}</div>
              <div>Radar % / Manual</div><div>${getChecklistPercent(record.data, "radar") ?? "-"} / ${getManualScore(record.data, "radar") ?? "-"}</div>
              <div>Remote % / Manual</div><div>${getChecklistPercent(record.data, "remote") ?? "-"} / ${getManualScore(record.data, "remote") ?? "-"}</div>
              <div>Audit % / Manual</div><div>${getChecklistPercent(record.data, "audit") ?? "-"} / ${getManualScore(record.data, "audit") ?? "-"}</div>
            </div>
          </section>

          <section class="detail-card">
            <h3>Sensors</h3>
            <div class="kv">
              <div>Configured</div><div>${record.sensors.sensorCount}</div>
              <div>With serials</div><div>${record.sensors.serialCount}</div>
              <div>With measurements</div><div>${record.sensors.measurementCount}</div>
            </div>
          </section>

          <section class="detail-card">
            <h3>Production</h3>
            <div class="kv">
              <div>Radar poles</div><div>${record.radarProd.poles}</div>
              <div>Radar brackets</div><div>${record.radarProd.brackets}</div>
              <div>Radar cables</div><div>${record.radarProd.cables}</div>
              <div>Radar sensors</div><div>${record.radarProd.sensors}</div>
            </div>
          </section>

          <section class="detail-card">
            <h3>Checklist signals</h3>
            <div class="kv">
              <div>Preparedness checks</div><div>${record.preparednessCount}</div>
              <div>Start shift days</div><div>${record.startShiftCount}</div>
              <div>End shift days</div><div>${record.endShiftCount}</div>
            </div>
            <div style="margin-top:10px;">
              <div class="muted" style="margin-bottom:6px;">QC Flags</div>
              ${renderMiniPills(record.qcFlags)}
            </div>
            <div style="margin-top:10px;">
              <div class="muted" style="margin-bottom:6px;">Audit Flags</div>
              ${renderMiniPills(record.auditFlags)}
            </div>
            <div style="margin-top:10px;">
              <div class="muted" style="margin-bottom:6px;">Audit Sensor Checks</div>
              ${renderMiniPills(record.auditSensorFlags)}
            </div>
          </section>

          <section class="detail-card">
            <h3>Issues</h3>
            ${renderIssues(record)}
          </section>

          <section class="detail-card">
            <h3>Notes</h3>
            ${renderNotes(record)}
          </section>
        </div>
      `;
    }

    function escapeJs(str) {
      return String(str).replaceAll("\\", "\\\\").replaceAll("'", "\\'");
    }

    function renderRow(record) {
      const info = record.info;
      const a = record.analysis;

      return `
        <tr class="sheet-row" data-name="${escapeHtml(record.name)}" onclick="toggleDetail('${escapeJs(record.name)}')">
          <td class="mono nowrap">${escapeHtml(info.project || record.name)}</td>
          <td><span class="truncate" title="${escapeHtml(info.customer)}">${escapeHtml(info.customer)}</span></td>
          <td class="${statusClass(a.status)}">${a.status}</td>
          <td>${a.lowestScore ?? "-"}</td>
          <td>${a.worstType ?? "-"}</td>
          <td>${scoreBadge(a.scores.radar)}</td>
          <td>${scoreBadge(a.scores.remote)}</td>
          <td>${scoreBadge(a.scores.audit)}</td>
          <td>${record.sensors.sensorCount}</td>
          <td>${record.sensors.serialCount}</td>
          <td>${record.qcFlags.length + record.auditFlags.length + record.auditSensorFlags.length}</td>
          <td>
            <div class="truncate" title="${escapeHtml(`${info.partnerCompany} / ${info.leadTech}`)}">
              ${escapeHtml(info.partnerCompany || "-")} / ${escapeHtml(info.leadTech || "-")}
            </div>
          </td>
          <td><span class="truncate" title="${escapeHtml(info.qcLead)}">${escapeHtml(info.qcLead || "-")}</span></td>
          <td class="nowrap">${formatDateTime(getUpdatedAt(record.data))}</td>
        </tr>
        <tr id="detail-${cssSafeId(record.name)}" class="detail-row">
          <td colspan="14" class="detail-cell">
            ${renderDetailRow(record)}
          </td>
        </tr>
      `;
    }

    function cssSafeId(str) {
      return String(str).replace(/[^a-zA-Z0-9_-]/g, "_");
    }

    function toggleDetail(name) {
      const row = document.getElementById(`detail-${cssSafeId(name)}`);
      if (!row) return;
      row.classList.toggle("open");
    }

    window.toggleDetail = toggleDetail;

    function applyFilters(records) {
      return records.filter(record => {
        const statusMatch = CURRENT_FILTER === "ALL" || record.analysis.status === CURRENT_FILTER;
        const searchMatch = !CURRENT_SEARCH || record.searchText.includes(CURRENT_SEARCH);
        return statusMatch && searchMatch;
      });
    }

    function sortRecords(records) {
      const order = { FAIL: 0, REVIEW: 1, PASS: 2, INCOMPLETE: 3 };
      records.sort((a, b) => {
        const s = (order[a.analysis.status] ?? 9) - (order[b.analysis.status] ?? 9);
        if (s !== 0) return s;

        const la = a.analysis.lowestScore ?? 9999;
        const lb = b.analysis.lowestScore ?? 9999;
        if (la !== lb) return la - lb;

        return String(a.info.project || a.name).localeCompare(String(b.info.project || b.name));
      });
      return records;
    }

    function render() {
      const summary = document.getElementById("summaryPills");
      const tbody = document.getElementById("tbody");

      summary.innerHTML = createSummaryPills(ALL_SITES);

      const filtered = sortRecords(applyFilters([...ALL_SITES]));

      if (!filtered.length) {
        tbody.innerHTML = `<tr><td colspan="14">No matching projects</td></tr>`;
        return;
      }

      tbody.innerHTML = filtered.map(renderRow).join("");
    }

    async function loadAll() {
      if (CURRENT_SOURCE === "firebase") {
        return loadAllFromFirebase();
      }

      if (DASHBOARD_LOADING) return;
      DASHBOARD_LOADING = true;

      const tbody = document.getElementById("tbody");
      tbody.innerHTML = `<tr><td colspan="14">Loading...</td></tr>`;

      try {
        const token = getAccessToken();
        if (!token) {
          ALL_SITES = [];
          PDF_LOOKUP = {};
          setLoadingMessage("Login to MS to load dashboard data.");
          return;
        }

        LAST_ACCESS_TOKEN = token;

        const [projects] = await Promise.all([getProjects(), loadPDFFolder()]);
        const folders = (projects || []).filter(p => p.folder);

        const records = await Promise.all(
          folders.map(async p => {
            const data = await loadProject(p.name);
            const record = buildRecord(p.name, data || {});
            record.searchText = getSearchText(record);
            return record;
          })
        );

        ALL_SITES = records;
        render();
      } catch (error) {
        console.error("[DASHBOARD LOAD FAILED]", error);
        setLoadingMessage("Failed to load dashboard data.");
      } finally {
        DASHBOARD_LOADING = false;
      }
    }

    async function loadAllFromFirebase() {
      if (DASHBOARD_LOADING) return;
      DASHBOARD_LOADING = true;

      const tbody = document.getElementById("tbody");
      tbody.innerHTML = `<tr><td colspan="14">Loading...</td></tr>`;

      try {
        const snap = await get(dbRef(database, `${FIREBASE_BASE_PATH}/tasks`));
        const tasks = snap.exists() ? snap.val() : {};

        const records = Object.entries(tasks).map(([id, data]) => {
          const record = buildRecord(id, data || {});
          record.searchText = getSearchText(record);
          return record;
        });

        ALL_SITES = records;
        PDF_LOOKUP = {};
        render();
      } catch (error) {
        console.error("[FIREBASE DASHBOARD LOAD FAILED]", error);
        setLoadingMessage("Failed to load Firebase dashboard data.");
      } finally {
        DASHBOARD_LOADING = false;
      }
    }

    async function reloadAfterTokenChange() {
      if (CURRENT_SOURCE !== "onedrive") return;
      const token = getAccessToken();
      if (!token || token === LAST_ACCESS_TOKEN) return;

      LAST_ACCESS_TOKEN = token;
      await loadAll();
    }

    function setSource(source) {
      CURRENT_SOURCE = source;
      setLoadingMessage("Loading...");
      loadAll();
    }

    document.getElementById("searchInput").addEventListener("input", e => {
      CURRENT_SEARCH = e.target.value.trim().toLowerCase();
      render();
    });

    document.getElementById("statusFilter").addEventListener("change", e => {
      CURRENT_FILTER = e.target.value;
      render();
    });

    window.addEventListener("focus", () => {
      reloadAfterTokenChange();
    });

    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) reloadAfterTokenChange();
    });

    window.addEventListener("storage", (event) => {
      if (event.key !== "accessToken") return;

      const token = getAccessToken();
      LAST_ACCESS_TOKEN = token;

      if (CURRENT_SOURCE !== "onedrive") return;

      if (token) {
        loadAll();
      } else {
        ALL_SITES = [];
        PDF_LOOKUP = {};
        setLoadingMessage("Login to MS to load dashboard data.");
      }
    });

    document.getElementById("loginButton")?.addEventListener("click", () => {
      if (CURRENT_SOURCE !== "onedrive") return;
      const baseline = getAccessToken();
      let attempts = 0;
      const maxAttempts = 60;

      const timer = setInterval(async () => {
        attempts += 1;
        const current = getAccessToken();

        if (current && current !== baseline) {
          clearInterval(timer);
          LAST_ACCESS_TOKEN = current;
          await loadAll();
          return;
        }

        if (attempts >= maxAttempts) {
          clearInterval(timer);
        }
      }, 500);
    });

    document.querySelectorAll('input[name="dataSource"]').forEach((radio) => {
      radio.addEventListener("change", (event) => {
        setSource(event.target.value);
      });
    });

    onAuthStateChanged(auth, (user) => {
      FIREBASE_BASE_PATH = user ? user.uid : "public";
      if (CURRENT_SOURCE === "firebase") loadAll();
    });

    loadAll();
  </script>
</body>

</html>
