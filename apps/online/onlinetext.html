<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Playback App</title>
    <link rel="stylesheet" href="../assets/css/online.css">
    <style>
        main {
            font-family: 'Verdana', sans-serif;
            text-align: center;
            background-color: #333;
            color: white;
            max-width: 1000px;
            margin: 0 auto;
        }

        #display {
            font-size: 2em;
            font-weight: bold;
            margin: 40px 0;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: yellow;
        }

        #controls {
            margin: 20px;
        }

        #fullText {
            margin-top: 20px;
            padding: 10px;
            border-top: 1px solid #ddd;
            text-align: left;
            font-size: 1em;
            color: white;
        }

        .slider-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .slider-container input[type="range"] {
            width: 200px;
        }

        .highlight {
            color: yellow;
        }

        textarea {
            max-width: 90%
        }
    </style>
</head>

<body>
    <header style="position:relative;">
        <div class="logo-box"><a href="../../index.html"><img src="../../assets/img/android-chrome-192x192.png"
                    alt="Luis Solutions"></a></div>
        <h1>Text Playback App</h1>
        <div class="auth-bar"><span id="auth-label">Not signed in</span><button id="auth-btn">Sign In</button></div>
        <button id="theme-toggle" title="Toggle theme">☀️</button>
        <script>(function () { var b = document.getElementById("theme-toggle"), h = document.documentElement; b.textContent = h.classList.contains("light") ? "🌙" : "☀️"; b.addEventListener("click", function () { var n = h.classList.contains("light") ? "dark" : "light"; h.classList.toggle("light", n === "light"); localStorage.setItem("ss-theme", n); b.textContent = n === "light" ? "🌙" : "☀️"; }); })();</script>
        <div id="login-inline">
            <h3>Sign In</h3><input type="email" id="email-in" placeholder="Email" /><input type="password" id="pass-in"
                placeholder="Password" /><button id="do-login">Sign In</button>
            <p id="auth-err"></p>
        </div>
    </header>
    <main>
        <div>
            <label for="savedTexts">Saved Texts:</label>
            <select id="savedTexts">
                <option value="">Select a saved text</option>
            </select>
            <button id="deleteTextButton" disabled>Delete Text</button>
        </div>
        <div id="display">Text will appear here</div>
        <div id="controls">
            <button id="startPauseButton">Start</button>
            <button id="resetButton">Reset</button>
            <div class="slider-container">
                <label for="speedSlider">Speed:</label>
                <input type="range" id="speedSlider" min="100" max="1000" value="300" step="25">
                <span id="speedValue">300 WPM</span>
            </div>
            <div>
                <label for="wordGroup">Words at a Time:</label>
                <select id="wordGroup">
                    <option value="1" selected>1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                    <option value="7">7</option>
                    <option value="8">8</option>
                    <option value="9">9</option>
                    <option value="10">10</option>
                </select>
            </div>
        </div>
        <div>
            <textarea id="textInput" rows="5" cols="50" placeholder="Paste your text here..."></textarea>
            <br>
            <button id="saveTextButton">Save Text</button>
            <button id="clearTextButton">Clear Text</button>
        </div>
        <br>
        <div id="fullText"></div>
    </main>
    <script type="module" src="../assets/js/auth.js"></script>
    <script src="../assets/js/links-aside.js" defer></script>
    <script type="module">
        import { getDatabase, ref, set, push, onValue, remove, auth, onAuthStateChanged } from '../assets/js/firebase-init.js';

        const database = getDatabase();
        // Scope saved texts to the signed-in user; fall back to shared public node when signed out.
        let DB = 'public';
        let unsubTexts = null;

        function escHtml(s) {
            return String(s ?? '').replace(/[&<>"']/g, c => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'
            }[c]));
        }

        const textInput = document.getElementById('textInput');
        const saveTextButton = document.getElementById('saveTextButton');
        const savedTexts = document.getElementById('savedTexts');
        const startPauseButton = document.getElementById('startPauseButton');
        const resetButton = document.getElementById('resetButton');
        const speedSlider = document.getElementById('speedSlider');
        const speedValue = document.getElementById('speedValue');
        const wordGroup = document.getElementById('wordGroup');
        const display = document.getElementById('display');
        const fullText = document.getElementById('fullText');
        const deleteTextButton = document.getElementById('deleteTextButton');
        const clearTextButton = document.getElementById('clearTextButton');

        let words = [];
        let currentIndex = 0;
        let timer = null;
        const isPlaying = { status: false };

        function togglePlayPause() {
            if (isPlaying.status) {
                pausePlayback();
            } else {
                startPlayback();
            }
        }

        function saveSettings() {
            const settings = {
                speedWpm: speedSlider.value,
                wordGroup: wordGroup.value,
                selectedText: savedTexts.value,
                textInput: textInput.value,
            };
            localStorage.setItem('textPlaybackSettings', JSON.stringify(settings));
        }

        function loadSettings() {
            const savedSettings = JSON.parse(localStorage.getItem('textPlaybackSettings') || '{}');
            if (savedSettings.speedWpm) {
                speedSlider.value = savedSettings.speedWpm;
            }
            if (savedSettings.wordGroup) {
                wordGroup.value = savedSettings.wordGroup;
            }
            if (savedSettings.selectedText) {
                savedTexts.value = savedSettings.selectedText;
                deleteTextButton.disabled = !savedTexts.value;
            }
            if (savedSettings.textInput) {
                textInput.value = savedSettings.textInput;
            } else if (savedSettings.selectedText) {
                const selectedTextRef = ref(database, `${DB}/texts/${savedSettings.selectedText}`);
                onValue(selectedTextRef, (snapshot) => {
                    if (snapshot.exists()) {
                        textInput.value = snapshot.val().text;
                    }
                }, { onlyOnce: true });
            }
        }

        function fetchSavedTexts() {
            if (unsubTexts) unsubTexts();
            unsubTexts = onValue(ref(database, `${DB}/texts`), (snapshot) => {
                savedTexts.innerHTML = '<option value="">Select a saved text</option>';
                const data = snapshot.val();
                if (data) {
                    for (const key in data) {
                        const option = document.createElement('option');
                        option.value = key;
                        option.textContent = data[key].text.substring(0, 30) + '...';
                        savedTexts.appendChild(option);
                    }
                }
                const savedSettings = JSON.parse(localStorage.getItem('textPlaybackSettings') || '{}');
                if (savedSettings?.selectedText) {
                    savedTexts.value = savedSettings.selectedText;
                }
            });
        }

        function startPlayback() {
            if (!textInput.value.trim()) {
                return;
            }

            if (!words.length) {
                words = textInput.value.trim().split(/\s+/);
                fullText.textContent = textInput.value;
                currentIndex = 0;
            } else if (currentIndex >= words.length) {
                currentIndex = 0; // finished last time - rewind
            }

            isPlaying.status = true;
            startPauseButton.textContent = "Pause";

            if (timer === null) {
                playStep();
            }
        }

        function pausePlayback() {
            clearTimeout(timer);
            timer = null;
            isPlaying.status = false;
            startPauseButton.textContent = "Start";
        }

        function resetPlayback() {
            clearTimeout(timer);
            timer = null;
            words = [];
            currentIndex = 0;
            display.textContent = 'Text will appear here';
            isPlaying.status = false;
            startPauseButton.textContent = "Start";
        }

        // Delay for one group at the current WPM; linger on punctuation.
        function groupDelay(group) {
            const wpm = parseInt(speedSlider.value, 10);
            let delay = group.length * (60000 / wpm);
            const last = group[group.length - 1] || '';
            if (/[.!?]["')\]]?$/.test(last)) {
                delay *= 1.6;
            } else if (/[,;:]["')\]]?$/.test(last)) {
                delay *= 1.3;
            }
            return delay;
        }

        function playStep() {
            const groupSize = parseInt(wordGroup.value, 10);
            const group = words.slice(currentIndex, currentIndex + groupSize);
            display.textContent = group.join(' ');
            highlightWords(currentIndex, group.length);
            currentIndex += group.length;

            if (currentIndex >= words.length) {
                timer = null;
                isPlaying.status = false;
                startPauseButton.textContent = "Start";
                return;
            }
            timer = setTimeout(playStep, groupDelay(group));
        }

        function highlightWords(startIndex, groupSize) {
            const highlightedWords = words.map((word, index) => {
                if (index >= startIndex && index < startIndex + groupSize) {
                    return `<span class="highlight">${escHtml(word)}</span>`;
                }
                return escHtml(word);
            });

            fullText.innerHTML = highlightedWords.join(' ');
        }

        function updateSpeedDisplay() {
            speedValue.textContent = `${speedSlider.value} WPM`;
        }

        saveTextButton.addEventListener('click', () => {
            const text = textInput.value.trim();
            if (text) {
                const newTextRef = push(ref(database, `${DB}/texts`));
                set(newTextRef, { text }).then(() => {
                    alert('Text saved successfully.');
                    textInput.value = '';
                    saveSettings();
                });
            }
        });

        savedTexts.addEventListener('change', () => {
            const selectedKey = savedTexts.value;
            if (selectedKey) {
                const selectedTextRef = ref(database, `${DB}/texts/${selectedKey}`);
                onValue(selectedTextRef, (snapshot) => {
                    if (snapshot.exists()) {
                        textInput.value = snapshot.val().text;

                        words = [];
                        currentIndex = 0;
                        display.textContent = 'Text will appear here';
                        fullText.textContent = textInput.value;

                        saveSettings();
                    }
                }, { onlyOnce: true });
            }

            deleteTextButton.disabled = !savedTexts.value;
        });

        deleteTextButton.addEventListener('click', () => {
            const selectedKey = savedTexts.value;
            if (selectedKey) {
                const selectedTextRef = ref(database, `${DB}/texts/${selectedKey}`);
                remove(selectedTextRef).then(() => {
                    alert('Text deleted successfully.');
                    fetchSavedTexts();
                    savedTexts.value = '';
                }).catch(error => {
                    console.error('Error deleting text: ', error);
                });
            }
        });

        // On live speed/group changes, reschedule the next step at the new pace.
        function reschedule() {
            if (isPlaying.status) {
                clearTimeout(timer);
                timer = setTimeout(playStep, 250);
            }
        }

        wordGroup.addEventListener('change', () => {
            saveSettings();
            reschedule();
        });

        speedSlider.addEventListener('input', () => {
            updateSpeedDisplay();
            saveSettings();
            reschedule();
        });

        document.addEventListener('DOMContentLoaded', () => {
            loadSettings();
            updateSpeedDisplay();
        });

        // Re-point the DB base path on auth changes and refresh the saved-text list.
        onAuthStateChanged(auth, (user) => {
            DB = user ? user.uid : 'public';
            fetchSavedTexts();
        });

        startPauseButton.addEventListener('click', () => {
            togglePlayPause();
            saveSettings();
        });

        clearTextButton.addEventListener('click', () => {
            textInput.value = '';
            words = [];
            currentIndex = 0;
            display.textContent = 'Text will appear here';
            fullText.innerHTML = '';
            saveSettings();
        });

        resetButton.addEventListener('click', resetPlayback);
    </script>
</body>

</html>
