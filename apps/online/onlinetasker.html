<!doctype html>
<html lang="en">
  <head>
    <title>Online Task Manager</title>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="../../assets/css/app-styles.css"
      id="stylesheet"
    />
    <script type="module" src="../assets/js/login.js"></script>
    <script src="../assets/js/search.js" defer></script>
    <style>
      @media (max-width: 768px) {
        input,
        button,
        textarea {
          width: 95%;
                  width: -webkit-fill-available;
        }

        header button,
        .checkbox input {
          width: auto;
        }
      }

      #currentTaskTime {
        display: inline;
      }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip-utils/0.1.0/jszip-utils.min.js"></script>
  </head>

  <body>
    <header>
      <h1>Online Task Manager</h1>
      <section id="login-section">
        <form id="login-form">
          <label for="username">Email:</label>
          <input type="email" id="username" required />
          <br />
          <label for="password">Password:</label>
          <input type="password" id="password" required />
          <br />
          <button type="submit">Login</button>
        </form>
        <button id="logout" style="display: none">Logout</button>
        <div class="ms" style="display: none">
          <button id="loginButton">Login to Microsoft</button>
          <button id="logoutButton">Logout of Microsoft</button>
        </div>
      </section>
      <div id="wbutton">
        <button id="goToBottomBtn">⤓</button>
      </div>
    </header>

    <main>
      <section id="task-manager" class="app-section">
        <div style="display: none">
          <label for="yearSelect">Select Year:</label>
          <select id="yearSelect">
            <option value="" disabled selected>Select Year</option>
          </select>
        </div>

        <div>
          <label for="taskSelect">Select Task:</label>
          <select id="taskSelect">
            <option value="" disabled selected>Select Task</option>
          </select>
        </div>

        <div>
          <div class="name-column-input">
            <input
              type="text"
              id="taskName"
              placeholder="Name"
              maxlength="40"
            />
          </div>
          <div class="project-column-input">
            <input
              type="text"
              id="project"
              placeholder="Project"
              maxlength="40"
            />
          </div>
          <div class="start-odometer-column-input odometer-input">
            <input
              type="number"
              id="startOdometer"
              placeholder="Start Odometer"
            />
          </div>
          <div class="end-odometer-column-input odometer-input">
            <input
              type="number"
              id="endOdometer"
              placeholder="End Odometer"
              disabled
            />
          </div>
          <div class="address-column-input">
            <input
              type="text"
              id="customerAddress"
              placeholder="Address"
              maxlength="60"
            />
          </div>
          <div class="notes-column-input">
            <textarea id="taskNotes" placeholder="Notes"></textarea>
          </div>
          <button id="updateTaskBtn" style="display: none">Update Task</button>
          <button id="toggleTimer">Start/Stop Timer</button>
          <button id="startTravelBtn">Start Travel</button>
          <button id="startWorkBtn">Start Work</button>
          <div>Timer: <span id="currentTaskTime">00:00:00</span></div>
          <div id="segmentSummary"></div>
        </div>

        <div id="imageUploadSection" class="hidden">
          <p>Images for Task</p>
          <input type="file" id="fileUploader" accept="image/*" />
          <br />
          <input
            type="text"
            id="imageNameInput"
            placeholder="Enter Image Name"
          />
          <input type="text" id="markupTextInput" placeholder="Markup Text" />
          <br />
          <button id="uploadButton">Upload Image</button>
          <br />
          <br />
          <label for="imageSelect">Existing Images:</label>
          <select id="imageSelect">
            <option value="" disabled selected>Select Image</option>
          </select>
          <div id="loadingIndicator" style="display: none">
            Loading images...
          </div>
          <div class="photoGrid">
            <div id="photoContainer"></div>
            <div id="paginationControls"></div>
          </div>
          <button id="deleteImageButton">Delete Selected Image</button>
          <button id="downloadAllImagesBtn">Download All Images</button>
        </div>

        <div>
          <br />
          <label for="searchTask"
            ><span id="totalTasks">0</span> Tasks:</label
          >
          <input type="text" id="searchTask" />
        </div>

        <div class="checkbox">
          <label style="display: none"
            ><input
              type="checkbox"
              class="toggle-column"
              value="name-column"
              checked
            />
            Name</label
          >
          <label
            ><input
              type="checkbox"
              class="toggle-column"
              value="project-column"
              checked
            />
            Project |</label
          >
          <label
            ><input
              type="checkbox"
              class="toggle-column"
              value="address-column"
            />
            Address |</label
          >
          <label
            ><input
              type="checkbox"
              class="toggle-column"
              value="odometer-column"
            />
            Mileage |</label
          >
          <label
            ><input
              type="checkbox"
              class="toggle-column"
              value="location-column"
            />
            Location |</label
          >
          <label
            ><input
              type="checkbox"
              class="toggle-column"
              value="start-time-column"
              checked
            />
            Start Time |</label
          >
          <label
            ><input
              type="checkbox"
              class="toggle-column"
              value="end-time-column"
              checked
            />
            End Time |</label
          >
          <label
            ><input
              type="checkbox"
              class="toggle-column"
              value="length-column"
              checked
            />
            Length |</label
          >
          <label
            ><input
              type="checkbox"
              class="toggle-column"
              value="notes-column"
              checked
            />
            Notes</label
          >
        </div>

        <div class="table">
          <table id="task-log">
            <thead>
              <tr>
                <th class="name-column">Name</th>
                <th class="project-column">Project</th>
                <th class="address-column">Address</th>
                <th class="start-odometer-column odometer-column">
                  Start Odometer
                </th>
                <th class="end-odometer-column odometer-column">
                  End Odometer
                </th>
                <th class="distance-column odometer-column">Distance</th>
                <th class="location-column">Location</th>
                <th class="start-time-column">Start Time</th>
                <th class="end-time-column">End Time</th>
                <th class="length-column">Length</th>
                <th class="notes-column">Notes</th>
                <th class="actions-column">Actions</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>

        <div>
          <h3>Hours (last 14 days):</h3>
          <span id="dailyTimeSpent"></span>
        </div>

        <div><b>Total Hours (all time): </b><span id="totalHours">0</span></div>
        <div id="date-range-picker" class="app-section">
          <h3>Hours Between Dates:</h3>
          <label for="startDate">Start:</label>
          <input type="datetime-local" id="startDate" />
          <label for="endDate">End:</label>
          <input type="datetime-local" id="endDate" />
          <button id="calculateHoursBtn">Calculate Hours</button>
          <div>
            Total Hours Between Dates: <span id="calculatedHours">0</span>
          </div>
        </div>

        <div id="buttons"></div>

        <button id="goToTopBtn">Go to Top ⤒</button>
        <button id="populateOneNoteBtn">Populate OneNote</button>
      </section>
    </main>

    <script type="module">
      import {
        auth,
        onAuthStateChanged,
        database,
        ref,
        set,
        get,
        push,
        onValue,
        remove,
        update,
        uploadBytesResumable,
        getDownloadURL,
        deleteObject,
        listAll,
        getStorage,
        storageRef,
        storage,
      } from "../assets/js/firebase-init.js";

      let DATABASE_BASE_PATH = "public";

      onAuthStateChanged(auth, (user) => {
        DATABASE_BASE_PATH = user ? `${user.uid}` : "public";
        loadTasks();
      });

      const taskNameInput = document.getElementById("taskName");
      const projectInput = document.getElementById("project");
      const customerAddressInput = document.getElementById("customerAddress");
      const taskNotesTextarea = document.getElementById("taskNotes");
      const startOdometerInput = document.getElementById("startOdometer");
      const endOdometerInput = document.getElementById("endOdometer");
      const toggleTimerBtn = document.getElementById("toggleTimer");
      const taskLogTable = document
        .getElementById("task-log")
        .getElementsByTagName("tbody")[0];
      const totalHoursSpan = document.getElementById("totalHours");
      const currentTaskTimeDisplay = document.getElementById("currentTaskTime");
      const deleteImageButton = document.getElementById("deleteImageButton");
      const updateTaskBtn = document.getElementById("updateTaskBtn");
      const startTravelBtn = document.getElementById("startTravelBtn");
      const startWorkBtn = document.getElementById("startWorkBtn");
      const searchTaskInput = document.getElementById("searchTask");
      const taskSearchHelper = window.SearchEngine?.attachAuto
        ? window.SearchEngine.attachAuto(searchTaskInput, {
            placeholderAdvanced:
              '🔎... e.g. name:"acme" project:roof -notes:"cancel"',
          })
        : null;

      if (!taskSearchHelper && searchTaskInput) {
        searchTaskInput.title =
          "Basic search only. Load ./assets/js/search.js for operators.";
      }
      const segmentSummary = document.getElementById("segmentSummary");
      const fileUploader = document.getElementById("fileUploader");
      const imageNameInput = document.getElementById("imageNameInput");
      const uploadButton = document.getElementById("uploadButton");
      const loadingIndicator = document.getElementById("loadingIndicator");
      const markupTextInput = document.getElementById("markupTextInput");
      const CALC_DEADLINE_MS = 60_000;

      let sortOrder = "asc";
      let currentTask = null;
      let timerInterval = null;
      let currentTaskId = null;
      let imageUrls = [];
      let currentPage = 1;
      let imagesPerPage = 6;
      let totalPages = 0;
      let unsubscribeTasks = null;
      let isShowingAll = false;

      // === Watchdog / Date helpers ===

      function snapTo15Minutes(date) {
        const snapped = new Date(date);
        let minutes = snapped.getMinutes();

        let snappedMinutes = Math.ceil(minutes / 15) * 15;

        if (snappedMinutes === 60) {
          snapped.setHours(snapped.getHours() + 1);
          snappedMinutes = 0;
        }

        snapped.setMinutes(snappedMinutes);
        snapped.setSeconds(0);
        snapped.setMilliseconds(0);

        return snapped;
      }

      function isValidDate(d) {
        return d instanceof Date && !isNaN(d.getTime());
      }
      function safeDate(value) {
        const d = new Date(value);
        return isValidDate(d) ? d : null;
      }

      function ensureSegments(task) {
        if (!task) return [];
        if (!Array.isArray(task.segments)) task.segments = [];
        return task.segments;
      }

      function getSegmentNow() {
        return snapTo15Minutes(new Date()).toISOString();
      }

      function closeActiveSegment(task) {
        const segments = ensureSegments(task);
        for (let i = segments.length - 1; i >= 0; i--) {
          if (!segments[i].endTime) {
            segments[i].endTime = getSegmentNow();
            break;
          }
        }
      }

      function startSegment(type) {
        if (currentTask && currentTask.endTime) {
          alert(
            "This job is already completed. Start a new task to add segments.",
          );
          return;
        }

        if (!currentTask) {
          startTask(type);
          return;
        }

        closeActiveSegment(currentTask);
        ensureSegments(currentTask).push({
          type,
          startTime: getSegmentNow(),
          endTime: null,
        });
        saveTask(currentTask);
        updateSegmentSummary();
      }

      function formatDuration(ms) {
        const totalSeconds = Math.max(0, Math.floor(ms / 1000));
        const hours = Math.floor(totalSeconds / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        return `${hours}h ${minutes}m`;
      }

      function updateSegmentSummary() {
        if (!segmentSummary) return;
        if (!currentTask) {
          segmentSummary.textContent = "";
          return;
        }

        const segments = ensureSegments(currentTask);
        if (!segments.length) {
          segmentSummary.textContent = "No travel/work segments yet.";
          return;
        }

        const totals = segments.reduce(
          (acc, seg) => {
            const end = seg.endTime ? new Date(seg.endTime) : new Date();
            const start = new Date(seg.startTime);
            const diff = Math.max(0, end - start);
            if (seg.type === "travel") acc.travel += diff;
            if (seg.type === "work") acc.work += diff;
            return acc;
          },
          { travel: 0, work: 0 },
        );

        const list = segments
          .map((seg) => {
            const start = new Date(seg.startTime).toLocaleTimeString();
            const end = seg.endTime
              ? new Date(seg.endTime).toLocaleTimeString()
              : "In progress";
            return `${seg.type.toUpperCase()} • ${start} → ${end}`;
          })
          .join(" | ");

        segmentSummary.textContent = `Travel: ${formatDuration(totals.travel)} • Work: ${formatDuration(totals.work)} | ${list}`;
      }

      document.querySelectorAll(".toggle-column").forEach((checkbox) => {
        checkbox.addEventListener("change", toggleColumnVisibility);
      });

      function toggleTimer() {
        if (currentTask) {
          endTask();
        } else {
          const taskName = taskNameInput.value.trim();
          if (taskName) {
            startTask();
          } else {
            const enteredTaskName = prompt(
              "Please enter a task name to start the timer:",
            );
            if (enteredTaskName) {
              taskNameInput.value = enteredTaskName;
              startTask();
            }
          }
        }
      }

      function startTask(initialSegmentType = null) {
        const taskName = taskNameInput.value.trim();
        const project = projectInput.value.trim();
        const startOdometer = startOdometerInput.value.trim();
        const customerAddress = customerAddressInput.value.trim();

        const handleTaskStart = (location) => {
          currentTask = {
            id: Date.now().toString(),
            customerName: taskName,
            project: project,
            customerAddress: customerAddress,
            notes: taskNotesTextarea.value.trim(),
            startOdometer,
            endOdometer: null,
            location,
            startTime: snapTo15Minutes(new Date()).toISOString(),
            endTime: null,
            segments: [],
          };

          if (initialSegmentType) {
            currentTask.segments.push({
              type: initialSegmentType,
              startTime: getSegmentNow(),
              endTime: null,
            });
          }
          saveTask(currentTask);
          timerInterval = setInterval(updateCurrentTaskTime, 1000);
          endOdometerInput.disabled = false;
          updateSegmentSummary();
        };

        if (typeof getGeolocation === "function") {
          getGeolocation((location) => {
            handleTaskStart(location);
          });
        } else {
          const fallbackLocation = { latitude: "NA", longitude: "NA" };
          handleTaskStart(fallbackLocation);
        }
      }

      function endTask() {
        clearInterval(timerInterval);
        closeActiveSegment(currentTask);
        currentTask.endOdometer = endOdometerInput.value.trim();
        currentTask.endTime = snapTo15Minutes(new Date()).toISOString();
        currentTask.notes = taskNotesTextarea.value.trim();
        currentTask.customerAddress = customerAddressInput.value.trim();
        currentTask.project = projectInput.value.trim();
        saveTask(currentTask);
        updateTaskInTable(currentTask);
        updateSegmentSummary();
        resetTimerState();
        updateTotalHours(allTasks);
        applyColumnVisibility();
        clearTaskImages();
      }

      function clearTaskImages() {
        imageUrls = [];
        imageSelect.innerHTML =
          '<option value="" disabled selected>Select Image</option>';
        photoContainer.innerHTML = "";
        paginationControls.innerHTML = "";
        fileUploader.value = "";
        imageNameInput.value = "";
        markupTextInput.value = "";
      }

      function saveTask(task) {
        const taskRef = ref(database, `${DATABASE_BASE_PATH}/tasks/${task.id}`);
        set(taskRef, task);
      }

      function updateTaskInTable(task) {
        const key = task.id;
        const existingRow = document.querySelector(`[data-task-id="${key}"]`);
        if (existingRow) {
          updateRow(existingRow, task);
        } else {
          addTaskToTable(task);
        }
      }

      function addTaskToTable(task) {
        const row = taskLogTable.insertRow();
        row.dataset.taskId = task.id;
        updateRow(row, task);
        applyColumnVisibility();
      }

      function updateRow(row, task) {
        const key = task.id;
        row.dataset.taskId = key;

        row.innerHTML = "";

        const nameCell = row.insertCell(0);
        const projectCell = row.insertCell(1);
        const addressCell = row.insertCell(2);
        const startOdometerCell = row.insertCell(3);
        const endOdometerCell = row.insertCell(4);
        const distanceCell = row.insertCell(5);
        const locationCell = row.insertCell(6);
        const startTimeCell = row.insertCell(7);
        const endTimeCell = row.insertCell(8);
        const lengthCell = row.insertCell(9);
        const notesCell = row.insertCell(10);
        const actionsCell = row.insertCell(11);

        nameCell.classList.add("name-column");
        projectCell.classList.add("project-column");
        addressCell.classList.add("address-column");
        startOdometerCell.classList.add(
          "start-odometer-column",
          "odometer-column",
        );
        endOdometerCell.classList.add("end-odometer-column", "odometer-column");
        distanceCell.classList.add("distance-column", "odometer-column");
        locationCell.classList.add("location-column");
        startTimeCell.classList.add("start-time-column");
        endTimeCell.classList.add("end-time-column");
        lengthCell.classList.add("length-column");
        notesCell.classList.add("notes-column");

        nameCell.innerText = task.customerName || "";
        projectCell.innerText = task.project || "";
        startOdometerCell.innerText = task.startOdometer || "";
        endOdometerCell.innerText = task.endOdometer || "";
        distanceCell.innerText = task.endOdometer
          ? calculateDistance(task.startOdometer, task.endOdometer)
          : "";
        locationCell.innerText = task.location
          ? `Lat: ${task.location.latitude} Long: ${task.location.longitude}`
          : "";
        startTimeCell.innerText = task.startTime
          ? formatDateTime(task.startTime)
          : "";
        endTimeCell.innerText = task.endTime
          ? formatDateTime(task.endTime)
          : "";
        lengthCell.innerText = task.endTime ? calculateTaskLength(task) : "";
        notesCell.innerText = task.notes || "";

        if (task.customerAddress) {
          const addressLink = document.createElement("a");
          const appleMapsUrl = `https://maps.apple.com/?address=${encodeURIComponent(task.customerAddress)}`;
          addressLink.href = appleMapsUrl;
          addressLink.target = "_blank";
          addressLink.innerText = task.customerAddress;
          addressCell.appendChild(addressLink);
        } else {
          addressCell.innerText = "";
        }

        const loadTaskButton = document.createElement("button");
        loadTaskButton.innerText = "Load";

        loadTaskButton.addEventListener("click", () => {
          loadTaskForEditing(key);
          window.scrollTo({
            top: 0,
            behavior: "smooth",
          });
        });
        actionsCell.appendChild(loadTaskButton);

        nameCell.contentEditable = true;
        projectCell.contentEditable = true;
        startOdometerCell.contentEditable = true;
        endOdometerCell.contentEditable = true;
        startTimeCell.contentEditable = true;
        endTimeCell.contentEditable = true;
        notesCell.contentEditable = true;

        nameCell.addEventListener("blur", () =>
          updateTaskField(key, "customerName", nameCell.innerText),
        );
        projectCell.addEventListener("blur", () =>
          updateTaskField(key, "project", projectCell.innerText),
        );
        startOdometerCell.addEventListener("blur", () =>
          updateTaskField(key, "startOdometer", startOdometerCell.innerText),
        );
        endOdometerCell.addEventListener("blur", () =>
          updateTaskField(key, "endOdometer", endOdometerCell.innerText),
        );
        startTimeCell.addEventListener("blur", () =>
          updateTaskField(
            key,
            "startTime",
            snapTo15Minutes(new Date(startTimeCell.innerText)).toISOString(),
          ),
        );
        endTimeCell.addEventListener("blur", () =>
          updateTaskField(
            key,
            "endTime",
            snapTo15Minutes(new Date(endTimeCell.innerText)).toISOString(),
          ),
        );
        notesCell.addEventListener("blur", () =>
          updateTaskField(key, "notes", notesCell.innerText),
        );

        const deleteButton = document.createElement("button");
        deleteButton.classList.add("clear-button");
        deleteButton.innerText = "Delete";
        deleteButton.addEventListener("click", () =>
          confirmDeleteTask(key, row),
        );
        actionsCell.appendChild(deleteButton);

        enableClickCopy(row);
      }

      async function loadTaskForEditing(taskKey) {
        currentTaskId = taskKey;
        const taskRef = ref(database, `${DATABASE_BASE_PATH}/tasks/${taskKey}`);

        const snapshot = await get(taskRef);
        if (snapshot.exists()) {
          const task = snapshot.val();
          task.id = task.id || taskKey;
          currentTask = task;
          taskNameInput.value = task.customerName || "";
          projectInput.value = task.project || "";
          taskNotesTextarea.value = task.notes || "";
          startOdometerInput.value = task.startOdometer || "";
          endOdometerInput.value = task.endOdometer || "";
          customerAddressInput.value = task.customerAddress || "";
          endOdometerInput.disabled = task.endOdometer == null;

          clearInterval(timerInterval);
          if (!task.endTime) {
            timerInterval = setInterval(updateCurrentTaskTime, 1000);
          }

          updateSegmentSummary();

          loadTaskImages(task.project);
          changeTimerButtonToRefresh();
          updateTaskBtn.style.display = "inline-block";
        } else {
          console.error("Task not found");
        }
      }

      function changeTimerButtonToRefresh() {
        toggleTimerBtn.removeEventListener("click", toggleTimer);

        toggleTimerBtn.innerText = "Refresh Page";

        toggleTimerBtn.addEventListener("click", () => {
          location.reload();
        });
      }

      function confirmDeleteTask(taskId, row) {
        if (confirm("Are you sure you want to delete this task?")) {
          deleteTask(taskId, row);
        }
      }

      function deleteTask(taskId, row) {
        const taskRef = ref(database, `${DATABASE_BASE_PATH}/tasks/${taskId}`);
        remove(taskRef)
          .then(() => {
            if (row && row.parentNode) {
              row.parentNode.removeChild(row);
            }
            updateTotalHours(allTasks);
            applySearchFilter();
          })
          .catch((error) => {
            console.error("Error removing task:", error);
          });
      }

      function calculateTaskLength(task) {
        const startTime = new Date(task.startTime);
        const endTime = task.endTime ? new Date(task.endTime) : new Date();

        const maxAllowedSeconds = 60 * 60 * 24 * 365 * 10;
        const lengthInSeconds = (endTime - startTime) / 1000;

        if (Math.abs(lengthInSeconds) > maxAllowedSeconds) {
          console.warn("⚠️ Task duration exceeds 10 years.");
          return "More than 10 years";
        }

        const isNegative = lengthInSeconds < 0;
        const absSeconds = Math.abs(lengthInSeconds);

        const hours = Math.floor(absSeconds / 3600);
        const minutes = Math.floor((absSeconds % 3600) / 60);
        const seconds = Math.floor(absSeconds % 60);
        const decimalHours = (lengthInSeconds / 3600).toFixed(2);

        const prefix = isNegative ? "-" : "";

        return `${prefix}${String(hours).padStart(2, "0")}:${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")} (${decimalHours})`;
      }

      function calculateDistance(startOdometer, endOdometer) {
        const start = parseFloat(startOdometer);
        const end = parseFloat(endOdometer);

        if (isNaN(start) || isNaN(end)) return "";

        return (end - start).toFixed(1);
      }

      function formatDateTime(dateTime) {
        const date = new Date(dateTime);
        return `${date.toLocaleDateString()} ${date.toLocaleTimeString()}`;
      }

      function updateCurrentTaskTime() {
        if (!currentTask || !currentTask.startTime) return;

        const startTime = new Date(currentTask.startTime);
        const now = new Date();

        const timeDifference = (now - startTime) / 1000;
        const maxAllowedSeconds = 60 * 60 * 24 * 365 * 10;

        if (timeDifference > maxAllowedSeconds) {
          console.warn("⚠️ Skipping update due to excessive time difference.");
          currentTaskTimeDisplay.innerText = "Too Long (10+ years)";
          return;
        }

        const taskLength = calculateTaskLength({
          startTime: currentTask.startTime,
          endTime: snapTo15Minutes(now).toISOString(),

      function sortTableByColumn(columnIndex, order = "asc") {
        const rows = Array.from(taskLogTable.querySelectorAll("tr"));

        rows.sort((a, b) => {

          const bText = b.cells[columnIndex]?.innerText.trim() || "";

          const aDate = new Date(aText);
          const bDate = new Date(bText);

          let comparison;

          if (!isNaN(aDate) && !isNaN(bDate)) {
            comparison = aDate - bDate;
          } else {
            comparison = aText.localeCompare(bText);

          return order === "asc" ? comparison : -comparison;

      function calculateDailyTimeSpent(tasks) {
        const dailyTimeSpent = {};
        const t0 = performance.now();

        for (const task of tasks) {
          // Deadline: stop processing this function after 60s total
          if (performance.now() - t0 > CALC_DEADLINE_MS) {
            console.warn(
              "⏳ Daily time calc hit 60s deadline — continuing without remaining tasks.",
            );
            break;
          }

          if (!task.startTime || !task.endTime) continue;
          let startTime = safeDate(task.startTime);
          let endTime = safeDate(task.endTime);

          if (!startTime || !endTime) continue;
          if (endTime < startTime) {
            // Swap if reversed (odd entry)
            const tmp = startTime;
            startTime = endTime;
            endTime = tmp;
          }

          // Hard cap to avoid absurd spans
          const maxSpanMs = 10 * 365 * 24 * 60 * 60 * 1000; // 10 years
          if (endTime - startTime > maxSpanMs) {
            console.warn("⚠️ Skipping task >10 years:", task.id);
            continue;
          }

          // Normalize to local-time boundaries by working in UTC but stepping by days safely
          // Safety: ensure the loop always advances; if not, break to avoid infinite loops.
          let guardSteps = 0;
          const GUARD_MAX_STEPS = 4000; // ~11 years of days; well under our 10y cap

          while (startTime < endTime) {
            // Check the global deadline inside the loop
            if (performance.now() - t0 > CALC_DEADLINE_MS) {
              console.warn("⏳ Per-task loop hit 30s deadline — breaking out.");
              break;
            }
            if (++guardSteps > GUARD_MAX_STEPS) {
              console.warn(
                "🧯 Loop guard tripped (too many day-steps) for task:",
                task.id,
              );
              break;
            }

            const currentDate = new Date(startTime);
            const dateKey = currentDate.toISOString().split("T")[0];

            const nextDay = new Date(
              Date.UTC(
                currentDate.getUTCFullYear(),
                currentDate.getUTCMonth(),
                currentDate.getUTCDate() + 1,
                0,
                0,
                0,
                0,
              ),
            );

            let endOfSlice = nextDay < endTime ? nextDay : endTime;

            // Safety: ensure forward progress (timezone / NaN edge cases)
            if (!isValidDate(endOfSlice) || endOfSlice <= startTime) {
              // Nudge by 1 second to guarantee progress
              endOfSlice = new Date(startTime.getTime() + 1000);
              if (endOfSlice > endTime) endOfSlice = endTime;
            }

            const durationInSeconds = Math.max(
              0,
              (endOfSlice - startTime) / 1000,
            );
            if (durationInSeconds > 0) {
              dailyTimeSpent[dateKey] =
                (dailyTimeSpent[dateKey] || 0) + durationInSeconds;
            }

            startTime = endOfSlice;
          }
        }

        return dailyTimeSpent;
      }

      function displayDailyTimeSpent(dailyTimeSpent) {
        const dailyTimeContainer = document.getElementById("dailyTimeSpent");
        dailyTimeContainer.innerHTML = "";

        const today = new Date();
        const pastDate = new Date(today);
        pastDate.setDate(today.getDate() - 15);

        const sortedDates = Object.keys(dailyTimeSpent)
          .map((date) => new Date(date))
          .filter((date) => date >= pastDate)
          .sort((a, b) => a - b);

        sortedDates.forEach((date) => {
          const dateString = date.toISOString().split("T")[0];
          const totalSeconds = dailyTimeSpent[dateString];
          const hours = Math.floor(totalSeconds / 3600);
          const minutes = Math.floor((totalSeconds % 3600) / 60);
          const decimalHours = (totalSeconds / 3600).toFixed(2);

          const dateElement = document.createElement("div");
          dateElement.innerText = `Date: ${dateString} - Time: ${hours} hours, ${minutes} min (${decimalHours})`;
          dailyTimeContainer.appendChild(dateElement);
        });
      }

      function exportData() {
        const table = document.getElementById("task-log");

          .filter(
            (th) =>

              th.style.display !== "none",
          )
          .map((th) => th.textContent.trim());

        const headerIndexes = Array.from(table.querySelectorAll("thead th"))
          .map((th, idx) => ({ text: th.textContent.trim(), idx }))
          .filter(({ idx }) => {
            const th = table.querySelectorAll("thead th")[idx];
            return (
              !th.classList.contains("actions-column") &&
              th.style.display !== "none"
            );
          })
          .map(({ idx }) => idx);

        const allRows = Array.from(table.querySelectorAll("tbody tr"));
        const visibleRows = allRows.filter(
          (row) => row.style.display !== "none",
        );

        const rows = visibleRows.map((row) => {
          const cells = Array.from(row.cells);
          return headerIndexes.map((i) => {
            const cell = cells[i];
            return cell
              ? cell.textContent.replace(/\r?\n|\r/g, " ").trim()
              : "";
          });
        });

        rows.unshift(headers);

        exportToCSV(rows);
      }

      function exportToCSV(rows) {
        let csvContent = "";

        rows.forEach((rowArray) => {
          const escapedRow = rowArray
            .map((field) => {
              if (field == null) return "";
              field = field
                .toString()
                .replace(/\r?\n|\r/g, " ")
                .trim();

              if (
                field.includes(",") ||
                field.includes('"') ||
                field.includes("\n") ||
                field.includes("#")
              ) {
                field = `"${field.replace(/"/g, '""')}"`;
              }

              return field;
            })
            .join(",");

          csvContent += escapedRow + "\r\n";
        });

        const encodedUri =
          "data:text/csv;charset=utf-8," + encodeURIComponent(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", "task_data.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      }

      function calculateHoursBetweenDates() {
        const startDateInput = document.getElementById("startDate").value;
        const endDateInput = document.getElementById("endDate").value;

        const startDate = safeDate(startDateInput);
        const endDate = safeDate(endDateInput);
        if (!startDate || !endDate) {
          alert("Please select valid start and end dates.");
          return;
        }
        endDate.setHours(23, 59, 59, 999);

        const rows = Array.from(
          document.querySelectorAll("#task-log tbody tr"),
        );
        let totalSeconds = 0;
        const t0 = performance.now();

        for (const row of rows) {
          if (performance.now() - t0 > CALC_DEADLINE_MS) {
            console.warn(
              "⏳ Hours-between-dates hit 30s deadline — using partial results.",
            );
            break;
          }

          const startCell = row.querySelector(".start-time-column");
          const endCell = row.querySelector(".end-time-column");

          if (!startCell || !endCell) {
            row.classList.add("excluded-by-date");
            row.style.display = "none";
            continue;
          }

          const taskStart = safeDate(startCell.innerText);
          const taskEnd = safeDate(endCell.innerText);
          if (!taskStart || !taskEnd) {
            row.classList.add("excluded-by-date");
            row.style.display = "none";
            continue;
          }

          const effectiveStart = taskStart < startDate ? startDate : taskStart;
          const effectiveEnd = taskEnd > endDate ? endDate : taskEnd;

          if (effectiveStart <= effectiveEnd) {
            totalSeconds += (effectiveEnd - effectiveStart) / 1000;
            row.classList.remove("excluded-by-date");
          } else {
            row.classList.add("excluded-by-date");
          }
        }

        const hours = Math.floor(totalSeconds / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const decimalHours = (totalSeconds / 3600).toFixed(2);

        document.getElementById("calculatedHours").innerText =
          `${hours} hours, ${minutes} minutes (${decimalHours})`;

        applySearchFilter();
      }

      function filterTasksByDateRange(startDate, endDate) {
        const taskRef = ref(database, `${DATABASE_BASE_PATH}/tasks`);
        get(taskRef)
          .then((snapshot) => {
            if (!snapshot.exists()) {
              alert("No tasks found in the database.");
              return;
            }

            const tasks = [];
            snapshot.forEach((taskSnapshot) => {
              const task = taskSnapshot.val();
              const taskStartTime = new Date(task.startTime);
              const taskEndTime = task.endTime ? new Date(task.endTime) : null;

              if (
                (taskStartTime >= startDate && taskStartTime <= endDate) ||
                (taskEndTime &&
                  taskEndTime >= startDate &&
                  taskEndTime <= endDate) ||
                (taskStartTime <= startDate && taskEndTime >= endDate)
              ) {
                tasks.push(task);
              }
            });

            taskLogTable.innerHTML = "";
            tasks.forEach((task) => addTaskToTable(task));
            applyColumnVisibility();
            applySearchFilter();
            sortTableByColumn(7);
          })

          notes: row.querySelector(".notes-column")?.innerText || "",

        }));

        let matches = records;
        if (taskSearchHelper) {
          matches = taskSearchHelper.filter(records, searchTerm);
        } else {
          const q = searchTerm.toLowerCase();
          matches = records.filter(
            (r) =>
              r.name.toLowerCase().includes(q) ||
              r.project.toLowerCase().includes(q) ||
              r.notes.toLowerCase().includes(q) ||
              r.address.toLowerCase().includes(q),
          );
        }

        const allowed = new Set(matches.map((r) => r.row));
        rows.forEach((row) => {
          if (row.classList.contains("excluded-by-date")) {
            row.style.display = "none";
            return;

          row.style.display = allowed.has(row) ? "" : "none";

            imageName ||
            file.name.split(".").slice(0, -1).join(".");
          baseFileName = baseFileName.replace(/\s+/g, "_");
          let finalFileName = `${baseFileName}.${fileExtension}`;

          let imageBlob = await resizeImage(file, 2048);

          if (markupText) {
            imageBlob = await addTextToImage(imageBlob, markupText);
          }

          const folderPath = `${DATABASE_BASE_PATH}/tasks/images/${project}`;
          const storageFolderRef = storageRef(storage, folderPath);
          const existingFiles = await listAll(storageFolderRef);
          const existingNames = existingFiles.items.map((item) => item.name);

          let counter = 1;
          while (existingNames.includes(finalFileName)) {
            finalFileName = `${baseFileName}_${counter}.${fileExtension}`;
            counter++;
          }

          await uploadToFirebase(imageBlob, `${folderPath}/${finalFileName}`);
          await loadTaskImages(project);

          alert("Image uploaded successfully!");
          fileUploader.value = "";
        } catch (error) {
          console.error("Error uploading image:", error);
          alert("Failed to upload image. Please try again.");
        }
      });

      function resizeImage(file, maxWidth) {
        return new Promise((resolve) => {
          const reader = new FileReader();
          reader.onload = () => {
            const img = new Image();
            img.src = reader.result;
            img.onload = () => {
              let width = img.width;
              let height = img.height;

              if (width > maxWidth) {
                height = height * (maxWidth / width);
                width = maxWidth;
              }

              const canvas = document.createElement("canvas");
              canvas.width = width;
              canvas.height = height;
              const ctx = canvas.getContext("2d");

              ctx.drawImage(img, 0, 0, width, height);

              canvas.toBlob(resolve, file.type);
            };
          };
          reader.readAsDataURL(file);
        });
      }

      function addTextToImage(blob, text) {
        return new Promise((resolve) => {
          const reader = new FileReader();
          reader.onload = () => {
            const img = new Image();
            img.src = reader.result;
            img.onload = () => {
              const canvas = document.createElement("canvas");
              const ctx = canvas.getContext("2d");
              canvas.width = img.width;
              canvas.height = img.height + 100;
              ctx.drawImage(img, 0, 0);
              ctx.fillStyle = "white";
              ctx.font = "80px Arial";
              ctx.textAlign = "center";
              ctx.fillText(text, canvas.width / 2, canvas.height - 20);
              canvas.toBlob(resolve, "image/jpeg");
            };
          };
          reader.readAsDataURL(blob);
        });
      }

      async function uploadToFirebase(blob, storagePath) {
        const imageRef = storageRef(storage, storagePath);
        const uploadTask = uploadBytesResumable(imageRef, blob);
        return new Promise((resolve, reject) => {
          uploadTask.on("state_changed", null, reject, async () => {
            resolve(await getDownloadURL(imageRef));
          });
        });
      }

      const displayImagesForPage = (page) => {
        const startIndex = (page - 1) * imagesPerPage;
        const endIndex = Math.min(startIndex + imagesPerPage, imageUrls.length);

        photoContainer.innerHTML = "";

        for (let i = startIndex; i < endIndex; i++) {
          const url = imageUrls[i];
          const img = document.createElement("img");
          img.dataset.src = url;
          img.className = "thumbnail";
          img.loading = "lazy";
          img.addEventListener("click", () => displaySelectedImage(url));
          photoContainer.appendChild(img);

          lazyLoadImage(img);
        }

        updatePaginationControls();
      };

      const updatePaginationControls = () => {
        const paginationControls =
          document.getElementById("paginationControls");
        paginationControls.innerHTML = "";

        totalPages = Math.ceil(imageUrls.length / imagesPerPage);

        const prevButton = document.createElement("button");
        prevButton.textContent = "Previous Page";
        prevButton.disabled = currentPage === 1;
        prevButton.addEventListener("click", () => {
          if (currentPage > 1) {
            currentPage--;
            displayImagesForPage(currentPage);
          }
        });
        paginationControls.appendChild(prevButton);

        for (let i = 1; i <= totalPages; i++) {
          const pageButton = document.createElement("button");
          pageButton.textContent = i;
          pageButton.className = "pg";
          pageButton.addEventListener("click", () => {
            currentPage = i;
            displayImagesForPage(currentPage);
          });
          paginationControls.appendChild(pageButton);
        }

        const nextButton = document.createElement("button");
        nextButton.textContent = "Next Page";
        nextButton.disabled = currentPage === totalPages;
        nextButton.addEventListener("click", () => {
          if (currentPage < totalPages) {
            currentPage++;
            displayImagesForPage(currentPage);
          }
        });
        paginationControls.appendChild(nextButton);
      };

      const displaySelectedImage = (url) => {
        photoContainer.innerHTML = "";
        const imgWrapper = document.createElement("div");
        imgWrapper.className = "img-wrapper";

        const img = document.createElement("img");
        img.src = url;
        img.className = "photo";
        imgWrapper.appendChild(img);
        photoContainer.appendChild(imgWrapper);

        const options = imageSelect.options;
        for (let i = 0; i < options.length; i++) {
          if (options[i].value === url) {
            imageSelect.selectedIndex = i;
            break;
          }
        }

        imgWrapper.addEventListener("click", (event) => {
          const rect = img.getBoundingClientRect();
          const x = event.clientX - rect.left;

          if (x < rect.width / 2) {
            goToPreviousImage();
          } else {
            goToNextImage();
          }
        });

        currentPage = 1;
        updatePaginationControls();
      };

      const goToPreviousImage = () => {
        if (imageSelect.selectedIndex > 1) {
          imageSelect.selectedIndex--;
          const selectedUrl = imageSelect.value;
          displaySelectedImage(selectedUrl);
        }
      };

      const goToNextImage = () => {
        if (imageSelect.selectedIndex < imageSelect.options.length - 1) {
          imageSelect.selectedIndex++;
          const selectedUrl = imageSelect.value;
          displaySelectedImage(selectedUrl);
        }
      };

      imageSelect.addEventListener("change", (event) => {
        const selectedUrl = event.target.value;
        if (selectedUrl) {
          displaySelectedImage(selectedUrl);
        }
      });

      const deleteSelectedImage = async () => {
        const selectedImageUrl = imageSelect.value;
        if (!selectedImageUrl || !projectInput.value.trim()) return;

        if (!confirm("Are you sure you want to delete this image?")) {
          return;
        }

        const project = projectInput.value.trim();

        try {
          const imageRef = storageRef(storage, selectedImageUrl);
          await deleteObject(imageRef);

          const projectImagesRef = ref(
            database,
            `${DATABASE_BASE_PATH}/tasks/images/${project}`,
          );
          const imagesSnapshot = await get(projectImagesRef);

          if (imagesSnapshot.exists()) {
            const images = imagesSnapshot.val();
            const imageKey = Object.keys(images).find(
              (key) => images[key] === selectedImageUrl,
            );

            if (imageKey) {
              await remove(
                ref(
                  database,
                  `${DATABASE_BASE_PATH}/tasks/images/${project}/${imageKey}`,
                ),
              );
              photoContainer.innerHTML = "";
            }
          }
        } catch (error) {
          console.error("Error deleting image:", error);
        }
        await loadTaskImages(project);
      };

      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.src = entry.target.dataset.src;
            observer.unobserve(entry.target);
          }
        });
      });

      function lazyLoadImage(img) {
        observer.observe(img);
      }

      toggleTimerBtn.addEventListener("click", toggleTimer);
      startTravelBtn.addEventListener("click", () => startSegment("travel"));
      startWorkBtn.addEventListener("click", () => startSegment("work"));
      deleteImageButton.addEventListener("click", deleteSelectedImage);
      updateTaskBtn.addEventListener("click", updateTask);

      const maxWidthBtn = document.createElement("button");
      maxWidthBtn.id = "maxWidthBtn";
      maxWidthBtn.textContent = "⟷";

      const wbuttonDiv = document.getElementById("wbutton");
      if (wbuttonDiv) {
        wbuttonDiv.appendChild(maxWidthBtn);
      }

      const mainElement = document.querySelector("main");

      maxWidthBtn.addEventListener("click", () => {
        const currentMaxWidth = window.getComputedStyle(mainElement).maxWidth;

        if (currentMaxWidth === "1000px") {
          mainElement.style.maxWidth = "none";
        } else {
          mainElement.style.maxWidth = "1000px";
        }
      });

      document
        .getElementById("downloadAllImagesBtn")
        .addEventListener("click", async () => {
          const project = projectInput.value.trim();
          if (!project) {
            alert("⚠️ Please select a task before opening images.");
            return;
          }

          const storageImagesRef = storageRef(
            storage,
            `${DATABASE_BASE_PATH}/tasks/images/${project}`,
          );

          try {
            const storageSnapshot = await listAll(storageImagesRef);
            if (storageSnapshot.items.length === 0) {
              alert("⚠️ No images found for this task.");
              return;
            }

            for (const item of storageSnapshot.items) {
              const imageUrl = await getDownloadURL(item);
              window.open(imageUrl, "_blank");
            }
          } catch (error) {
            console.error("❌ Error opening images:", error);
            alert("⚠️ Error opening images. Please try again.");
          }
        });

      function formatToLocalTime(isoTime) {
        const date = new Date(isoTime);
        return date.toLocaleString("en-US", {
          year: "numeric",
          month: "long",
          day: "numeric",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
          hour12: true,
          timeZoneName: "short",
        });
      }

      function enableClickCopy(row) {
        for (let cell of row.cells) {
          cell.addEventListener("click", function (e) {
            if (!this._clickCount) this._clickCount = 0;
            this._clickCount++;

            clearTimeout(this._clickTimeout);
            this._clickTimeout = setTimeout(() => {
              this._clickCount = 0;
            }, 500);

            if (this._clickCount === 4) {
              navigator.clipboard
                .writeText(this.innerText.trim())
                .then(() => {
                  const originalBg = this.style.backgroundColor;
                  this.style.backgroundColor = "lightblue";
                  setTimeout(() => {
                    this.style.backgroundColor = originalBg;
                  }, 1000);
                })
                .catch((err) => {
                  console.error("Failed to copy text: ", err);
                });

              this._clickCount = 0;
            }
          });
        }
      }

      const headerTitle = document.querySelector("header h1");
      const loginSection = document.getElementById("login-section");

      headerTitle.addEventListener("click", (e) => {
        if (e.ctrlKey) {
          const isHidden = getComputedStyle(loginSection).display === "none";

          loginSection.style.display = isHidden ? "block" : "none";

          loadTasks();
          console.log("Header double-clicked: reloading tasks...");
        }
      });

      document.addEventListener("DOMContentLoaded", () => {
        loadColumnVisibility();
        applyColumnVisibility();

        document.querySelectorAll(".toggle-column").forEach((checkbox) => {
          checkbox.addEventListener("change", () => {
            saveColumnVisibility();
            applyColumnVisibility();
          });
        });

        const startTimeHeader = document.querySelector(
          "#task-log th.start-time-column",
        );
        startTimeHeader.addEventListener("click", () => {
          const sorted = [...allTasks].sort((a, b) => {
            const aTime = new Date(a.startTime);
            const bTime = new Date(b.startTime);

            return sortOrder === "asc" ? aTime - bTime : bTime - aTime;
          });

          taskLogTable.innerHTML = "";

          sorted.forEach((task) => addTaskToTable(task));

          sortOrder = sortOrder === "asc" ? "desc" : "asc";
        });

        const endTimeHeader = document.querySelector(
          "#task-log th.end-time-column",
        );
        endTimeHeader.addEventListener("click", (e) => {
          e.preventDefault();

          taskLogTable.innerHTML = "";

          const reversed = [...allTasks].reverse();

          reversed.forEach((task) => addTaskToTable(task));

          document.getElementById("totalTasks").innerText = reversed.length;

          checkForOngoingTask(reversed);
          processTasksForDailyTimeSpent(reversed);
          updateTotalHours(reversed);
          populateTaskDropdown(reversed);
        });
      });

      // OneNote section Code

      const populateOneNoteBtn = document.getElementById("populateOneNoteBtn");

      if (populateOneNoteBtn) {
        populateOneNoteBtn.addEventListener("click", async () => {
          if (isProcessing) {
            isProcessing = false;
            populateOneNoteBtn.textContent = "Populate OneNote";
            console.log("Process stopped.");
            return;
          }

          const sectionName = prompt("Enter a name for the OneNote section:");

          if (sectionName === null) {
            console.log("Operation canceled by the user.");
            return;
          }

          const section = await getOrCreateSection(sanitizedSectionName);

          isProcessing = true;
          populateOneNoteBtn.textContent = "Stop";
          console.log(`Process started. Section name: "${sectionName}"`);

          try {
            const visibleTasks = Array.from(
              document.querySelectorAll("#task-log tbody tr"),
            )
              .filter((row) => row.style.display !== "none")
              .map((row) => {
                const taskId = row.dataset.taskId;
                return taskId;
              });

            if (visibleTasks.length === 0) {
              alert("No tasks to send.");
              isProcessing = false;
              populateOneNoteBtn.textContent = "Populate OneNote";
              return;
            }

            const taskRef = ref(database, `${DATABASE_BASE_PATH}/tasks`);
            const snapshot = await get(taskRef);

            if (!snapshot.exists()) {
              alert("No tasks found in Firebase.");
              isProcessing = false;
              populateOneNoteBtn.textContent = "Populate OneNote";
              return;
            }

            const jsonData = snapshot.val();
            const section = await getOrCreateSection(sectionName);

            if (!section) {
              alert(`Failed to find or create the '${sectionName}' section.`);
              isProcessing = false;
              populateOneNoteBtn.textContent = "Populate OneNote";
              return;
            }

            let processedCount = 0;

            for (const id of visibleTasks) {
              if (!isProcessing) {
                console.log("Process interrupted.");
                break;
              }

              const task = jsonData[id];
              if (!task) continue;

              const taskTitle = `${task.customerName || "Unnamed"} - ${task.project || `Task ${id}`}`;
              const taskHtml = `
                            <p><b>Name:</b> ${task.customerName || "N/A"}</p>
                            <p><b>Project:</b> ${task.project || "N/A"}</p>
                            <p><b>Address:</b> ${task.customerAddress || "N/A"}</p>
                            <p><b>Notes:</b> ${task.notes || "No notes provided"}</p>
                            <p><b>Start:</b> ${task.startTime ? formatToLocalTime(task.startTime) : "N/A"}</p>
                            <p><b>End:</b> ${task.endTime ? formatToLocalTime(task.endTime) : "N/A"}</p>
                        `;

              try {
                console.log(`Processing task: "${taskTitle}"`);
                await sendTaskToOneNote(
                  taskTitle,
                  taskHtml,
                  task.startTime,
                  section.id,
                );
                console.log(`Task "${taskTitle}" processed.`);
                processedCount++;
              } catch (error) {
                console.error(`Error processing task "${taskTitle}":`, error);
              }

              await delay(1000);
            }

            alert(
              `${processedCount}/${visibleTasks.length} tasks have been populated to "${sectionName}" section in OneNote.`,
            );
          } catch (error) {
            alert("Error fetching tasks from Firebase. Check your connection.");
            console.error("Error fetching tasks:", error);
          } finally {
            isProcessing = false;
            populateOneNoteBtn.textContent = "Populate OneNote";
          }
        });
      }
    </script>
