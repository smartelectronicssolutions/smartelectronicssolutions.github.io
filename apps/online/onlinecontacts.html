<!doctype html>
<html lang="en">

<head>
  <title>Contact Information Management</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../assets/css/online.css" />
  <script>(function () { var t = localStorage.getItem("ss-theme"); if (t === "light") document.documentElement.classList.add("light"); }());</script>
  <script type="module" src="../assets/js/auth.js" defer></script>
  <script src="../assets/js/links-aside.js" defer></script>
  <script src="../assets/js/search.js" defer></script>
  <style>
    main {
      display: flex;
      flex-direction: row;
    }

    #contacts-list {
      width: 200px;
      list-style-type: none;
      padding: 0;
    }

    #contacts-list li {
      padding: 10px;
      background: var(--surface);
      margin: 5px 0;
      cursor: pointer;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    #contacts-list li .contact-name {
      font-weight: 600;
    }

    #contacts-list li .contact-meta {
      font-size: 12px;
      color: var(--muted);
    }

    #contacts-list li:hover {
      background: var(--surface2);
    }

    #contact-details,
    #add-contact-section {
      flex-grow: 1;
      padding: 15px;
      background: var(--surface);
      border-radius: 5px;
      display: none;
      margin: 15px;
    }

    input[type="text"],
    input[type="email"],
    input[type="tel"] {
      width: 100%;
      padding: 8px;
      margin: 5px 0;
      border: 1px solid var(--border);
      border-radius: 4px;
    }

    #projects-list {
      margin-top: 20px;
    }

    .contact-summary {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 12px;
    }

    .field-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 6px;
    }

    .field-chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
    }

    .contact-subtle {
      font-size: 12px;
      color: var(--muted);
    }

    .project-card {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      background: var(--surface2);
      margin-bottom: 10px;
    }

    .project-card h4 {
      margin: 0 0 6px;
    }

    #toggleSidebar {
      margin: 10px;
    }

    #sidebar {
      height: 100%;
      max-width: 300px;
      position: fixed;
      left: 0;
      top: 0;
      background-color: var(--surface2);
      overflow-y: auto;
      padding: 20px;
      z-index: 1;
      box-shadow: rgba(0, 0, 0, 0.35) 0px 5px 15px;
      text-align: left;
      transition: transform 0.5s ease-in-out;
      transform: translateX(-100%);
    }

    #sidebar.hidden {
      transform: translateX(-100%);
    }

    #sidebar:not(.hidden) {
      transform: translateX(0);
    }

    @media (max-width: 400px) {
      #sidebar {
        overflow-x: auto;
        margin-top: 15px;
      }

      header {
        flex-direction: column;
      }

      body {
        margin-top: 10px;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>Contacts Manager</h1>
    <div class="auth-bar"><span id="auth-label">Not signed in</span><button id="auth-btn">Sign In</button></div>
    <button id="theme-toggle" title="Toggle theme">☀️</button>
    <script>(function () { var b = document.getElementById("theme-toggle"), h = document.documentElement; b.textContent = h.classList.contains("light") ? "🌙" : "☀️"; b.addEventListener("click", function () { var n = h.classList.contains("light") ? "dark" : "light"; h.classList.toggle("light", n === "light"); localStorage.setItem("ss-theme", n); b.textContent = n === "light" ? "🌙" : "☀️"; }); })();</script>
    <div id="login-inline">
      <h3>Sign In</h3><input type="email" id="email-in" placeholder="Email" /><input type="password" id="pass-in"
        placeholder="Password" /><button id="do-login">Sign In</button>
      <p id="auth-err"></p>
    </div>
    <button class="toggleSidebar">Contacts</button>
    <div>
      <input type="text" id="searchContacts" />
    </div>
    <section id="login-section" style="display:none">
      <form id="login-form">
        <label for="username">Email:</label>
        <input type="email" id="username" required />
        <br />
        <label for="password">Password:</label>
        <input type="password" id="password" required />
        <br />
        <button type="submit">Login</button>
      </form>
      <button id="logout" style="display: none">Logout</button>
    </section>
  </header>
  <main>
    <div id="sidebar">
      <button class="toggleSidebar">Hide</button>
      <br />
      <button id="toggle-add-contact-button">Add Contact</button>
      <ul id="contacts-list"></ul>
    </div>
    <div id="contact-details">
      <h2 id="contact-name"></h2>
      <div class="contact-summary">
        <div>
          <div class="contact-subtle">Phones on record</div>
          <div id="contact-phone-list" class="field-list"></div>
        </div>
        <div>
          <div class="contact-subtle">Emails on record</div>
          <div id="contact-email-list" class="field-list"></div>
        </div>
        <div>
          <div class="contact-subtle">Addresses on record</div>
          <div id="contact-address-list" class="field-list"></div>
        </div>
      </div>
      <div class="contact-subtle">Update all records for this customer:</div>
      <input type="tel" id="contact-phone" placeholder="Phone" />
      <input type="email" id="contact-email" placeholder="Email" />
      <input type="text" id="contact-address" placeholder="Address" />
      <button id="save-contact-button">Save Contact</button>
      <button id="delete-contact-button">Delete Contact</button>
      <h3>Projects</h3>
      <div id="projects-list"></div>
    </div>
    <div id="add-contact-section" style="display: none">
      <h2>Add Contact</h2>
      <input type="text" id="new-contact-name" placeholder="Customer Name" />
      <input type="tel" id="new-contact-phone" placeholder="Phone" />
      <input type="email" id="new-contact-email" placeholder="Email" />
      <input type="text" id="new-contact-address" placeholder="Address" />
      <button id="add-contact-button">Add Contact</button>
    </div>
  </main>

  <script type="module">
    import {
      auth,
      onAuthStateChanged,
      database,
      ref,
      get,
      set,
      push,
      remove,
      update,
    } from "../assets/js/firebase-init.js";
    import { onIdTokenChanged } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-auth.js";

    const contactsList = document.getElementById("contacts-list");
    const contactDetails = document.getElementById("contact-details");
    const contactNameElem = document.getElementById("contact-name");
    const contactPhoneInput = document.getElementById("contact-phone");
    const contactEmailInput = document.getElementById("contact-email");
    const contactAddressInput = document.getElementById("contact-address");
    const searchContacts = document.getElementById("searchContacts");
    const addContactSection = document.getElementById("add-contact-section");
    const newContactNameInput = document.getElementById("new-contact-name");
    const newContactPhoneInput = document.getElementById("new-contact-phone");
    const newContactEmailInput = document.getElementById("new-contact-email");
    const newContactAddressInput = document.getElementById(
      "new-contact-address",
    );
    const contactSearchHelper = window.SearchEngine?.attachAuto
      ? window.SearchEngine.attachAuto(searchContacts, {
        defaultFields: ["name"],
        placeholderAdvanced: '🔎... e.g. name:"smith"',
      })
      : null;
    let selectedContactId = null;
    let DATABASE_BASE_PATH = "public";
    let authReady = false;
    let currentUser = null;

    if (!contactSearchHelper && searchContacts) {
      searchContacts.title =
        "Basic search only. Load ./assets/js/search.js for operators.";
    }

    function showAuthBanner(msg) {
      let b = document.getElementById("authBanner");
      if (!b) {
        b = document.createElement("div");
        b.id = "authBanner";
        b.style.cssText = "position:fixed;top:0;left:0;right:0;z-index:9999;background:#8a1f1f;color:#fff;padding:8px 14px;text-align:center;font:13px system-ui,sans-serif;";
        document.body.appendChild(b);
      }
      b.textContent = msg;
      b.style.display = "block";
    }
    function hideAuthBanner() {
      const b = document.getElementById("authBanner");
      if (b) b.style.display = "none";
    }
    function canWrite() {
      if (authReady && currentUser) { hideAuthBanner(); return true; }
      showAuthBanner("Not saving — sign in to store contacts privately.");
      return false;
    }

    // Login UI is driven only by onAuthStateChanged (via auth.js auth-bar).
    onAuthStateChanged(auth, (user) => {
      authReady = true;
      currentUser = user;
      DATABASE_BASE_PATH = user ? `${user.uid}` : "public";
      if (user) hideAuthBanner();
      fetchContacts();
    });

    // Token expiry reflects as signed-out; keep the write path accurate.
    onIdTokenChanged(auth, (user) => {
      currentUser = user;
      DATABASE_BASE_PATH = user ? `${user.uid}` : "public";
    });

    async function fetchContacts() {
      const tasksRef = ref(database, `${DATABASE_BASE_PATH}/tasks`);
      const snapshot = await get(tasksRef);
      if (snapshot.exists()) {
        renderContacts(snapshot.val());
      }
    }

    function renderContacts(tasks) {
      contactsList.innerHTML = "";
      const customerMap = {};

      for (const taskId in tasks) {
        const task = tasks[taskId];
        const customerName = (task.customerName || "Unnamed Contact").trim();

        if (!customerMap[customerName]) {
          customerMap[customerName] = [];
        }
        customerMap[customerName].push({ taskId, task });
      }

      const sortedNames = Object.keys(customerMap)
        .filter((name) => name)
        .sort((a, b) =>
          a.localeCompare(b, undefined, { sensitivity: "base" }),
        );

      for (const customerName of sortedNames) {
        const tasksForCustomer = customerMap[customerName];
        const lastActivity = tasksForCustomer
          .map(({ task }) =>
            new Date(task.endTime || task.startTime || 0).getTime(),
          )
          .reduce((acc, val) => Math.max(acc, val), 0);
        const lastLabel = lastActivity
          ? new Date(lastActivity).toLocaleDateString()
          : "No activity";

        const li = document.createElement("li");
        li.dataset.name = customerName.toLowerCase();
        const wrap = document.createElement("div");
        const nameDiv = document.createElement("div");
        nameDiv.className = "contact-name";
        nameDiv.textContent = customerName;
        const metaDiv = document.createElement("div");
        metaDiv.className = "contact-meta";
        metaDiv.textContent = `${tasksForCustomer.length} project(s) • Last: ${lastLabel}`;
        wrap.appendChild(nameDiv);
        wrap.appendChild(metaDiv);
        li.appendChild(wrap);
        li.onclick = () => displayContactDetails(tasksForCustomer);
        contactsList.appendChild(li);
      }
    }

    function displayContactDetails(customerTasks) {
      selectedContactId = customerTasks[0].taskId;
      contactDetails.style.display = "block";
      addContactSection.style.display = "none";
      const firstTask = customerTasks[0].task;

      const uniqueValues = (values) => [
        ...new Set(values.map((v) => String(v || "").trim()).filter(Boolean)),
      ];
      const phones = uniqueValues(
        customerTasks.map((ct) => ct.task.customerPhone),
      );
      const emails = uniqueValues(
        customerTasks.map((ct) => ct.task.customerEmail),
      );
      const addresses = uniqueValues(
        customerTasks.map((ct) => ct.task.customerAddress),
      );

      const renderChips = (el, values) => {
        el.innerHTML = "";
        if (!values.length) {
          const empty = document.createElement("span");
          empty.className = "contact-subtle";
          empty.textContent = "—";
          el.appendChild(empty);
          return;
        }
        values.forEach((val) => {
          const chip = document.createElement("span");
          chip.className = "field-chip";
          chip.textContent = val;
          el.appendChild(chip);
        });
      };

      contactNameElem.textContent =
        firstTask.customerName || "Unnamed Contact";
      contactPhoneInput.value = phones[0] || "";
      contactEmailInput.value = emails[0] || "";
      contactAddressInput.value = addresses[0] || "";

      contactPhoneInput.placeholder =
        phones.length > 1 ? "Multiple values" : "Phone";
      contactEmailInput.placeholder =
        emails.length > 1 ? "Multiple values" : "Email";
      contactAddressInput.placeholder =
        addresses.length > 1 ? "Multiple values" : "Address";

      renderChips(document.getElementById("contact-phone-list"), phones);
      renderChips(document.getElementById("contact-email-list"), emails);
      renderChips(document.getElementById("contact-address-list"), addresses);

      renderProjects(customerTasks);
    }

    function renderProjects(customerTasks) {
      const projectsList = document.getElementById("projects-list");
      projectsList.innerHTML = "";

      customerTasks.forEach(({ task }) => {
        const projectDiv = document.createElement("div");
        projectDiv.className = "project-card";
        const start = task.startTime
          ? new Date(task.startTime).toLocaleString()
          : "N/A";
        const end = task.endTime
          ? new Date(task.endTime).toLocaleString()
          : "N/A";
        const h4 = document.createElement("h4");
        h4.textContent = task.project || "Untitled Project";
        projectDiv.appendChild(h4);

        const idDiv = document.createElement("div");
        idDiv.className = "contact-subtle";
        idDiv.textContent = `Task ID: ${task.id || ""}`;
        projectDiv.appendChild(idDiv);

        const startDiv = document.createElement("div");
        const startStrong = document.createElement("strong");
        startStrong.textContent = "Start:";
        startDiv.appendChild(startStrong);
        startDiv.appendChild(document.createTextNode(" " + start));
        projectDiv.appendChild(startDiv);

        const endDiv = document.createElement("div");
        const endStrong = document.createElement("strong");
        endStrong.textContent = "End:";
        endDiv.appendChild(endStrong);
        endDiv.appendChild(document.createTextNode(" " + end));
        projectDiv.appendChild(endDiv);

        if (task.notes) {
          const notesDiv = document.createElement("div");
          const notesStrong = document.createElement("strong");
          notesStrong.textContent = "Notes:";
          notesDiv.appendChild(notesStrong);
          notesDiv.appendChild(document.createTextNode(" " + task.notes));
          projectDiv.appendChild(notesDiv);
        }

        projectsList.appendChild(projectDiv);
      });
    }

    document
      .getElementById("save-contact-button")
      .addEventListener("click", async () => {
        if (!selectedContactId) return;
        if (!canWrite()) return;

        const phone = contactPhoneInput.value;
        const email = contactEmailInput.value;
        const address = contactAddressInput.value;
        const targetName = contactNameElem.textContent;

        const tasksRef = ref(database, `${DATABASE_BASE_PATH}/tasks`);
        const snapshot = await get(tasksRef);
        if (!snapshot.exists()) return;

        const tasks = snapshot.val();
        const updates = {};
        for (const taskId in tasks) {
          if (tasks[taskId].customerName === targetName) {
            updates[`${taskId}/customerPhone`] = phone;
            updates[`${taskId}/customerEmail`] = email;
            updates[`${taskId}/customerAddress`] = address;
          }
        }

        try {
          await update(tasksRef, updates);
          alert("All matching contacts updated successfully!");
          fetchContacts();
        } catch (error) {
          console.error("Error updating contact:", error);
          alert("Error updating contacts.");
        }
      });

    document
      .getElementById("delete-contact-button")
      .addEventListener("click", () => {
        if (selectedContactId) {
          if (!canWrite()) return;
          const contactRef = ref(
            database,
            `${DATABASE_BASE_PATH}/tasks/${selectedContactId}`,
          );
          remove(contactRef)
            .then(() => {
              alert("Contact deleted successfully!");
              fetchContacts();
              contactDetails.style.display = "none";
            })
            .catch((error) => {
              console.error("Error deleting contact:", error);
            });
        }
      });

    document
      .getElementById("add-contact-button")
      .addEventListener("click", () => {
        const contactName = newContactNameInput.value;
        const phone = newContactPhoneInput.value;
        const email = newContactEmailInput.value;
        const address = newContactAddressInput.value;

        if (contactName) {
          if (!canWrite()) return;
          const tasksRef = ref(database, `${DATABASE_BASE_PATH}/tasks`);
          const newContactRef = push(tasksRef);
          set(newContactRef, {
            customerName: contactName,
            customerPhone: phone,
            customerEmail: email,
            customerAddress: address,
          }).then(() => {
            newContactNameInput.value = "";
            newContactPhoneInput.value = "";
            newContactEmailInput.value = "";
            newContactAddressInput.value = "";
            fetchContacts();
          });
        }
      });

    document
      .getElementById("toggle-add-contact-button")
      .addEventListener("click", () => {
        addContactSection.style.display =
          addContactSection.style.display === "none" ? "block" : "none";
        contactDetails.style.display = "none";
      });

    document.querySelectorAll(".toggleSidebar").forEach((button) => {
      button.addEventListener("click", () => {
        const sidebar = document.getElementById("sidebar");
        sidebar.classList.toggle("hidden");
      });
    });

    document.addEventListener("click", (event) => {
      const sidebar = document.getElementById("sidebar");
      const toggleButtons = document.querySelectorAll(".toggleSidebar");

      if (
        !sidebar.contains(event.target) &&
        !Array.from(toggleButtons).some((button) =>
          button.contains(event.target),
        ) &&
        !sidebar.classList.contains("hidden")
      ) {
        sidebar.classList.add("hidden");
      }
    });

    searchContacts.addEventListener("input", () => {
      const searchValue = String(searchContacts.value || "").trim();
      const items = Array.from(contactsList.children).map((li) => ({
        row: li,
        name: li.dataset.name || li.textContent || "",
      }));

      if (!searchValue) {
        items.forEach((item) => {
          item.row.style.display = "block";
        });
        return;
      }

      let matches = items;
      if (contactSearchHelper) {
        matches = contactSearchHelper.filter(items, searchValue);
      } else {
        const q = searchValue.toLowerCase();
        matches = items.filter((item) => item.name.toLowerCase().includes(q));
      }

      const allowed = new Set(matches.map((item) => item.row));
      items.forEach((item) => {
        item.row.style.display = allowed.has(item.row) ? "block" : "none";
      });
    });
  </script>
</body>

</html>
