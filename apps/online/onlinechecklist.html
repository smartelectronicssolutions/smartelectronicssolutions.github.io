<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>Job Details Tracker</title>
    <link rel="stylesheet" href="../../assets/css/app-styles.css" />
    <style></style>
    <script type="module" src="../assets/js/microsoftAuth.js"></script>
    <script type="module" src="../assets/js/login.js"></script>
    <script src="../assets/js/sidebar.js"></script>
    <script src="../assets/js/search.js" defer></script>
    <style>
      /* ---------- SECTIONS (CARDS) ---------- */

      section {
        background: var(--cardBackground);
        border: 1px solid var(--borderColor);
        border-radius: 10px;
        padding: 14px;
        margin-bottom: 14px;
        box-shadow: var(--cardShadow);
        max-width: 100%;
        overflow-wrap: anywhere;
      }

      /* ---------- LABEL ---------- */

      label {
        display: block;
        margin-top: 4px;
        margin-bottom: 4px;
        font-weight: 500;
        color: var(--mutedText);
      }

      /* ---------- INPUTS ---------- */

      input,
      select,
      textarea {
        background: var(--secondaryBackgroundColor);
        border: 1px solid var(--borderColor);
        color: var(--textColor);
        border-radius: 6px;
        padding: 6px 8px;
        max-width: 100%;
      }

      textarea {
        min-height: 120px;
        width: 100%;
        min-width: 0;
        resize: vertical;
      }

      input:focus,
      textarea:focus,
      select:focus {
        outline: none;
        border-color: var(--primaryColor);
        box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
      }

      .row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        max-width: 200px;
        margin-top: 20px;
      }

      /* ---------- CHECKLIST ---------- */

      .checkItem {
        background: var(--secondaryBackgroundColor);
        border-radius: 8px;
        padding: 10px;
        overflow-wrap: anywhere;
      }

      .checkItem label,
      .checkItem strong {
        white-space: normal;
        overflow-wrap: anywhere;
        word-break: break-word;
      }

      /* ---------- NIGHT CHECKBOXES (BIG FIX) ---------- */

      .checkMulti {
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        margin-right: 12px;
        font-size: 13px;
      }

      .checkMulti::before {
        content: attr(data-label);
        margin-bottom: 4px;
        font-weight: 500;
      }

      .checkMulti input {
        transform: scale(1.3);
      }

      /* ---------- NIGHTLY PRODUCTION (FIX SQUISHING) ---------- */

      .row div {
        margin-bottom: 6px;
      }

      /* Make nightly rows breathe */
      [id^="field_nightly_production_"] {
        width: 80px;
        margin-right: 6px;
      }

      /* ---------- SCORE / END OF WEEK ---------- */

      .score-breakdown {
        margin-top: 10px;
        padding: 10px;
        border: 1px solid var(--borderColor);
        background: var(--backgroundColor);
      }

      /* ---------- MISSING LIST ---------- */

      #missingList li {
        color: var(--danger);
        font-weight: bold;
      }

      /* ---------- COLLAPSIBLE ---------- */

      .collapsible-header {
        cursor: pointer;
        font-weight: bold;
        padding: 6px 0;
      }

      .hidden {
        display: none !important;
      }

      .field-toggle-panel {
        border: 1px solid var(--borderColor);
        border-radius: 10px;
        padding: 10px;
        margin-bottom: 12px;
        background: var(--secondaryBackgroundColor);
      }

      .field-toggle-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 8px;
      }

      .field-toggle-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .field-toggle-actions button {
        padding: 6px 10px;
        border-radius: 8px;
        border: 1px solid var(--borderColor);
        background: var(--backgroundColor);
        color: var(--textColor);
        cursor: pointer;
      }

      .field-toggle-list {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 6px 12px;
      }

      .field-toggle-item {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      /* ---------- RESPONSIVE ---------- */

      @media (max-width: 768px) {
        textarea {
          min-height: 140px;
        }

        .checkMulti {
          flex-direction: row;
          justify-content: space-between;
          width: 100%;
        }
      }
    </style>
  </head>

  <body>
    <header>
      <h1>Checklist App</h1>
      <section id="login-section" class="logins-section">
        <form id="login-form">
          <label for="username">Email:</label>
          <input type="email" id="username" required />

          <label for="password">Password:</label>
          <input type="password" id="password" required />

          <button type="submit">Sign in</button>
        </form>

        <button id="logout" style="display: none">Logout</button>

        <div class="ms">
          <br />
          <button id="loginButton">Login to MS</button>
          <button id="logoutButton">Logout of MS</button>
          <p id="loginStatus">Login status...</p>
        </div>
      </section>
    </header>

    <main id="mainApp">
      <section>
        <label
          >Project ID:
          <input type="text" id="project" />
        </label>

        <button id="saveProject" style="display: none">Save New Project</button>

        <input type="text" id="projectSearch" />

        <label
          >Existing Projects:
          <select id="projectList">
            <option value="">-- Choose a project --</option>
          </select>
        </label>
      </section>

      <section class="collapsible-section" id="qcChecklistSection">
        <h2 class="collapsible-header">📋 QC Checklist</h2>
        <div id="checklistSelector" aria-live="polite"></div>
        <div id="fieldTogglePanel" class="field-toggle-panel hidden" aria-live="polite"></div>

        <div id="app">Loading checklist...</div>
      </section>

      <section class="collapsible-section" id="site-analysis">
        <h2 class="collapsible-header">📋 Site Analysis</h2>
        <button id="compareBtn" type="button">Generate Report</button>
        <button id="exportReportBtn" type="button">Export Report CSV</button>
        <button id="uploadQCBtn">Upload QC Checklist</button>
        <div id="comparisonResults"></div>
      </section>
    </main>

    <script type="module">
      import {
        auth,
        onAuthStateChanged,
        database,
        storage,
        ref as dbRef,
        set,
        update,
        get,
        onValue,
        storageRef,
        uploadBytes,
        getDownloadURL,
        listAll,
        deleteObject,
      } from "../assets/js/firebase-init.js";

      const CONFIG = {
        MAX_NIGHTS: 10,
        DEFAULT_NIGHTS: 5,
        ADMIN_PASSWORD: "telaidadmin",
        AUTO_SAVE_MS: 2500,
        IMAGE_MAX_WIDTH: 2048,
        SENSOR_IMAGE_COUNT_REQUIRED: 2,
      };

      const $ = (id) => document.getElementById(id);
      const $$ = (selector, root = document) =>
        Array.from(root.querySelectorAll(selector));

      const escapeHtml = (value) =>
        String(value ?? "").replace(
          /[&<>"']/g,
          (m) =>
            ({
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              '"': "&quot;",
              "'": "&#39;",
            })[m],
        );

      const sanitize = (str) =>
        (str || "")
          .trim()
          .replace(/\s+/g, "_")
          .replace(/[\\/:*?"<>|#%{}~&]/g, "_");

      const normalizeText = (v) =>
        String(v ?? "")
          .replace(/[\r\n]+/g, " ")
          .trim();
      const normKey = (s) => (s || "").trim().toLowerCase();

      const createEl = (tag, options = {}) => {
        const el = document.createElement(tag);
        if (options.className) el.className = options.className;
        if (options.text != null) el.textContent = options.text;
        if (options.html != null) el.innerHTML = options.html;
        if (options.attrs) {
          Object.entries(options.attrs).forEach(([key, value]) => {
            if (value != null) el.setAttribute(key, value);
          });
        }
        return el;
      };

      const debounce = (fn, delay = 300) => {
        let timer = null;
        return (...args) => {
          clearTimeout(timer);
          timer = setTimeout(() => fn(...args), delay);
        };
      };

      const downloadBlob = (blob, filename) => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      };

      const downloadCSV = (rows, filename) => {
        const csv = rows
          .map((row) =>
            row
              .map((cell) => {
                const text = String(cell ?? "");
                return /[",\n]/.test(text)
                  ? `"${text.replace(/"/g, '""')}"`
                  : text;
              })
              .join(","),
          )
          .join("\n");

        downloadBlob(
          new Blob([csv], { type: "text/csv;charset=utf-8" }),
          filename,
        );
      };

      const bestTime = (task, id) =>
        Math.max(
          Number(task?.updatedAt) || 0,
          Number(task?.createdAt) || 0,
          Number(task?.startTime) || 0,
          Number(task?.timestamp) || 0,
          Number(id) || 0,
        );

      const state = {
        basePath: "public",
        currentProject: "",
        currentProjectName: "",
        currentCustomerName: "",
        metaOwnerTaskId: "",
        expectedSensors: 0,
        allProjects: [],
        validated: false,
        isLoadingProject: false,
        isUploading: false,
        modalItems: [],
        modalIndex: 0,
        taskListenerUnsub: null,
        qcConfig: null,
        qcListenerBound: false,
        imageModule: null,
        currentChecklistFile: "",
        currentChecklistType: "",
        checklistFiles: {},
        qcDataCache: { sections: {} },
        qcDataUnsub: null,
        qcDataPath: "",
        isEditingQC: false,
        qcEditTimer: null,
      };

      async function loadOrCreateProject() {
        const input = $("project")?.value.trim();
        if (!input) return;

        const key = input.toLowerCase();

        const tasks = (await readOnce(`${state.basePath}/tasks`)) || {};

        // 🔍 Find existing project
        const match = Object.entries(tasks).find(
          ([id, data]) => (data.project || "").trim().toLowerCase() === key,
        );

        if (match) {
          // ✅ LOAD EXISTING
          const [id] = match;
          await loadProject(id);
          return;
        }

        // ➕ CREATE NEW
        const customerName = prompt("Enter Customer Name:");
        if (!customerName) {
          alert("Customer name is required.");
          return;
        }

        const id = Date.now().toString();

        await set(dbRef(database, `${state.basePath}/tasks/${id}`), {
          id,
          project: input,
          customerName: customerName.trim(),
          createdAt: Date.now(),
          updatedAt: Date.now(),
        });

        await loadProject(id);
        await populateProjects();
      }

      function getTaskPath(taskId = state.currentProject) {
        return `${state.basePath}/tasks/${taskId}`;
      }

      function getImagesPath(mode = "sensors") {
        const safeProjectName = sanitize(
          state.currentProjectName || state.currentProject,
        );
        return `${state.basePath}/tasks/images/${safeProjectName}/${mode}`;
      }

      function sensorMetaBasePath() {
        return `${state.basePath}/tasks/${state.metaOwnerTaskId}/sensorMeta`;
      }

      function getFavorites() {
        try {
          return JSON.parse(localStorage.getItem("favorites") || "{}");
        } catch {
          return {};
        }
      }

      function setFavorites(favorites) {
        localStorage.setItem("favorites", JSON.stringify(favorites));
      }

      async function readOnce(path) {
        const snap = await get(dbRef(database, path));
        return snap.exists() ? snap.val() : null;
      }

      async function patch(path, payload) {
        await update(dbRef(database, path), payload);
      }

      async function listStorageItems(path) {
        const result = await listAll(storageRef(storage, path));
        return Promise.all(
          result.items.map(async (item) => ({
            name: item.name,
            fullPath: item.fullPath,
            url: await getDownloadURL(item),
            ref: item,
          })),
        );
      }

      async function getUniqueFilename(folderPath, filename) {
        const idx = filename.lastIndexOf(".");
        const base = idx >= 0 ? filename.slice(0, idx) : filename;
        const ext = idx >= 0 ? filename.slice(idx) : "";
        let attempt = base;
        let suffix = 1;

        while (true) {
          try {
            await getDownloadURL(
              storageRef(storage, `${folderPath}/${attempt}${ext}`),
            );
            attempt = `${base}_${suffix++}`;
          } catch (err) {
            if (err?.code === "storage/object-not-found") {
              return `${attempt}${ext}`;
            }
            throw err;
          }
        }
      }

      function populateSensorDropdown(count) {
        [$("sensorMetaNumberDropdown"), $("sensorNumberDropdown")].forEach(
          (dropdown) => {
            if (!dropdown) return;
            dropdown.innerHTML = '<option value="">Select a Device</option>';
            for (let i = 1; i <= count; i += 1) {
              const padded = String(i).padStart(2, "0");
              dropdown.appendChild(new Option(padded, String(i)));
            }
          },
        );
      }

      function updateImageModeUI() {
        const mode =
          document.querySelector('input[name="viewMode"]:checked')?.value ||
          "sensors";
        if ($("sensorUploadSection"))
          $("sensorUploadSection").style.display =
            mode === "sensors" ? "block" : "none";
        if ($("deliverableUploadSection"))
          $("deliverableUploadSection").style.display =
            mode === "deliverables" ? "block" : "none";
      }

      function showModalByIndex(index) {
        const item = state.modalItems[index];
        if (!item) return;

        state.modalIndex = index;
        if ($("modalImage")) $("modalImage").src = item.url;
        if ($("modalFileName")) $("modalFileName").textContent = item.name;
        if ($("modal")) $("modal").style.display = "flex";
      }

      function closeModal() {
        if ($("modal")) $("modal").style.display = "none";
        if ($("modalImage")) $("modalImage").src = "";
        if ($("modalFileName")) $("modalFileName").textContent = "";
      }

      async function loadSensorMeta(sensorNum) {
        if (!sensorNum || !state.metaOwnerTaskId) return;
        const data =
          (await readOnce(`${sensorMetaBasePath()}/${sensorNum}`)) || {};

        if ($("sensorMetaSerial"))
          $("sensorMetaSerial").value = data.serial || "";
        if ($("sensorMetaM1")) $("sensorMetaM1").value = data.m1 || "";
        if ($("sensorMetaM2")) $("sensorMetaM2").value = data.m2 || "";
        if ($("sensorMetaM3")) $("sensorMetaM3").value = data.m3 || "";

        if ($("serialNumber") && !$("serialNumber").value && data.serial) {
          $("serialNumber").value = data.serial;
        }
      }

      const resizeImage = (file, maxWidth = CONFIG.IMAGE_MAX_WIDTH) =>
        new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onerror = reject;

          reader.onload = () => {
            const img = new Image();
            img.onerror = reject;
            img.src = reader.result;

            img.onload = () => {
              let { width, height } = img;
              if (width > maxWidth) {
                height *= maxWidth / width;
                width = maxWidth;
              }

              const canvas = document.createElement("canvas");
              canvas.width = width;
              canvas.height = height;
              canvas.getContext("2d").drawImage(img, 0, 0, width, height);

              canvas.toBlob(
                (blob) => resolve(blob || file),
                "image/jpeg",
                0.92,
              );
            };
          };

          reader.readAsDataURL(file);
        });

      const addTextToImage = (blob, text) =>
        new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onerror = reject;

          reader.onload = () => {
            const img = new Image();
            img.onerror = reject;
            img.src = reader.result;

            img.onload = () => {
              const barHeight = Math.max(72, Math.round(img.width * 0.08));
              const canvas = document.createElement("canvas");
              canvas.width = img.width;
              canvas.height = img.height + barHeight;

              const ctx = canvas.getContext("2d");
              ctx.drawImage(img, 0, 0);

              ctx.fillStyle = "black";
              ctx.fillRect(0, img.height, canvas.width, barHeight);

              ctx.fillStyle = "white";
              ctx.font = `bold ${Math.max(28, Math.round(img.width * 0.05))}px Arial`;
              ctx.textAlign = "center";
              ctx.textBaseline = "middle";
              ctx.fillText(text, canvas.width / 2, img.height + barHeight / 2);

              canvas.toBlob(
                (finalBlob) => resolve(finalBlob || blob),
                "image/jpeg",
                0.92,
              );
            };
          };

          reader.readAsDataURL(blob);
        });

      function handlePickMissing(sensorNum) {
        const sensorsRadio = document.querySelector(
          'input[name="viewMode"][value="sensors"]',
        );
        if (sensorsRadio && !sensorsRadio.checked) {
          sensorsRadio.checked = true;
          updateImageModeUI();
        }

        if ($("sensorNumberDropdown"))
          $("sensorNumberDropdown").value = sensorNum;
        if ($("sensorMetaNumberDropdown"))
          $("sensorMetaNumberDropdown").value = sensorNum;

        $("sensorNumberDropdown")?.dispatchEvent(
          new Event("change", { bubbles: true }),
        );
        $("sensorMetaNumberDropdown")?.dispatchEvent(
          new Event("change", { bubbles: true }),
        );

        $("sensorUploadSection")?.scrollIntoView({
          behavior: "smooth",
          block: "start",
        });
        setTimeout(() => $("serialNumber")?.focus(), 250);
      }

      function confirmWithPassword(actionDescription = "this action") {
        const input = prompt(`Enter password to confirm ${actionDescription}:`);
        return Promise.resolve(input === CONFIG.ADMIN_PASSWORD);
      }

      async function populateProjects() {
        const tasks = (await readOnce(`${state.basePath}/tasks`)) || {};

        const allProjects = Object.entries(tasks)
          .map(([id, task]) => {
            const customer = (task.customerName || "").trim();
            const project = (task.project || "").trim();

            if (!customer && !project) return null;

            return {
              id,
              customer,
              project,
              label: `${customer || "(No Customer)"} — ${project || "(No Project)"}`,
              time: bestTime(task, id),
            };
          })
          .filter(Boolean);

        const deduped = new Map();
        allProjects.forEach((project) => {
          const key = `${normKey(project.customer)}|${normKey(project.project)}`;
          const existing = deduped.get(key);
          if (!existing || project.time < existing.time) {
            deduped.set(key, project);
          }
        });

        state.allProjects = Array.from(deduped.values()).sort(
          (a, b) => b.time - a.time,
        );

        renderProjectDropdown(state.allProjects);
      }

      function renderProjectDropdown(projects) {
        if (!$("projectList")) return;
        $("projectList").innerHTML =
          '<option value="">-- Choose a customer --</option>';
        projects.forEach((p) =>
          $("projectList").appendChild(new Option(p.label, p.id)),
        );
      }

      const projectSearchInput = document.getElementById("projectSearch");
      const projectSearchHelper = window.SearchEngine?.attachAuto
        ? window.SearchEngine.attachAuto(projectSearchInput, {
            defaultFields: ["customer", "project", "label"],
            placeholderAdvanced: '🔎... e.g. customer:"acme" project:roof',
          })
        : null;

      if (!projectSearchHelper && projectSearchInput) {
        projectSearchInput.title =
          "Basic search only. Load ./assets/js/search.js for operators.";
      }

      function filterProjects() {
        const rawQuery = String(projectSearchInput?.value || "").trim();
        if (!rawQuery) {
          renderProjectDropdown(state.allProjects);
          return;
        }

        if (projectSearchHelper) {
          const records = state.allProjects.map((p) => ({
            ...p,
            customer: p.customer || "",
            project: p.project || "",
            label: p.label || "",
          }));
          renderProjectDropdown(projectSearchHelper.filter(records, rawQuery));
          return;
        }

        const query = normKey(rawQuery);
        renderProjectDropdown(
          state.allProjects.filter((p) =>
            normKey(`${p.customer} ${p.project}`).includes(query),
          ),
        );
      }

      async function resolveMetaOwnerTaskId() {
        state.metaOwnerTaskId = state.currentProject;

        const projKey = normKey(state.currentProjectName);
        const custKey = normKey(state.currentCustomerName);

        if (!projKey && !custKey) return state.metaOwnerTaskId;

        const tasks = (await readOnce(`${state.basePath}/tasks`)) || {};
        const matches = Object.entries(tasks).filter(
          ([, task]) =>
            normKey(task.project) === projKey &&
            normKey(task.customerName) === custKey,
        );

        if (!matches.length) return state.metaOwnerTaskId;

        matches.sort((a, b) => bestTime(a[1], a[0]) - bestTime(b[1], b[0]));
        state.metaOwnerTaskId = matches[0][0];
        return state.metaOwnerTaskId;
      }

      async function startApp(projectId) {
        state.validated = true;
        localStorage.setItem("lastProject", projectId);

        await populateProjects();
        if ($("projectList")) $("projectList").value = projectId;

        await loadProject(projectId);
      }

      async function loadProject(projectId) {
        if (state.isLoadingProject) return;
        state.isLoadingProject = true;

        try {
          state.currentProject = projectId;

          const data = await readOnce(getTaskPath(projectId));
          if (!data) throw new Error("No project data");

          state.currentProjectName = data.project || "";
          state.currentCustomerName = (data.customerName || "").trim();

          await resolveMetaOwnerTaskId();

          const owner =
            (await readOnce(getTaskPath(state.metaOwnerTaskId))) || data;
          state.expectedSensors =
            Number(
              data?.qcData_radar?.sections?.site_info?.fields?.sensorTotal
                ?.value,
            ) || 0;
          syncSensorTotalToQC();

          if ($("project")) $("project").value = state.currentProjectName;
          if ($("sensorCount"))
            $("field_sensorTotal").value = state.expectedSensors;

          populateSensorDropdown(state.expectedSensors);

          await Promise.all([loadQCChecklist(projectId)]);

          syncSensorTotalToQC();
          initCollapsibles();
          bindRealtimeProjectListener(projectId);
        } catch (err) {
          console.error("[loadProject] Failed:", err);
          alert("Failed to load project. Check console for details.");
        } finally {
          state.isLoadingProject = false;
        }
      }

      function bindRealtimeProjectListener(projectId) {
        if (state.taskListenerUnsub) state.taskListenerUnsub();

        const taskRef = dbRef(database, getTaskPath(projectId));
        state.taskListenerUnsub = onValue(taskRef, (snap) => {
          if (!snap.exists()) return;

          const liveData = snap.val();
          state.currentProjectName = liveData.project || "";
          state.currentCustomerName = (liveData.customerName || "").trim();

          applyTaskToSiteInfo(liveData);

          if (liveData.sensorCount !== undefined) {
            state.expectedSensors = Number(liveData.sensorCount) || 0;
            if ($("sensorCount"))
              $("field_sensorTotal").value = state.expectedSensors;
            populateSensorDropdown(state.expectedSensors);
            syncSensorTotalToQC();
          }

          if (liveData.project !== undefined && $("project")) {
            $("project").value = liveData.project;
          }
        });
      }

      async function saveProjectBasics() {
        if (!state.currentProject) {
          alert("No project selected.");
          return;
        }

        state.currentProjectName = $("project")?.value.trim() || "";
        state.expectedSensors = Math.max(
          0,
          Number($("sensorCount")?.value) || 0,
        );

        await patch(getTaskPath(), {
          project: state.currentProjectName,
          sensorCount: state.expectedSensors,
          updatedAt: Date.now(),
        });

        populateSensorDropdown(state.expectedSensors);
        await populateProjects();

        alert("Project saved.");
      }

      async function initQCConfig(force = false) {
        if (!force && state.qcConfig?.sections?.length) return;

        try {
          $("app").textContent = "Loading checklist...";

          if (!state.currentChecklistFile) {
            throw new Error("No checklist file selected");
          }

          const file = state.currentChecklistFile;

          const response = await fetch(file);
          if (!response.ok) throw new Error(`HTTP ${response.status}`);

          const config = await response.json();

          if (!config || !Array.isArray(config.sections)) {
            throw new Error("Invalid config format");
          }

          state.qcConfig = config;
        } catch (err) {
          console.error("Failed to load QC config:", err);
          $("app").textContent = "Config failed to load.";
        }
      }

      function getSectionConfig(sectionId) {
        return (
          state.qcConfig?.sections?.find(
            (section) => section.id === sectionId,
          ) || null
        );
      }

      const getFieldToggleStorageKey = () =>
        `onlineChecklistFieldVisibility_${state.currentChecklistType}`;

      function getToggleSectionId() {
        if (getSectionConfig("site_info")) return "site_info";
        if (getSectionConfig("audit_info")) return "audit_info";
        return null;
      }

      function getFieldVisibilityDefaults() {
        const sectionId = getToggleSectionId();
        const section = sectionId ? getSectionConfig(sectionId) : null;
        const defaults = {};

        if (!section?.fields?.length) return defaults;

        section.fields.forEach((field) => {
          if (field.hiddenByDefault === true) defaults[field.id] = false;
          if (field.defaultVisible === false) defaults[field.id] = false;
        });

        return defaults;
      }

      function getFieldVisibilityPrefs() {
        try {
          const prefs = JSON.parse(
            localStorage.getItem(getFieldToggleStorageKey()) || "{}",
          );
          const defaults = getFieldVisibilityDefaults();

          Object.entries(defaults).forEach(([key, value]) => {
            if (prefs[key] === undefined) prefs[key] = value;
          });

          return prefs;
        } catch {
          return {};
        }
      }

      function setFieldVisibilityPrefs(prefs) {
        localStorage.setItem(getFieldToggleStorageKey(), JSON.stringify(prefs));
      }

      function applyFieldVisibility() {
        const sectionId = getToggleSectionId();
        if (!sectionId) return;

        const prefs = getFieldVisibilityPrefs();
        $$(`.field-row[data-section-id="${sectionId}"]`).forEach((row) => {
          const fieldId = row.dataset.fieldId;
          const visible = prefs[fieldId] !== false;
          row.classList.toggle("hidden", !visible);
        });
      }

      function renderFieldToggles() {
        const panel = $("fieldTogglePanel");
        if (!panel) return;

        const sectionId = getToggleSectionId();
        const section = sectionId ? getSectionConfig(sectionId) : null;
        if (!section?.fields?.length) {
          panel.innerHTML = "";
          panel.classList.add("hidden");
          return;
        }

        panel.classList.remove("hidden");
        panel.innerHTML = "";

        const prefs = getFieldVisibilityPrefs();

        const header = createEl("div", { className: "field-toggle-header" });
        header.appendChild(createEl("strong", { text: "Field visibility" }));

        const actions = createEl("div", { className: "field-toggle-actions" });
        const showAllBtn = createEl("button", {
          text: "Show all",
          attrs: { type: "button" },
        });
        const hideAllBtn = createEl("button", {
          text: "Hide all",
          attrs: { type: "button" },
        });

        showAllBtn.addEventListener("click", () => {
          section.fields.forEach((field) => {
            prefs[field.id] = true;
          });
          setFieldVisibilityPrefs(prefs);
          renderFieldToggles();
          applyFieldVisibility();
        });

        hideAllBtn.addEventListener("click", () => {
          section.fields.forEach((field) => {
            prefs[field.id] = false;
          });
          setFieldVisibilityPrefs(prefs);
          renderFieldToggles();
          applyFieldVisibility();
        });

        actions.appendChild(showAllBtn);
        actions.appendChild(hideAllBtn);
        header.appendChild(actions);
        panel.appendChild(header);

        const list = createEl("div", { className: "field-toggle-list" });

        section.fields.forEach((field) => {
          const fieldRow = createEl("label", { className: "field-toggle-item" });
          const checkbox = createEl("input", {
            attrs: {
              type: "checkbox",
              id: `toggle_${sectionId}_${field.id}`,
            },
          });
          checkbox.checked = prefs[field.id] !== false;
          checkbox.addEventListener("change", () => {
            prefs[field.id] = checkbox.checked;
            setFieldVisibilityPrefs(prefs);
            applyFieldVisibility();
          });

          fieldRow.appendChild(checkbox);
          fieldRow.appendChild(
            document.createTextNode(` ${field.label || field.id}`),
          );
          list.appendChild(fieldRow);
        });

        panel.appendChild(list);
      }

      function markQCEditing() {
        state.isEditingQC = true;

        if (state.qcEditTimer) clearTimeout(state.qcEditTimer);

        state.qcEditTimer = setTimeout(() => {
          state.isEditingQC = false;
          state.qcEditTimer = null;

          if (state.qcConfig?.sections?.length) {
            const merged = mergeQcData(state.qcDataCache, collectData());
            applyData(merged);
          }
        }, 700);
      }

      function bindRealtimeQCListener(qcPath) {
        if (!qcPath) return;

        if (state.qcDataPath === qcPath && state.qcDataUnsub) return;

        if (state.qcDataUnsub) {
          state.qcDataUnsub();
          state.qcDataUnsub = null;
        }

        state.qcDataPath = qcPath;
        state.qcDataUnsub = onValue(dbRef(database, qcPath), (snap) => {
          const qcData = snap.exists() ? snap.val() : { sections: {} };
          state.qcDataCache = qcData || { sections: {} };

          if (state.isEditingQC) return;

          if (state.qcConfig?.sections?.length) {
            applyData(state.qcDataCache);
          }
        });
      }

      function mergeQcData(existing, incoming) {
        const safeExisting = existing && typeof existing === "object"
          ? existing
          : { sections: {} };
        const safeIncoming = incoming && typeof incoming === "object"
          ? incoming
          : { sections: {} };

        return {
          ...safeExisting,
          ...safeIncoming,
          sections: {
            ...(safeExisting.sections || {}),
            ...(safeIncoming.sections || {})
          }
        };
      }

      function normalizeNightCount(value, fallback = 1) {
        const parsed = parseInt(value, 10);
        if (Number.isNaN(parsed) || parsed <= 0) return fallback;
        return Math.min(parsed, CONFIG.MAX_NIGHTS);
      }

      function getTotalNights(data = null) {
        const raw = data?.sections?.site_info?.fields?.totalNights;
        const fromData = raw && typeof raw === "object" ? raw.value : raw;

        if (fromData != null && fromData !== "") {
          return normalizeNightCount(fromData, CONFIG.DEFAULT_NIGHTS);
        }

        const el = $("field_totalNights");
        if (!el) return CONFIG.DEFAULT_NIGHTS;

        return normalizeNightCount(el.value, CONFIG.DEFAULT_NIGHTS);
      }

      function getFieldElementId(sectionId, fieldId, day = null) {
        return day == null
          ? `field_${fieldId}`
          : `field_${sectionId}_${fieldId}_${day}`;
      }

      const sectionRenderers = {
        fields(section, _data, container) {
          const fragment = document.createDocumentFragment();

          section.fields.forEach((field) => {
            const row = createEl("div", {
              className: "field-row",
              attrs: {
                "data-field-id": field.id,
                "data-section-id": section.id,
              },
            });

            row.appendChild(
              createEl("label", {
                text: field.label,
                attrs: { for: `field_${field.id}` },
              }),
            );

            row.appendChild(
              createEl(field.type === "textarea" ? "textarea" : "input", {
                attrs: {
                  id: `field_${field.id}`,
                  type: field.type === "textarea" ? null : field.type || "text",
                },
              }),
            );

            fragment.appendChild(row);
          });

          container.appendChild(fragment);
        },

        counter(section, _data, container) {
          const fragment = document.createDocumentFragment();

          section.fields.forEach((field) => {
            fragment.appendChild(createEl("label", { text: field.label }));

            const row = createEl("div");
            row.appendChild(
              createEl("input", {
                attrs: {
                  id: `field_${field.id}`,
                  type: "number",
                  placeholder: "Done",
                },
              }),
            );
            row.appendChild(document.createTextNode(" / "));
            row.appendChild(
              createEl("input", {
                attrs: {
                  id: `field_${field.targetId}`,
                  type: "number",
                  placeholder: "Total",
                },
              }),
            );

            fragment.appendChild(row);
          });

          container.appendChild(fragment);
        },

        checklist(section, _data, container) {
          const fragment = document.createDocumentFragment();

          section.items.forEach((item, index) => {
            const itemText = typeof item === "object" ? item.text : item;
            const wrapper = createEl("div", { className: "checkItem" });
            const label = createEl("label");

            const checkbox = createEl("input", {
              attrs: {
                type: "checkbox",
                id: `${section.id}_${index}`,
              },
            });

            checkbox.addEventListener("change", () => {
              label.style.background =
                item.type === "negative" && checkbox.checked
                  ? "rgba(255,0,0,0.2)"
                  : "";
            });

            label.appendChild(checkbox);
            label.appendChild(document.createTextNode(` ${itemText}`));
            wrapper.appendChild(label);
            fragment.appendChild(wrapper);
          });

          if (section.notes) {
            fragment.appendChild(
              createEl("label", {
                text: "Notes",
                attrs: { for: `notes_${section.id}` },
              }),
            );
            fragment.appendChild(
              createEl("textarea", {
                attrs: { id: `notes_${section.id}` },
              }),
            );
          }

          container.appendChild(fragment);
        },

        checklistMultiDay(section, data, container) {
          const days = Math.max(1, getTotalNights(data));
          const fragment = document.createDocumentFragment();

          section.items.forEach((item, index) => {
            const wrapper = createEl("div", { className: "checkItem" });
            wrapper.appendChild(createEl("strong", { text: item.text }));
            wrapper.appendChild(document.createElement("br"));

            for (let day = 0; day < days; day += 1) {
              const label = createEl("label", { className: "checkMulti" });
              label.setAttribute("data-label", `Night ${day + 1}`);
              label.appendChild(
                createEl("input", {
                  attrs: {
                    type: "checkbox",
                    id: `${section.id}_${index}_${day}`,
                  },
                }),
              );
              wrapper.appendChild(label);
            }

            fragment.appendChild(wrapper);
          });

          if (section.notes) {
            fragment.appendChild(
              createEl("label", {
                text: "Notes",
                attrs: { for: `notes_${section.id}` },
              }),
            );
            fragment.appendChild(
              createEl("textarea", {
                attrs: { id: `notes_${section.id}` },
              }),
            );
          }

          container.appendChild(fragment);
        },

        nightCounter(section, data, container) {
          const days = Math.max(1, getTotalNights(data));
          const sensorTotal = Number(
            data?.sections?.site_info?.fields?.sensorTotal?.value ||
              $("field_sensorTotal")?.value ||
              0,
          );

          section.fields.forEach((field) => {
            const wrapper = createEl("div", { className: "row" });
            wrapper.appendChild(createEl("strong", { text: field.label }));
            wrapper.appendChild(document.createElement("br"));

            for (let day = 0; day < days; day += 1) {
              const row = createEl("div");
              row.appendChild(createEl("span", { text: `Night ${day + 1}: ` }));
              row.appendChild(
                createEl("input", {
                  attrs: {
                    id: getFieldElementId(section.id, field.id, day),
                    type: "number",
                    placeholder: "0",
                  },
                }),
              );
              row.appendChild(
                createEl("span", {
                  className: "sensor-total",
                  text: `/ ${sensorTotal}`,
                }),
              );

              wrapper.appendChild(row);
            }

            container.appendChild(wrapper);
          });
        },

        matrix(section, _data, container) {
          const fragment = document.createDocumentFragment();

          section.rows.forEach((row, rowIndex) => {
            const rowDiv = createEl("div", { className: "row" });
            rowDiv.appendChild(createEl("strong", { text: row }));
            rowDiv.appendChild(document.createElement("br"));

            section.columns.forEach((column, colIndex) => {
              const label = createEl("label");
              label.appendChild(
                createEl("input", {
                  attrs: {
                    type: "radio",
                    name: `${section.id}_${rowIndex}`,
                    id: `${section.id}_${rowIndex}_${colIndex}`,
                  },
                }),
              );
              label.appendChild(document.createTextNode(` ${column}`));
              rowDiv.appendChild(label);
            });

            fragment.appendChild(rowDiv);
          });

          container.appendChild(fragment);
        },

        scoring(section, _data, container) {
          const fragment = document.createDocumentFragment();

          section.fields.forEach((field) => {
            fragment.appendChild(
              createEl("label", {
                text: `${field.label} (0-${field.max})`,
                attrs: { for: `score_${field.id}` },
              }),
            );

            fragment.appendChild(
              createEl("input", {
                attrs: {
                  id: `score_${field.id}`,
                  type: "number",
                  max: field.max,
                },
              }),
            );
          });

          fragment.appendChild(
            createEl("label", {
              text: "Total",
              attrs: { for: `score_total_${section.id}` },
            }),
          );

          fragment.appendChild(
            createEl("input", {
              attrs: {
                id: `score_total_${section.id}`,
                readonly: "readonly",
              },
            }),
          );

          container.appendChild(fragment);
        },

        singleSelect(section, _data, container) {
          const fragment = document.createDocumentFragment();

          section.options.forEach((option, index) => {
            const label = createEl("label");
            label.appendChild(
              createEl("input", {
                attrs: {
                  type: "radio",
                  name: section.id,
                  id: `${section.id}_${index}`,
                },
              }),
            );
            label.appendChild(document.createTextNode(` ${option}`));
            fragment.appendChild(label);
          });

          container.appendChild(fragment);
        },
      };

      function renderSection(section, data) {
        const container = $(`section_${section.id}`);
        if (!container) return;

        container.innerHTML = "";
        const renderer = sectionRenderers[section.type];

        if (!renderer) {
          container.textContent = `Unsupported section type: ${section.type}`;
          return;
        }

        renderer(section, data, container);
      }

      function buildApp(data = { sections: {} }) {
        if ($("app")) $("app").innerHTML = "";

        if (!state.qcConfig?.sections?.length) {
          if ($("app")) $("app").textContent = "Checklist config not loaded.";
          return;
        }

        const fragment = document.createDocumentFragment();

        state.qcConfig.sections.forEach((section, index) => {
          const wrapper = createEl("div", {
            className: "collapsible-section",
            attrs: { id: section.id },
          });

          const header = createEl("h2", {
            className: "collapsible-header",
            text: section.title || `Section ${index + 1}`,
          });

          const content = createEl("div", {
            attrs: { id: `section_${section.id}` },
          });

          wrapper.appendChild(header);
          wrapper.appendChild(content);
          fragment.appendChild(wrapper);
        });

        $("app")?.appendChild(fragment);

        state.qcConfig.sections.forEach((section) =>
          renderSection(section, data),
        );
        applyData(data);
        updateAllScoringTotals();
        syncSensorTotalToQC();
        renderFieldToggles();
        applyFieldVisibility();
        initCollapsibles();
      }

      function collectData() {
        const data = { sections: {} };
        if (!state.qcConfig?.sections?.length) return data;

        state.qcConfig.sections.forEach((section) => {
          const sectionData = {};

          if (section.type === "nightCounter") {
            const days = Math.max(1, getTotalNights());
            sectionData.fields = {};

            section.fields.forEach((field) => {
              sectionData.fields[field.id] = [];
              for (let day = 0; day < days; day += 1) {
                sectionData.fields[field.id].push(
                  Number(
                    $(getFieldElementId(section.id, field.id, day))?.value || 0,
                  ),
                );
              }
            });
          }

          if (section.type === "fields" || section.type === "counter") {
            sectionData.fields = {};

            section.fields.forEach((field) => {
              const value = $(`field_${field.id}`)?.value ?? "";

              if (
                section.id === "site_info" &&
                [
                  "date",
                  "endTime",
                  "siteNumber",
                  "customerName",
                  "customerAddress",
                  "sensorTotal",
                  "installSummary",
                  "startOdometer",
                  "endOdometer",
                ].includes(field.id)
              ) {
                return;
              }

              sectionData.fields[field.id] = {
                label: field.label,
                value,
              };

              if (field.targetId) {
                sectionData.fields[field.targetId] =
                  $(`field_${field.targetId}`)?.value ?? "";
              }
            });
          }

          if (section.type === "scoring") {
            sectionData.scores = {};
            let manualScore = 0;

            section.fields.forEach((field) => {
              const value = Number($(`score_${field.id}`)?.value || 0);
              sectionData.scores[field.id] = value;
              manualScore += value;
            });

            const checklistScore = calculateChecklistScoreAll();
            sectionData.total = Math.round(
              checklistScore.percent * 0.7 + manualScore * 0.3,
            );
            sectionData.checklistPercent = checklistScore.percent;
            sectionData.manualScore = manualScore;
          }

          if (section.type === "matrix") {
            sectionData.matrix = section.rows.map((_, rowIndex) => {
              const checked = document.querySelector(
                `input[name="${section.id}_${rowIndex}"]:checked`,
              );
              return checked ? Number(checked.id.split("_").pop()) : null;
            });
          }

          if (section.type === "singleSelect") {
            sectionData.selected = null;
            section.options.forEach((_, index) => {
              if ($(`${section.id}_${index}`)?.checked) {
                sectionData.selected = index;
              }
            });
          }

          if (section.type === "checklist") {
            sectionData.items = section.items.map((item, index) => {
              const checked = Boolean($(`${section.id}_${index}`)?.checked);
              return {
                label: typeof item === "object" ? item.text : item,
                checked,
                value: checked ? 1 : 0,
              };
            });

            if (section.notes) {
              sectionData.notes = $(`notes_${section.id}`)?.value ?? "";
            }
          }

          if (section.type === "checklistMultiDay") {
            const days = Math.max(1, getTotalNights());

            sectionData.items = section.items.map((item, index) => {
              const dayValues = [];
              for (let day = 0; day < days; day += 1) {
                dayValues.push(
                  Boolean($(`${section.id}_${index}_${day}`)?.checked),
                );
              }

              return {
                label: item.text,
                days: dayValues,
                value: dayValues.filter(Boolean).length,
              };
            });

            if (section.notes) {
              sectionData.notes = $(`notes_${section.id}`)?.value ?? "";
            }
          }

          data.sections[section.id] = sectionData;
        });

        return data;
      }

      function applyData(data) {
        const sections = data?.sections || {};

        Object.entries(sections).forEach(([sectionId, sectionData]) => {
          if (sectionData.notes !== undefined) {
            const notesEl = $(`notes_${sectionId}`);
            if (notesEl) notesEl.value = sectionData.notes;
          }

          if (sectionData.fields) {
            Object.entries(sectionData.fields).forEach(([key, value]) => {
              const fieldEl = $(`field_${key}`);
              if (fieldEl) {
                fieldEl.value =
                  value && typeof value === "object" && "value" in value
                    ? value.value
                    : (value ?? "");
              }
            });
          }

          if (sectionData.scores) {
            Object.entries(sectionData.scores).forEach(([key, value]) => {
              const scoreEl = $(`score_${key}`);
              if (scoreEl) scoreEl.value = value;
            });
          }

          if (Array.isArray(sectionData.matrix)) {
            sectionData.matrix.forEach((colIndex, rowIndex) => {
              if (colIndex != null) {
                const radio = $(`${sectionId}_${rowIndex}_${colIndex}`);
                if (radio) radio.checked = true;
              }
            });
          }

          if (sectionData.selected != null) {
            const radio = $(`${sectionId}_${sectionData.selected}`);
            if (radio) radio.checked = true;
          }

          if (Array.isArray(sectionData.items)) {
            sectionData.items.forEach((item, index) => {
              if (Array.isArray(item.days)) {
                item.days.forEach((value, dayIndex) => {
                  const checkbox = $(`${sectionId}_${index}_${dayIndex}`);
                  if (checkbox) checkbox.checked = value;
                });
              } else if (item.checked !== undefined) {
                const checkbox = $(`${sectionId}_${index}`);
                if (checkbox) checkbox.checked = item.checked;
              }
            });
          }

          const sectionConfig = getSectionConfig(sectionId);
          if (sectionConfig?.type === "nightCounter" && sectionData.fields) {
            Object.entries(sectionData.fields).forEach(([fieldId, values]) => {
              (values || []).forEach((value, dayIndex) => {
                const el = $(getFieldElementId(sectionId, fieldId, dayIndex));
                if (el) el.value = value;
              });
            });
          }
        });

        updateAllScoringTotals();
      }

      function calculateChecklistScoreAll() {
        let earned = 0;
        let total = 0;

        state.qcConfig?.sections?.forEach((section) => {
          if (section.type === "checklist") {
            section.items.forEach((item, index) => {
              const weight = item.weight != null ? Number(item.weight) : 1;
              const checked = Boolean($(`${section.id}_${index}`)?.checked);

              if (item.type === "negative") {
                if (checked) {
                  earned -= weight;
                }
              } else {
                total += weight;

                if (checked) {
                  earned += weight;
                }
              }
            });
          }

          if (section.type === "checklistMultiDay") {
            const days = Math.max(1, getTotalNights());

            section.items.forEach((item, index) => {
              const weight = item.weight != null ? Number(item.weight) : 1;

              for (let day = 0; day < days; day += 1) {
                total += weight;
                if (Boolean($(`${section.id}_${index}_${day}`)?.checked)) {
                  earned += weight;
                }
              }
            });
          }
        });

        if (earned < 0) earned = 0;

        return {
          earned,
          total,
          percent: total > 0 ? Math.round((earned / total) * 100) : 0,
        };
      }

      function updateAllScoringTotals() {
        if (!state.qcConfig?.sections?.length) return;

        const checklistScore = calculateChecklistScoreAll();
        let manualScore = 0;

        state.qcConfig.sections.forEach((section) => {
          if (section.type !== "scoring") return;
          section.fields.forEach((field) => {
            manualScore += Number($(`score_${field.id}`)?.value || 0);
          });
        });

        const finalScore = Math.round(
          checklistScore.percent * 0.7 + manualScore * 0.3,
        );
        const totalEl = $("score_total_final_scoring");
        if (totalEl) totalEl.value = finalScore;

        let breakdown = $("score_breakdown");
        if (!breakdown) {
          breakdown = createEl("div", {
            attrs: { id: "score_breakdown" },
            className: "score-breakdown",
          });
          $("section_final_scoring")?.appendChild(breakdown);
        }

        breakdown.innerHTML = `Checklist Score: ${checklistScore.percent}%<br>Manual Score: ${manualScore}<br>Final Score: <strong>${finalScore}</strong>`;
      }

      function updateNightDependentSections() {
        const data = collectData();

        state.qcConfig?.sections?.forEach((section) => {
          if (
            section.type === "nightCounter" ||
            section.type === "checklistMultiDay"
          ) {
            renderSection(section, data);
          }
        });

        applyData(data);
        updateAllScoringTotals();
        syncSensorTotalToQC();
      }

      const saveQCData = debounce(async () => {
        if (!state.currentProject || !state.qcConfig?.sections?.length) return;

        const data = collectData();

        if (!data || !Object.keys(data.sections || {}).length) return;

        const merged = mergeQcData(state.qcDataCache, data);
        await patch(getQCPath(), merged);
      }, 800);

      function applyTaskToSiteInfo(taskData) {
        const map = {
          date: taskData.startTime
            ? new Date(taskData.startTime).toISOString().split("T")[0]
            : "",
          siteNumber: taskData.project || "",
          customerName: taskData.customerName || "",
          sensorTotal: taskData.sensorCount || "",
          installSummary: taskData.notes || "",
          customerAddress: taskData.customerAddress || "",
        };

        Object.entries(map).forEach(([key, value]) => {
          const el = $(`field_${key}`);
          if (!el) return;

          const incoming = normalizeText(value);
          const current = normalizeText(el.value);

          if (!incoming) return;
          if (current) return;

          el.value = value;
        });
      }

      function attachQCListeners() {
        if (state.qcListenerBound) return;

        $("qcChecklistSection")?.addEventListener("input", async (event) => {
          const target = event.target;
          if (!(target instanceof HTMLElement)) return;

          markQCEditing();

          if (target.id.startsWith("field_")) {
            const fieldKey = target.id.replace("field_", "");
            const map = {
              date: "startTime",
              siteNumber: "project",
              customerName: "customerName",
              sensorTotal: "sensorCount",
              installSummary: "notes",
              customerAddress: "customerAddress",
            };

            const taskField = map[fieldKey];
            if (taskField && state.currentProject) {
              let value = target.value;
              if (fieldKey === "date") value = new Date(value).toISOString();
              if (fieldKey === "sensorTotal") value = Number(value);
              await patch(getTaskPath(), { [taskField]: value });
            }
          }

          if (target.id === "field_totalNights") {
            let value = Number(target.value);
            if (Number.isNaN(value)) return;

            value = Math.min(Math.max(value, 1), CONFIG.MAX_NIGHTS);
            target.value = value;

            updateNightDependentSections();
            saveQCData();
            return;
          }

          if (target.id === "field_sensorTotal") {
            const total = target.value;
            $$('[id^="field_nightly_production_"]').forEach((input) => {
              input.parentElement
                ?.querySelector(".sensor-total")
                ?.replaceChildren(document.createTextNode(`/ ${total}`));
            });
            saveQCData();
            return;
          }

          updateAllScoringTotals();
          saveQCData();
        });

        $("qcChecklistSection")?.addEventListener("change", () => {
          markQCEditing();
          updateAllScoringTotals();
          saveQCData();
        });

        state.qcListenerBound = true;
      }

      async function loadQCChecklist(projectId) {
        await initQCConfig();
        if (!state.qcConfig?.sections?.length) return;

        if ($("app")) $("app").innerHTML = "";

        const taskData = (await readOnce(getTaskPath(projectId))) || {};
        let qcData = { sections: {} };

        const qcPath = getQCPath();

        if (qcPath) {
          qcData = (await readOnce(qcPath)) || { sections: {} };
          state.qcDataCache = qcData || { sections: {} };
          bindRealtimeQCListener(qcPath);
        }

        buildApp(qcData);
        applyTaskToSiteInfo(taskData);
        attachQCListeners();
      }

      function getNightlyProductionStats(data) {
        const section = data.sections.nightly_production;
        if (!section?.fields) return null;

        const parseValues = (val) =>
          Array.isArray(val)
            ? val.map((v) => Number(v) || 0)
            : typeof val === "string"
              ? val.split(",").map((v) => Number(v.trim()) || 0)
              : [];

        const sensors = parseValues(section.fields.sensors);
        const nights = Math.max(sensors.length, getTotalNights(data));

        const sensorTotal =
          Number(data?.sections?.site_info?.fields?.sensorTotal?.value) ||
          Number($("field_sensorTotal")?.value) ||
          state.expectedSensors ||
          0;

        let maxDone = 0;
        const result = [];

        for (let i = 0; i < nights; i += 1) {
          const done = Number(sensors[i] ?? 0);
          maxDone = Math.max(maxDone, done);

          result.push({
            night: i + 1,
            done,
            total: sensorTotal,
            pct: sensorTotal > 0 ? Math.round((done / sensorTotal) * 100) : 0,
          });
        }

        return {
          nights: result,
          overall:
            sensorTotal > 0 ? Math.round((maxDone / sensorTotal) * 100) : 0,
        };
      }

      function generateCertificationReport() {
        const data = collectData();
        const scoring = data.sections.final_scoring || {};

        const total = scoring.total || 0;
        const checklistPercent = scoring.checklistPercent || 0;
        const manualScore = scoring.manualScore || 0;

        let result = "PASS";
        if (total < 70) result = "FAIL";
        else if (total < 85) result = "NEEDS IMPROVEMENT";

        const production = getNightlyProductionStats(data);

        const lines = [
          `Total Score: ${total}`,
          `Checklist Score: ${checklistPercent}%`,
          `Manual Score: ${manualScore}`,
          `Result: ${result}`,
        ];

        if (production) {
          lines.push("");
          lines.push("Night Progress:");
          production.nights.forEach((night) => {
            lines.push(
              `Night ${night.night}: ${night.done}/${night.total} (${night.pct}%)`,
            );
          });
          lines.push(`Overall Completion: ${production.overall}%`);
        }

        return lines.join("\n");
      }

      function buildReportFile() {
        const reportText = generateCertificationReport();
        return new Blob([reportText], { type: "text/plain" });
      }

      function buildReportCSVRows() {
        const data = collectData();
        const rows = [["Metric", "Value"]];

        const scoring = data.sections.final_scoring || {};
        const total = scoring.total || 0;

        let result = "PASS";
        if (total < 70) result = "FAIL";
        else if (total < 85) result = "NEEDS IMPROVEMENT";

        rows.push(["Total Score", total], ["Result", result]);

        return rows;
      }

      function exportCertificationCSV() {
        const data = collectData();
        const rows = [["Metric", "Value"]];
        const scoring = data.sections.final_scoring || {};

        const total = scoring.total || 0;
        let result = "PASS";
        if (total < 70) result = "FAIL";
        else if (total < 85) result = "NEEDS IMPROVEMENT";

        rows.push(["Total Score", total], ["Result", result]);

        Object.entries(scoring.scores || {}).forEach(([key, value]) => {
          rows.push([key, value]);
        });

        rows.push([]);
        rows.push(["Night Progress"]);

        const production = getNightlyProductionStats(data);
        if (production) {
          production.nights.forEach((night) => {
            rows.push([
              `Night ${night.night}`,
              `${night.done}/${night.total} (${night.pct}%)`,
            ]);
          });
          rows.push(["Overall Completion", `${production.overall}%`]);
        }

        downloadCSV(rows, "certification_report.csv");
      }

      function initCollapsibles() {
        $$(".collapsible-section").forEach((section) => {
          const header = section.querySelector(".collapsible-header");
          if (!header) return;

          const id = section.id;
          if (!id) return;

          const saved = localStorage.getItem(`collapse:${id}`);
          if (saved === "true") {
            section.classList.add("collapsed");
          }

          if (header.dataset.bound) return;
          header.dataset.bound = "true";

          header.addEventListener("click", () => {
            section.classList.toggle("collapsed");

            localStorage.setItem(
              `collapse:${id}`,
              section.classList.contains("collapsed"),
            );
          });
        });
      }

      function initProjectEvents() {
        $("projectList")?.addEventListener("change", async () => {
          const id = $("projectList")?.value;
          if (id) await loadProject(id);
        });

        $("projectSearch")?.addEventListener("input", filterProjects);

        $("saveProject")?.addEventListener("click", saveProjectBasics);

        $("project")?.addEventListener("blur", async () => {
          const value = $("project")?.value.trim();
          if (!value) return;

          await loadOrCreateProject();
        });
      }

      function initFeatureEvents() {
        $("saveSensorMeta")?.addEventListener("click", saveSensorMeta);

        $("sensorMetaNumberDropdown")?.addEventListener("change", () => {
          loadSensorMeta($("sensorMetaNumberDropdown")?.value);
        });

        $("sensorNumberDropdown")?.addEventListener("change", async () => {
          const sensorNum = $("sensorNumberDropdown")?.value;
          if (!sensorNum) return;

          const data =
            (await readOnce(`${sensorMetaBasePath()}/${sensorNum}`)) || {};
          if (data.serial && $("serialNumber")) {
            $("serialNumber").value = data.serial;
          }
        });

        $$('input[name="viewMode"]').forEach((radio) => {
          radio.addEventListener("change", async () => {
            updateImageModeUI();
          });
        });

        $("missingList")?.addEventListener("click", (e) => {
          const li = e.target.closest("li[data-sensor]");
          if (li) handlePickMissing(li.dataset.sensor);
        });

        $("missingList")?.addEventListener("keydown", (e) => {
          const li = e.target.closest("li[data-sensor]");
          if (li && (e.key === "Enter" || e.key === " ")) {
            e.preventDefault();
            handlePickMissing(li.dataset.sensor);
          }
        });

        $("compareBtn")?.addEventListener("click", () => {
          const report = generateCertificationReport();
          $("comparisonResults").innerHTML =
            `<pre style="white-space: pre-wrap;">${escapeHtml(report || "No report available")}</pre>`;
        });

        $("exportReportBtn")?.addEventListener("click", exportCertificationCSV);

        $("checklistSelector")?.addEventListener("change", async (e) => {
          const target = e.target;
          if (!(target instanceof HTMLInputElement)) return;
          if (target.name !== "checklistType") return;

          const type = target.value;
          state.currentChecklistType = type;
          state.currentChecklistFile = state.checklistFiles[type] || "";
          state.qcConfig = null;

          await initQCConfig(true);
          await loadQCChecklist(state.currentProject);
        });

        $("uploadQCBtn")?.addEventListener("click", uploadReportsToOneDrive);
      }

      function getQCPath() {
        if (!state.currentProject) return null;

        const key =
          state.currentChecklistType ||
          state.currentChecklistFile.replace(/\.json$/i, "");
        return `${getTaskPath()}/qcData_${key}`;
      }

      function syncSensorTotalToQC() {
        const total = state.expectedSensors;

        const qcField = $("field_sensorTotal");
        if (qcField) qcField.value = total;

        $$(".sensor-total").forEach((el) => {
          el.textContent = `/ ${total}`;
        });
      }

      export function getAccessToken() {
        return localStorage.getItem("accessToken");
      }

      onAuthStateChanged(auth, async (user) => {
        state.basePath = user ? user.uid : "public";
        await populateProjects();
      });

      async function loadChecklistOptions() {
        const container = $("checklistSelector");
        if (container) container.innerHTML = "";

        try {
          const res = await fetch("../assets/js/checklist_index.json");
          const entries = await res.json();

          state.checklistFiles = {};

          for (const entry of entries) {
            const item =
              typeof entry === "string"
                ? {
                    file: entry,
                    type: String(entry)
                      .split("/")
                      .pop()
                      .replace(/\.json$/i, ""),
                    title: String(entry)
                      .split("/")
                      .pop()
                      .replace(/\.json$/i, ""),
                  }
                : entry;

            if (!item?.file) continue;

            const response = await fetch(item.file);
            const config = await response.json();

            const type =
              String(item.type || "").trim() ||
              String(item.file || "")
                .split("/")
                .pop()
                .replace(/\.json$/i, "");
            state.checklistFiles[type] = item.file;

            if (container) {
              const label = document.createElement("label");
              const input = document.createElement("input");
              input.type = "radio";
              input.name = "checklistType";
              input.value = type;

              if (!state.currentChecklistType) {
                input.checked = true;
                state.currentChecklistType = type;
                state.currentChecklistFile = item.file;
              }

              label.appendChild(input);
              label.appendChild(
                document.createTextNode(
                  ` ${item.title || config.title || type}`,
                ),
              );
              container.appendChild(label);
            }
          }
        } catch (err) {
          console.error("Failed to load checklist index:", err);
        }
      }

      function buildQCChecklistCSV() {
        const data = collectData();
        const rows = [["Section", "Field", "Value"]];

        Object.entries(data.sections || {}).forEach(([sectionId, section]) => {
          // 🧾 Fields
          if (section.fields) {
            Object.entries(section.fields).forEach(([key, val]) => {
              const value =
                val && typeof val === "object" && "value" in val
                  ? val.value
                  : val;

              rows.push([sectionId, key, normalizeText(value)]);
            });
          }

          // ✅ Checklist
          if (Array.isArray(section.items)) {
            section.items.forEach((item, i) => {
              if (item.label) {
                rows.push([
                  sectionId,
                  item.label,
                  item.checked ?? item.value ?? "",
                ]);
              }

              // multi-day
              if (Array.isArray(item.days)) {
                item.days.forEach((dayVal, d) => {
                  rows.push([
                    sectionId,
                    `${item.label} (Night ${d + 1})`,
                    dayVal,
                  ]);
                });
              }
            });
          }

          // 📊 Scores
          if (section.scores) {
            Object.entries(section.scores).forEach(([k, v]) => {
              rows.push([sectionId, k, v]);
            });

            rows.push([sectionId, "Total Score", section.total || 0]);
          }

          // 🧠 Notes
          if (section.notes) {
            rows.push([sectionId, "Notes", normalizeText(section.notes)]);
          }
        });

        return rows;
      }

      function buildQCChecklistBlob() {
        const rows = buildQCChecklistCSV();

        const csv = rows
          .map((row) =>
            row
              .map((cell) => {
                const text = String(cell ?? "");
                return /[",\n]/.test(text)
                  ? `"${text.replace(/"/g, '""')}"`
                  : text;
              })
              .join(","),
          )
          .join("\n");

        return new Blob([csv], { type: "text/csv" });
      }

      async function uploadReportsToOneDrive() {
        if (!state.currentProject) {
          alert("No project selected");
          return;
        }

        const site = sanitize(state.currentProjectName || state.currentProject);
        const basePath = `Jobs/Radar/${site}`;

        const accessToken = localStorage.getItem("accessToken");
        if (!accessToken) {
          alert("Not logged into Microsoft");
          return;
        }

        try {
          // 📄 Build files
          const qcBlob = buildQCChecklistBlob();
          const reportBlob = buildReportFile();

          const timestamp = new Date().toISOString().replace(/[:.]/g, "-");

          // 📤 Upload QC Checklist
          await fetch(
            `https://graph.microsoft.com/v1.0/me/drive/root:/${basePath}/qc_${timestamp}.csv:/content`,
            {
              method: "PUT",
              headers: {
                Authorization: `Bearer ${accessToken}`,
                "Content-Type": "text/csv",
              },
              body: qcBlob,
            },
          );

          // 📤 Upload Report
          await fetch(
            `https://graph.microsoft.com/v1.0/me/drive/root:/${basePath}/report_${timestamp}.txt:/content`,
            {
              method: "PUT",
              headers: {
                Authorization: `Bearer ${accessToken}`,
                "Content-Type": "text/plain",
              },
              body: reportBlob,
            },
          );

          alert("QC Checklist + Report uploaded ✅");
        } catch (err) {
          console.error(err);
          alert("Upload failed.");
        }
      }

      async function uploadQCChecklistToOneDrive() {
        if (!state.currentProject) {
          alert("No project selected");
          return;
        }

        const site = sanitize(state.currentProjectName || state.currentProject);
        const path = `Jobs/Radar/${site}`;

        const accessToken = localStorage.getItem("accessToken");
        if (!accessToken) {
          alert("Not logged into Microsoft");
          return;
        }

        try {
          const rows = buildQCChecklistCSV();

          const csv = rows
            .map((r) =>
              r
                .map((cell) => {
                  const text = String(cell ?? "");
                  return /[",\n]/.test(text)
                    ? `"${text.replace(/"/g, '""')}"`
                    : text;
                })
                .join(","),
            )
            .join("\n");

          const blob = new Blob([csv], { type: "text/csv" });

          await fetch(
            `https://graph.microsoft.com/v1.0/me/drive/root:/${path}/qc_checklist.csv:/content`,
            {
              method: "PUT",
              headers: {
                Authorization: `Bearer ${accessToken}`,
                "Content-Type": "text/csv",
              },
              body: blob,
            },
          );

          alert("QC Checklist uploaded ✅");
        } catch (err) {
          console.error(err);
          alert("QC upload failed.");
        }
      }

      async function uploadToOneDrive(
        path,
        fileBlob,
        filename,
        contentType = "application/octet-stream",
      ) {
        const accessToken = localStorage.getItem("accessToken");
        if (!accessToken) {
          alert("Not logged into Microsoft");
          return;
        }

        const fullPath = `${path}/${filename}`;

        const res = await fetch(
          `https://graph.microsoft.com/v1.0/me/drive/root:/${fullPath}:/content`,
          {
            method: "PUT",
            headers: {
              Authorization: `Bearer ${accessToken}`,
              "Content-Type": contentType,
            },
            body: fileBlob,
          },
        );

        if (!res.ok) {
          const err = await res.text();
          console.error("Upload failed:", err);
          throw new Error("OneDrive upload failed");
        }

        return await res.json();
      }

      async function initApp() {
        initProjectEvents();
        initFeatureEvents();
        initCollapsibles();

        await loadChecklistOptions();

        if (state.currentChecklistFile) {
          await initQCConfig(true);

          if (state.currentProject) {
            await loadQCChecklist(state.currentProject);
          }
        }
      }

      initApp();
    </script>
  </body>
