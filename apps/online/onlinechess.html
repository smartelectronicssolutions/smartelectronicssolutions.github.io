<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Chess</title>
    <link rel="stylesheet" href="../assets/css/online.css">
    <script>(function () { if (localStorage.getItem('ss-theme') === 'light') document.documentElement.classList.add('light'); }());</script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { flex-shrink: 0; }
        .game-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg, #0d1b2a);
            overflow: hidden;
        }
        #phaser-game canvas { display: block; }

        .stats-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 6px 16px;
            background: var(--surface, #111c2a);
            border-bottom: 1px solid var(--border, #1e3048);
            font-size: 0.82rem;
            color: var(--muted, #a0b8cc);
            flex-shrink: 0;
        }
        .stats-bar span { color: var(--text, #e7ecff); }
        .stats-bar button {
            margin-left: auto;
            padding: 4px 14px;
            border-radius: 6px;
            border: 1px solid var(--border, #1e3048);
            background: transparent;
            color: var(--muted, #a0b8cc);
            font-size: 0.8rem;
            cursor: pointer;
        }
        .stats-bar button:hover { border-color: steelblue; color: steelblue; }
        #turn-label { color: steelblue; font-weight: 600; }
    </style>
</head>
<body>
    <header style="position:relative;">
        <div class="logo-box">
            <a href="../../index.html"><img src="../../assets/img/android-chrome-192x192.png" alt="Luis Solutions"></a>
        </div>
        <h1 id="appTitle">Chess</h1>
        <div class="auth-bar">
            <span id="auth-label">Not signed in</span>
            <button class="btn" id="auth-btn">Sign In</button>
        </div>
        <button id="theme-toggle" title="Toggle theme">☀️</button>
        <script>(function () {
            var b = document.getElementById('theme-toggle'), h = document.documentElement;
            b.textContent = h.classList.contains('light') ? '🌙' : '☀️';
            b.addEventListener('click', function () {
                var n = h.classList.contains('light') ? 'dark' : 'light';
                h.classList.toggle('light', n === 'light');
                localStorage.setItem('ss-theme', n);
                b.textContent = n === 'light' ? '🌙' : '☀️';
            });
        }());</script>
        <div id="login-inline">
            <h3>Sign In</h3>
            <input type="email" id="email-in" placeholder="Email">
            <input type="password" id="pass-in" placeholder="Password">
            <button class="btn" id="do-login">Sign In</button>
            <p id="auth-err"></p>
        </div>
    </header>

    <div class="stats-bar">
        <div>Turn: <span id="turn-label">White</span></div>
        <div>Score: <span id="score-value">0</span></div>
        <button id="resetGame">Reset</button>
    </div>

    <div class="game-wrap">
        <div id="phaser-game"></div>
    </div>

    <script type="module" src="../assets/js/auth.js"></script>
    <script src="../assets/js/links-aside.js" defer></script>

    <script type="module">
        import { auth, database, ref, onValue, set, off, onAuthStateChanged } from '../../assets/js/firebase-init.js';

        // Chess Unicode — proper white (outline) and black (filled) symbols
        const SYMBOLS = {
            white: { king:'♔', queen:'♕', rook:'♖', bishop:'♗', knight:'♘', pawn:'♙' },
            black: { king:'♚', queen:'♛', rook:'♜', bishop:'♝', knight:'♞', pawn:'♟' },
        };

        const SQ = 72;
        const COLS = 8, ROWS = 8;
        const W = SQ * COLS, H = SQ * ROWS;

        let uid = 'public';
        let activeStateRef = null;

        onAuthStateChanged(auth, u => {
            uid = u ? u.uid : 'public';
            document.getElementById('auth-label').textContent = u ? u.email : 'Not signed in';
            if (currentScene) loadState(currentScene);
        });

        const config = {
            type: Phaser.AUTO,
            width: W, height: H,
            parent: 'phaser-game',
            transparent: true,
            physics: { default: 'arcade', arcade: { gravity: { y: 0 }, debug: false } },
            scene: { preload, create, update },
            scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
        };

        const game = new Phaser.Game(config);
        let player, cursors;
        let chessPieces = [];
        let carriedPiece = null;
        let currentTurn = 'white';
        let score = 0;
        let currentScene = null;
        let highlights = [];

        function preload() {}

        function create() {
            currentScene = this;
            drawBoard(this);

            const g = this.add.graphics();
            g.fillStyle(0x4a90c4, 1);
            g.fillCircle(SQ / 2, SQ / 2, SQ * 0.3);
            g.generateTexture('player_tex', SQ, SQ);
            g.destroy();

            player = this.physics.add.sprite(SQ / 2, SQ * 6 + SQ / 2, 'player_tex')
                .setDisplaySize(SQ * 0.6, SQ * 0.6).setDepth(2);

            loadState(this);

            cursors = this.input.keyboard.createCursorKeys();

            this.input.on('pointerdown', pointer => {
                const gx = Math.floor(pointer.x / SQ);
                const gy = Math.floor(pointer.y / SQ);
                if (gx < 0 || gx >= COLS || gy < 0 || gy >= ROWS) return;

                if (!carriedPiece) {
                    const p = pieceAt(gx, gy);
                    if (p && p.color === currentTurn) {
                        carriedPiece = p;
                        p.sprite.setDepth(3).setScale(1.2);
                        player.x = gx * SQ + SQ / 2;
                        player.y = gy * SQ + SQ / 2;
                        showHighlights(p);
                    }
                } else {
                    player.x = gx * SQ + SQ / 2;
                    player.y = gy * SQ + SQ / 2;
                    carriedPiece.sprite.setScale(1);
                    toggleCarry();
                }
            });

            document.getElementById('resetGame').addEventListener('click', resetGame);
        }

        function drawBoard(scene) {
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const light = (r + c) % 2 === 0;
                    const g = scene.add.graphics();
                    g.fillStyle(light ? 0xf0d9b5 : 0xb58863, 1);
                    g.fillRect(c * SQ, r * SQ, SQ, SQ);
                }
            }
        }

        function defaultPieces() {
            const layout = [
                ['rook','knight','bishop','queen','king','bishop','knight','rook'],
            ];
            const pieces = [];
            // Black back row
            layout[0].forEach((type, x) => pieces.push({ x, y: 0, type, color: 'black' }));
            // Black pawns
            for (let x = 0; x < 8; x++) pieces.push({ x, y: 1, type: 'pawn', color: 'black' });
            // White pawns
            for (let x = 0; x < 8; x++) pieces.push({ x, y: 6, type: 'pawn', color: 'white' });
            // White back row
            layout[0].forEach((type, x) => pieces.push({ x, y: 7, type, color: 'white' }));
            return pieces;
        }

        function spawnPiece(scene, p) {
            const sym = SYMBOLS[p.color][p.type];
            const txt = scene.add.text(
                p.x * SQ + SQ / 2,
                p.y * SQ + SQ / 2,
                sym,
                { fontSize: `${SQ * 0.65}px`, color: p.color === 'black' ? '#1a1a1a' : '#ffffff',
                  stroke: p.color === 'black' ? '#ffffff' : '#1a1a1a', strokeThickness: 2 }
            ).setOrigin(0.5, 0.5).setDepth(1);
            return { ...p, sprite: txt };
        }

        function loadState(scene) {
            if (activeStateRef) off(activeStateRef);
            activeStateRef = ref(database, `${uid}/gameState/chess`);
            onValue(activeStateRef, snap => {
                chessPieces.forEach(p => p.sprite?.destroy());
                chessPieces = [];
                carriedPiece = null;

                const data = snap.val();
                const raw = data?.pieces ?? defaultPieces();
                chessPieces = raw.map(p => spawnPiece(scene, p));

                if (data?.turn) currentTurn = data.turn;
                if (data?.score) score = data.score;
                updateUI();
            });
        }

        function saveState() {
            set(ref(database, `${uid}/gameState/chess`), {
                pieces: chessPieces.map(({ x, y, type, color }) => ({ x, y, type, color })),
                turn: currentTurn,
                score,
            });
        }

        function update() {
            if (Phaser.Input.Keyboard.JustDown(cursors.left)  && player.x - SQ >= 0)    move(-SQ, 0);
            if (Phaser.Input.Keyboard.JustDown(cursors.right) && player.x + SQ < W)     move(SQ, 0);
            if (Phaser.Input.Keyboard.JustDown(cursors.up)    && player.y - SQ >= 0)    move(0, -SQ);
            if (Phaser.Input.Keyboard.JustDown(cursors.down)  && player.y + SQ < H)     move(0, SQ);
            if (Phaser.Input.Keyboard.JustDown(cursors.space)) toggleCarry();
        }

        function move(dx, dy) {
            player.x += dx;
            player.y += dy;
            if (carriedPiece) {
                carriedPiece.sprite.setPosition(player.x, player.y - SQ * 0.5);
            }
        }

        function gridPos() {
            return { gx: Math.floor(player.x / SQ), gy: Math.floor(player.y / SQ) };
        }

        function pieceAt(gx, gy) {
            return chessPieces.find(p => p.x === gx && p.y === gy);
        }

        function toggleCarry() {
            const { gx, gy } = gridPos();
            if (!carriedPiece) {
                const p = pieceAt(gx, gy);
                if (p && p.color === currentTurn) {
                    carriedPiece = p;
                    p.sprite.setDepth(3).setScale(1.2);
                    showHighlights(p);
                }
            } else {
                // Same square — cancel without changing turn
                if (gx === carriedPiece.x && gy === carriedPiece.y) {
                    cancelCarry();
                    return;
                }
                // Illegal move — cancel
                if (!isLegalMove(carriedPiece, gx, gy)) {
                    cancelCarry();
                    return;
                }
                // Capture enemy
                const target = pieceAt(gx, gy);
                if (target) {
                    score += target.type === 'king' ? 100 : 10;
                    target.sprite.destroy();
                    chessPieces = chessPieces.filter(p => p !== target);
                }
                carriedPiece.x = gx;
                carriedPiece.y = gy;
                carriedPiece.sprite.setPosition(gx * SQ + SQ / 2, gy * SQ + SQ / 2).setDepth(1).setScale(1);
                clearHighlights();
                carriedPiece = null;
                currentTurn = currentTurn === 'white' ? 'black' : 'white';
                updateUI();
                saveState();
            }
        }

        function cancelCarry() {
            carriedPiece.sprite
                .setPosition(carriedPiece.x * SQ + SQ / 2, carriedPiece.y * SQ + SQ / 2)
                .setDepth(1).setScale(1);
            clearHighlights();
            carriedPiece = null;
        }

        function showHighlights(piece) {
            clearHighlights();
            for (let gy = 0; gy < ROWS; gy++) {
                for (let gx = 0; gx < COLS; gx++) {
                    if (!isLegalMove(piece, gx, gy)) continue;
                    const target = pieceAt(gx, gy);
                    const isCapture = target && target.color !== piece.color;
                    const g = currentScene.add.graphics();
                    g.fillStyle(isCapture ? 0xff4444 : 0x44dd88, 0.35);
                    g.fillCircle(gx * SQ + SQ / 2, gy * SQ + SQ / 2, SQ * 0.28);
                    g.setDepth(1);
                    highlights.push(g);
                }
            }
        }

        function clearHighlights() {
            highlights.forEach(g => g.destroy());
            highlights = [];
        }

        function isPathClear(x1, y1, x2, y2) {
            const dx = Math.sign(x2 - x1);
            const dy = Math.sign(y2 - y1);
            let x = x1 + dx, y = y1 + dy;
            while (x !== x2 || y !== y2) {
                if (pieceAt(x, y)) return false;
                x += dx;
                y += dy;
            }
            return true;
        }

        function isLegalMove(piece, toX, toY) {
            if (toX < 0 || toX >= COLS || toY < 0 || toY >= ROWS) return false;
            const dx = toX - piece.x;
            const dy = toY - piece.y;
            if (dx === 0 && dy === 0) return false;
            const target = pieceAt(toX, toY);
            if (target && target.color === piece.color) return false;
            const adx = Math.abs(dx), ady = Math.abs(dy);

            switch (piece.type) {
                case 'pawn': {
                    const dir = piece.color === 'white' ? -1 : 1;
                    const startRow = piece.color === 'white' ? 6 : 1;
                    if (dx === 0 && dy === dir && !target) return true;
                    if (dx === 0 && dy === 2 * dir && piece.y === startRow && !target && !pieceAt(piece.x, piece.y + dir)) return true;
                    if (adx === 1 && dy === dir && target && target.color !== piece.color) return true;
                    return false;
                }
                case 'rook':
                    if (dx !== 0 && dy !== 0) return false;
                    return isPathClear(piece.x, piece.y, toX, toY);
                case 'knight':
                    return (adx === 2 && ady === 1) || (adx === 1 && ady === 2);
                case 'bishop':
                    if (adx !== ady) return false;
                    return isPathClear(piece.x, piece.y, toX, toY);
                case 'queen':
                    if (dx !== 0 && dy !== 0 && adx !== ady) return false;
                    return isPathClear(piece.x, piece.y, toX, toY);
                case 'king':
                    return adx <= 1 && ady <= 1;
                default:
                    return false;
            }
        }

        function updateUI() {
            document.getElementById('turn-label').textContent = currentTurn.charAt(0).toUpperCase() + currentTurn.slice(1);
            document.getElementById('score-value').textContent = score;
        }

        function resetGame() {
            set(ref(database, `${uid}/gameState/chess`), null);
            currentTurn = 'white';
            score = 0;
        }
    </script>
</body>
</html>
