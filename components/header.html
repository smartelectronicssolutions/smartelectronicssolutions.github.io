            </div>
        </div>
        <nav class="nav-links" id="navLinks">
            <a href="index.html" class="nav-home">Home</a>
            <a href="electronics.html" class="nav-electronics">Electronics</a>

        </nav>
        <button id="theme-toggle" title="Toggle theme">☀️</button>
    </nav>
</header>
<script>
    (function () {
        // Auto active state
        const path = window.location.pathname.split('/').pop() || 'index.html';
        const normalized = (path === 'web.html' || path === 'apps.html') ? 'workspace.html'
            : (path === 'ju.html') ? 'shop.html'
                : path;
        document.querySelectorAll('.nav-links a').forEach(link => {
            if (link.getAttribute('href') === normalized || (normalized === '' && link.getAttribute('href') === 'index.html')) {
                link.classList.add('active');
            }
        });


        // Apply saved preference (or system preference on first visit)
        if (saved) {
            applyTheme(saved);
        } else if (window.matchMedia('(prefers-color-scheme: light)').matches) {
            applyTheme('light');
        }

        btn.addEventListener('click', () => {
            const isLight = html.classList.contains('light');
            const next = isLight ? 'dark' : 'light';
            localStorage.setItem('ss-theme', next);
            applyTheme(next);
        });
    })();
</script>
