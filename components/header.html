<header id="site-header">
    <nav>
        <div class="logo-box"><a href="index.html"><img src="assets/img/glogo.png" alt="Smart Solutions"></a></div>
        <div class="site-name">Smart Solutions</div>
        <div class="hamburger-box">
            <div class="hamburger" id="hamburger">
                <div class="line"></div>
                <div class="line"></div>
                <div class="line"></div>
            </div>
        </div>
        <nav class="nav-links" id="navLinks">
            <a href="index.html" class="nav-home">Home</a>
            <a href="electronics.html" class="nav-electronics">Electronics</a>
            <a href="shop.html" class="nav-shop">Shop</a>
            <a href="workspace.html" class="nav-workspace">Workspace</a>
            <a href="contact.html" class="nav-contact">Contact</a>
            <a href="#" class="nav-account" id="hdr-account-link">Sign In</a>
        </nav>
        <button id="theme-toggle" title="Toggle theme">☀️</button>
    </nav>
    <div id="header-auth-panel" style="
        display:none; position:absolute; top:100%; right:20px; z-index:200;
        background:var(--surface); border:1px solid var(--border); border-radius:8px;
        box-shadow:0 4px 20px rgba(0,0,0,.3); padding:16px; min-width:240px;
    ">
        <div id="header-auth-loggedout">
            <input id="hdr-email" type="email" placeholder="Email" style="width:100%;padding:7px 10px;margin-bottom:8px;border-radius:5px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:.9rem;">
            <input id="hdr-password" type="password" placeholder="Password" style="width:100%;padding:7px 10px;margin-bottom:10px;border-radius:5px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:.9rem;">
            <button id="hdr-login-btn" style="width:100%;padding:8px;border-radius:5px;border:none;background:var(--primary);color:#fff;font-size:.9rem;cursor:pointer;">Sign In</button>
            <p id="hdr-auth-error" style="color:#e55;font-size:.8rem;margin:6px 0 0;display:none;"></p>
        </div>
        <div id="header-auth-loggedin" style="display:none;">
            <p id="hdr-user-email" style="font-size:.85rem;color:var(--text-muted);margin:0 0 10px;"></p>
            <button id="hdr-logout-btn" style="width:100%;padding:8px;border-radius:5px;border:none;background:var(--border);color:var(--text);font-size:.9rem;cursor:pointer;">Sign Out</button>
        </div>
    </div>
</header>
