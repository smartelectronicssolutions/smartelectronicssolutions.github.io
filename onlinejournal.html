<!doctype html>
<html lang="en" class="theme-web">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Online Journal</title>

  <link rel="stylesheet" href="assets/css/master.css" />
  <link rel="icon" href="assets/img/favicon.ico" />

  <style>
    .journal-shell {
      max-width: 1280px;
      margin: auto;
      padding: 24px;
    }

    .journal-layout {
      display: grid;
      grid-template-columns: 420px minmax(0, 1fr);
      gap: 20px;
      align-items: start;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      min-width: 0;
      width: 60vw;
    }

    .panel h2 {
      margin-bottom: 12px;
    }

    label {
      display: block;
      font-size: 0.88rem;
      color: var(--muted);
      margin-bottom: 4px;
    }

    input,
    textarea {
      width: 100%;
      margin-top: 4px;
      margin-bottom: 12px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface2);
      color: var(--text);
      font: inherit;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    .section-card {
      border: 1px solid var(--border);
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 12px;
      background: var(--surface2);
    }

    .section-card h4 {
      margin: 0 0 8px;
      font-size: 0.95rem;
    }

    .entry-card {
      border: 1px solid var(--border);
      padding: 14px;
      border-radius: 10px;
      margin-bottom: 12px;
      cursor: pointer;
      background: var(--surface2);
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .entry-card:hover {
      background: var(--surface);
      transform: translateY(-2px);
    }

    .entry-card small {
      display: block;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .entry-card h3 {
      margin: 0 0 8px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .btn {
      padding: 8px 12px;
      cursor: pointer;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }

    .status-line {
      margin-top: 12px;
      min-height: 22px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .muted-line {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 10px;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .article-meta {
      margin-bottom: 14px;
      color: var(--muted);
    }

    .article-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 12px 0 18px;
    }

    .tag {
      display: inline-block;
      font-size: 0.75rem;
      padding: 5px 10px;
      border-radius: 999px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
    }

    .article-section {
      border-top: 1px solid var(--border);
      padding-top: 16px;
      margin-top: 16px;
    }

    .article-section h3 {
      margin-bottom: 8px;
      color: var(--primary);
    }

    .article-section ul {
      padding-left: 20px;
      margin: 10px 0 0;
    }

    .article-section li {
      margin-bottom: 8px;
    }

    .article-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .empty-state {
      color: var(--muted);
      padding: 16px;
      border: 1px dashed var(--border);
      border-radius: 10px;
      background: var(--surface2);
    }

    .auth-indicator {
      padding: 8px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 12px;
    }

    @media (max-width: 980px) {
      .journal-layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div id="header-placeholder"></div>

  <main>
    <div class="journal-shell">
      <div class="auth-indicator" id="authIndicator">Loading...</div>

      <div class="journal-layout">

        <!-- LEFT: EDITOR -->
        <section class="panel" style="display: none;">
          <h2 id="editorTitle">Create Article</h2>
          <p class="muted-line">
            Build article-style entries with sections and step lists.
          </p>

          <label for="title">Title</label>
          <input id="title" placeholder="Article title" />

          <label for="description">Description</label>
          <textarea id="description" placeholder="Short article summary"></textarea>

          <label for="tags">Tags</label>
          <input id="tags" placeholder="tag1, tag2, tag3" />

          <div class="actions">
            <button class="btn" id="addSection" type="button">Add Section</button>
            <button class="btn" id="save" type="button">Save Article</button>
            <button class="btn btn-outline" id="clearFormBtn" type="button">Clear</button>
          </div>

          <div id="sections"></div>

          <div class="status-line" id="statusLine"></div>
        </section>

        <!-- RIGHT: VIEW -->
        <section class="panel">
          <div id="listView">
            <div class="toolbar">
              <button class="btn btn-outline" id="refreshListBtn" type="button">Refresh</button>
            </div>
            <h2>Articles</h2>
            <div id="list"></div>
          </div>

          <div id="articleView" style="display:none;">
            <div class="toolbar">
              <button class="btn btn-outline" id="backToListBtn" type="button">Back to List</button>
            </div>

            <h2 id="articleTitle"></h2>
            <div class="article-meta" id="articleDate"></div>
            <p id="articleDescription"></p>
            <div class="article-tags" id="articleTags"></div>
            <div id="articleSections"></div>

            <div class="article-actions" style="display: none;">
              <button class="btn" id="editArticleBtn" type="button">Edit Article</button>
              <button class="btn btn-outline" id="deleteArticleBtn" type="button">Delete Article</button>
            </div>
          </div>
        </section>

      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="assets/js/main.js"></script>

  <script type="module">
    import { auth, database } from "./assets/js/firebase-init-noauth.js";
    import {
      ref,
      set,
      get,
      remove
    } from "https://www.gstatic.com/firebasejs/9.1.3/firebase-database.js";

    import {
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/9.1.3/firebase-auth.js";

    /* =========================
       GLOBAL STATE
    ========================= */

    let PATH = "share/journalArticles";
    let currentUser = null;

    let sections = [];
    let allArticles = {};
    let currentArticleId = null;
    let editingId = null;
    let isSaving = false;

    /* =========================
       ELEMENTS
    ========================= */

    const authIndicator = document.getElementById("authIndicator");

    const titleInput = document.getElementById("title");
    const descriptionInput = document.getElementById("description");
    const tagsInput = document.getElementById("tags");
    const sectionsContainer = document.getElementById("sections");
    const statusLine = document.getElementById("statusLine");
    const editorTitle = document.getElementById("editorTitle");

    const addSectionBtn = document.getElementById("addSection");
    const saveBtn = document.getElementById("save");
    const clearFormBtn = document.getElementById("clearFormBtn");

    const listView = document.getElementById("listView");
    const articleView = document.getElementById("articleView");
    const listEl = document.getElementById("list");

    const articleTitle = document.getElementById("articleTitle");
    const articleDate = document.getElementById("articleDate");
    const articleDescription = document.getElementById("articleDescription");
    const articleTags = document.getElementById("articleTags");
    const articleSections = document.getElementById("articleSections");

    const backToListBtn = document.getElementById("backToListBtn");
    const refreshListBtn = document.getElementById("refreshListBtn");
    const editArticleBtn = document.getElementById("editArticleBtn");
    const deleteArticleBtn = document.getElementById("deleteArticleBtn");

    /* =========================
       AUTH HANDLING
    ========================= */

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        PATH = `${user.uid}/journalArticles`;
        currentUser = user;

        authIndicator.textContent = `Personal Journal (${user.email})`;
        authIndicator.style.background = "var(--primary)";
        authIndicator.style.color = "#000";

      } else {
        PATH = "share/journalArticles";
        currentUser = null;

        authIndicator.textContent = "Public Shared Journal";
        authIndicator.style.background = "var(--surface2)";
        authIndicator.style.color = "var(--muted)";
      }

      await loadArticles(true);
    });

    /* =========================
       HELPERS
    ========================= */

    function setStatus(msg, err = false) {
      statusLine.textContent = msg || "";
      statusLine.style.color = err ? "#ff6b6b" : "var(--muted)";
    }

    function escapeHtml(v) {
      return String(v ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function getTags() {
      return tagsInput.value.split(",").map(t => t.trim()).filter(Boolean);
    }

    function getSections() {
      return sections.map(s => ({
        title: s.title.trim(),
        summary: s.summary.trim(),
        steps: s.steps.map(x => x.trim()).filter(Boolean)
      })).filter(s => s.title || s.summary || s.steps.length);
    }

    /* =========================
       SECTIONS
    ========================= */

    function addSection(sec = { title: "", summary: "", steps: [] }) {
      sections.push(sec);
      renderSections();
    }

    function renderSections() {
      sectionsContainer.innerHTML = "";

      if (!sections.length) {
        sectionsContainer.innerHTML = `<div class="empty-state">No sections yet</div>`;
        return;
      }

      sections.forEach((s, i) => {
        const div = document.createElement("div");
        div.className = "section-card";

        div.innerHTML = `
      <h4>Section ${i + 1}</h4>
      <input data-i="${i}" class="title" value="${escapeHtml(s.title)}" placeholder="Title"/>
      <textarea data-i="${i}" class="summary">${escapeHtml(s.summary)}</textarea>
      <textarea data-i="${i}" class="steps">${escapeHtml(s.steps.join("\n"))}</textarea>
      <div class="actions">
        <button data-i="${i}" class="up">↑</button>
        <button data-i="${i}" class="down">↓</button>
        <button data-i="${i}" class="del">Remove</button>
      </div>
    `;

        sectionsContainer.appendChild(div);
      });

      document.querySelectorAll(".title").forEach(el => {
        el.oninput = e => sections[e.target.dataset.i].title = e.target.value;
      });

      document.querySelectorAll(".summary").forEach(el => {
        el.oninput = e => sections[e.target.dataset.i].summary = e.target.value;
      });

      document.querySelectorAll(".steps").forEach(el => {
        el.oninput = e => {
          sections[e.target.dataset.i].steps = e.target.value.split("\n");
        };
      });

      document.querySelectorAll(".del").forEach(btn => {
        btn.onclick = () => {
          sections.splice(btn.dataset.i, 1);
          renderSections();
        };
      });
    }

    /* =========================
       SAVE
    ========================= */

    async function saveArticle() {
      if (isSaving) return;

      const title = titleInput.value.trim();
      if (!title) return setStatus("Title required", true);

      try {
        isSaving = true;
        saveBtn.disabled = true;

        const id = editingId || Date.now().toString();

        const payload = {
          title,
          description: descriptionInput.value.trim(),
          tags: getTags(),
          sections: getSections(),
          updatedAt: Date.now(),
          createdAt: editingId ? allArticles[id].createdAt : Date.now()
        };

        await set(ref(database, `${PATH}/${id}`), payload);

        editingId = id;
        currentArticleId = id;

        await loadArticles();

        setStatus("Saved ✓");

      } catch (e) {
        console.error(e);
        setStatus("Save failed", true);
      }

      isSaving = false;
      saveBtn.disabled = false;
    }

    /* =========================
       LOAD / LIST
    ========================= */

    async function loadArticles(initial = false) {
      const snap = await get(ref(database, PATH));
      allArticles = snap.exists() ? snap.val() : {};

      renderList();

      if (initial) {
        const params = new URLSearchParams(location.search);
        const id = params.get("id");
        if (id && allArticles[id]) renderArticle(id);
      }
    }

    function renderList() {
      listEl.innerHTML = "";

      Object.entries(allArticles)
        .sort((a, b) => b[0] - a[0])
        .forEach(([id, a]) => {

          const div = document.createElement("div");
          div.className = "entry-card";

          div.innerHTML = `
        <h3>${escapeHtml(a.title)}</h3>
        <p>${escapeHtml(a.description || "")}</p>
      `;

          div.onclick = () => {
            location.search = `?id=${id}`;
          };

          listEl.appendChild(div);
        });
    }

    /* =========================
       VIEW
    ========================= */

    function renderArticle(id) {
      const a = allArticles[id];
      if (!a) return;

      currentArticleId = id;

      listView.style.display = "none";
      articleView.style.display = "block";

      articleTitle.textContent = a.title;
      articleDescription.textContent = a.description || "";

      articleSections.innerHTML = "";

      (a.sections || []).forEach(s => {
        const div = document.createElement("div");

        div.innerHTML = `
      <h3>${escapeHtml(s.title)}</h3>
      <p>${escapeHtml(s.summary)}</p>
      <ul>${(s.steps || []).map(x => `<li>${escapeHtml(x)}</li>`).join("")}</ul>
    `;

        articleSections.appendChild(div);
      });

      // SHOW edit/delete ONLY if user owns data
      if (currentUser) {
        editArticleBtn.style.display = "inline-block";
        deleteArticleBtn.style.display = "inline-block";
      }
    }

    /* =========================
       DELETE
    ========================= */

    async function deleteArticle() {
      if (!currentArticleId) return;

      if (!confirm("Delete?")) return;

      await remove(ref(database, `${PATH}/${currentArticleId}`));

      currentArticleId = null;
      location.search = "";
    }

    /* =========================
       EVENTS
    ========================= */

    addSectionBtn.onclick = () => addSection();
    saveBtn.onclick = saveArticle;
    clearFormBtn.onclick = () => location.reload();

    backToListBtn.onclick = () => {
      location.search = "";
    };

    refreshListBtn.onclick = () => loadArticles();

    editArticleBtn.onclick = () => {
      const a = allArticles[currentArticleId];
      if (!a) return;

      editingId = currentArticleId;

      titleInput.value = a.title;
      descriptionInput.value = a.description;
      tagsInput.value = (a.tags || []).join(", ");

      sections = a.sections || [];
      renderSections();
    };

    deleteArticleBtn.onclick = deleteArticle;

    renderSections();
  </script>
</body>

</html>
