<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Smart Tech Solutions — Repair Price Calculator for phones, tablets, and devices.">
    <title>Repair Calculator — Smart Tech Solutions</title>
    <link rel="stylesheet" href="assets/css/master.css">
    <link rel="icon" href="assets/img/favicon.ico">
    <style>
        :root {
            --color-primary: #2a9d8f;
            --color-primary-lt: #4ac8ba;
            --color-accent: #1d7a70;
        }

        .calc-wrap {
            max-width: 720px;
            margin: 40px auto;
            padding: 0 24px;
        }

        .calc-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            padding: 36px 28px;
            text-align: center;
        }

        .calc-card img.logo {
            height: 56px;
            margin: 0 auto 20px;
            border-radius: 8px;
        }

        .calc-card h1 {
            font-size: 1.6rem;
            margin-bottom: 8px;
        }

        .calc-card>p {
            color: var(--color-text-muted);
            margin-bottom: 24px;
        }

        .radios {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .radios span {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--color-text-muted);
            font-size: 0.9rem;
        }

        .radios input {
            width: auto;
        }

        #phoneImage {
            max-height: 160px;
            margin: 16px auto;
            border-radius: 8px;
        }

        #repairOptions label {
            display: block;
            text-align: left;
            max-width: 440px;
            margin: 6px auto;
            color: var(--color-text-muted);
            font-size: 0.9rem;
        }

        #repairOptions input {
            width: auto;
            margin-right: 8px;
        }

        h3 {
            margin-top: 20px;
            font-size: 1.1rem;
        }

        #discountAmount {
            max-width: 200px;
            margin-top: 8px;
        }

        .sheets-link {
            display: inline-block;
            margin-top: 14px;
            color: var(--color-text-muted);
            font-size: var(--font-size-sm);
            text-decoration: none;
        }

        .sheets-link:hover {
            color: #4ac8ba;
        }

        .links-section {
            max-width: 720px;
            margin: 0 auto 40px;
            padding: 0 24px;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 16px;
        }

        .links-grid a {
            display: block;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 8px;
            padding: 10px 14px;
            color: var(--color-text-muted);
            font-size: var(--font-size-sm);
            text-align: center;
            transition: border-color 0.2s;
        }

        .links-grid a:hover {
            border-color: #2a9d8f;
            color: #4ac8ba;
        }
    </style>
</head>

<body>

    <div id="header-placeholder"></div>

    <main>
        <div class="calc-wrap">
            <div class="calc-card">
                <img class="logo" src="assets/img/logo.png" alt="Smart Tech Solutions">
                <h1>Repair Price Calculator</h1>
                <p>Select a brand and model to see repair pricing.</p>

                <div class="radios">
                    <span><input type="radio" id="Apple" name="brand" value="Apple" checked> <label
                            for="Apple">Apple</label></span>
                    <span><input type="radio" id="Samsung" name="brand" value="Samsung"> <label
                            for="Samsung">Samsung</label></span>
                    <span><input type="radio" id="Other" name="brand" value="Other"> <label
                            for="Other">Other</label></span>
                </div>

                <label for="modelSelect">Select Model:</label>
                <select id="modelSelect"></select>
                <img id="phoneImage" src="" alt="Device">
                <div id="repairOptions"></div>

                <h3>Total Before Tax: $<span id="totalPrice">0</span></h3>
                <input type="number" id="discountAmount" placeholder="Discount amount" min="0">

                <br>
                <a class="sheets-link"
                    href="https://docs.google.com/spreadsheets/d/1DJfvnvlLIQYloI3GmJz8nG_3YnvSfBRTOP0DEKfixtI/edit#gid=1923309158"
                    target="_blank" rel="noopener">
                    📊 Open Price Sheet
                </a>
            </div>
        </div>

        <div class="links-section">
            <h2 class="section-title">Quick Links</h2>
            <div class="links-grid">
                <a href="https://laptopscreens.com" target="_blank" rel="noopener">Laptop Screens</a>
                <a href="https://gsx2.apple.com/" target="_blank" rel="noopener">Apple GSX</a>
                <a href="https://diagnostics.apple.com/" target="_blank" rel="noopener">Apple Diagnostics</a>
                <a href="https://imeicheck.com/" target="_blank" rel="noopener">IMEI Check</a>
                <a href="https://www.3u.com/" target="_blank" rel="noopener">3uTools</a>
                <a href="https://luissolutions.github.io/websites/cpr/reg.html">Register</a>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="assets/js/main.js" defer></script>
    <script type="module" src="assets/js/cpr.js"></script>
</body>

</html>
