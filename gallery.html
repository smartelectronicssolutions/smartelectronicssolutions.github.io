<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Smart Solutions — art gallery and creative collection.">
    <title>Gallery — Smart Solutions</title>
    <link rel="stylesheet" href="assets/css/master.css">
    <link rel="icon" href="assets/img/favicon.ico">
    <style>
        .gallery-hero { text-align: center; padding: 56px 24px 40px; background: linear-gradient(160deg, #0a0a18 0%, #0d0d2a 60%, #0a0a18 100%); }
        .gallery-hero h1 { font-size: clamp(2rem, 4vw, 2.8rem); margin-bottom: 12px; }
        .gallery-hero p { color: var(--color-text-muted); max-width: 540px; margin: 0 auto 28px; line-height: 1.7; }

        .gallery-body { max-width: 1200px; margin: 0 auto; padding: 40px 24px; }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 12px;
        }

        .photo-grid img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: var(--radius);
            border: 1px solid var(--color-border);
            cursor: zoom-in;
            transition: transform 0.2s, border-color 0.2s;
        }

        .photo-grid img:hover { transform: scale(1.02); border-color: var(--color-primary); }

        .lightbox {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.92); z-index: 500;
            align-items: center; justify-content: center;
            padding: 24px;
        }
        .lightbox.active { display: flex; }
        .lightbox img { max-width: 90vw; max-height: 85vh; border-radius: var(--radius); object-fit: contain; }
        .lightbox-close { position: fixed; top: 16px; right: 20px; background: none; border: none; color: white; font-size: 2rem; cursor: pointer; }

        @media (max-width: 600px) { .photo-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

    <div id="header-placeholder"></div>

    <section class="gallery-hero">
        <span class="label">Creative</span>
        <h1>Art Collection</h1>
        <p>A curated collection of digital art and AI-generated imagery.</p>
    </section>

    <main class="gallery-body">
        <div class="photo-grid" id="photoGrid"></div>
    </main>

    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightboxClose">✕</button>
        <img id="lightboxImg" src="" alt="">
    </div>

    <div id="footer-placeholder"></div>

    <script>
        document.getElementById('hamburger').addEventListener('click', () => document.getElementById('navLinks').classList.toggle('active'));

        // Build gallery from shared assets
        const grid = document.getElementById('photoGrid');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightboxImg');

        // Gallery images — from assets/img/ai subfolders
        const images = [
            ...Array.from({length: 10}, (_, i) => `assets/img/ai/robots/00001-120971211${i}.png`),
        ];

        // Load gallery from Firebase photos.json if available, otherwise show placeholder grid
        fetch('apps/assets/js/photos.json')
            .then(r => r.ok ? r.json() : Promise.reject())
            .then(photos => {
                photos.forEach(photo => addImg(photo.url || photo));
            })
            .catch(() => {
                // Fallback — show images from assets/img/ai
                ['robots', 'other'].forEach(folder => {
                    for (let i = 1; i <= 8; i++) {
                        addImg(`assets/img/ai/${folder}/00001-120971211${i}.png`);
                    }
                });
            });

        function addImg(src) {
            const img = document.createElement('img');
            img.src = src;
            img.loading = 'lazy';
            img.alt = 'Gallery image';
            img.addEventListener('error', () => img.remove());
            img.addEventListener('click', () => {
                lightboxImg.src = src;
                lightbox.classList.add('active');
            });
            grid.appendChild(img);
        }

        document.getElementById('lightboxClose').addEventListener('click', () => lightbox.classList.remove('active'));
        lightbox.addEventListener('click', e => { if (e.target === lightbox) lightbox.classList.remove('active'); });
        document.addEventListener('keydown', e => { if (e.key === 'Escape') lightbox.classList.remove('active'); });
    </script>
    <script src="assets/js/main.js" defer></script>
</body>
</html>
